<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>酒場 — 銀の鹿亭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=MedievalSharp&display=swap" rel="stylesheet">
  <style>
    :root {
      --parchment-bg: linear-gradient(135deg, #f1e2bb 0%, #e9d49a 50%, #d8bc7e 100%);
      --parchment-ink: #3a2912;
      --parchment-ink-soft: #5a4323;
      --parchment-gold: #8b6914;
      --parchment-border: #8b6914;
      --parchment-shadow: 0 0 12px rgba(40,20,0,0.6), inset 0 0 20px rgba(120,80,30,0.25);
      --wood-dark: #3a2614;
      --wood-mid: #5a3a1e;
      --stone: #2a251e;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Cinzel', 'Times New Roman', serif;
      background: #0a0805;
      color: #f5e8c8;
      user-select: none;
    }

    /* 酒場の背景: 木の床＋石壁＋暖炉の灯り */
    #tavern {
      position: relative;
      width: 100vw; height: 100vh;
      background:
        radial-gradient(ellipse at 50% 35%, rgba(255,170,80,0.18) 0%, rgba(10,6,4,0.0) 50%),
        radial-gradient(ellipse at 50% 90%, rgba(80,50,20,0.35) 0%, rgba(10,5,0,0.95) 75%),
        /* 木の床 */
        repeating-linear-gradient(90deg,
          #4a2e18 0 52px, #3a2312 52px 54px),
        /* 石壁下地 */
        linear-gradient(180deg, var(--stone) 0%, #1a1510 55%, #2a1e12 55%, #2a1e12 100%);
      background-color: #1a120a;
    }

    /* 上部: 石壁 + 梁 */
    #wallTop {
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 55%;
      background:
        repeating-linear-gradient(0deg,
          rgba(255,255,255,0.02) 0 2px, rgba(0,0,0,0.08) 2px 4px),
        repeating-linear-gradient(90deg,
          transparent 0 80px, rgba(0,0,0,0.25) 80px 84px,
          transparent 84px 160px, rgba(0,0,0,0.25) 160px 164px),
        linear-gradient(180deg, #3a332a 0%, #2c261e 100%);
      border-bottom: 6px solid #1a1008;
      box-shadow: inset 0 -20px 40px rgba(0,0,0,0.6);
      pointer-events: none;
    }
    /* 暖炉(中央奥) */
    #fireplace {
      position: absolute;
      left: 50%; top: 12%;
      transform: translateX(-50%);
      width: 200px; height: 140px;
      background:
        radial-gradient(ellipse at 50% 75%, rgba(255,180,60,0.9) 0%, rgba(255,120,20,0.5) 35%, rgba(80,20,0,0) 70%),
        linear-gradient(180deg, #1a0a04 0%, #3a1a08 100%);
      border: 8px solid #2a1a10;
      border-radius: 6px 6px 0 0;
      box-shadow: 0 0 40px rgba(255,120,40,0.4), inset 0 -10px 20px rgba(255,100,20,0.3);
      pointer-events: none;
    }
    @keyframes flicker {
      0%,100% { opacity: 0.95; }
      50%     { opacity: 1.0; }
    }
    #fireplace::before {
      content: "";
      position: absolute;
      inset: 40% 20% 10% 20%;
      background: radial-gradient(ellipse at 50% 100%, #ffda70 0%, #ff8020 40%, #c04010 70%, transparent 90%);
      animation: flicker 0.6s infinite ease-in-out;
      border-radius: 50% 50% 0 0;
    }

    /* タイトル帯 */
    #title {
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      padding: 10px 36px;
      background: var(--parchment-bg);
      border: 2px double var(--parchment-border);
      box-shadow: var(--parchment-shadow);
      font-family: 'MedievalSharp', serif;
      font-size: 26px;
      color: var(--parchment-gold);
      letter-spacing: 4px;
      text-shadow: 0 1px 0 rgba(255,240,200,0.6);
      z-index: 10;
    }
    #title small {
      display: block;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--parchment-ink-soft);
      margin-top: 2px;
    }

    /* プレイヤー情報カード(左上) */
    #playerCard {
      position: absolute;
      top: 22px; left: 22px;
      padding: 10px 16px 10px 14px;
      background: var(--parchment-bg);
      border: 2px solid var(--parchment-border);
      box-shadow: var(--parchment-shadow);
      color: var(--parchment-ink);
      font-family: 'MedievalSharp', serif;
      font-size: 14px;
      min-width: 180px;
      z-index: 10;
    }
    #playerCard .name {
      font-size: 18px;
      color: var(--parchment-gold);
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    #playerCard .stat { font-size: 12px; color: var(--parchment-ink-soft); }

    /* NPCテーブルエリア */
    #tableArea {
      position: absolute;
      inset: 55% 8% 100px 8%;
      z-index: 5;
    }
    .table {
      position: absolute;
      width: 200px; height: 130px;
      cursor: pointer;
      transition: transform 0.15s ease-out;
    }
    .table:hover { transform: translateY(-4px); }
    .table.locked { cursor: not-allowed; }
    .table.locked:hover { transform: none; }

    /* 円卓 */
    .tableTop {
      position: absolute;
      left: 50%; bottom: 4px;
      transform: translateX(-50%);
      width: 170px; height: 46px;
      background:
        radial-gradient(ellipse at 50% 40%, #7a5028 0%, #4a2a12 70%, #2a1608 100%);
      border: 3px solid #1a0d04;
      border-radius: 50%;
      box-shadow: 0 6px 14px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,180,100,0.2);
    }
    .tableTop::before {
      content: "";
      position: absolute;
      inset: 4px 12px 10px 12px;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,200,120,0.15), transparent 70%);
      border-radius: 50%;
    }

    /* NPC 本体 */
    .npc {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      width: 58px; height: 76px;
      z-index: 2;
    }
    .npc .body {
      position: absolute;
      left: 8px; top: 22px;
      width: 42px; height: 46px;
      background: linear-gradient(180deg, #6a4030 0%, #3a2010 100%);
      border-radius: 16px 16px 6px 6px;
      border: 2px solid #1a0a04;
    }
    .npc .head {
      position: absolute;
      left: 14px; top: 0;
      width: 30px; height: 30px;
      background: radial-gradient(circle at 50% 40%, #e0b080 0%, #a07050 100%);
      border-radius: 50%;
      border: 2px solid #1a0a04;
    }
    .npc .cap {
      position: absolute;
      left: 10px; top: -4px;
      width: 38px; height: 14px;
      background: #3a2a40;
      border: 2px solid #1a0a04;
      border-radius: 12px 12px 2px 2px;
    }

    /* バリエーション: 商人 / 盗賊風 / 司祭 / ???  */
    .npc.merchant .body { background: linear-gradient(180deg, #6a4a20 0%, #3a2810 100%); }
    .npc.merchant .cap  { background: #7a5020; border-color: #3a2010; width: 44px; left: 7px; }
    .npc.ranger .body   { background: linear-gradient(180deg, #3a5a2a 0%, #1a3010 100%); }
    .npc.ranger .cap    { background: #2a4018; }
    .npc.villager .body { background: linear-gradient(180deg, #4a4a60 0%, #252540 100%); }
    .npc.villager .cap  { display: none; }
    .npc.soldier .body  { background: linear-gradient(180deg, #505868 0%, #28303a 100%); }
    .npc.soldier .cap   { background: #8a8a92; }
    .npc.cleric  .body  { background: linear-gradient(180deg, #e6dcbc 0%, #a09278 100%); }
    .npc.cleric  .cap   { background: #fff8d8; border-color: #604020; }
    .npc.mystery .body  { background: linear-gradient(180deg, #2a1a3a 0%, #0a0a1a 100%); }
    .npc.mystery .head  { background: radial-gradient(circle at 50% 40%, #2a0a2a 0%, #0a0005 100%); }
    .npc.mystery .cap   { background: #1a0a2a; }

    .table.locked .npc {
      filter: grayscale(0.9) brightness(0.4);
    }
    .table.locked .tableTop {
      opacity: 0.5;
    }

    /* NPC の上に漂う看板(依頼プレビュー) */
    .sign {
      position: absolute;
      left: 50%; top: -4px;
      transform: translateX(-50%);
      min-width: 150px;
      padding: 6px 10px;
      background: var(--parchment-bg);
      border: 2px solid var(--parchment-border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      color: var(--parchment-ink);
      font-family: 'MedievalSharp', serif;
      font-size: 13px;
      text-align: center;
      line-height: 1.3;
      pointer-events: none;
    }
    .sign .place { color: var(--parchment-gold); font-size: 14px; letter-spacing: 1px; }
    .sign .diff  { font-size: 11px; color: #8b3020; margin-top: 2px; letter-spacing: 1px; }
    .table.locked .sign {
      background: linear-gradient(135deg, #3a3a3a, #1a1a1a);
      color: #707070;
      border-color: #404040;
    }
    .table.locked .sign .place { color: #707070; }
    .table.locked .sign .diff { color: #505050; }

    /* 床タグ (テーブル番号的な) */
    .floorTag {
      position: absolute;
      left: 50%; bottom: -10px;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(200,170,120,0.4);
      pointer-events: none;
    }

    /* 会話モーダル */
    #dialog {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(4,6,10,0.72);
      z-index: 100;
      backdrop-filter: blur(2px);
    }
    #dialogBox {
      position: relative;
      width: min(620px, 92vw);
      max-height: 80vh;
      padding: 32px 40px;
      background: var(--parchment-bg);
      border: 3px double var(--parchment-border);
      box-shadow: var(--parchment-shadow);
      color: var(--parchment-ink);
      overflow-y: auto;
    }
    #dialogBox::before, #dialogBox::after {
      content: "";
      position: absolute;
      width: 28px; height: 28px;
      border: 2px solid var(--parchment-gold);
      pointer-events: none;
    }
    #dialogBox::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
    #dialogBox::after  { bottom: 10px; right: 10px; border-left: none; border-top: none; }
    #dialogHead {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(90,60,20,0.35);
    }
    #dialogHead .clientName {
      font-family: 'MedievalSharp', serif;
      font-size: 22px;
      color: var(--parchment-gold);
      letter-spacing: 2px;
    }
    #dialogHead .clientRole {
      font-size: 13px;
      color: var(--parchment-ink-soft);
      font-style: italic;
    }
    #dialogPlace {
      font-family: 'MedievalSharp', serif;
      font-size: 17px;
      color: #5a2010;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    #dialogQuote {
      font-size: 15px;
      line-height: 1.65;
      margin-bottom: 18px;
      padding-left: 14px;
      border-left: 3px solid var(--parchment-gold);
      color: var(--parchment-ink);
    }
    .meta {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 4px 12px;
      font-size: 14px;
      margin-bottom: 18px;
    }
    .meta .k { color: var(--parchment-ink-soft); font-weight: 700; letter-spacing: 1px; }
    .meta .v { color: var(--parchment-ink); }
    .meta .v.reward { color: #8b6914; font-weight: 700; }

    .enemyList { margin-top: 4px; }
    .enemyList .tag {
      display: inline-block;
      padding: 2px 8px;
      margin: 2px 3px 2px 0;
      background: rgba(90,60,20,0.15);
      border: 1px solid rgba(90,60,20,0.5);
      border-radius: 10px;
      font-size: 12px;
      color: var(--parchment-ink);
    }
    .enemyList .tag.boss {
      background: rgba(160,40,20,0.2);
      border-color: #8b2010;
      color: #8b2010;
      font-weight: 700;
    }

    .choices {
      display: flex;
      gap: 14px;
      justify-content: flex-end;
      margin-top: 22px;
    }
    .btn {
      padding: 10px 26px;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 2px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      text-transform: uppercase;
      transition: filter 0.1s;
    }
    .btn.accept {
      background: var(--parchment-gold);
      color: #fff8e0;
    }
    .btn.decline {
      background: #5a3a20;
      color: #e8d8bc;
    }
    .btn:hover { filter: brightness(1.15); }
    .btn:active { filter: brightness(0.9); }

    /* 未解放の会話 */
    #dialog.locked #dialogBox {
      background: linear-gradient(135deg, #2a2620 0%, #1a1814 100%);
      color: #908878;
      border-color: #505040;
    }
    #dialog.locked .clientName,
    #dialog.locked #dialogPlace,
    #dialog.locked .meta .v.reward {
      color: #a09070;
    }
    #dialog.locked #dialogQuote { border-left-color: #706040; }

    /* 準備画面(スタブ) */
    #prep {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-start;
      justify-content: center;
      background: rgba(4,6,10,0.85);
      z-index: 90;
      overflow-y: auto;             /* 画面より長い内容はスクロール可能に */
      padding: 30px 0;
    }
    #prepBox {
      position: relative;
      width: min(720px, 92vw);
      max-height: calc(100vh - 60px); /* 画面内に収まる場合は内部スクロール */
      overflow-y: auto;
      padding: 36px 44px;
      background: var(--parchment-bg);
      border: 3px double var(--parchment-border);
      box-shadow: var(--parchment-shadow);
      color: var(--parchment-ink);
      margin: 0 auto;
    }
    #prepBox h2 {
      font-family: 'MedievalSharp', serif;
      color: var(--parchment-gold);
      letter-spacing: 4px;
      font-size: 28px;
      margin: 0 0 4px 0;
    }
    #prepBox .sub {
      color: var(--parchment-ink-soft);
      font-size: 13px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .prepPanel {
      background: rgba(120,90,40,0.12);
      border: 1px dashed rgba(90,60,20,0.5);
      padding: 14px 18px;
      margin-bottom: 12px;
      border-radius: 3px;
    }
    .prepPanel .ph {
      font-family: 'MedievalSharp', serif;
      color: var(--parchment-ink-soft);
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .prepPanel .stub {
      font-size: 13px;
      color: var(--parchment-ink-soft);
      font-style: italic;
    }

    /* 装備選択リスト */
    .equipGroup {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .equipLabel {
      flex: 0 0 48px;
      padding-top: 4px;
      color: var(--parchment-ink-soft);
      font-family: 'MedievalSharp', serif;
      font-size: 13px;
      letter-spacing: 2px;
    }
    .equipList {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .equipItem {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: rgba(255,245,210,0.55);
      border: 2px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s, border-color 0.1s;
    }
    .equipItem:hover:not(.locked) {
      background: rgba(255,245,210,0.85);
    }
    .equipItem.selected {
      background: linear-gradient(180deg, #f0daa0, #d8bc7e);
      border-color: var(--parchment-gold);
      box-shadow: inset 0 0 8px rgba(139,105,20,0.3);
    }
    .equipItem.locked {
      opacity: 0.35;
      cursor: not-allowed;
      filter: grayscale(0.7);
    }
    .equipItem .eName {
      font-weight: 700;
      color: var(--parchment-ink);
    }
    .equipItem .eSpec {
      color: var(--parchment-ink-soft);
      font-size: 12px;
      font-style: italic;
    }
    .equipItem.selected .eName,
    .equipItem.selected .eSpec { color: #3a2010; }

    /* 装備の色分類 (白=通常 / 青=+Nエンハンスメント / 紫=特殊効果) */
    .item-normal  { color: var(--parchment-ink); }
    .item-magic   { color: #1a5ac0; font-weight: 700; }
    .item-special { color: #7a28a8; font-weight: 700; text-shadow: 0 0 4px rgba(180,80,220,0.3); }
    .equipItem.selected .item-magic,
    .equipItem.selected .item-special { filter: brightness(0.9); }

    /* スキル選択リスト */
    .skillList {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .skillItem {
      padding: 7px 10px;
      background: rgba(255,245,210,0.55);
      border: 2px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.35;
      transition: background 0.1s, border-color 0.1s;
    }
    .skillItem:hover:not(.full) {
      background: rgba(255,245,210,0.85);
    }
    .skillItem.selected {
      background: linear-gradient(180deg, #dcc2f0, #b090d8);
      border-color: #7a4da0;
      box-shadow: inset 0 0 8px rgba(110,60,160,0.3);
    }
    .skillItem.full:not(.selected) {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .skillItem .sName {
      font-weight: 700;
      color: var(--parchment-ink);
      display: block;
      margin-bottom: 2px;
    }
    .skillItem .sCat {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--parchment-gold);
      margin-right: 4px;
    }
    .skillItem .sFlavor {
      color: var(--parchment-ink-soft);
      font-size: 11px;
    }
    .skillItem.selected .sName,
    .skillItem.selected .sFlavor { color: #2a0a3a; }
    .skillItem.selected .sCat    { color: #5a2085; }
    #skillSlotCounter {
      font-size: 13px;
      color: var(--parchment-ink-soft);
      margin-left: 8px;
    }
    #skillSlotCounter.full { color: #8b2010; font-weight: 700; }
    #skillSlotTitle {
      font-size: 13px;
      color: var(--parchment-gold);
      letter-spacing: 2px;
      margin-left: 4px;
    }

    /* パーティースロットタブ (編成中のキャラ数に応じて自動列数) */
    .partyTabs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 3px;
      margin-bottom: 8px;
    }

    /* パーティ編成トグル (6キャラから 1〜4人選択) */
    .partyComp {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      margin-top: 6px;
    }
    .partyMemberToggle {
      background: rgba(245,232,200,0.35);
      border: 2px solid rgba(139,105,20,0.35);
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: all 150ms ease;
      position: relative;
      color: var(--parchment-ink-soft);
    }
    .partyMemberToggle:hover {
      background: rgba(245,232,200,0.6);
      border-color: rgba(139,105,20,0.6);
    }
    .partyMemberToggle.active {
      background: linear-gradient(180deg, #d8bc7e, #b89c5e);
      border-color: rgba(139,105,20,0.85);
      box-shadow: 0 0 8px rgba(180,140,60,0.45);
      color: var(--parchment-ink);
    }
    .partyMemberToggle.locked {
      cursor: not-allowed;
    }
    .partyMemberToggle.locked::after {
      content: "★";
      position: absolute;
      top: 3px;
      right: 5px;
      font-size: 10px;
      color: rgba(180,30,30,0.85);
    }
    .partyMemberToggle .memberName {
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    .partyMemberToggle .memberRole {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 2px;
    }
    .partyMemberToggle.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .equipToggleBtn {
      font-family: 'Noto Serif JP', serif;
      font-size: 12px;
      padding: 4px 12px;
      background: rgba(255,245,210,0.4);
      border: 1px solid rgba(139,105,20,0.4);
      border-radius: 4px;
      color: var(--parchment-ink-soft);
      cursor: pointer;
      transition: background 0.12s;
      letter-spacing: 0.5px;
    }
    .equipToggleBtn:hover { background: rgba(255,245,210,0.75); }
    .equipToggleBtn.active {
      background: linear-gradient(180deg, #d8bc7e, #b89c5e);
      color: #2a1808;
      border-color: var(--parchment-border);
      font-weight: 700;
    }
    .partyTab {
      padding: 6px 4px;
      text-align: center;
      font-family: 'MedievalSharp', serif;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      background: rgba(255,245,210,0.4);

      return out;
    }
    return (raw && typeof raw === "object") ? { ...raw } : {};
  }

  // 装備・スキルの選択状態 (localStorage から復元)
  function loadSelections() {
    let equipWeapon = inventory.weaponIdx;
    let equipArmor  = inventory.armorIdx;
    let equipShield = inventory.shieldIdx;
    // キャラ別スキル: { warrior: [...], cleric: [...], ... }
    const partySkills = {};
    for (const slot of PARTY_SLOTS) {
      if (slot) partySkills[slot.classKey] = [...slot.defaults];
    }
    // パーティ編成 (1-4人): 第1段階は戦士強制リーダー、デフォルト 4人推奨構成
    let partyComposition = ["warrior", "dwarf", "cleric", "mage"];
    // 仲間装備 (キャラ別。CHAR_EQUIP に登録された全キャラ分の枠を作る)
    const allyEquip = {};
    for (const key of Object.keys(CHAR_EQUIP)) {
      if (key !== "warrior" && CHAR_EQUIP[key]) {
        allyEquip[key] = { weapon: 0, armor: 0, shield: 0 };
      }
    }
    try {
      const w = localStorage.getItem("dragonfighters.equipWeaponIdx");
      const a = localStorage.getItem("dragonfighters.equipArmorIdx");
      const s = localStorage.getItem("dragonfighters.equipShieldIdx");
      if (w !== null) equipWeapon = Math.min(Number(w), inventory.weaponIdx);
      if (a !== null) equipArmor  = Math.min(Number(a), inventory.armorIdx);
      if (s !== null) equipShield = Math.min(Number(s), inventory.shieldIdx);
      // 仲間装備の選択 (キャラ別、所持上限は warrior の inventory と同じカウンタを共有)
      const aeRaw = localStorage.getItem("dragonfighters.allyEquip");
      if (aeRaw) {
        const ae = JSON.parse(aeRaw);
        for (const key of Object.keys(allyEquip)) {
          if (ae[key]) {
            const pool = CHAR_EQUIP[key];
            if (pool) {
              allyEquip[key].weapon = Math.min(ae[key].weapon | 0, pool.weapons.length - 1, inventory.weaponIdx);
              allyEquip[key].armor  = Math.min(ae[key].armor  | 0, pool.armors.length - 1,  inventory.armorIdx);
              allyEquip[key].shield = Math.min(ae[key].shield | 0, pool.shields.length - 1, inventory.shieldIdx);
            }
          }
        }
      }
      // 新キー: partySkills (キャラ別) 優先
      const psRaw = localStorage.getItem("dragonfighters.partySkills");
      if (psRaw) {
        const ps = JSON.parse(psRaw);
        for (const slot of PARTY_SLOTS) {
          if (slot && Array.isArray(ps[slot.classKey])) {
            // skillPool 内の ID だけ受け入れる (旧 ID はマイグレーション)
            // 空配列でも尊重する (ユーザが全スキルを外した状態 → AI もスキル使用しない)
            const validIds = new Set(slot.skillPool.map(sk => sk.id));
            const migrated = ps[slot.classKey]
              .map(id => id === "sneak-attack" ? "shadow-step" : id)
              .filter(id => validIds.has(id))
              .slice(0, SKILL_SLOT_LIMIT);
            partySkills[slot.classKey] = migrated;
          }
        }
      } else {
        // 旧キー equippedSkills が残っていれば戦士のスキルとして移行
        const oldRaw = localStorage.getItem("dragonfighters.equippedSkills");
        if (oldRaw) {
          const old = JSON.parse(oldRaw);
          if (Array.isArray(old)) {
            partySkills["warrior"] = old.slice(0, SKILL_SLOT_LIMIT);
          }
        }
      }
      // パーティ編成 (Step 2-C 完了: 先頭=リーダー、誰でもなれる)
      const pcRaw = localStorage.getItem("dragonfighters.partyComposition");
      if (pcRaw) {
        const pc = JSON.parse(pcRaw);
        if (Array.isArray(pc) && pc.length >= 1 && pc.length <= 4) {
          const validKeys = new Set(PARTY_SLOTS.map(s => s.classKey));
          const filtered = pc.filter(k => validKeys.has(k));
          if (filtered.length > 0) {
            partyComposition = filtered.slice(0, 4);
          }
        }
      }
    } catch (e) { /* ignore */ }
    return { equipWeapon, equipArmor, equipShield, partySkills, allyEquip, partyComposition };
  }
  const selection = loadSelections();

  function saveSelections() {
    try {
      localStorage.setItem("dragonfighters.equipWeaponIdx", String(selection.equipWeapon));
      localStorage.setItem("dragonfighters.equipShieldIdx", String(selection.equipShield));
      localStorage.setItem("dragonfighters.equipArmorIdx",  String(selection.equipArmor));
      localStorage.setItem("dragonfighters.partySkills", JSON.stringify(selection.partySkills));
      localStorage.setItem("dragonfighters.allyEquip",  JSON.stringify(selection.allyEquip));
      localStorage.setItem("dragonfighters.partyComposition", JSON.stringify(selection.partyComposition));
    } catch (e) { /* ignore */ }
  }
  // 戦士の実戦闘ステ (index.html の playerStats と同期)
  const PLAYER_DMG_DICE = "1d8";
  const PLAYER_DMG_BONUS = 3;
  const PLAYER_WEAPON_RANGE = "melee";
  function formatWeaponLine(name, dmgDice, dmgBonus, rangeKey, rarity, bonusDice, bonusType) {
    const rLabel = RANGE_LABEL[rangeKey] || "近距離";
    const bonusStr = (dmgBonus > 0) ? `+${dmgBonus}`
                  : (dmgBonus < 0) ? `${dmgBonus}` : "";
    const cls = getItemColorClass(name, rarity);
    const ELEM = { fire: "炎", cold: "氷", lightning: "雷", holy: "聖" };
    const extraStr = bonusDice
      ? ` <span style="color:#7a30c0;font-weight:700">+${bonusDice}${ELEM[bonusType] || ""}</span>`
      : "";
    return `武器: <span class="${cls}">${name || "—"}</span> (${dmgDice || "—"}${bonusStr}${extraStr}, ${rLabel})`;
  }
  function formatArmorLine(name, rarity) {
    const cls = getItemColorClass(name, rarity);
    return `防具: <span class="${cls}">${name || "—"}</span>`;
  }
  function formatShieldLine(name, rarity, enhancement) {
    const cls = getItemColorClass(name, rarity);
    const acStr = (enhancement > 0) ? ` (AC +${enhancement})` : "";
    return `盾: <span class="${cls}">${name || "—"}</span>${acStr}`;
  }
  function renderPlayerCard() {
    const lv = getLevelFromXP(inventory.xp);
    const nextXp = getNextLevelXP(inventory.xp);
    document.getElementById("playerGold").textContent =
      `金貨 ${inventory.gold} ・ Lv${lv} (XP ${inventory.xp}/${nextXp})`;

    // 装備 (実際に装備中の選択値を使う。inventory.*Idx は所持最上位なので表示には不適切)
    const wIdx = Math.min(selection.equipWeapon, WEAPONS.length - 1);
    const aIdx = Math.min(selection.equipArmor,  ARMORS.length  - 1);
    const sIdx = Math.min(selection.equipShield, SHIELDS.length - 1);
    const w = WEAPONS[wIdx];
    const a = ARMORS[aIdx];
    const s = SHIELDS[sIdx];

    // 戦士のレベル別ステ計算 (index.html の LEVEL_PROGRESSION.warrior と同期)
    // hitDieMax=10, babFn=lv (full BAB), statBoost="str" (4Lv ごとに STR+1)
    const BASE = { hp: 30, str: 3, dex: 1, con: 2, ac: 16, atk: 4 };
    const hpGain    = (lv - 1) * 10;
    const babGain   = (lv - 1);
    const strBoost  = Math.floor(lv / 4);
    const curMaxHp  = BASE.hp + hpGain;
    const curStr    = BASE.str + strBoost;

    // 戦闘ステ (装備エンハ込み)
    const weaponEnh = w.enhancement || 0;
    const armorEnh  = a.enhancement || 0;
    const shieldEnh = s.enhancement || 0;
    const curAtk    = BASE.atk + babGain + strBoost + weaponEnh;
    const curAc     = BASE.ac  + armorEnh + shieldEnh;

    // 上3行 (Lv/HP, STR/DEX/CON, AC/攻撃) 反映
    document.getElementById("playerLvHp").textContent =
      `Lv ${lv} ・ HP ${curMaxHp} / ${curMaxHp}`;
    document.getElementById("playerCoreStats").textContent =
      `STR+${curStr} DEX+${BASE.dex} CON+${BASE.con}`;
    document.getElementById("playerCombat").textContent =
      `AC ${curAc} ・ 攻撃 +${curAtk}`;

    // 装備エンハンスメントをダメージにも反映、ダメダイスは武器固有
    const dmgDice    = w.dmgDice || PLAYER_DMG_DICE;
    const effDmgBonus = PLAYER_DMG_BONUS + strBoost + weaponEnh;
    document.getElementById("playerWeapon").innerHTML =
      formatWeaponLine(w.name, dmgDice, effDmgBonus, PLAYER_WEAPON_RANGE, w.rarity, w.bonusDmgDice, w.bonusDmgType);
    document.getElementById("playerArmor").innerHTML =
      formatArmorLine(a.name, a.rarity);
    const shieldEl = document.getElementById("playerShield");
    if (shieldEl) {
      shieldEl.innerHTML = formatShieldLine(s.name, s.rarity, s.enhancement);
    }
  }

  // 直前ダンジョンからのリザルト受け取り(index.html がクリア時に書き込む)
  (function consumeResult() {
    const resultRaw = sessionStorage.getItem("dragonfighters.lastResult");
    if (!resultRaw) return;
    sessionStorage.removeItem("dragonfighters.lastResult");
    try {
      const r = JSON.parse(resultRaw);
      if (r && r.cleared && r.scenarioId) {
        progress.cleared.add(r.scenarioId);
        saveClearedSet(progress.cleared);
        // 次 tick でバナー表示(renderTables 後)
        setTimeout(() => showReturnBanner(r), 100);
      } else if (r && (r.defeated || r.retreated)) {
        setTimeout(() => showReturnBanner(r), 100);
      }
    } catch (e) { /* ignore */ }
  })();

  function showReturnBanner(r) {
    const banner = document.createElement("div");
    banner.style.cssText =
      "position:fixed;top:110px;left:50%;transform:translateX(-50%);" +
      "padding:14px 28px;background:var(--parchment-bg);border:2px double var(--parchment-border);" +
      "box-shadow:var(--parchment-shadow);color:var(--parchment-ink);" +
      "font-family:'MedievalSharp',serif;font-size:16px;letter-spacing:2px;z-index:15;" +
      "transition:opacity 0.5s;line-height:1.5;max-width:640px;text-align:center;";
    let msg;
    if (r.cleared) {
      const rw = r.reward || {};
      const parts = [`「${r.scenarioTitle || "依頼"}」達成!`];
      if (rw.gold != null)     parts.push(`金貨 +${rw.gold} (累計 ${rw.totalGold})`);
      if (rw.newWeapon)        parts.push(`新武器「${rw.newWeapon}」`);
      if (rw.newArmor)         parts.push(`新防具「${rw.newArmor}」`);
      msg = parts.join(" / ");
    } else if (r.retreated) {
      msg = `「${r.scenarioTitle || "依頼"}」から撤退… 傷を癒し、再び挑もう`;
    } else {
      msg = `「${r.scenarioTitle || "依頼"}」失敗… もう一度挑もう`;
    }
    banner.textContent = msg;
    document.body.appendChild(banner);
    setTimeout(() => banner.style.opacity = "0", 5500);
    setTimeout(() => banner.remove(), 6200);
  }

  function isUnlocked(sc) {
    if (!sc.locked) return true;
    if (!sc.unlockAfter) return true;
    return progress.cleared.has(sc.unlockAfter);
  }

  // ─────────────────────────────────────────────────────────────
  // テーブル配置
  // ─────────────────────────────────────────────────────────────
  // 相対座標(%)。テーブル数は可変対応
  const tableSlots = [
    { left: "8%",  top: "10%" },
    { left: "32%", top: "2%"  },
    { left: "58%", top: "10%" },
    { left: "82%", top: "2%"  },
    { left: "20%", top: "58%" },
    { left: "60%", top: "58%" },
  ];

  function renderTables() {
    const area = document.getElementById("tableArea");
    area.innerHTML = "";
    scenarios.forEach((sc, i) => {
      const slot = tableSlots[i] || tableSlots[tableSlots.length - 1];
      const unlocked = isUnlocked(sc);
      const table = document.createElement("div");
      table.className = "table" + (unlocked ? "" : " locked");
      table.style.left = slot.left;
      table.style.top  = slot.top;
      table.innerHTML = `
        <div class="sign">
          <div class="place">${unlocked ? sc.place : "???"}</div>
          <div class="diff">${unlocked ? sc.difficulty : "— 未解放 —"}</div>
        </div>
        <div class="npc ${sc.client.type}">
          <div class="cap"></div>
          <div class="head"></div>
          <div class="body"></div>
        </div>
        <div class="tableTop"></div>
        <div class="floorTag">TABLE ${String(i + 1).padStart(2, "0")}</div>
      `;
      table.addEventListener("click", () => openDialog(sc, unlocked));
      area.appendChild(table);
    });
  }

  // ─────────────────────────────────────────────────────────────
  // 会話モーダル
  // ─────────────────────────────────────────────────────────────
  const dialogEl = document.getElementById("dialog");
  let currentScenario = null;

  function openDialog(sc, unlocked) {
    currentScenario = sc;
    dialogEl.classList.toggle("locked", !unlocked);
    document.querySelector("#dialogHead .clientName").textContent =
      unlocked ? sc.client.name : "???";
    document.querySelector("#dialogHead .clientRole").textContent =
      unlocked ? sc.client.role : "この席の主はまだ姿を現していない";
    document.getElementById("dialogPlace").textContent =
      unlocked ? `依頼: ${sc.place} — ${sc.title}` : "封印された依頼";
    document.getElementById("dialogQuote").textContent =
      unlocked ? sc.dialog
               : "（先のシナリオをクリアすれば、この者が酒場に姿を現すだろう…）";
    document.getElementById("metaReward").textContent = unlocked ? sc.reward : "???";
    document.getElementById("metaDiff").textContent   = unlocked ? sc.difficulty : "???";

    const enemyBox = document.getElementById("metaEnemies");
    enemyBox.innerHTML = "";
    if (unlocked) {
      for (const e of sc.enemies) {
        const tag = document.createElement("span");
        tag.className = "tag" + (e.boss ? " boss" : "");
        tag.textContent = e.name;
        enemyBox.appendChild(tag);
      }
    } else {
      enemyBox.innerHTML = `<span class="tag">???</span>`;
    }

    document.getElementById("btnAccept").disabled = !unlocked;
    document.getElementById("btnAccept").style.opacity = unlocked ? "1" : "0.4";
    document.getElementById("btnAccept").style.cursor = unlocked ? "pointer" : "not-allowed";

    dialogEl.style.display = "flex";
  }

  function closeDialog() {
    dialogEl.style.display = "none";
    currentScenario = null;
  }

  document.getElementById("btnDecline").addEventListener("click", closeDialog);
  dialogEl.addEventListener("click", (e) => {
    if (e.target === dialogEl) closeDialog();
  });
  document.getElementById("btnAccept").addEventListener("click", () => {
    if (!currentScenario || !isUnlocked(currentScenario)) return;
    openPrep(currentScenario);
  });

  // ─────────────────────────────────────────────────────────────
  // 準備画面(スタブ)
  // ─────────────────────────────────────────────────────────────
  const prepEl = document.getElementById("prep");
  let prepScenario = null;

  function openPrep(sc) {
    prepScenario = sc;
    document.getElementById("prepTitle").textContent = `出発の準備 — ${sc.place}`;
    document.getElementById("prepSub").textContent = `「${sc.title}」に挑む`;
    const info = sc.enemies.map(e => (e.boss ? `【${e.name}】` : e.name)).join(" / ");
    document.getElementById("prepEnemyInfo").textContent = info;
    // 編成にいないキャラがアクティブだとそのキャラの装備リストが表示されてしまう
    // → 編成先頭(リーダー)に戻す
    if (!selection.partyComposition.includes(activeCharTab)) {
      activeCharTab = selection.partyComposition[0] || "warrior";
    }
    renderPartyComposition();
    renderCharTabs();
    renderCharLoadout();
    dialogEl.style.display = "none";
    prepEl.style.display = "flex";
  }

  // ── 統合キャラパネル: タブ + 装備 + スキル + 魔法 ──
  let activeCharTab = "warrior";
  // 未所持装備も表示するか (デフォルト false = 所持品のみのコンパクト表示)
  let showAllEquip = false;

  // 装備選択の getter/setter (キャラ別アクセスを統一)
  function getEquipSelection(charKey) {
    if (charKey === "warrior") {
      return {
        weapon: selection.equipWeapon,
        armor:  selection.equipArmor,
        shield: selection.equipShield,
      };
    }
    return selection.allyEquip[charKey] || { weapon: 0, armor: 0, shield: 0 };
  }
  function setEquipSelection(charKey, kind, idx) {
    if (charKey === "warrior") {
      if (kind === "weapon") selection.equipWeapon = idx;
      else if (kind === "armor")  selection.equipArmor  = idx;
      else if (kind === "shield") selection.equipShield = idx;
    } else {
      if (!selection.allyEquip[charKey]) selection.allyEquip[charKey] = { weapon:0, armor:0, shield:0 };
      selection.allyEquip[charKey][kind] = idx;
    }
  }

  // ── パーティ編成 (6キャラから 1〜4人選択、先頭=リーダー) ──
  // Step 2-C 完了で戦士ロック解除、誰でもリーダーになれる (リーダーが戦士以外ならスキル発動なし通常攻撃のみ)
  function renderPartyComposition() {
    const compEl = document.getElementById("partyComp");
    const countEl = document.getElementById("partyCompCount");
    if (!compEl) return;
    compEl.innerHTML = "";
    const composition = selection.partyComposition;
    const set = new Set(composition);
    const atMax = composition.length >= 4;
    const leaderKey = composition[0];
    PARTY_SLOTS.forEach((slot) => {
      if (!slot) return;
      const isActive = set.has(slot.classKey);
      const isLeader = slot.classKey === leaderKey;
      // 最低1人は維持: 唯一の出陣キャラを外せない
      const isLastOne = isActive && composition.length === 1;
      const isDisabled = !isActive && atMax;
      const el = document.createElement("div");
      el.className = "partyMemberToggle"
        + (isActive ? " active" : "")
        + (isLeader ? " locked" : "")
        + (isDisabled ? " disabled" : "");
      const role = isLeader ? "リーダー" : (isActive ? "出陣" : "—");
      el.innerHTML = `<div class="memberName">${slot.name}</div>` +
                     `<div class="memberRole">${role}</div>`;
      if (!isDisabled && !isLastOne) {
        el.addEventListener("click", () => togglePartyMember(slot.classKey));
      } else if (isLastOne) {
        el.title = "最低1人は出陣しないといけない";
      } else if (isDisabled) {
        el.title = "最大4人まで";
      }
      compEl.appendChild(el);
    });
    if (countEl) countEl.textContent = `${composition.length} / 4 人`;
  }

  function togglePartyMember(classKey) {
    const composition = selection.partyComposition;
    const set = new Set(composition);
    if (set.has(classKey)) {
      // 外す。最低1人は維持
      if (composition.length <= 1) return;
      selection.partyComposition = composition.filter(k => k !== classKey);
    } else {
      // 追加 (最大4人、追加した人は末尾 → 先頭=リーダーは変わらない)
      if (composition.length >= 4) return;
      selection.partyComposition.push(classKey);
    }
    saveSelections();
    renderPartyComposition();
    // 編成外のキャラを開いてたらリーダーに戻す
    if (!selection.partyComposition.includes(activeCharTab)) {
      activeCharTab = selection.partyComposition[0] || "warrior";
    }
    renderCharTabs();
    renderCharLoadout();
  }

  // ── キャラタブ (装備+スキル+魔法を1キャラずつ切替、編成中のキャラのみ) ──
  function renderCharTabs() {
    const tabsEl = document.getElementById("charTabs");
    if (!tabsEl) return;
    tabsEl.innerHTML = "";
    const set = new Set(selection.partyComposition);
    PARTY_SLOTS.forEach((slot) => {
      if (!slot) return;
      if (!set.has(slot.classKey)) return;  // 編成外はタブを出さない
      const isActive = slot.classKey === activeCharTab;
      const equipped = (selection.partySkills[slot.classKey] || []).length;
      const tab = document.createElement("div");
      tab.className = "partyTab" + (isActive ? " active" : "");
      tab.innerHTML = `<div>${slot.name}</div>` +
                      `<div class="tabCount">スキル ${equipped}/${SKILL_SLOT_LIMIT}</div>`;
      tab.addEventListener("click", () => {
        if (activeCharTab === slot.classKey) return;
        activeCharTab = slot.classKey;
        renderCharTabs();
        renderCharLoadout();
      });
      tabsEl.appendChild(tab);
    });
    const nameEl = document.getElementById("charPanelName");
    const slot = PARTY_SLOTS.find(s => s && s.classKey === activeCharTab);
    if (nameEl) nameEl.textContent = slot ? `(${slot.name})` : "";
  }

  // ── 装備セクション 共通レンダ (filter 対応・未所持カウント表示) ──
  function renderEquipSlot(listEl, items, ownedMax, currentSel, kind) {
    if (!listEl) return;
    listEl.innerHTML = "";
    let hiddenCount = 0;
    items.forEach((it, i) => {
      const owned = i <= ownedMax;
      // 未所持 & 「所持のみ」モード & 選択中ではない → スキップ
      if (!owned && !showAllEquip && i !== currentSel) {
        hiddenCount++;
        return;
      }
      const item = document.createElement("div");
      item.className = "equipItem" +
        (i === currentSel ? " selected" : "") +
        (owned ? "" : " locked");
      const colorCls = getItemColorClass(it.name, it.rarity);
      const rangeTag = (kind === "weapon" && it.range) ? `[${RANGE_LABEL[it.range] || ""}] ` : "";
      item.innerHTML =
        `<span class="eName ${colorCls}">${it.name}</span>` +
        `<span class="eSpec">${owned ? rangeTag + it.spec : "未所持"}</span>`;
      if (owned) {
        item.addEventListener("click", () => {
          setEquipSelection(activeCharTab, kind, i);
          saveSelections();
          renderCharLoadout();
        });
      }
      listEl.appendChild(item);
    });
    if (hiddenCount > 0) {
      const hint = document.createElement("div");
      hint.className = "equipItem locked";
      hint.style.opacity = "0.55";
      hint.style.fontStyle = "italic";
      hint.style.fontSize = "11px";
      hint.style.padding = "4px 8px";
      hint.innerHTML = `<span class="eName">…未所持 ${hiddenCount} 個</span>`;
      listEl.appendChild(hint);
    }
  }

  // ── Phase 2-H: 道具袋 (inventoryBag) ロード/セーブ + 描画 ──
  function loadInventoryBag() {
    const empty = {};
    for (const k of ["warrior","dwarf","cleric","mage","elf","rogue"]) {
      empty[k] = { weapons: [], armors: [], shields: [] };
    }
    try {
      const raw = localStorage.getItem("dragonfighters.inventoryBag");
      if (!raw) return empty;
      const parsed = JSON.parse(raw) || {};
      for (const k of Object.keys(empty)) {
        if (parsed[k]) {
          empty[k].weapons = Array.isArray(parsed[k].weapons) ? parsed[k].weapons.slice() : [];
          empty[k].armors  = Array.isArray(parsed[k].armors)  ? parsed[k].armors.slice()  : [];
          empty[k].shields = Array.isArray(parsed[k].shields) ? parsed[k].shields.slice() : [];
        }
      }
    } catch (e) { /* ignore */ }
    return empty;
  }
  function saveInventoryBag(bag) {
    try {
      localStorage.setItem("dragonfighters.inventoryBag", JSON.stringify(bag));
    } catch (e) { /* ignore */ }
  }
  let tavernInventoryBag = loadInventoryBag();

  // 道具袋の中身を表示。クリックで「装備に切り替え + 道具袋から取り除く」
  function renderBagSlot(listEl, sectionEl, classKey, kind, pool) {
    if (!listEl || !sectionEl) return;
    const slot = (tavernInventoryBag[classKey] || {})[kind] || [];
    if (slot.length === 0) {
      sectionEl.style.display = "none";
      return;
    }
    sectionEl.style.display = "";
    listEl.innerHTML = "";
    for (const idx of slot) {
      const item = pool[idx];
      if (!item) continue;
      const itemEl = document.createElement("div");
      itemEl.className = "equipItem bagItem";
      itemEl.innerHTML = `<span class="eName">🎒 ${item.name}</span>`;
      itemEl.style.cursor = "pointer";
      itemEl.addEventListener("click", () => {
        // 道具袋から取り出して装備セットに移す + tavern の最強所持上限を更新
        const map = (kind === "weapons") ? "weaponIdx"
                  : (kind === "armors")  ? "armorIdx"
                  : "shieldIdx";
        // 戦士の場合は inventory (最強所持) も更新 (上限が ally で見られる)
        if (classKey === "warrior" && idx > inventory[map]) {
          inventory[map] = idx;
        }
        // 装備セットに反映
        const kindShort = (kind === "weapons") ? "weapon"
                       : (kind === "armors")  ? "armor"
                       : "shield";
        setEquipSelection(classKey, kindShort, idx);
        // 道具袋から削除 + 保存
        const i = tavernInventoryBag[classKey][kind].indexOf(idx);
        if (i >= 0) tavernInventoryBag[classKey][kind].splice(i, 1);
        saveInventoryBag(tavernInventoryBag);
        renderCharLoadout();
      });
      listEl.appendChild(itemEl);
    }
  }


  // ── Phase 2-J: 呪文職用 個数指定 (±ボタン) アイテム描画 ──
  // partySkills[classKey] は重複 ID 配列 (例: ["fireball","fireball","magic-missile"])
  // 個数 = 重複数。getMaxSpellSlotsForClassTV(classKey, lv) を上限とする。
  // 僧侶 (auto-slot) は CLERIC_SLOTS_TABLE による自動配分のみ、編集不可。
  function renderSpellSlotItem(sk, classKey, totalUsed, totalMax, currentLv) {
    const list = selection.partySkills[classKey];
    const arr = Array.isArray(list) ? list : [];
    const cnt = arr.filter(x => x === sk.id).length;
    const isAuto = isAutoSlotClassTV(classKey);
    const autoFromTable = isAuto ? (CLERIC_SLOTS_TABLE[sk.id] || [])[Math.max(0, Math.min(10, currentLv))] || 0 : 0;
    const lvReq = sk.levelReq || 1;
    const lvOk = currentLv >= lvReq;
    const item = document.createElement("div");
    item.className = "skillItem spellCountItem" + (cnt > 0 ? " selected" : "") + (!lvOk ? " full" : "");
    const rangeTag = RANGE_LABEL[sk.range] || "";
    const lvLock = !lvOk ? ` <span class="sCat" style="color:#8b2010">[Lv${lvReq} 必要]</span>` : "";
    const mpTag = sk.mpCost ? ` <span class="sCat" style="color:#2b5d8e">[1 スロット]</span>` : "";
    item.innerHTML =
      `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">` +
        `<div style="flex:1;">` +
          `<span class="sName"><span class="sCat">[${sk.category}]</span>${sk.name}` +
          (rangeTag ? ` <span class="sCat" style="color:#5a2085">[${rangeTag}]</span>` : "") +
          mpTag + lvLock +
          `</span>` +
          `<span class="sFlavor">${sk.flavor}</span>` +
        `</div>` +
        (isAuto
          ? `<div class="spellAuto">自動 <b>${autoFromTable}</b></div>`
          : `<div class="spellCountCtrl">` +
              `<button type="button" class="spcBtn spcMinus" ${cnt <= 0 ? "disabled" : ""}>−</button>` +
              `<span class="spcNum">${cnt}</span>` +
              `<button type="button" class="spcBtn spcPlus" ${(!lvOk || totalUsed >= totalMax) ? "disabled" : ""}>＋</button>` +
            `</div>`) +
      `</div>`;
    if (!isAuto) {
      const btnMinus = item.querySelector(".spcMinus");
      const btnPlus  = item.querySelector(".spcPlus");
      if (btnMinus) btnMinus.addEventListener("click", (ev) => {
        ev.stopPropagation();
        const list2 = selection.partySkills[classKey];
        const idx = (Array.isArray(list2) ? list2 : []).indexOf(sk.id);
        if (idx >= 0) {
          list2.splice(idx, 1);
          saveSelections();
          renderCharTabs();
          renderCharLoadout();
        }
      });
      if (btnPlus) btnPlus.addEventListener("click", (ev) => {
        ev.stopPropagation();
        if (!lvOk) return;
        if (totalUsed >= totalMax) return;
        const list2 = selection.partySkills[classKey] || (selection.partySkills[classKey] = []);
        list2.push(sk.id);
        saveSelections();
        renderCharTabs();
        renderCharLoadout();
      });
    }
    return item;
  }

  // ── スキル/魔法 共通レンダ (mpCost で自動分類) ──
  function renderSkillItem(sk, equippedSet, full, classKey) {
    const selected = equippedSet.has(sk.id);
    const item = document.createElement("div");
    item.className = "skillItem" +
      (selected ? " selected" : "") +
      (full && !selected ? " full" : "");
    const rangeTag = RANGE_LABEL[sk.range] || "";
    const reactiveTag = sk.reactive ? ` <span class="sCat" style="color:#8b2010">[自動発動]</span>` : "";
    const mpTag = sk.mpCost ? ` <span class="sCat" style="color:#2b5d8e">[MP ${sk.mpCost}]</span>` : "";
    item.innerHTML =
      `<span class="sName"><span class="sCat">[${sk.category}]</span>${sk.name}` +
      (rangeTag ? ` <span class="sCat" style="color:#5a2085">[${rangeTag}]</span>` : "") +
      mpTag +
      reactiveTag +
      `</span>` +
      `<span class="sFlavor">${sk.flavor}</span>`;
    item.addEventListener("click", () => {
      const list = selection.partySkills[classKey] || [];
      const isSel = list.includes(sk.id);
      if (isSel) {
        selection.partySkills[classKey] = list.filter(s => s !== sk.id);
      } else {
        if (list.length >= SKILL_SLOT_LIMIT) return;
        selection.partySkills[classKey] = [...list, sk.id];
      }
      saveSelections();
      renderCharTabs();
      renderCharLoadout();
    });
    return item;
  }

  function renderSkillSubsection(listEl, sectionEl, skills, equippedSet, full, classKey, emptyMsg) {
    if (!listEl || !sectionEl) return;
    listEl.innerHTML = "";
    if (skills.length === 0) {
      sectionEl.style.display = "none";
      return;
    }
    sectionEl.style.display = "";
    skills.forEach(sk => {
      listEl.appendChild(renderSkillItem(sk, equippedSet, full, classKey));
    });
  }

  // ── 統合レンダ: アクティブキャラの全セクション ──
  function renderCharLoadout() {
    const slot = PARTY_SLOTS.find(s => s && s.classKey === activeCharTab);
    if (!slot) return;

    // ── 装備セクション (CHAR_EQUIP に未対応のキャラはセクション全体を非表示) ──
    const weaponListEl = document.getElementById("equipWeaponList");
    const armorListEl  = document.getElementById("equipArmorList");
    const shieldListEl = document.getElementById("equipShieldList");
    const pool = CHAR_EQUIP[activeCharTab];
    const weaponSection = weaponListEl.parentElement;
    const armorSection  = armorListEl.parentElement;
    const shieldSection = shieldListEl ? shieldListEl.parentElement : null;
    if (pool) {
      const sel = getEquipSelection(activeCharTab);
      weaponSection.style.display = "";
      armorSection.style.display  = "";
      if (shieldSection) shieldSection.style.display = "";
      renderEquipSlot(weaponListEl, pool.weapons, inventory.weaponIdx, sel.weapon, "weapon");
      renderEquipSlot(armorListEl,  pool.armors,  inventory.armorIdx,  sel.armor,  "armor");
      renderEquipSlot(shieldListEl, pool.shields, inventory.shieldIdx, sel.shield, "shield");
      // Phase 2-H: 道具袋セクション (このキャラ向けの保管装備)
      renderBagSlot(document.getElementById("bagWeaponList"),
                    document.getElementById("bagWeaponSection"),
                    activeCharTab, "weapons", pool.weapons);
      renderBagSlot(document.getElementById("bagArmorList"),
                    document.getElementById("bagArmorSection"),
                    activeCharTab, "armors",  pool.armors);
      renderBagSlot(document.getElementById("bagShieldList"),
                    document.getElementById("bagShieldSection"),
                    activeCharTab, "shields", pool.shields);
    } else {
      weaponSection.style.display = "none";
      armorSection.style.display  = "none";
      if (shieldSection) shieldSection.style.display = "none";
      // Phase 2-H: 道具袋セクションも非表示
      ["bagWeaponSection","bagArmorSection","bagShieldSection"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = "none";
      });
    }

    // ── スキル/魔法 セクション ──
    const equipped = selection.partySkills[slot.classKey] || [];
    const equippedSet = new Set(equipped);
    const full = equippedSet.size >= SKILL_SLOT_LIMIT;
    // mpCost が無い (or 0) → スキル、ある (>0) → 魔法
    const skills = slot.skillPool.filter(sk => !sk.mpCost);
    const magics = slot.skillPool.filter(sk =>  sk.mpCost > 0);
    const skillListEl = document.getElementById("skillList");
    const magicListEl = document.getElementById("magicList");
    const skillSection = document.getElementById("skillSection");
    const magicSection = document.getElementById("magicSection");
    renderSkillSubsection(skillListEl, skillSection, skills, equippedSet, full, slot.classKey);
    // Phase 2-J: 呪文職 (cleric/mage/elf) は magic セクションを ±UI で描画
    if (isCasterClassTV(slot.classKey)) {
      const playerLv = getLevelFromXP(inventory.xp);
      const totalMax = getMaxSpellSlotsForClassTV(slot.classKey, playerLv);
      // partySkills の現在の合計 (僧侶は自動なので 0 を出して上限と比較しない)
      const list = Array.isArray(selection.partySkills[slot.classKey]) ? selection.partySkills[slot.classKey] : [];
      const totalUsed = isAutoSlotClassTV(slot.classKey) ? totalMax : list.length;
      magicListEl.innerHTML = "";
      if (magics.length === 0) {
        magicSection.style.display = "none";
      } else {
        magicSection.style.display = "";
        for (const sk of magics) {
          magicListEl.appendChild(renderSpellSlotItem(sk, slot.classKey, totalUsed, totalMax, playerLv));
        }
        // セクション見出しに「N/M 使用」表示
        const magicHint = document.getElementById("magicHint");
        if (magicHint) {
          magicHint.textContent = isAutoSlotClassTV(slot.classKey)
            ? `(自動配分 Lv${playerLv} = 合計 ${totalMax} スロット)`
            : `(使用 ${totalUsed}/${totalMax} スロット)`;
        }
      }
    } else {
      renderSkillSubsection(magicListEl, magicSection, magics, equippedSet, full, slot.classKey);
    }
    // カウンタ更新
    const counter = document.getElementById("skillSlotCounter");
    if (counter) {
      counter.textContent = `(${equippedSet.size}/${SKILL_SLOT_LIMIT})`;
      counter.style.color = (equippedSet.size >= SKILL_SLOT_LIMIT) ? "#8b2010" : "";
    }
    const magicHint = document.getElementById("magicHint");
    if (magicHint) magicHint.textContent = magics.length === 0 ? "" : "(スキル枠と共有)";

    // 装備トグルボタン状態
    const btn = document.getElementById("equipShowAllBtn");
    if (btn) {
      btn.classList.toggle("active", showAllEquip);
      btn.textContent = showAllEquip ? "所持のみ表示" : "未所持も表示";
    }
  }

  // トグルボタン: 1度だけリスナを張る
  (function bindEquipShowAllBtn() {
    const btn = document.getElementById("equipShowAllBtn");
    if (!btn) return;
    btn.addEventListener("click", () => {
      showAllEquip = !showAllEquip;
      renderCharLoadout();
    });
  })();

  document.getElementById("btnBack").addEventListener("click", () => {
    prepEl.style.display = "none";
    prepScenario = null;
  });
  // Phase 2-G DEBUG: 残影回避モードのトグル状態 (出発時に URL ?evade=... を付与)
  let __debugEvadeMode = "off";   // "off" | "all" | "arrow"
  (function setupDebugEvadeBtns() {
    const btnAll = document.getElementById("btnDebugEvadeAll");
    const btnArrow = document.getElementById("btnDebugEvadeArrow");
    function refresh() {
      if (btnAll) {
        const on = __debugEvadeMode === "all";
        btnAll.classList.toggle("on", on);
        btnAll.textContent = on ? "🛡 必ず回避 (全攻撃) ON" : "🛡 必ず回避 (全攻撃) OFF";
      }
      if (btnArrow) {
        const on = __debugEvadeMode === "arrow";
        btnArrow.classList.toggle("on", on);
        btnArrow.textContent = on ? "🏹 必ず回避 (矢のみ) ON" : "🏹 必ず回避 (矢のみ) OFF";
      }
    }
    if (btnAll) {
      btnAll.addEventListener("click", () => {
        __debugEvadeMode = (__debugEvadeMode === "all") ? "off" : "all";
        refresh();
      });
    }
    if (btnArrow) {
      btnArrow.addEventListener("click", () => {
        __debugEvadeMode = (__debugEvadeMode === "arrow") ? "off" : "arrow";
        refresh();
      });
    }
    refresh();
  })();

  // 出発処理 (共通)。autoplayOverride に数値を渡すと autoplay=N を強制付与
  function departToScenario(autoplayOverride) {
    if (!prepScenario) return;
    // 選んだ構成を永続化 + sessionStorage 経由で index.html へ
    saveSelections();
    sessionStorage.setItem("dragonfighters.currentScenario", prepScenario.id);
    sessionStorage.setItem("dragonfighters.partyComposition", JSON.stringify(selection.partyComposition));
    // フォールバックは index.html (本編)。battle.html は単体検証用なので明示指定された時のみ
    let target = prepScenario.target || "index.html";
    const params = [];
    // Phase 2-G DEBUG: デバッグ回避モードが ON なら URL パラメータを付与
    if (__debugEvadeMode === "all" || __debugEvadeMode === "arrow") {
      params.push("evade=" + __debugEvadeMode);
    }
    // Phase 2-K: autoplay 指定 (ボタン override 優先、なければ tavern URL から引き継ぎ)
    let ap = autoplayOverride;
    if (ap == null) {
      try {
        const tavParams = new URLSearchParams(window.location.search);
        ap = tavParams.get("autoplay");
      } catch (e) {}
    }
    if (ap) params.push("autoplay=" + encodeURIComponent(ap));
    if (params.length) {
      const sep = target.includes("?") ? "&" : "?";
      target += sep + params.join("&");
    }
    window.location.href = target;
  }
  document.getElementById("btnDepart").addEventListener("click", () => departToScenario());
  // Phase 2-K: ワンクリック オートプレイ出発 (x10 / x30)
  const btnAuto = document.getElementById("btnDepartAutoplay");
  if (btnAuto) btnAuto.addEventListener("click", () => departToScenario(10));
  const btnAutoFast = document.getElementById("btnDepartAutoplayFast");
  if (btnAutoFast) btnAutoFast.addEventListener("click", () => departToScenario(30));
  // 自動デバッグ巡回: index.html?autodebug=N で N ラン連続実行 (全6シナリオを自動巡回)。
  // 選んだパーティ構成は引き継ぎ、シナリオは巡回側が決めるため出発シナリオは無視する。
  function departAutoDebug(runs) {
    if (!prepScenario) return;
    saveSelections();
    try {
      sessionStorage.setItem("dragonfighters.partyComposition", JSON.stringify(selection.partyComposition));
    } catch (e) {}
    window.location.href = "index.html?autodebug=" + encodeURIComponent(runs);
  }
  const btnAutoDebug = document.getElementById("btnDepartAutoDebug");
  if (btnAutoDebug) btnAutoDebug.addEventListener("click", () => departAutoDebug(6));

  // ─────────────────────────────────────────────────────────────
  // 初期化
  // ─────────────────────────────────────────────────────────────
  renderPlayerCard();
  renderTables();
</script>
</body>
</html>
