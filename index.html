      const a = pool.armors[sel.armor];
      const s = pool.shields[sel.shield];
      const baseW = pool.weapons[0], baseA = pool.armors[0], baseS = pool.shields[0];
      ally.dmgDice  = w.dmgDice;
      ally.dmgBonus = (ally.dmgBonus || 0) + (w.enhancement - baseW.enhancement);
      ally.ac       = (ally.ac       || 10) + (a.enhancement - baseA.enhancement)
                                            + (s.enhancement - baseS.enhancement);
      ally.weaponName = w.name;
      ally.armorName  = a.name;
      ally.shieldName = s.name;
      // レアリティ (色分け表示用)
      ally.weaponRarity = w.rarity || null;
      ally.armorRarity  = a.rarity || null;
      // 武器のレンジが変わる装備 (魔法使いの杖など) にも対応
      if (w.range) ally.weaponRange = w.range;
      // レア武器の特殊効果をコピー (未定義は null クリア)
      ally.weaponBonusDmgDice = w.bonusDmgDice || null;
      ally.weaponBonusDmgType = w.bonusDmgType || null;
      ally.weaponCritStun     = w.critStun     || 0;
      ally.weaponLifeStealDice = w.lifeStealDice || null;
      // 雷鳴の斧の余波 (周囲1マス追加ダメージ + STR セーブで半減)
      ally.weaponShockwaveDice   = w.shockwaveDice   || null;
      ally.weaponShockwaveType   = w.shockwaveType   || null;
      ally.weaponShockwaveSaveDC = w.shockwaveSaveDC || 0;
    }

    // 酒場で選んだスキル装備 (キャラ別)。partySkills (新キー) 優先、旧 equipSkills は戦士にフォールバック
    let equippedSkills = ["strong-cleave", "iron-guard", "morale"];
    // partySkills は character セットアップで全キャラに適用するためにパースして保持
    let partySkillsMap = null;
    try {
      if (persistent.partySkills) {
        partySkillsMap = JSON.parse(persistent.partySkills);
        if (partySkillsMap && Array.isArray(partySkillsMap.warrior)) {
          equippedSkills = partySkillsMap.warrior
            .filter(id => id in WARRIOR_SKILLS).slice(0, 3);
        }
      } else if (persistent.equipSkills) {
        // 旧キー: 戦士のスキルとして使う
        const arr = JSON.parse(persistent.equipSkills);
        if (Array.isArray(arr)) {
          equippedSkills = arr.filter(id => id in WARRIOR_SKILLS).slice(0, 3);
        }
      }
    } catch (e) { /* ignore — fall back to default */ }

    // プレイヤーのバフ状態(エンカウンター毎にリセット)
    const playerBuffs = {
      atkBonusRemaining: 0,
      atkBonusAmount: 0,
      dmgReductionRemaining: 0,
      dmgReductionDice: null,
      dmgReductionFlat: 0,
      dmgReductionFlatRemaining: 0,
      statusImmunityCharges: 0,
      antiKnockbackRemaining: 0,
      skipNextTurn: false,
      resilientFired: false,   // 不屈 (エンカウンター1回)
      acBonusRemaining: 0,     // シールド・オブ・フェイス等 の AC バフ
      acBonusAmount: 0,
    };
    function resetPlayerBuffs() {
      playerBuffs.atkBonusRemaining = 0;
      playerBuffs.atkBonusAmount = 0;
      playerBuffs.dmgReductionRemaining = 0;
      playerBuffs.dmgReductionDice = null;
      playerBuffs.dmgReductionFlat = 0;
      playerBuffs.dmgReductionFlatRemaining = 0;
      playerBuffs.statusImmunityCharges = 0;
      playerBuffs.antiKnockbackRemaining = 0;
      playerBuffs.skipNextTurn = false;
      playerBuffs.resilientFired = false;
      playerBuffs.acBonusRemaining = 0;
      playerBuffs.acBonusAmount = 0;
    }
    function tickPlayerBuffsAtTurnStart() {
      if (playerBuffs.atkBonusRemaining > 0) playerBuffs.atkBonusRemaining--;
      if (playerBuffs.dmgReductionRemaining > 0) {
        playerBuffs.dmgReductionRemaining--;
        if (playerBuffs.dmgReductionRemaining <= 0) playerBuffs.dmgReductionDice = null;
      }
      if (playerBuffs.dmgReductionFlatRemaining > 0) {
        playerBuffs.dmgReductionFlatRemaining--;
        if (playerBuffs.dmgReductionFlatRemaining <= 0) playerBuffs.dmgReductionFlat = 0;
      }
      if (playerBuffs.antiKnockbackRemaining > 0) playerBuffs.antiKnockbackRemaining--;
      if (playerBuffs.acBonusRemaining > 0) playerBuffs.acBonusRemaining--;
      // リーダースキルクールダウンも 1 進める (rogue の shadow-step CD など)
      for (const k of Object.keys(leaderSkillCooldowns)) {
        if (leaderSkillCooldowns[k] > 0) leaderSkillCooldowns[k]--;
      }
    }
    function currentPlayerAtkBonus() {
      const w = getCurrentWeapon();
      const weaponEnh = (w && w.enhancement) || 0;
      return playerStats.atkBonus + weaponEnh +
        (playerBuffs.atkBonusRemaining > 0 ? playerBuffs.atkBonusAmount : 0);
    }
    function currentPlayerDmgBonus() {
      // 武器エンハンスメントをダメージにも加算
      const w = getCurrentWeapon();
      return playerStats.dmgBonus + ((w && w.enhancement) || 0);
    }
    function currentPlayerAc() {
      const a = getCurrentArmor();
      const s = getCurrentShield();
      const armorEnh  = (a && a.enhancement) || 0;
      const shieldEnh = (s && s.enhancement) || 0;
      return playerStats.ac + armorEnh + shieldEnh +
        (playerBuffs.acBonusRemaining > 0 ? playerBuffs.acBonusAmount : 0);
    }
    function currentAllyAc(a) {
      return a.ac + (a.buffs.acBonusRemaining > 0 ? a.buffs.acBonusAmount : 0);
    }
    function applyDmgReductionToPlayerDmg(dmg) {
      if (playerBuffs.dmgReductionRemaining <= 0 || !playerBuffs.dmgReductionDice) {
        return { final: dmg, reduction: 0, rolls: [] };
      }
      const { n, sides } = parseDiceDD(playerBuffs.dmgReductionDice);
      const r = rollDiceDD(n, sides);
      return { final: Math.max(0, dmg - r.total), reduction: r.total, rolls: r.rolls };
    }

    function showSkillAnnounce(skillName) {
      const pop = document.createElement("div");
      pop.className = "rollPop skill";
      pop.innerHTML = `<span class="label">SKILL</span><span class="big">${skillName}</span>`;
      pop.style.left = (playerX + 48 - camX) + "px";
      pop.style.top  = (playerY - 40 - camY) + "px";
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), 1400);
    }
    function showBuffPop(text) {
      const pop = document.createElement("div");
      pop.className = "rollPop buff";
      pop.innerHTML = text;
      pop.style.left = (playerX + 48 - camX) + "px";
      pop.style.top  = (playerY - 24 - camY) + "px";
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), 1400);
    }

    // 生存中の交戦対象から最適ターゲット(HP最少)を選ぶ
    function pickAliveEngagedIdx() {
      let best = -1, bestHp = Infinity;
      for (const i of encounterEnemyIndices) {
        if (!enemies[i].alive) continue;
        if (enemies[i].hp < bestHp) { best = i; bestHp = enemies[i].hp; }
      }
      return best;
    }

    // ── レア武器の特殊効果 (Flame Tongue / 雷鳴の斧 / 吸命メイス / 嵐のスタッフ / 霜咬みの弓) ──
    // weaponLike: { bonusDmgDice, bonusDmgType, critStun, lifeStealDice,
    //               shockwaveDice, shockwaveType, shockwaveSaveDC }
    // 順序: 0.余波 (ヒット瞬間に黄色フラッシュ + 周囲ダメージ) → 1.主対象追加属性 → 2.crit スタン → 3.HP 吸収
    // attacker: "player" or { kind:"ally", ally }
    async function applyWeaponSpecialEffects(weaponLike, target, targetIdx, ex, isCrit, attackerName, attackerRef, suppressFx) {
      if (!weaponLike) return;
      const ELEM_NAME = { fire: "炎", cold: "冷気", lightning: "雷", holy: "聖" };

      // 0. 周囲1マス余波 (雷鳴の斧): ヒット瞬間に発動 - 視覚演出 → 余波ダメージ → 続けて主対象の追加属性
      if (weaponLike.shockwaveDice) {
        const ds = target.def.displaySize || 64;
        const tcx = target.x + ds / 2;
        const tcy = target.y + ds / 2;
        const dc  = weaponLike.shockwaveSaveDC || 13;
        const targetTX = Math.floor(tcx / TILE_SIZE);
        const targetTY = Math.floor(tcy / TILE_SIZE);
        if (!suppressFx) {
          // 3x3 黄色ハイライト (中心マス基準で -1,-1 から 3x3、〜600ms フラッシュ)
          spawnGroundFx(targetTX - 1, targetTY - 1, 3, 3, "thunder", 600);
          playThunderShockwaveFx(tcx, tcy);
        }
        let hitN = 0;
        for (let i = 0; i < enemies.length; i++) {
          if (i === targetIdx) continue;
          const e = enemies[i];
          if (!e || !e.alive) continue;
          const eds = e.def.displaySize || 64;
          const ecx = e.x + eds / 2;
          const ecy = e.y + eds / 2;
          if (tileChebyshev(tcx, tcy, ecx, ecy) > 1) continue;
          const sd = parseDiceDD(weaponLike.shockwaveDice);
          const sr = rollDiceDD(sd.n, sd.sides);
          const strMod = (e.def && typeof e.def.str === "number") ? e.def.str : 0;
          const saveTotal = d20() + strMod;
          const saved = saveTotal >= dc;
          let sdmg = Math.max(1, sr.total);
          if (saved) sdmg = Math.max(1, Math.floor(sdmg / 2));
          e.hp = Math.max(0, e.hp - sdmg);
          triggerEnemyDamageFlash(i);
          showDmgAt(ecx, e.y - 22, sdmg, false);
          if (!suppressFx) spawnThunderZapOnEnemy(i, saved);
          hitN++;
        }
        if (hitN > 0) {
          updateInfo(`${attackerName}: 雷鳴の余波 → 周囲 ${hitN} 体に追撃 (${weaponLike.shockwaveDice}, STR DC${dc})`);
        }
        await sleepMs(380);
      }

      // 1. 追加属性ダメージ (Flame Tongue, 嵐のスタッフ, 霜咬みの弓)
      const bonusDice = weaponLike.bonusDmgDice;
      const bonusType = weaponLike.bonusDmgType;
      if (bonusDice) {
        const bd = parseDiceDD(bonusDice);
        const br = rollDiceDD(bd.n, bd.sides);
        const extra = Math.max(1, br.total);
        target.hp = Math.max(0, target.hp - extra);
        triggerEnemyDamageFlash(targetIdx);
        // 属性エフェクト (suppressFx 指定時はスキップ)
        if (!suppressFx) {
          const fxY = target.y + (target.def.displaySize || 64) / 2;
          if (bonusType === "fire") {
            // 炎: 中央フラッシュ + 炎柱 → 敵に火が燃え移る粒子継続
            playFlameTongueImpactFx(ex, fxY, targetIdx, isCrit);
            spawnFireBurnOnEnemy(targetIdx, isCrit ? 1800 : 1400);
          } else if (bonusType === "cold") {
            // 冷気: 青白閃光 + 放射状氷晶 → 敵から落ちる氷の粒
            playFrostbiteImpactFx(ex, fxY, targetIdx, isCrit);
            spawnFrostOnEnemy(targetIdx, isCrit ? 1500 : 1200);
          } else if (bonusType === "lightning") {
            // 雷: 黄色閃光 + 4方向ジグザグ。雷鳴の斧 (shockwave 持ち) は中央フラッシュが
            // playThunderShockwaveFx で既に出てるので重複回避
            if (!weaponLike.shockwaveDice) {
              playLightningImpactFx(ex, fxY, isCrit);
            }
          } else if (bonusType === "holy") {
            // 聖: 金色バースト + 上から降りる光柱 → 上昇する金色の光粒
            playHolyImpactFx(ex, fxY, targetIdx, isCrit);
            spawnHolyAuraOnEnemy(targetIdx, isCrit ? 1500 : 1200);
          }
        }
        showDmgAt(ex, target.y - 22, extra, false);
        const tname = ELEM_NAME[bonusType] || "魔法";
        updateInfo(`${attackerName}: +${extra} ${tname}属性ダメージ (${bonusDice}[${br.rolls.join("+")}])`);
        await sleepMs(350);
      }

      // 2. クリティカル時スタン (雷鳴の斧, 霜咬みの弓)
      if (weaponLike.critStun && isCrit && target.alive !== false && target.hp > 0) {
        target.stunned = Math.max(target.stunned || 0, weaponLike.critStun);
        showDmgAt(ex, target.y - 40, "STUN", false);
        updateInfo(`${attackerName}: ${target.def.name} を ${weaponLike.critStun}T スタン!`);
        await sleepMs(350);
      }

      // 3. 命中時HP回復 (吸命のメイス)
      if (weaponLike.lifeStealDice) {
        const ld = parseDiceDD(weaponLike.lifeStealDice);
        const lr = rollDiceDD(ld.n, ld.sides);
        const rawHeal = lr.total;
        let actualHeal = 0;
        if (attackerRef === "player") {
          const prev = hp;
          hp = Math.min(maxHp, hp + rawHeal);
          actualHeal = hp - prev;
          if (actualHeal > 0) showHealAt(playerX + 48, playerY + 40, actualHeal);
        } else if (attackerRef && attackerRef.ally) {
          const a = attackerRef.ally;
          const prev = a.hp;
          a.hp = Math.min(a.maxHp, a.hp + rawHeal);
          actualHeal = a.hp - prev;
          if (actualHeal > 0) showHealAt(a.x + a.def.displaySize / 2, a.y, actualHeal);
        }
        if (actualHeal > 0) {
          updateInfo(`${attackerName}: 命中時 ${actualHeal} HP 吸収 (${weaponLike.lifeStealDice}[${lr.rolls.join("+")}])`);
          await sleepMs(300);
        }
      }
    }

    // 敵の実効AC: 通常 = def.ac、煙幕などのフェーズバフがあれば加算
    function effectiveEnemyAc(target) {
      let ac = target.def.ac || 10;
      if (target.def.ragePhaseDefensive && target.phase === 1) ac += 4;
      return ac;
    }

    // ── 単体攻撃の共通処理(通常攻撃・スキル共用) ──
    // opts: { skillName?, dmgDice, dmgBonus, critMult, useStr?, onAfterHit?, range? }
    async function playerSingleAttack(targetIdx, opts) {
      const target = enemies[targetIdx];
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      mouseX = ex; mouseY = ey;
      updateFacingFromMouse();

      // 射程チェック: opts.range (スキル側) が優先、なければ武器射程
      const rangeKey = opts.range || playerStats.weaponRange || "melee";
      const rangeTiles = getRange(rangeKey).tiles;
      const dist = tileChebyshev(playerX + 48, playerY + 58, ex, ey);
      if (dist > rangeTiles) {
        showRollAtPlayer(
          `<span class="label">OUT OF RANGE</span>射程外 (${dist}タイル / 射程${rangeTiles})`,
          "miss");
        updateInfo(`射程外: ${dist}タイル (射程${rangeTiles})`);
        await sleepMs(900);
        return { missed: true };
      }

      const helpless = target.stunned > 0;  // スタン/スリープ中の敵は無抵抗
      const atkBonus = currentPlayerAtkBonus();
      const natD20  = d20();
      const atkTotal = natD20 + atkBonus;
      const isFumble = !helpless && natD20 === 1;  // 無抵抗相手はファンブルなし
      const isThreat = natD20 >= playerStats.critRange && !isFumble;
      const critMult = opts.critMult != null ? opts.critMult : playerStats.critMult;
      const labelPrefix = opts.skillName ? `${opts.skillName} ` : "";
      const atkText =
        `1d20(<b>${natD20}</b>)${signedDD(atkBonus)} = ` +
        `<span class="big">${atkTotal}</span><br>vs AC ${effectiveEnemyAc(target)}`;

      if (isFumble) {
        showRollAtPlayer(
          `<span class="label">FUMBLE!</span>1d20(<b>1</b>)${signedDD(atkBonus)}`,
          "fumble");
        updateInfo(`${getLeaderName()}${opts.skillName ? "の"+opts.skillName : ""}: ファンブル! 自動ミス`);
        await sleepMs(1000);
        return { missed: true };
      }

      const hit = helpless || isThreat || atkTotal >= effectiveEnemyAc(target);
      let isCrit = helpless;  // 無抵抗は確定クリティカル相当

      if (!hit) {
        showRollAtPlayer(`<span class="label">${labelPrefix}MISS</span>${atkText}`, "miss");
        updateInfo(`${getLeaderName()}${opts.skillName ? "の"+opts.skillName : ""}: ${atkTotal} vs AC${effectiveEnemyAc(target)} → ミス`);
        const angle = Math.atan2(ey - (playerY + 58), ex - (playerX + 48));
        await runSwingNoHit(angle);
        return { missed: true };
      }

      if (helpless) {
        showRollAtPlayer(
          `<span class="label">${labelPrefix}HELPLESS!</span>無抵抗の敵に自動命中 ×${critMult}`,
          "crit");
        updateInfo(`${getLeaderName()}: ${tgtDef.name} は無抵抗! 自動命中 ×${critMult}`);
      } else if (isThreat) {
        showRollAtPlayer(
          `<span class="label">CRIT THREAT!</span>1d20(<b>${natD20}</b>)${signedDD(atkBonus)}`,
          "crit");
        await sleepMs(650);
        const cn = d20(), ct = cn + atkBonus;
        if (ct >= effectiveEnemyAc(target)) {
          isCrit = true;
          showRollAtPlayer(
            `<span class="label">CRIT x${critMult}</span>` +
            `確認: 1d20(${cn})${signedDD(atkBonus)} = <span class="big">${ct}</span>`,
            "crit");
          updateInfo(`${getLeaderName()}: クリティカル成功! ×${critMult}`);
        } else {
          showRollAtPlayer(
            `<span class="label">CRIT FAILED</span>確認 ${ct} → 通常命中`, "hit");
        }
      } else {
        showRollAtPlayer(`<span class="label">${labelPrefix}HIT</span>${atkText}`, "hit");
      }
      await sleepMs(550);

      const angle = Math.atan2(ey - (playerY + 58), ex - (playerX + 48));
      await runSwingNoHit(angle);

      // 武器エンハンスメント (+N) はダメージにも加算、ダメダイスは武器から
      const curWeapon = getCurrentWeapon();
      const weaponEnh = (curWeapon && curWeapon.enhancement) || 0;
      const weaponDice = (curWeapon && curWeapon.dmgDice) || playerStats.dmgDice;
      const dmgBonus = (opts.dmgBonus != null ? opts.dmgBonus : playerStats.dmgBonus) + weaponEnh;
      const { n, sides } = parseDiceDD(opts.dmgDice || weaponDice);
      const times = isCrit ? critMult : 1;
      let allRolls = [];
      for (let i = 0; i < times; i++) {
        allRolls = allRolls.concat(rollDiceDD(n, sides).rolls);
      }
      const bonusTotal = dmgBonus * times;
      const dmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + bonusTotal);

      target.hp -= dmg;
      if (target.hp < 0) target.hp = 0;
      triggerEnemyDamageFlash(targetIdx);
      showHitSpark(targetIdx, isCrit);
      showDmgAt(ex, target.y, dmg, isCrit);
      const rollText = allRolls.join("+");
      const diceStr = opts.dmgDice || playerStats.dmgDice;
      updateInfo(`${getLeaderName()}${opts.skillName ? "の"+opts.skillName : ""}: ${tgtDef.name} に ${dmg} ダメージ ` +
        `(${diceStr}${isCrit ? "×" + critMult : ""}[${rollText}]${signedDD(bonusTotal)})`);
      await sleepMs(400);

      // ── レア武器の特殊効果 (D&D 3.5 RAW: エネルギーダメは crit で倍化されない) ──
      await applyWeaponSpecialEffects(curWeapon, target, targetIdx, ex, isCrit, getLeaderName(), "player", opts.suppressWeaponFx);

      if (opts.onAfterHit) await opts.onAfterHit(targetIdx, isCrit);

      if (target.hp <= 0) {
        defeatEnemy(targetIdx);
        await sleepMs(400);
      }
      return { missed: false, isCrit };
    }

    // ── 各スキル実装 ──
    async function skill_strongCleave(targetIdx) {
      await playerSingleAttack(targetIdx, {
        skillName: "強斬り",
        dmgDice: "2d8",
        dmgBonus: playerStats.str,
        range: WARRIOR_SKILLS["strong-cleave"].range,
      });
    }
    async function skill_sweep() {
      // 前列全体: 交戦中の生存敵すべてに個別に攻撃ロール
      const aliveIdxs = encounterEnemyIndices.filter(i => enemies[i].alive);
      for (const idx of aliveIdxs) {
        if (!enemies[idx].alive) continue;
        await playerSingleAttack(idx, {
          skillName: "なぎ払い",
          dmgDice: "1d6",
          dmgBonus: playerStats.str,
          range: WARRIOR_SKILLS["sweep"].range,
        });
        await sleepMs(200);
      }
    }
    async function skill_finisher(targetIdx) {
      const res = await playerSingleAttack(targetIdx, {
        skillName: "渾身の一撃",
        dmgDice: "3d10",
        dmgBonus: playerStats.str,
        range: WARRIOR_SKILLS["finisher"].range,
      });
      // 命中/外れに関わらず自分は息切れで次ターン行動不能
      playerBuffs.skipNextTurn = true;
      showBuffPop(`<span class="label">SELF STUN</span>息切れ — 次ターン休み`);
      await sleepMs(400);
    }
    async function skill_ironGuard() {
      const skill = WARRIOR_SKILLS["iron-guard"];
      playerBuffs.dmgReductionRemaining = skill.duration + 1;  // 次ターンまで
      playerBuffs.dmgReductionDice = skill.dmgReductionDice;
      showBuffPop(
        `<span class="label">鉄壁の構え</span>` +
        `次ターンまで被ダメ <span class="big">-${skill.dmgReductionDice}</span>`
      );
      updateInfo(`戦士: 鉄壁の構え! 被ダメージを ${skill.dmgReductionDice} 軽減`);
      await sleepMs(900);
    }
    async function skill_shieldBash(targetIdx) {
      const res = await playerSingleAttack(targetIdx, {
        skillName: "盾バッシュ",
        dmgDice: "1d4",
        dmgBonus: playerStats.str,
        range: WARRIOR_SKILLS["shield-bash"].range,
        suppressWeaponFx: true,  // 盾の打撃なので武器の炎エフェクトは出さない
      });
      if (!res.missed && enemies[targetIdx].alive) {
        enemies[targetIdx].stunned = 1;
        showRollAtEnemy(targetIdx, `<span class="label">STUNNED</span>次ターン行動不能`, "miss");
        await sleepMs(500);
      }
    }
    async function skill_morale() {
      const skill = WARRIOR_SKILLS["morale"];
      playerBuffs.atkBonusRemaining = skill.duration + 1;  // 次ターンから3ターン
      playerBuffs.atkBonusAmount = skill.atkBonusAmount;
      showBuffPop(
        `<span class="label">士気高揚</span>` +
        `3ターン攻撃ロール <span class="big">${signedDD(skill.atkBonusAmount)}</span>`
      );
      updateInfo(`戦士: 士気高揚! 3ターン攻撃+${skill.atkBonusAmount}`);
      await sleepMs(900);
    }
    async function skill_fightingSpirit() {
      const skill = WARRIOR_SKILLS["fighting-spirit"];
      const { n, sides } = parseDiceDD(skill.healDice);
      const r = rollDiceDD(n, sides);
      const heal = Math.max(1, r.total + playerStats.con);
      const prevHp = hp;
      hp = Math.min(maxHp, hp + heal);
      const actualHeal = hp - prevHp;
      showBuffPop(
        `<span class="label">闘志 HEAL</span>` +
        `${skill.healDice}(${r.rolls.join("+")})${signedDD(playerStats.con)} = ` +
        `<span class="big">+${actualHeal}</span>`
      );
      updateInfo(`戦士: 闘志でHPを ${actualHeal} 回復 (${hp}/${maxHp})`);
      await sleepMs(900);
    }

    // ── セカンドウィンド (立て直しフェーズで同期発動・1エンカウンター1回) ──
    let secondWindUsed = false;
    async function triggerSecondWind() {
      if (secondWindUsed) return false;
      if (hp <= 0) return false;
      if (!equippedSkills.includes("second-wind")) return false;
      if (hp >= maxHp) return false;  // HP 満タンなら温存

      secondWindUsed = true;
      const r = rollDiceDD(1, 10);
      const heal = Math.max(1, r.total + playerStats.con);
      const prevHp = hp;
      hp = Math.min(maxHp, hp + heal);
      const actualHeal = hp - prevHp;

      flashAction(player, "skill");
      showSkillAnnounce("セカンドウィンド");
      showHealAt(playerX + 48, playerY + 40, actualHeal);
      await sleepMs(500);
      showRollAtPlayer(
        `<span class="label">REST</span>1d10(${r.rolls.join("+")})${signedDD(playerStats.con)} = <span class="big">+${actualHeal}</span>`,
        "init"
      );
      updateInfo(`戦士のHPが、${actualHeal} 回復した。(セカンドウィンド)`);
      await sleepMs(1100);
      return true;
    }

    // ═════════════════════════════════════════════════════════
    // 部屋配置の宝箱 (トレハン要素)
    // ═════════════════════════════════════════════════════════
    const roomChests = [];
    const CHEST_DISCOVER_RADIUS = 240;   // この距離以内に入ると発見
    const CHEST_SAFE_DIST       = 640;   // 敵がこの距離未満なら発見保留 (戦闘圏内)
    const CHEST_ELIGIBLE_MIN_SIZE = 25;  // 玄室判定: 5×5 以上
    const CHEST_SPAWN_CHANCE    = 0.5;   // 各玄室での出現率

    function pickChestLoot() {
      const r = Math.random();
      if (r < 0.35) {
        return { kind: "goldSmall", amount: 10 + Math.floor(Math.random() * 11) };      // 10-20
      } else if (r < 0.55) {
        return { kind: "goldLarge", amount: 30 + Math.floor(Math.random() * 21) };      // 30-50
      } else if (r < 0.70) {
        return { kind: "weapon" };
      } else if (r < 0.85) {
        return { kind: "armor" };
      } else if (r < 0.95) {
        return { kind: "shield" };
      } else {
        return { kind: "empty" };
      }
    }

    function spawnRoomChests() {
      // 玄室候補: 5×5以上 & 非スタート(idx=0) & 非ボス部屋(末尾)
      const candidates = [];
      const bossRoomIdx = ROOMS.length - 1;
      for (let i = 0; i < ROOMS.length; i++) {
        if (i === 0 || i === bossRoomIdx) continue;
        const [r1, c1, r2, c2] = ROOMS[i];
        const size = (r2 - r1 + 1) * (c2 - c1 + 1);
        if (size >= CHEST_ELIGIBLE_MIN_SIZE) candidates.push(i);
      }
      for (const i of candidates) {
        if (Math.random() >= CHEST_SPAWN_CHANCE) continue;
        const [r1, c1, r2, c2] = ROOMS[i];
        // 部屋内の床タイル (mapData===0) からランダム1個選ぶ
        const floorTiles = [];
        for (let r = r1; r <= r2; r++) {
          for (let c = c1; c <= c2; c++) {
            if (mapData[r][c] === 0) floorTiles.push([c, r]);
          }
        }
        if (floorTiles.length === 0) continue;
        const [tx, ty] = floorTiles[Math.floor(Math.random() * floorTiles.length)];
        const chest = {
          tx, ty, opened: false, found: false,
          hidden: false,             // 部屋配置は自動発見 (接近で tryDiscoverChest)
          loot: pickChestLoot(),
          el: null,
        };
        roomChests.push(chest);
        createRoomChestDom(chest, roomChests.length - 1);
      }
    }

    // 隠された宝箱: 床タイル (スタート/ボス部屋除外) にランダム配置
    //   罠と同じく未発見は非表示、知覚チェックで発見後に回収可能
    function spawnHiddenChests() {
      const count = currentScenario.hiddenChestCount || 0;
      if (count <= 0) return;
      const bossIdx = ROOMS.length - 1;
      const excludeRooms = new Set([0, bossIdx]);
      const candidates = [];
      for (let r = 0; r < MAP_H; r++) {
        for (let c = 0; c < MAP_W; c++) {
          if (mapData[r][c] !== 0) continue;
          let inExcluded = false;
          for (const i of excludeRooms) {
            const [r1, c1, r2, c2] = ROOMS[i];
            if (r >= r1 && r <= r2 && c >= c1 && c <= c2) { inExcluded = true; break; }
          }
          if (inExcluded) continue;
          // 既存の宝箱 (roomChests) や罠と同じタイルは避ける
          const occupied = roomChests.some(ch => ch.tx === c && ch.ty === r)
            || (typeof traps !== "undefined" && traps.some(t => t.tx === c && t.ty === r));
          if (occupied) continue;
          candidates.push([c, r]);
        }
      }
      if (candidates.length === 0) return;
      for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
      }
      const spawnN = Math.min(count, candidates.length);
      for (let i = 0; i < spawnN; i++) {
        const [tx, ty] = candidates[i];
        const chest = {
          tx, ty, opened: false, found: false,
          hidden: true,              // 知覚チェックで発見するまで非表示
          loot: pickChestLoot(),
          el: null,
        };
        roomChests.push(chest);
        createRoomChestDom(chest, roomChests.length - 1);
      }
    }

    function createRoomChestDom(chest, idx) {
      const el = document.createElement("div");
      el.className = "roomChest";
      el.id = "roomChest" + idx;
      document.body.appendChild(el);
      chest.el = el;
    }

    function tryDiscoverChest() {
      if (!gameStarted || gameOver) return;
      if (encounterActive || encounterRunning) return;
      if (hp <= 0) return;
      const pCX = playerX + 48, pCY = playerY + 58;

      for (const chest of roomChests) {
        if (chest.opened) continue;  // 開封済みは無視
        // 隠された宝箱 (知覚チェック待ち) は非表示のまま
        if (chest.hidden && !chest.found) continue;
        const cx = chest.tx * TILE_SIZE + TILE_SIZE / 2;
        const cy = chest.ty * TILE_SIZE + TILE_SIZE / 2;
        if (Math.hypot(pCX - cx, pCY - cy) > CHEST_DISCOVER_RADIUS) continue;
        if (!hasLineOfSight(pCX, pCY, cx, cy)) continue;

        // 近くに生存敵がいれば保留 (戦闘圏内)
        let inDanger = false;
        for (const e of enemies) {
          if (!e.alive) continue;
          const eCX = e.x + e.def.displaySize / 2;
          const eCY = e.y + e.def.displaySize / 2;
          if (Math.hypot(pCX - eCX, pCY - eCY) < CHEST_SAFE_DIST) { inDanger = true; break; }
        }
        if (inDanger) continue;

        // 発見演出 (知覚で既に found=true なら発見バナーは省略して開封演出のみ)
        const skipBanner = chest.found;
        chest.found = true;
        discoverChest(chest, { skipBanner });
        return;  // 1回の tick で1個だけ処理
      }
    }

    async function discoverChest(chest, opts = {}) {
      if (!opts.skipBanner) {
        showBanner("🎁 宝箱をみつけた!", 1500);
        appendLog("宝箱を発見！", "sys");
        // レア判定: loot 種別で differentiate (武器/防具/大金貨=レア的扱い)
        const isRare = chest.loot && (chest.loot.kind === "weapon" || chest.loot.kind === "armor" || chest.loot.kind === "goldLarge");
        if (isRare) {
          showDMMessage("おや…これはただの箱ではない。紋章が刻まれた鉄製の箱だ。中に何が入っている？", 2400);
        } else {
          showDMMessage("壁際に、古びた木箱が置かれている。埃を被っているが、鍵はかかっていないようだ。", 2400);
        }
      }
      if (chest.el) chest.el.classList.add("discovering");
      await sleepMs(800);

      // 中身処理
      const loot = chest.loot;
      if (loot.kind === "goldSmall" || loot.kind === "goldLarge") {
        coins += loot.amount;
        updateInfo(`宝箱の中身: 金貨 +${loot.amount}`);
        showBanner(`金貨 +${loot.amount}`, 1400);
      } else if (loot.kind === "weapon") {
        // 次ランクの武器を所持 (既存の index=1 体系)
        const nextIdx = Math.min(weapons.length - 1, currentWeaponIndex + 1);
        if (nextIdx > currentWeaponIndex) {
          currentWeaponIndex = nextIdx;
          const w = weapons[nextIdx];
          updateInfo(`宝箱の中身: 武器『${w.name}』`);
          showBanner(`武器 "${w.name}" を手に入れた!`, 1800);
        } else {
          // 既に最上位 → 金貨に変換
          const bonus = 25;
          coins += bonus;
          updateInfo(`宝箱の中身: 予備の武器 (既に上位所持) → 金貨 +${bonus}`);
          showBanner(`予備の武器を換金 金貨 +${bonus}`, 1400);
        }
      } else if (loot.kind === "armor") {
        const nextIdx = Math.min(armors.length - 1, currentArmorIndex + 1);
        if (nextIdx > currentArmorIndex) {
          currentArmorIndex = nextIdx;
          const a = armors[nextIdx];
          updateInfo(`宝箱の中身: 防具『${a.name}』`);
          showBanner(`防具 "${a.name}" を手に入れた!`, 1800);
        } else {
          const bonus = 25;
          coins += bonus;
          updateInfo(`宝箱の中身: 予備の防具 (既に上位所持) → 金貨 +${bonus}`);
          showBanner(`予備の防具を換金 金貨 +${bonus}`, 1400);
        }
      } else if (loot.kind === "shield") {
        const nextIdx = Math.min(shields.length - 1, currentShieldIndex + 1);
        if (nextIdx > currentShieldIndex) {
          currentShieldIndex = nextIdx;
          const s = shields[nextIdx];
          updateInfo(`宝箱の中身: 盾『${s.name}』`);
          showBanner(`盾 "${s.name}" を手に入れた!`, 1800);
        } else {
          const bonus = 20;
          coins += bonus;
          updateInfo(`宝箱の中身: 予備の盾 (既に上位所持) → 金貨 +${bonus}`);
          showBanner(`予備の盾を換金 金貨 +${bonus}`, 1400);
        }
      } else {
        // empty
        updateInfo("宝箱の中身: 空っぽだった…");
        showBanner("空っぽだった…", 1300);
      }

      await sleepMs(600);
      chest.opened = true;
      if (chest.el) {
        chest.el.classList.remove("discovering");
        chest.el.classList.add("opened");
        // 開封時のバースト演出 (放射光線+暖色ブルーム+本体パンチアップ)
        chest.el.classList.add("openBurst");
        const elRef = chest.el;
        setTimeout(() => { if (elRef) elRef.classList.remove("openBurst"); }, 950);
      }
    }

    setInterval(tryDiscoverChest, 400);

    // ═════════════════════════════════════════════════════════
    // ダンジョン罠 (知覚チェックで発見、未発見で踏むとダメージ)
    // ═════════════════════════════════════════════════════════
    const traps = [];
    const TRAP_PERCEPTION_RADIUS = 6;  // このタイル以内の罠を毎ターン判定

    function spawnTraps() {
      const count = currentScenario.trapCount || 3;
      const bossIdx = ROOMS.length - 1;
      const excludeRooms = new Set([0, bossIdx]);  // スタート・ボス部屋は除外
      const candidates = [];
      for (let r = 0; r < MAP_H; r++) {
        for (let c = 0; c < MAP_W; c++) {
          if (mapData[r][c] !== 0) continue;
          // 除外部屋内ならスキップ
          let inExcluded = false;
          for (const i of excludeRooms) {
            const [r1, c1, r2, c2] = ROOMS[i];
            if (r >= r1 && r <= r2 && c >= c1 && c <= c2) { inExcluded = true; break; }
          }
          if (inExcluded) continue;
          candidates.push([c, r]);
        }
      }
      if (candidates.length === 0) return;
      // Fisher-Yates シャッフル
      for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
      }
      const spawnN = Math.min(count, candidates.length);
      for (let i = 0; i < spawnN; i++) {
        const [tx, ty] = candidates[i];
        const trap = {
          tx, ty,
          type: "damage",
          damageDice: "1d6",
          found: false,
          triggered: false,
          el: null,
        };
        traps.push(trap);
        createTrapDom(trap, traps.length - 1);
      }
    }

    function createTrapDom(trap, idx) {
      const el = document.createElement("div");
      el.className = "trap";
      el.id = "trap" + idx;
      document.body.appendChild(el);
      trap.el = el;
    }

    // 知覚チェック: プレイヤー 1 タイル移動後に呼ばれる
    //   周辺 TRAP_PERCEPTION_RADIUS 以内の未発見罠 + 隠された宝箱を
    //   PT 全員で 1d20+WIS+perceptionBonus 判定、1人成功で発見
    function runPerceptionCheck() {
      if (encounterActive || encounterRunning) return;
      if (!gameStarted || gameOver) return;
      const dc = currentScenario.perceptionDC || 15;
      const pCX = playerX + 48, pCY = playerY + 58;
      const pTX = Math.floor(pCX / TILE_SIZE);
      const pTY = Math.floor(pCY / TILE_SIZE);
      // ロール担当者をリスト化 (毎 tick 同じなので先に作る)
      function getRollers() {
        const rollers = [];
        if (hp > 0 && !gameOver) {
          rollers.push({ name: getLeaderName(), wis: playerStats.wis || 0, bonus: 0 });
        }
        for (const a of allies) {
          if (!a.alive) continue;
          rollers.push({
            name: a.def.name,
            wis: a.wis || 0,
            bonus: a.def.perceptionBonus || 0,
          });
        }
        return rollers;
      }

      // 罠の発見判定
      for (const trap of traps) {
        if (trap.found || trap.triggered) continue;
        if (Math.abs(trap.tx - pTX) > TRAP_PERCEPTION_RADIUS) continue;
        if (Math.abs(trap.ty - pTY) > TRAP_PERCEPTION_RADIUS) continue;
        for (const r of getRollers()) {
          const natD20 = d20();
          const total = natD20 + r.wis + r.bonus;
          if (total >= dc) {
            trap.found = true;
            showBanner("⚠ 罠を見つけた!", 1400);
            showDMMessage("足を止めろ。床に不自然な跡がある。罠だ。慎重に進め。", 2400);
            updateInfo(
              `${r.name} が罠を発見! 1d20(${natD20})` +
              `${r.wis !== 0 ? (r.wis > 0 ? "+" : "") + "WIS" + r.wis : ""}` +
              `${r.bonus !== 0 ? "+" + r.bonus : ""}` +
              ` = ${total} vs DC${dc}`
            );
            break;
          }
        }
      }

      // 隠された宝箱の発見判定
      if (typeof roomChests !== "undefined") {
        for (const chest of roomChests) {
          if (!chest.hidden || chest.found) continue;
          if (Math.abs(chest.tx - pTX) > TRAP_PERCEPTION_RADIUS) continue;
          if (Math.abs(chest.ty - pTY) > TRAP_PERCEPTION_RADIUS) continue;
          for (const r of getRollers()) {
            const natD20 = d20();
            const total = natD20 + r.wis + r.bonus;
            if (total >= dc) {
              chest.found = true;
              showBanner("🎁 隠された宝箱を見つけた!", 1400);
              updateInfo(
                `${r.name} が隠された宝箱を発見! 1d20(${natD20})` +
                `${r.wis !== 0 ? (r.wis > 0 ? "+" : "") + "WIS" + r.wis : ""}` +
                `${r.bonus !== 0 ? "+" + r.bonus : ""}` +
                ` = ${total} vs DC${dc}`
              );
              break;
            }
          }
        }
      }
    }

    // 罠発動チェック: 誰かが罠タイルに入ったら発動
    function checkTrapTrigger() {
      if (!gameStarted || gameOver) return;
      if (encounterActive || encounterRunning) return;
      const pTX = Math.floor((playerX + 48) / TILE_SIZE);
      const pTY = Math.floor((playerY + 58) / TILE_SIZE);
      for (const trap of traps) {
        if (trap.triggered) continue;
        // プレイヤー
        if (trap.tx === pTX && trap.ty === pTY && !trap.found) {
          triggerTrapOnPlayer(trap);
        }
        // 仲間
        for (const ally of allies) {
          if (!ally.alive || trap.triggered) continue;
          const aTX = Math.floor((ally.x + ally.def.displaySize / 2) / TILE_SIZE);
          const aTY = Math.floor((ally.y + ally.def.displaySize / 2) / TILE_SIZE);
          if (trap.tx === aTX && trap.ty === aTY && !trap.found) {
            triggerTrapOnAlly(trap, ally);
          }
        }
      }
    }

    function triggerTrapOnPlayer(trap) {
      trap.triggered = true;
      trap.found = true;
      const r = rollDiceDD(1, 6);
      const dmg = r.total;
      hp = Math.max(0, hp - dmg);
      showBanner("罠発動!", 1200);
      showDMMessage("しまった! 罠だ!", 1800);
      updateInfo(`${getLeaderName()}が罠を踏んだ! 1d6(${r.rolls.join("+")}) = ${dmg} ダメージ`);
      showDmgAt(playerX + 48, playerY + 48, dmg, false);
      if (hp <= 0) gameOver = true;
    }

    function triggerTrapOnAlly(trap, ally) {
      trap.triggered = true;
      trap.found = true;
      const r = rollDiceDD(1, 6);
      const dmg = r.total;
      ally.hp = Math.max(0, ally.hp - dmg);
      showBanner("罠発動!", 1200);
      showDMMessage("しまった! 罠だ!", 1800);
      updateInfo(`${ally.def.name} が罠を踏んだ! 1d6(${r.rolls.join("+")}) = ${dmg} ダメージ`);
      showDmgAt(ally.x + ally.def.displaySize / 2, ally.y + 40, dmg, false);
      if (ally.hp <= 0) {
        ally.alive = false;
        updateInfo(`${ally.def.name} は倒れた…`);
      }
    }

    // ── カウンター (被弾後の自動反撃) ──
    async function performCounter(enemyIdx) {
      if (!enemies[enemyIdx].alive) return;
      showSkillAnnounce("カウンター");
      flashAction(player, "skill");
      await sleepMs(400);
      await playerSingleAttack(enemyIdx, {
        skillName: "カウンター",
        dmgDice: "1d8",
        dmgBonus: playerStats.str,
        range: "melee",
      });
    }

    // ═══════════════════════════════════════════════════════════
    // パーティー戦闘: 敵ターゲット選択 + 仲間のターン
    // ═══════════════════════════════════════════════════════════

    // 敵がパーティーの誰を狙うか (最寄りの生存メンバー)
    function pickEnemyTarget(enemyIdx) {
      const e = enemies[enemyIdx];
      const eCX = e.x + e.def.displaySize / 2;
      const eCY = e.y + e.def.displaySize / 2;
      const candidates = [];
      if (hp > 0 && !gameOver) {
        candidates.push({ kind: "leader", cx: playerX + 48, cy: playerY + 58 });
      }
      for (let i = 0; i < allies.length; i++) {
        if (!allies[i].alive) continue;
        const a = allies[i];
        candidates.push({
          kind: "ally", idx: i,
          cx: a.x + a.def.displaySize / 2,
          cy: a.y + a.def.displaySize / 2
        });
      }
      if (candidates.length === 0) return null;
      let best = null, bestDist = Infinity;
      for (const c of candidates) {
        const d = Math.hypot(eCX - c.cx, eCY - c.cy);
        if (d < bestDist) { bestDist = d; best = c; }
      }
      return best;
    }

    // 回復ポップ (緑色のダメージポップ再利用)
    function showHealAt(worldX, worldY, heal) {
      const pop = document.createElement("div");
      pop.className = "dmgPop";
      pop.style.color = "#8effa0";
      pop.style.textShadow =
        "0 1px 0 #000, 0 2px 6px rgba(0,0,0,0.9), 0 0 10px rgba(140,255,160,0.85)";
      pop.textContent = "+" + heal;
      pop.style.left = (worldX - camX) + "px";
      pop.style.top  = (worldY - camY - 4) + "px";
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), 900);
    }

    // MP 回復ポップ (青色)
    function showHealAtAllyMp(ally, amount) {
      if (!ally || !ally.def) return;
      const pop = document.createElement("div");
      pop.className = "dmgPop";
      pop.style.color = "#6ab0ff";
      pop.style.textShadow =
        "0 1px 0 #000, 0 2px 6px rgba(0,0,0,0.9), 0 0 10px rgba(80,140,255,0.9)";
      pop.textContent = `MP +${amount}`;
      const wx = ally.x + ally.def.displaySize / 2;
      const wy = ally.y;
      pop.style.left = (wx - camX) + "px";
      pop.style.top  = (wy - camY - 4) + "px";
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), 1000);
    }

    function findLowestHpPartyMember() {
      const list = [];
      if (hp > 0 && !gameOver) {
        list.push({
          kind: "leader",
          hp, maxHp, ratio: hp / maxHp,
          cx: playerX + 48, cy: playerY + 58,
        });
      }
      for (const a of allies) {
        if (!a.alive) continue;
        list.push({
          kind: "ally", ally: a,
          hp: a.hp, maxHp: a.maxHp, ratio: a.hp / a.maxHp,
          cx: a.x + a.def.displaySize / 2,
          cy: a.y + a.def.displaySize / 2,
        });
      }
      if (list.length === 0) return null;
      list.sort((a, b) => a.ratio - b.ratio);
      return list[0];
    }

    function pickClosestEngagedEnemyFromAlly(ally) {
      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      let best = -1, bestDist = Infinity;
      for (const i of encounterEnemyIndices) {
        if (!enemies[i].alive) continue;
        const eCX = enemies[i].x + enemies[i].def.displaySize / 2;
        const eCY = enemies[i].y + enemies[i].def.displaySize / 2;
        const d = Math.hypot(aCX - eCX, aCY - eCY);
        if (d < bestDist) { bestDist = d; best = i; }
      }
      return best;
    }

    // 仲間を1タイル前進 (任意座標へ)。戦士・他仲間・敵のタイルを回避
    async function allyAdvanceTowardPoint(ally, targetWX, targetWY, opts = {}) {
      const slideMs   = (opts.slideMs   != null) ? opts.slideMs   : 380;
      const postSleep = (opts.postSleep != null) ? opts.postSleep : 120;
      const silent    = !!opts.silent;  // ログ/ロール表示を抑制 (探索中向け)
      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const aTX = Math.floor(aCX / TILE_SIZE);
      const aTY = Math.floor(aCY / TILE_SIZE);
      const gTX = Math.floor(targetWX / TILE_SIZE);
      const gTY = Math.floor(targetWY / TILE_SIZE);
      // 他ユニット (戦士・他仲間・敵) を避ける
      const avoidSet = getUnitOccupiedTiles(ally);
      const next = firstTileStep(aTX, aTY, gTX, gTY, avoidSet);
      if (!next) {
        if (!silent) showRollAtAlly(ally, `<span class="label">CAN'T ADVANCE</span>経路なし`, "miss");
        await sleepMs(silent ? 100 : 600);
        return;
      }
      // 右向きのみ運用: 水平移動時のみ facing 更新、上下は維持
      if (next.tx < aTX) ally.facing = "left";
      else if (next.tx > aTX) ally.facing = "right";

      if (!silent) showRollAtAlly(ally, `<span class="label">ADVANCE</span>前進 1タイル`, "init");
      flashAction(ally.el, "move");
      const fromX = ally.x, fromY = ally.y;
      const toX = next.tx * TILE_SIZE + TILE_SIZE / 2 - ally.def.displaySize / 2;
      const toY = next.ty * TILE_SIZE + TILE_SIZE / 2 - ally.def.displaySize / 2;
      ally.slideTargetTile = { tx: next.tx, ty: next.ty };  // 他ユニットの侵入防止
      ally.playerMovingThisFrame = true;
      try {
        await slideAnim((x, y) => {
          ally.x = x; ally.y = y; ally.playerMovingThisFrame = true;
        }, fromX, fromY, toX, toY, slideMs);
      } finally {
        ally.slideTargetTile = null;
        ally.playerMovingThisFrame = false;
      }
      await sleepMs(postSleep);
    }

    // 仲間の通常攻撃
    async function allyBasicAttack(ally, enemyIdx) {
      const target = enemies[enemyIdx];
      if (!target.alive) return;
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      // 向き調整
      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const dfx = ex - aCX, dfy = ey - aCY;
      // 右向きのみ運用: X軸に差があれば更新、ほぼ真上/真下なら facing 維持
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      // 射程 + 視線チェック (遠距離武器は壁越しに撃てない)
      const rangeKey = ally.weaponRange || "melee";
      const rangeTiles = getRange(rangeKey).tiles;
      const distT = tileChebyshev(aCX, aCY, ex, ey);
      const needLOS = (rangeKey !== "melee");
      if (distT > rangeTiles || (needLOS && !hasLineOfSight(aCX, aCY, ex, ey))) {
        await allyAdvanceTowardPoint(ally, ex, ey);
        return;
      }

      flashAction(ally.el, "attack");
      startAllyAttackAnim(ally);

      const helpless = target.stunned > 0;
      const natD20 = d20();
      const atkTotal = natD20 + ally.atkBonus;
      const isFumble = !helpless && natD20 === 1;
      const isThreat = natD20 >= ally.critRange && !isFumble;

      // 弓使い (weaponProjectile=arrow) は矢発射ヘルパー
      const fireArrowFromAlly = async () => {
        if (ally.def.weaponProjectile !== "arrow") return;
        const launchX = aCX + (ally.facing === "right" ? 22 : -22);
        const launchY = aCY - 6;
        await spawnArrow(launchX, launchY, ex, ey, 320);
      };

      if (isFumble) {
        showRollAtAlly(ally,
          `<span class="label">FUMBLE!</span>1d20(<b>1</b>)${signedDD(ally.atkBonus)}`,
          "fumble");
        await sleepMs(900);
        return;
      }

      const hit = helpless || isThreat || atkTotal >= effectiveEnemyAc(target);
      let isCrit = helpless;
      if (!hit) {
        showRollAtAlly(ally,
          `<span class="label">MISS</span>1d20(<b>${natD20}</b>)${signedDD(ally.atkBonus)} = ${atkTotal}<br>vs AC ${effectiveEnemyAc(target)}`,
          "miss");
        await fireArrowFromAlly();
        await sleepMs(500);
        return;
      }

      if (!helpless && isThreat) {
        const cn = d20(), ct = cn + ally.atkBonus;
        if (ct >= effectiveEnemyAc(target)) isCrit = true;
      }
      if (helpless) {
        showRollAtAlly(ally,
          `<span class="label">HELPLESS!</span>無抵抗の敵に自動命中 ×${ally.critMult}`,
          "crit");
      } else {
        showRollAtAlly(ally,
          `<span class="label">${isCrit ? "CRIT!" : "HIT"}</span>1d20(<b>${natD20}</b>)${signedDD(ally.atkBonus)} = <span class="big">${atkTotal}</span><br>vs AC ${effectiveEnemyAc(target)}`,
          isCrit ? "crit" : "hit");
      }
      await sleepMs(300);
      // 命中側でも矢飛翔 (着弾 → ダメージ)
      await fireArrowFromAlly();

      const { n, sides } = parseDiceDD(ally.dmgDice);
      const times = isCrit ? ally.critMult : 1;
      let allRolls = [];
      for (let i = 0; i < times; i++) allRolls = allRolls.concat(rollDiceDD(n, sides).rolls);
      const bonusTotal = ally.dmgBonus * times;
      const dmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + bonusTotal);

      target.hp -= dmg;
      if (target.hp < 0) target.hp = 0;
      triggerEnemyDamageFlash(enemyIdx);
      showHitSpark(enemyIdx, isCrit);
      showDmgAt(ex, target.y, dmg, isCrit);
      updateInfo(`${ally.def.name}: ${tgtDef.name} に ${dmg} ダメージ`);
      await sleepMs(400);

      // ── レア武器の特殊効果 (ally 武器のフィールドから読み出し) ──
      const allyWeaponLike = {
        bonusDmgDice:  ally.weaponBonusDmgDice,
        bonusDmgType:  ally.weaponBonusDmgType,
        critStun:      ally.weaponCritStun,
        lifeStealDice: ally.weaponLifeStealDice,
        shockwaveDice:   ally.weaponShockwaveDice,
        shockwaveType:   ally.weaponShockwaveType,
        shockwaveSaveDC: ally.weaponShockwaveSaveDC,
      };
      await applyWeaponSpecialEffects(allyWeaponLike, target, enemyIdx, ex, isCrit, ally.def.name, { kind:"ally", ally });

      if (target.hp <= 0) {
        defeatEnemy(enemyIdx);
        await sleepMs(400);
      }
    }

        actualHeal = target.ally.hp - prev;

      spawnCureFx(target.cx, target.cy);

    // スリープ: 命中判定、ヒットで 2T スタン
    async function allySleep(ally, enemyIdx) {
      const skill = MAGE_SKILLS["sleep"];
      const target = enemies[enemyIdx];
      if (!target || !target.alive) return;
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const rangeTiles = getRange(skill.range).tiles;
      if (tileChebyshev(aCX, aCY, ex, ey) > rangeTiles || !hasLineOfSight(aCX, aCY, ex, ey)) {
        await allyAdvanceTowardPoint(ally, ex, ey);
        return;
      }

      // 範囲(2x2)選定: ターゲットを含む 4通りの origin から最多敵を含むものを採用
      const targetTX = Math.floor(ex / TILE_SIZE);
      const targetTY = Math.floor(ey / TILE_SIZE);
      const enemiesInArea = (originTX, originTY) => {
        const out = [];
        for (let i = 0; i < enemies.length; i++) {
          const e = enemies[i];
          if (!e.alive) continue;
          const eTX = Math.floor((e.x + e.def.displaySize / 2) / TILE_SIZE);
          const eTY = Math.floor((e.y + e.def.displaySize / 2) / TILE_SIZE);
          if (eTX >= originTX && eTX < originTX + 2 &&
              eTY >= originTY && eTY < originTY + 2) out.push(i);
        }
        return out;
      };
      const candidates = [
        { tx: targetTX,     ty: targetTY     },
        { tx: targetTX - 1, ty: targetTY     },
        { tx: targetTX,     ty: targetTY - 1 },
        { tx: targetTX - 1, ty: targetTY - 1 },
      ];
      let best = candidates[0], bestCount = enemiesInArea(best.tx, best.ty).length;
      for (let i = 1; i < candidates.length; i++) {
        const c = candidates[i];
        const cnt = enemiesInArea(c.tx, c.ty).length;
        if (cnt > bestCount) { best = c; bestCount = cnt; }
      }
      const affectedIdxs = enemiesInArea(best.tx, best.ty);
      if (affectedIdxs.length === 0) return;  // 範囲に敵なし

      // 発動確定 → MP 消費
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      flashAction(ally.el, "skill");

      const dfx = ex - aCX;
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      showRollAtAlly(ally,

    // ══════════ ドワーフスキル (Phase 2) ══════════
    // パワーアタック: 命中-2 / ダメージ+4 (extraDmg) の単体力押し
    async function allyPowerAttack(ally, enemyIdx) {
      const skill = DWARF_SKILLS["power-attack"];
      const target = enemies[enemyIdx];
      if (!target || !target.alive) return;
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const rangeTiles = getRange(skill.range).tiles;
      if (tileChebyshev(aCX, aCY, ex, ey) > rangeTiles) {
        await allyAdvanceTowardPoint(ally, ex, ey);
        return;
      }

      // 発動確定 → 使用権消費
      ally.skillsUsedInEncounter.add("power-attack");
      flashAction(ally.el, "skill");

      const dfx = ex - aCX, dfy = ey - aCY;
      // 右向きのみ運用: X軸に差があれば更新、ほぼ真上/真下なら facing 維持
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      startAllyAttackAnim(ally, 700);  // パワーアタックは少し長め

      showRollAtAlly(ally, `<span class="label">SKILL</span><span class="big">${skill.name}</span>`, "skill");
      await sleepMs(1100);

      // 命中判定 (penalty 適用)
      const helpless = target.stunned > 0;
      const atkBonus = ally.atkBonus - (skill.atkPenalty || 0);
      const natD20 = d20();
      const atkTotal = natD20 + atkBonus;
      const isFumble = !helpless && natD20 === 1;
      const isThreat = natD20 >= ally.critRange && !isFumble;

      if (isFumble) {
        showRollAtAlly(ally,
          `<span class="label">FUMBLE!</span>1d20(<b>1</b>)${signedDD(atkBonus)}`,
          "fumble");
        await sleepMs(900);
        return;
      }
      const hit = helpless || isThreat || atkTotal >= effectiveEnemyAc(target);
      let isCrit = helpless;
      if (!hit) {
        showRollAtAlly(ally,
          `<span class="label">MISS</span>1d20(<b>${natD20}</b>)${signedDD(atkBonus)} = ${atkTotal}<br>vs AC ${effectiveEnemyAc(target)}`,
          "miss");
        await sleepMs(800);
        return;
      }
      if (!helpless && isThreat) {
        const cn = d20(), ct = cn + atkBonus;
        if (ct >= effectiveEnemyAc(target)) isCrit = true;
      }
      if (helpless) {
        showRollAtAlly(ally,
          `<span class="label">HELPLESS!</span>無抵抗の敵に自動命中 ×${ally.critMult || 2}`,
          "crit");
      } else {
        showRollAtAlly(ally,
          `<span class="label">${isCrit ? "CRIT!" : "HIT"}</span>1d20(<b>${natD20}</b>)${signedDD(atkBonus)} = <span class="big">${atkTotal}</span><br>vs AC ${effectiveEnemyAc(target)}`,
          isCrit ? "crit" : "hit");
      }
      await sleepMs(500);

      // ダメージ (dmgDice + STR + extraDmg)
      const { n, sides } = parseDiceDD(skill.dmgDice);
      const times = isCrit ? (ally.critMult || 2) : 1;
      let allRolls = [];
      for (let i = 0; i < times; i++) allRolls = allRolls.concat(rollDiceDD(n, sides).rolls);
      const strBonus = (skill.useStr ? ally.str : 0) * times;
      const extra = (skill.extraDmg || 0) * times;
      const dmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + strBonus + extra);

      target.hp = Math.max(0, target.hp - dmg);
      triggerEnemyDamageFlash(enemyIdx);
      showHitSpark(enemyIdx, isCrit);
      showDmgAt(ex, target.y, dmg, isCrit);
      updateInfo(`${ally.def.name}: パワーアタックで ${tgtDef.name} に ${dmg} ダメージ`);
      await sleepMs(500);
      if (target.hp <= 0) {
        defeatEnemy(enemyIdx);
        await sleepMs(400);
      }
    }

        const eCY = e.y + e.def.displaySize / 2;

      ally.buffs.dmgReductionRemaining = skill.duration;
      ally.buffs.antiKnockbackRemaining = skill.duration;
      showRollAtAlly(ally,
        `<span class="label">SKILL</span><span class="big">${skill.name}</span><br>DR ${skill.dmgReductionDice} + ノックバック無効 / ${skill.duration}T`,
        "skill");
      updateInfo(`${ally.def.name}: 踏ん張り — ${skill.duration}ターン被ダメ -${skill.dmgReductionDice} & ノックバック無効`);
      await sleepMs(800);
    }

    // ── 状態異常 1回無効化チェック (鋼の意志) ──
    // 状態異常を ally に適用しようとする箇所で呼ぶ。残りスタックがあれば消費して true を返す。
    function consumeAllyStatusImmunity(ally, label) {
      if (!ally || !ally.buffs) return false;
      if ((ally.buffs.statusImmunityCharges || 0) <= 0) return false;
      ally.buffs.statusImmunityCharges--;
      showRollAtAlly(ally,
        `<span class="label">RESIST!</span>${label || "状態異常"}を鋼の意志で無効化`,
        "skill");
      updateInfo(`${ally.def.name}: 鋼の意志で ${label || "状態異常"} を無効化 (残り ${ally.buffs.statusImmunityCharges})`);
      return true;
    }

    // ══════════ ドワーフ フェーズ C: バフ系 3スキル ══════════

    // 戦闘の咆哮: 3T 攻撃ロール +4 (1戦1回)
    async function allyBattleRoar(ally) {
      const skill = DWARF_SKILLS["battle-roar"];
      ally.skillsUsedInEncounter.add("battle-roar");
      flashAction(ally.el, "skill");
      // 既存の atk バフより強い場合のみ上書き (士気高揚 +2 の上に乗らないが、+4 が常に強い)
      ally.buffs.atkBonusAmount = Math.max(ally.buffs.atkBonusAmount || 0, skill.atkBonusAmount);
      ally.buffs.atkBonusRemaining = skill.duration;
      showRollAtAlly(ally,
        `<span class="label">SKILL</span><span class="big">${skill.name}</span><br>攻撃 +${skill.atkBonusAmount} / ${skill.duration}T`,
        "skill");
      updateInfo(`${ally.def.name}: 戦闘の咆哮! ${skill.duration}ターン攻撃 +${skill.atkBonusAmount}`);
      await sleepMs(800);
    }

    // 大飯食らい: 2d8+CON HP 回復 (1戦1回、battle-rest 上位)
    async function allyBigEater(ally) {
      const skill = DWARF_SKILLS["big-eater"];
      ally.skillsUsedInEncounter.add("big-eater");
      flashAction(ally.el, "skill");
      startAllyAttackAnim(ally);
      showRollAtAlly(ally,
        `<span class="label">SKILL</span><span class="big">${skill.name}</span>`,
        "skill");
      await sleepMs(1200);

      const r = rollDiceDD(2, 8);
      const heal = Math.max(1, r.total + (skill.useCon ? ally.con : 0));
      const prev = ally.hp;
      ally.hp = Math.min(ally.maxHp, ally.hp + heal);
      const actual = ally.hp - prev;

      showRollAtAlly(ally,
        `<span class="label">EAT</span>2d8(${r.rolls.join("+")})${signedDD(ally.con)} = <span class="big">+${actual}</span>`,
        "init");
      showHealAt(ally.x + ally.def.displaySize / 2, ally.y, actual);
      updateInfo(`${ally.def.name}: 大飯食らい! ${actual} HP 回復`);
      await sleepMs(700);
    }

    // ── ドワーフの意地: HP 2d4 以下で自動発動 (リアクティブ、1戦1回) ──
    // 被ダメ後に呼ぶ。HP が閾値以下になっていれば +2 atk + +2 AC を残戦闘ターン適用。
    async function checkDwarvenGritTrigger(ally) {
      if (!ally || ally.classKey !== "dwarf") return;
      if (!ally.equippedSkills || !ally.equippedSkills.includes("dwarven-grit")) return;
      if (ally.skillsUsedInEncounter.has("dwarven-grit")) return;
      if (ally.hp <= 0) return;
      // 閾値はエンカウンター単位で 2d4 を 1 回ロール (ロール前なら今ロール)
      if (ally.gritThreshold == null) {
        const r = rollDiceDD(2, 4);
        ally.gritThreshold = r.total;
      }
      if (ally.hp > ally.gritThreshold) return;
      // 発動
      const skill = DWARF_SKILLS["dwarven-grit"];
      ally.skillsUsedInEncounter.add("dwarven-grit");
      flashAction(ally.el, "skill");
      // 攻撃 +2 (既存 atk バフが弱ければ上書き)、残戦闘永続 (duration 99)
      ally.buffs.atkBonusAmount = Math.max(ally.buffs.atkBonusAmount || 0, skill.atkBonusAmount);
      ally.buffs.atkBonusRemaining = Math.max(ally.buffs.atkBonusRemaining || 0, 99);
      // AC +2 同様
      ally.buffs.acBonusAmount = Math.max(ally.buffs.acBonusAmount || 0, skill.acBonusAmount);
      ally.buffs.acBonusRemaining = Math.max(ally.buffs.acBonusRemaining || 0, 99);
      showRollAtAlly(ally,
        `<span class="label">GRIT!</span><span class="big">${skill.name}</span><br>HP ${ally.hp}/${ally.maxHp} ≤ 2d4(${ally.gritThreshold})<br>攻撃 +${skill.atkBonusAmount} / AC +${skill.acBonusAmount}`,
        "crit");
      updateInfo(`${ally.def.name}: ドワーフの意地発動! HP ≤ ${ally.gritThreshold} → 攻撃 +${skill.atkBonusAmount} / AC +${skill.acBonusAmount} (残戦闘)`);
      await sleepMs(900);
    }

    // 仲間のターン
    async function allyAttackTurn(ally) {
      // バフ tick
      if (ally.buffs.atkBonusRemaining > 0) ally.buffs.atkBonusRemaining--;
      if (ally.buffs.dmgReductionRemaining > 0) {
        ally.buffs.dmgReductionRemaining--;
        if (ally.buffs.dmgReductionRemaining <= 0) ally.buffs.dmgReductionDice = null;
      }
      if (ally.buffs.dmgReductionFlatRemaining > 0) {
        ally.buffs.dmgReductionFlatRemaining--;
        if (ally.buffs.dmgReductionFlatRemaining <= 0) ally.buffs.dmgReductionFlat = 0;
      }
      if (ally.buffs.antiKnockbackRemaining > 0) ally.buffs.antiKnockbackRemaining--;
      if (ally.buffs.acBonusRemaining > 0) ally.buffs.acBonusRemaining--;
      // スタン
      if (ally.stunned > 0) {
        ally.stunned--;
        showRollAtAlly(ally, `<span class="label">STUNNED</span>行動不能`, "miss");
        await sleepMs(900);
        return;
      }

      // クラス別 AI 分岐
      if (ally.classKey === "cleric") {
        if (await clericAI(ally)) return;
      } else if (ally.classKey === "mage") {
        if (await mageAI(ally)) return;
      } else if (ally.classKey === "dwarf") {
        if (await dwarfAI(ally)) return;
      } else if (ally.classKey === "elf") {
        if (await elfAI(ally)) return;
      } else if (ally.classKey === "rogue") {
        if (await rogueAI(ally)) return;
      }

      // 通常攻撃: 最寄りの交戦敵を狙う
      const tgtIdx = pickClosestEngagedEnemyFromAlly(ally);
      if (tgtIdx < 0) {
        showRollAtAlly(ally, `<span class="label">待機</span>敵なし`, "miss");
        await sleepMs(600);
        return;
      }
      await allyBasicAttack(ally, tgtIdx);
    }

    // ── 脅威度評価 (mageAI / clericAI 共通) ──
    // score 大きいほど魔法・リソース浪費の価値あり。< 12 は雑魚戦扱い
    function evaluateThreat() {
      const aliveEnemies = encounterEnemyIndices.filter(i => enemies[i].alive);
      let totalEnemyHp = 0;
      let hasBoss = false;
      for (const i of aliveEnemies) {
        totalEnemyHp += enemies[i].hp;
        if ((enemies[i].def.maxSummons || 0) > 0) hasBoss = true;
      }
      const allyInPinch =
        (hp > 0 && !gameOver && hp / maxHp < 0.5) ||
        allies.some(a => a.alive && a.hp / a.maxHp < 0.5);
      return {
        aliveEnemies,
        hasBoss,
        allyInPinch,
        score: totalEnemyHp + aliveEnemies.length * 5 + (hasBoss ? 20 : 0) + (allyInPinch ? 10 : 0),
      };
    }

    // 僧侶 AI: ヒール/シールド判断。スキル発動したら true を返す
    async function clericAI(ally) {
      const threat = evaluateThreat();

      // 味方HPが75%未満で回復スキル持ち & MP 足りれば、50%の確率でヒール
      // (回復は雑魚戦でも価値があるので閾値なし)
      const hasHeal = ally.equippedSkills.includes("cure-light-wounds");
      const cureCost = CLERIC_SKILLS["cure-light-wounds"]?.mpCost || 0;
      if (hasHeal && ally.mp >= cureCost) {
        const low = findLowestHpPartyMember();
        if (low && low.ratio < 0.75 && Math.random() < 0.5) {
          await allyCureLight(ally, low);
          return true;
        }
      }
      // シールド: 脅威度 15 以上 (= ボス・複数敵・強敵) の時のみ発動。
      //   雑魚1体相手には MP 温存する
      const hasShield = ally.equippedSkills.includes("shield-of-faith");
      const shieldCost = CLERIC_SKILLS["shield-of-faith"]?.mpCost || 0;
      if (hasShield && ally.mp >= shieldCost && threat.score >= 15) {
        const candidates = [];
        if (hp > 0 && !gameOver && playerBuffs.acBonusRemaining <= 0) {
          candidates.push({
            kind: "leader", priority: 2,
            cx: playerX + 48, cy: playerY + 58,
          });
        }
        for (const a of allies) {
          if (!a.alive) continue;
          if (a.buffs.acBonusRemaining > 0) continue;
          candidates.push({
            kind: "ally", ally: a, priority: a === ally ? 0 : 1,
            cx: a.x + a.def.displaySize / 2, cy: a.y + a.def.displaySize / 2,
          });
        }
        if (candidates.length > 0 && Math.random() < 0.4) {
          candidates.sort((a, b) => b.priority - a.priority);
          await allyShieldOfFaith(ally, candidates[0]);
          return true;
        }
      }
      return false;
    }

    // 魔法使い AI: 脅威度評価 → 自己シールド(緊急/通常) → スリープ → 攻撃呪文 → スリングの優先順
    async function mageAI(ally) {
      const threat = evaluateThreat();
      const unstunnedEnemies = threat.aliveEnemies.filter(i => (enemies[i].stunned || 0) <= 0);
      const threatScore = threat.score;
      const selfLowHp = ally.hp < ally.maxHp * 0.5;

      // 1. 緊急自己シールド: 自分HP50%以下 & 未バフ → ほぼ確定で発動
      const hasAShield = ally.equippedSkills.includes("arcane-shield");
      const aShieldCost = MAGE_SKILLS["arcane-shield"]?.mpCost || 0;
      if (hasAShield && ally.mp >= aShieldCost && ally.buffs.acBonusRemaining <= 0 && selfLowHp) {
        await allyArcaneShield(ally);
        return true;
      }
      // 通常自己シールド: HP 70%以下 & 未バフ & 脅威度が十分高ければ 30%
      if (hasAShield && ally.mp >= aShieldCost && ally.buffs.acBonusRemaining <= 0
          && ally.hp < ally.maxHp * 0.7 && threatScore >= 15 && Math.random() < 0.3) {
        await allyArcaneShield(ally);
        return true;
      }

      // 2. スリープ: 未スタンの敵が 2体以上 & 50%確率
      const hasSleep = ally.equippedSkills.includes("sleep");
      const sleepCost = MAGE_SKILLS["sleep"]?.mpCost || 0;
      if (hasSleep && ally.mp >= sleepCost && unstunnedEnemies.length >= 2 && Math.random() < 0.5) {
        const tgtIdx = pickClosestEngagedEnemyFromAlly(ally);
        if (tgtIdx >= 0) {
          await allySleep(ally, tgtIdx);
          return true;
        }
      }

      // 3. 攻撃呪文: 脅威度が低いなら温存、高いほど許可呪文が増える
      //    <12: スリングのみ / 12-25: fire-bolt まで / >=25: 全呪文
      // MP 残量が極少 (3 以下) なら攻撃呪文は温存
      if (ally.mp > 3 && threatScore >= 12) {
        const attackSpells = [];
        if (ally.equippedSkills.includes("fire-bolt") && ally.mp >= MAGE_SKILLS["fire-bolt"].mpCost) {
          attackSpells.push("fire-bolt");
        }
        if (threatScore >= 25 &&
            ally.equippedSkills.includes("magic-missile") &&
            ally.mp >= MAGE_SKILLS["magic-missile"].mpCost) {
          attackSpells.push("magic-missile");
        }
        if (attackSpells.length > 0) {
          const tgtIdx = pickClosestEngagedEnemyFromAlly(ally);
          if (tgtIdx < 0) return false;
          const spellId = attackSpells[Math.floor(Math.random() * attackSpells.length)];
          if (spellId === "magic-missile") await allyMagicMissile(ally, tgtIdx);
          else await allyFireBolt(ally, tgtIdx);
          return true;
        }
      }

      // 呪文撃たない判断 → スリングで通常攻撃 (allyBasicAttack にフォールバック)
      return false;
    }

    // ドワーフ AI: 緊急回復/防御 → 大火力 → シールドウォール → 攻撃
    async function dwarfAI(ally) {
      const used = ally.skillsUsedInEncounter;

      // 1a. 大飯食らい (緊急回復): HP 40% 以下 & 未使用 → 優先発動 (battle-rest より回復量多)
      if (ally.equippedSkills.includes("big-eater")
          && !used.has("big-eater")
          && ally.hp < ally.maxHp * 0.4) {
        await allyBigEater(ally);
        return true;
      }

      // 1b. 戦場の一息 (緊急回復): HP 40%以下 & 未使用 → 発動 (大飯食らい未装備時のフォールバック)
      if (ally.equippedSkills.includes("battle-rest")
          && !used.has("battle-rest")
          && ally.hp < ally.maxHp * 0.4) {
        await allyBattleRest(ally);
        return true;
      }

      // 1c. 戦闘の咆哮 (戦闘準備バフ): 未使用 & 未バフ & 敵 2 体以上 & 50%
      if (ally.equippedSkills.includes("battle-roar")
          && !used.has("battle-roar")
          && (ally.buffs.atkBonusRemaining || 0) <= 0) {
        const aliveCount = encounterEnemyIndices.filter(i => enemies[i] && enemies[i].alive).length;
        if (aliveCount >= 2 && Math.random() < 0.5) {
          await allyBattleRoar(ally);
          return true;
        }
      }

      // 2. 岩肌の皮膚 (緊急防御): HP 50%以下 & 未active & 未使用 → 70%
      if (ally.equippedSkills.includes("stone-skin")
          && !used.has("stone-skin")
          && ally.buffs.dmgReductionFlatRemaining <= 0
          && ally.hp < ally.maxHp * 0.5
          && Math.random() < 0.7) {
        await allyStoneSkin(ally);
        return true;
      }

      // 3. 踏ん張り (中堅防御): 隣接敵 2 体以上 & 未使用 & 未active → 50%
      if (ally.equippedSkills.includes("brace")
          && !used.has("brace")
          && ally.buffs.dmgReductionRemaining <= 0) {
        const aCX = ally.x + ally.def.displaySize / 2;
        const aCY = ally.y + ally.def.displaySize / 2;
        let adjEnemies = 0;
        for (let i = 0; i < enemies.length; i++) {
          const e = enemies[i];
          if (!e || !e.alive) continue;
          const eCX = e.x + e.def.displaySize / 2;
          const eCY = e.y + e.def.displaySize / 2;
          if (tileChebyshev(aCX, aCY, eCX, eCY) <= 1) adjEnemies++;
        }
        if (adjEnemies >= 2 && Math.random() < 0.5) {
          await allyBrace(ally);
          return true;
        }
      }

      // 4. 鋼の意志 (状態異常保険): 未使用 & 未スタック & HP 60%以下で 30% (発動条件は雰囲気のみ、現状ほぼ保険)
      if (ally.equippedSkills.includes("steel-will")
          && !used.has("steel-will")
          && (ally.buffs.statusImmunityCharges || 0) <= 0
          && ally.hp < ally.maxHp * 0.6
          && Math.random() < 0.3) {
        await allySteelWill(ally);
        return true;
      }

      // 5. シールドウォール: 未使用 & 未バフ & 隣接する生存味方がいて脅威度 >= 15 & 30%
      if (ally.equippedSkills.includes("shield-wall")
          && !used.has("shield-wall")
          && ally.buffs.acBonusRemaining <= 0) {
        const threat = evaluateThreat();
        if (threat.score >= 15) {
          // 隣接味方が1人以上いるか確認
          const aCX = ally.x + ally.def.displaySize / 2;
          const aCY = ally.y + ally.def.displaySize / 2;
          const pCX = playerX + 48, pCY = playerY + 58;
          let hasAdj = (hp > 0 && !gameOver && tileChebyshev(aCX, aCY, pCX, pCY) <= 1);
          if (!hasAdj) {
            for (const other of allies) {
              if (other === ally || !other.alive) continue;
              const oCX = other.x + other.def.displaySize / 2;
              const oCY = other.y + other.def.displaySize / 2;
              if (tileChebyshev(aCX, aCY, oCX, oCY) <= 1) { hasAdj = true; break; }
            }
          }
          if (hasAdj && Math.random() < 0.3) {
            await allyShieldWall(ally);
            return true;
          }
        }
      }

      // 6. 大地砕き: 敵 3 体以上いて未使用 → 70% で発動 (1戦1回の最強切り札)
      if (ally.equippedSkills.includes("earth-shatter")
          && !used.has("earth-shatter")) {
        const aliveCount = encounterEnemyIndices.filter(i => enemies[i] && enemies[i].alive).length;
        if (aliveCount >= 3 && Math.random() < 0.7) {
          await allyEarthShatter(ally);
          return true;
        }
      }

      // 7. アックスストーム: 周囲1マス敵 2 体以上 & 未使用 → 60% で発動 (1戦1回)
      if (ally.equippedSkills.includes("axe-storm")
          && !used.has("axe-storm")) {
        const aCX = ally.x + ally.def.displaySize / 2;
        const aCY = ally.y + ally.def.displaySize / 2;
        let around = 0;
        for (let i = 0; i < enemies.length; i++) {
          const e = enemies[i];
          if (!e || !e.alive) continue;
          const eCX = e.x + e.def.displaySize / 2;
          const eCY = e.y + e.def.displaySize / 2;
          if (tileChebyshev(aCX, aCY, eCX, eCY) <= 1) around++;
        }
        if (around >= 2 && Math.random() < 0.6) {
          await allyAxeStorm(ally);
          return true;
        }
      }

      // 8. パワーアタック: 射程内の敵がいて未使用 → 50% で発動 (1戦1回の切り札)
      if (ally.equippedSkills.includes("power-attack")
          && !used.has("power-attack")) {
        const tgtIdx = pickClosestEngagedEnemyFromAlly(ally);
        if (tgtIdx >= 0) {
          const e = enemies[tgtIdx];
          const eCX = e.x + e.def.displaySize / 2;
          const eCY = e.y + e.def.displaySize / 2;
          const aCX = ally.x + ally.def.displaySize / 2;
          const aCY = ally.y + ally.def.displaySize / 2;
          if (tileChebyshev(aCX, aCY, eCX, eCY) <= 1 && Math.random() < 0.5) {
            await allyPowerAttack(ally, tgtIdx);
            return true;
          }
        }
      }

      // 9. 投げ斧: 遠距離 (隣接敵が無い場合) または 35% 確率で発動 (使用制限なし)
      if (ally.equippedSkills.includes("throwing-axe")) {
        const tgtIdx = pickClosestEngagedEnemyFromAlly(ally);
        if (tgtIdx >= 0) {
          const e = enemies[tgtIdx];
          const eCX = e.x + e.def.displaySize / 2;
          const eCY = e.y + e.def.displaySize / 2;
          const aCX = ally.x + ally.def.displaySize / 2;
          const aCY = ally.y + ally.def.displaySize / 2;
          const dist = tileChebyshev(aCX, aCY, eCX, eCY);
          // 隣接していない (近接攻撃が届かない) なら積極的に投げる、隣接でも 35% で発動
          const trigger = (dist > 1) || (Math.random() < 0.35);
          if (trigger && dist <= getRange("medium").tiles) {
            await allyThrowingAxe(ally, tgtIdx);
            return true;
          }
        }
      }

      // スキル撃たない → 通常攻撃 (allyBasicAttack) にフォールバック
      return false;
    }

    // ══════════ エルフスキル (Phase 2) ══════════
    // エイムドショット: 命中+3 / ロングボウ 1d8+1d6+DEX の精密射撃
    async function allyAimedShot(ally, enemyIdx) {
      const skill = ELF_SKILLS["aimed-shot"];
      const target = enemies[enemyIdx];
      if (!target || !target.alive) return;
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const rangeTiles = getRange(skill.range).tiles;
      if (tileChebyshev(aCX, aCY, ex, ey) > rangeTiles || !hasLineOfSight(aCX, aCY, ex, ey)) {
        await allyAdvanceTowardPoint(ally, ex, ey);
        return;
      }

      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      flashAction(ally.el, "skill");
      const dfx = ex - aCX;
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      showRollAtAlly(ally, `<span class="label">SKILL</span><span class="big">${skill.name}</span>`, "skill");
      startAllyAttackAnim(ally);
      await sleepMs(1400);  // 弓を引く詠唱 (短縮、続けて照準演出)

      // 弓の発射点 (キャラ前方やや上)
      const launchX = aCX + (ally.facing === "right" ? 22 : -22);
      const launchY = aCY - 6;

      // 照準線: 700ms 表示 (うち 350ms 後に矢を放つ)
      showAimLine(launchX, launchY, ex, ey, 700);
      await sleepMs(450);  // 「狙いを定めている」溜め

      // 矢を 380ms で一直線に飛ばす
      await spawnArrow(launchX, launchY, ex, ey, 380);

      // 命中: 通常 atkBonus + DEX + skill.atkBonusAmount
      const atkBonus = ally.atkBonus + (ally.dex || 0) + (skill.atkBonusAmount || 0);
      const natD20 = d20();
      const atkTotal = natD20 + atkBonus;
      const helpless = target.stunned > 0;
      const isFumble = !helpless && natD20 === 1;
      const isThreat = natD20 >= ally.critRange && !isFumble;

      if (isFumble) {
        showRollAtAlly(ally,
          `<span class="label">FUMBLE!</span>1d20(<b>1</b>)${signedDD(atkBonus)}`,
          "fumble");
        await sleepMs(900);
        return;
      }
      const hit = helpless || isThreat || atkTotal >= effectiveEnemyAc(target);
      let isCrit = helpless;
      if (!hit) {
        showRollAtAlly(ally,
          `<span class="label">MISS</span>1d20(<b>${natD20}</b>)${signedDD(atkBonus)} = ${atkTotal}<br>vs AC ${effectiveEnemyAc(target)}`,
          "miss");
        await sleepMs(800);
        return;
      }
      if (!helpless && isThreat) {
        const cn = d20(), ct = cn + atkBonus;
        if (ct >= effectiveEnemyAc(target)) isCrit = true;
      }
      showRollAtAlly(ally,
        `<span class="label">${isCrit ? "CRIT!" : "HIT"}</span>1d20(<b>${natD20}</b>)${signedDD(atkBonus)} = <span class="big">${atkTotal}</span><br>vs AC ${effectiveEnemyAc(target)}`,
        isCrit ? "crit" : "hit");
      await sleepMs(500);

      // ダメージ: 1d8 (本武器) + 1d6 (精密射撃)、CRIT で全部 critMult 倍
      const baseDice = parseDiceDD(skill.dmgDice);
      const extraDice = parseDiceDD(skill.extraDmgDice);
      const times = isCrit ? (ally.critMult || 2) : 1;
      let allRolls = [];
      for (let i = 0; i < times; i++) {
        allRolls = allRolls.concat(rollDiceDD(baseDice.n, baseDice.sides).rolls);
        allRolls = allRolls.concat(rollDiceDD(extraDice.n, extraDice.sides).rolls);
      }
      const dexBonus = (ally.dex || 0) * times;
      const dmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + dexBonus);

      target.hp = Math.max(0, target.hp - dmg);
      triggerEnemyDamageFlash(enemyIdx);
      showHitSpark(enemyIdx, isCrit);
      showDmgAt(ex, target.y, dmg, isCrit);
      updateInfo(`${ally.def.name}: ${tgtDef.name} に ${dmg} 矢ダメージ${isCrit ? " (CRIT!)" : ""}`);
      await sleepMs(500);
      if (target.hp <= 0) {
        defeatEnemy(enemyIdx);
        await sleepMs(400);
      }
    }

    // マジック・アロー: 必中 1d6+INT (魔法属性)
    async function allyMagicArrow(ally, enemyIdx) {
      const skill = ELF_SKILLS["magic-arrow"];
      const target = enemies[enemyIdx];
      if (!target || !target.alive) return;
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const rangeTiles = getRange(skill.range).tiles;
      if (tileChebyshev(aCX, aCY, ex, ey) > rangeTiles || !hasLineOfSight(aCX, aCY, ex, ey)) {
        await allyAdvanceTowardPoint(ally, ex, ey);
        return;
      }

      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      flashAction(ally.el, "skill");
      const dfx = ex - aCX;
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      showRollAtAlly(ally, `<span class="label">SKILL</span><span class="big">${skill.name}</span>`, "skill");
      startAllyAttackAnim(ally);
      await sleepMs(1700);  // 詠唱 (短縮、続けて魔力の矢飛翔へ)

      // 弓の発射点
      const launchX = aCX + (ally.facing === "right" ? 22 : -22);
      const launchY = aCY - 6;
      // 魔力の矢: 必中なので一直線、青白く輝く
      await spawnArrow(launchX, launchY, ex, ey, 380, { variant: "magicArrow" });

      const helpless = target.stunned > 0;
      const critMult = ally.critMult || 2;
      const { n, sides } = parseDiceDD(skill.dmgDice);
      const times = helpless ? critMult : 1;
      let allRolls = [];
      for (let i = 0; i < times; i++) allRolls = allRolls.concat(rollDiceDD(n, sides).rolls);
      const intBonus = (ally.int || 0) * times;
      const dmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + intBonus);

      showRollAtAlly(ally,
        `<span class="label">${helpless ? "HELPLESS HIT!" : "AUTO HIT"}</span>${skill.dmgDice}(${allRolls.join("+")})${signedDD(intBonus)} = <span class="big">${dmg}</span>`,
        "crit");
      await sleepMs(300);

      target.hp = Math.max(0, target.hp - dmg);
      triggerEnemyDamageFlash(enemyIdx);
      showHitSpark(enemyIdx, helpless);
      showDmgAt(ex, target.y, dmg, helpless);
      updateInfo(`${ally.def.name}: ${tgtDef.name} に ${dmg} 魔法ダメージ (必中)`);
      await sleepMs(500);
      if (target.hp <= 0) {
        defeatEnemy(enemyIdx);
        await sleepMs(400);
      }
    }

    // キュア・マイナー: 自分に 1d6+WIS HP回復
    async function allyCureMinor(ally) {
      const skill = ELF_SKILLS["cure-minor"];
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      flashAction(ally.el, "skill");
      showRollAtAlly(ally,
        `<span class="label">SKILL</span><span class="big">${skill.name}</span>`,
        "skill");
      startAllyAttackAnim(ally);
      await sleepMs(2400);

      const r = rollDiceDD(1, 6);
      const heal = Math.max(1, r.total + (ally.wis || 0));
      const prev = ally.hp;
      ally.hp = Math.min(ally.maxHp, ally.hp + heal);
      const actual = ally.hp - prev;

      showRollAtAlly(ally,
        `<span class="label">CURE</span>1d6(${r.rolls.join("+")})${signedDD(ally.wis)} = <span class="big">+${actual}</span>`,
        "init");
      showHealAt(ally.x + ally.def.displaySize / 2, ally.y, actual);
      updateInfo(`${ally.def.name}: 自身を ${actual} HP 回復`);
      await sleepMs(700);
    }

    // エルフ AI: 自己ヒール優先 → 強敵に必中 → エイムドショット汎用 → 通常弓
    async function elfAI(ally) {
      const threat = evaluateThreat();

      // 1. 自己ヒール: HP 35%以下 & MP 足りる
      const hasCure = ally.equippedSkills.includes("cure-minor");
      const cureCost = ELF_SKILLS["cure-minor"]?.mpCost || 0;
      if (hasCure && ally.mp >= cureCost && ally.hp / ally.maxHp < 0.35) {
        await allyCureMinor(ally);
        return true;
      }

      // 2. マジック・アロー (必中): 脅威度 >= 15 & MP 足りる、50%
      const hasMArrow = ally.equippedSkills.includes("magic-arrow");
      const mArrowCost = ELF_SKILLS["magic-arrow"]?.mpCost || 0;
      if (hasMArrow && ally.mp >= mArrowCost && threat.score >= 15) {
        const tgtIdx = pickClosestEngagedEnemyFromAlly(ally);
        if (tgtIdx >= 0 && Math.random() < 0.5) {
          await allyMagicArrow(ally, tgtIdx);
          return true;
        }
      }

      // 3. エイムドショット (命中強化): MP に余裕あり (cure 用に 3 残す) かつ 50%
      const hasAimed = ally.equippedSkills.includes("aimed-shot");
      const aimedCost = ELF_SKILLS["aimed-shot"]?.mpCost || 0;
      if (hasAimed && ally.mp >= aimedCost + 3 && Math.random() < 0.5) {
        const tgtIdx = pickClosestEngagedEnemyFromAlly(ally);
        if (tgtIdx >= 0) {
          await allyAimedShot(ally, tgtIdx);
          return true;
        }
      }

      return false;  // 通常弓攻撃にフォールバック
    }

    // ── フレイムタング命中: 中央オレンジ閃光 + 敵から立ち上る短い炎柱 ──
    // 雷鳴の斧の core flash と同型構造、配色は炎系。続けて spawnFireBurnOnEnemy で粒子継続。
    function playFlameTongueImpactFx(wx, wy, enemyIdx, isCrit) {
      // 中央フラッシュ (世界座標基準、敵中心に配置)
      const core = document.createElement("div");

      setTimeout(() => core.remove(), isCrit ? 420 : 320);

      // 炎柱: document.body に配置 + 敵の世界座標を毎フレーム参照
      // (敵 DOM の子だと defeatEnemy で display:none → 即座に消えるため body 配置)
      // 敵が生存中なら現在位置に追従、死亡後は最後の e.x/e.y がそのまま残るので位置維持
      const e = enemies && enemies[enemyIdx];

          const cx = e.x + ds / 2;

          pillar.style.top  = (cy - camY - pillarH) + "px";
