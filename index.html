      ctx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);
      if (!tilesetLoaded) return;
      const startTX = Math.max(0, Math.floor(camX / TILE_SIZE));
      const startTY = Math.max(0, Math.floor(camY / TILE_SIZE));
      const endTX = Math.min(MAP_W - 1, Math.ceil((camX + mapCanvas.width) / TILE_SIZE));
      const endTY = Math.min(MAP_H - 1, Math.ceil((camY + mapCanvas.height) / TILE_SIZE));

      // ── Pass 1a: 天井(void)セル — 暗い背景 ──
      for (let ty = startTY; ty <= endTY; ty++) {
        for (let tx = startTX; tx <= endTX; tx++) {
          if (mapData[ty][tx] !== 2) continue;
          const screenX = Math.round(tx * TILE_SIZE - camX);
          const screenY = Math.round(ty * TILE_SIZE - camY);
          const [sx, sy, sw, sh] = SPR_CEILING;
          ctx.drawImage(tileset, sx, sy, sw, sh, screenX, screenY, TILE_SIZE, TILE_SIZE);
        }
      }
      // ── Pass 1b: 床セル — 床1 シームレステクスチャをワールド座標アンカーで pattern fill ──
      // (隣接セルで模様が連続する。fall back は 床2 (1セル1枚) → tileset)
      if (floorPattern) {
        ctx.save();
        ctx.translate(-camX, -camY);
        ctx.fillStyle = floorPattern;
        for (let ty = startTY; ty <= endTY; ty++) {
          for (let tx = startTX; tx <= endTX; tx++) {
            if (mapData[ty][tx] === 2) continue;
            ctx.fillRect(tx * TILE_SIZE, ty * TILE_SIZE, TILE_SIZE, TILE_SIZE);
          }
        }
        ctx.restore();
      } else {
        for (let ty = startTY; ty <= endTY; ty++) {
          for (let tx = startTX; tx <= endTX; tx++) {
            if (mapData[ty][tx] === 2) continue;
            const screenX = Math.round(tx * TILE_SIZE - camX);
            const screenY = Math.round(ty * TILE_SIZE - camY);
            if (floorTexLoaded) {
              ctx.drawImage(floorTex, screenX, screenY, TILE_SIZE, TILE_SIZE);
            } else {
              const vi = tileHash(tx, ty) % SPR_FLOORS.length;
              const [sx, sy] = SPR_FLOORS[vi];
              ctx.drawImage(tileset, sx, sy, 16, 16, screenX, screenY, TILE_SIZE, TILE_SIZE);
            }
          }
        }
      }

      // ── Pass 1.2: 床にグリッド線 (床セルのみ、天井=2 にはひかない) ──
      ctx.strokeStyle = "rgba(0, 0, 0, 0.22)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let ty = startTY; ty <= endTY; ty++) {
        for (let tx = startTX; tx <= endTX; tx++) {
          if (mapData[ty][tx] === 2) continue;
          const screenX = Math.round(tx * TILE_SIZE - camX) + 0.5;
          const screenY = Math.round(ty * TILE_SIZE - camY) + 0.5;
          ctx.moveTo(screenX, screenY);
          ctx.lineTo(screenX + TILE_SIZE, screenY);
          ctx.moveTo(screenX, screenY);
          ctx.lineTo(screenX, screenY + TILE_SIZE);
          // 右端・下端のセルはマップ端の線も引く
          if (tx === endTX || mapData[ty][tx + 1] === 2) {
            ctx.moveTo(screenX + TILE_SIZE, screenY);
            ctx.lineTo(screenX + TILE_SIZE, screenY + TILE_SIZE);
          }
          if (ty === endTY || mapData[ty + 1] && mapData[ty + 1][tx] === 2) {
            ctx.moveTo(screenX, screenY + TILE_SIZE);
            ctx.lineTo(screenX + TILE_SIZE, screenY + TILE_SIZE);
          }
        }
      }
      ctx.stroke();

      // ── Pass 1.5: 装飾(床の上に置く小物、タイル中央に半分サイズで) ──
      // 壁掛け松明は壁の上に重ねるため Pass 2.5 で別途描画 (ここではスキップ)
      const DECO_SIZE = TILE_SIZE / 2;
      const DECO_PAD = (TILE_SIZE - DECO_SIZE) / 2;
      for (const d of decorations) {
        if (d.kind === "torch" && torchWallImgLoaded) continue;
        if (d.tx < startTX - 1 || d.tx > endTX + 1) continue;
        if (d.ty < startTY - 1 || d.ty > endTY + 1) continue;
        const screenX = Math.round(d.tx * TILE_SIZE - camX + DECO_PAD);
        const screenY = Math.round(d.ty * TILE_SIZE - camY + d.offsetY * 6 + DECO_PAD);
        ctx.drawImage(tileset, d.sx, d.sy, 16, 16, screenX, screenY, DECO_SIZE, DECO_SIZE);
      }

      // ── Pass 2: 壁立て描画 (壁1 パターンで床境界の壁を 2セル高さで描画) ──
      const ty0 = Math.max(0, startTY - 1);
      if (wallPattern) {
        ctx.save();
        ctx.translate(-camX, -camY);
        ctx.fillStyle = wallPattern;
        for (let ty = ty0; ty <= endTY; ty++) {
          for (let tx = startTX; tx <= endTX; tx++) {
            if (!isNorthWall(tx, ty)) continue;
            // 1セル上から 2セル分塗る (壁の「立体感」)
            ctx.fillRect(tx * TILE_SIZE, (ty - 1) * TILE_SIZE, TILE_SIZE, TILE_SIZE * 2);
          }
        }
        ctx.restore();
      } else {
        // フォールバック: 旧 tileset 壁スプライト
        for (let ty = ty0; ty <= endTY; ty++) {
          for (let tx = startTX; tx <= endTX; tx++) {
            if (!isNorthWall(tx, ty)) continue;
            const westIsWall = isNorthWall(tx - 1, ty);
            const eastIsWall = isNorthWall(tx + 1, ty);
            let spr;
            if (!westIsWall && !eastIsWall)      spr = SPR_WALL_MID;
            else if (!westIsWall)                spr = SPR_WALL_LEND;
            else if (!eastIsWall)                spr = SPR_WALL_REND;
            else {
              spr = SPR_WALL_MID_VARIANTS[tileHash(tx, ty * 17 + 3) % SPR_WALL_MID_VARIANTS.length];
            }
            const [sx, sy, sw, sh] = spr;
            const screenX = Math.round(tx * TILE_SIZE - camX);
            const screenY = Math.round((ty - 1) * TILE_SIZE - camY);
            ctx.drawImage(tileset, sx, sy, sw, sh, screenX, screenY, TILE_SIZE, TILE_SIZE * 2);
          }
        }
      }

      // ── Pass 2.5: 壁掛け松明 (壁の上に重ねて描画・painterly) ──
      // 配置: 床タイル中央に水平センタリング、底面を床線から 12px 下げて壁マウント感
      // 描画後に炎周りに加算ブルーム (光輪) を重ねて燃えてる感を出す
      if (torchWallImgLoaded) {
        const TORCH_W = 56, TORCH_H = 84, TORCH_FLOOR_OVERLAP = 12;
        const TORCH_X_OFFSET = (TILE_SIZE - TORCH_W) / 2;
        for (const d of decorations) {
          if (d.kind !== "torch") continue;
          if (d.tx < startTX - 1 || d.tx > endTX + 1) continue;
          if (d.ty < startTY - 1 || d.ty > endTY + 1) continue;
          const screenX = Math.round(d.tx * TILE_SIZE - camX + TORCH_X_OFFSET);
          const screenY = Math.round(d.ty * TILE_SIZE - camY + TORCH_FLOOR_OVERLAP - TORCH_H);
          ctx.drawImage(torchWallImg, screenX, screenY, TORCH_W, TORCH_H);

          // 炎中心の加算ブルーム (画像上部=炎の位置、ゆらぎ付き)
          const flameCX = screenX + TORCH_W / 2;
          const flameCY = screenY + 12;
          const f = 1 + Math.sin(Date.now() / 140 + d.tx * 3 + d.ty * 5) * 0.08;
          const bloomR = 70 * f;
          const grad = ctx.createRadialGradient(flameCX, flameCY, 0, flameCX, flameCY, bloomR);
          grad.addColorStop(0,    "rgba(255, 220, 140, 0.85)");
          grad.addColorStop(0.35, "rgba(255, 170,  60, 0.45)");
          grad.addColorStop(1,    "rgba(255, 140,  40, 0)");
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(flameCX, flameCY, bloomR, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }
    }
    // ─────────────────────────────────────────────────────────────

    // ── マジックミサイル: 1発の光弾を弧軌道で飛ばす ──
    function spawnMagicMissile(fromX, fromY, toX, toY, durationMs = 600) {
      const el = document.createElement("div");
      el.className = "fxMissile";
      enemyLayer.appendChild(el);
      // 弧軌道のためのランダム化 (左右どちら/曲り具合)
      const curveSign = (Math.random() < 0.5) ? 1 : -1;
      const curveAmp  = 26 + Math.random() * 36;  // 26〜62px
      const startTime = performance.now();
      return new Promise(resolve => {
        function step(now) {
          const t = Math.min((now - startTime) / durationMs, 1);
          const dx = toX - fromX, dy = toY - fromY;
          const len = Math.hypot(dx, dy) || 1;
          // 進行方向の垂直ベクトルへ sin で膨らむ
          const px = -dy / len, py = dx / len;
          const offset = Math.sin(t * Math.PI) * curveAmp * curveSign;
          const cx = fromX + dx * t + px * offset;
          const cy = fromY + dy * t + py * offset;
          el.style.left = (cx - camX) + "px";
          el.style.top  = (cy - camY) + "px";
          if (t < 1) requestAnimationFrame(step);
          else {
            el.classList.add("burst");
            setTimeout(() => el.remove(), 280);
            resolve();
          }
        }
        requestAnimationFrame(step);
      });
    }
    // 複数発を staggered で発射 (ターゲットが死んでも続行)
    async function castMagicMissileBarrage(fromX, fromY, toX, toY, count = 3, staggerMs = 130) {
      const promises = [];
      for (let i = 0; i < count; i++) {
        promises.push((async () => {
          await sleepMs(i * staggerMs);
          await spawnMagicMissile(fromX, fromY, toX, toY);
        })());
      }
      await Promise.all(promises);
    }

    // ── エイムドショット: 照準線(線が一瞬光って消える) ──
    function showAimLine(fromX, fromY, toX, toY, durationMs = 700) {
      const el = document.createElement("div");
      el.className = "fxAimLine";
      enemyLayer.appendChild(el);
      const dx0 = toX - fromX, dy0 = toY - fromY;
      const len = Math.hypot(dx0, dy0);
      const angle = Math.atan2(dy0, dx0);
      // カメラ追従のためフレーム毎に再配置
      const startTime = performance.now();
      function step(now) {
        const t = (now - startTime) / durationMs;
        if (t >= 1 || !el.parentNode) return;
        el.style.left = (fromX - camX) + "px";
        el.style.top  = (fromY - camY) + "px";
        el.style.width = len + "px";
        el.style.transform = `rotate(${angle}rad)`;
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
      setTimeout(() => el.remove(), durationMs + 50);
    }

    // ── エイムドショット: 矢を一直線で飛ばす (回転で進行方向に向ける) ──
    function spawnArrow(fromX, fromY, toX, toY, durationMs = 380, opts = {}) {
      const el = document.createElement("div");
      el.className = "fxArrow" + (opts.variant ? " " + opts.variant : "");
      enemyLayer.appendChild(el);
      const dx = toX - fromX, dy = toY - fromY;
      const angle = Math.atan2(dy, dx);
      const startTime = performance.now();
      // spinning=true: 進行方向回転を JS でセットせず CSS アニメに委ねる (投げ斧用)
      const spinning = !!opts.spinning;
      return new Promise(resolve => {
        function step(now) {
          const t = Math.min((now - startTime) / durationMs, 1);
          const cx = fromX + dx * t;
          const cy = fromY + dy * t;
          el.style.left = (cx - camX) + "px";
          el.style.top  = (cy - camY) + "px";
          if (!spinning) el.style.transform = `rotate(${angle}rad)`;
          if (t < 1) requestAnimationFrame(step);
          else {
            // 着弾後、一瞬刺さって見えるようにフェードアウト
            el.classList.add("embed");
            setTimeout(() => el.remove(), 340);
            resolve();
          }
        }
        requestAnimationFrame(step);
      });
    }

    // ── キュアライト: 中央リング + 周囲に降り注ぐ光粒 ──
    function spawnCureFx(targetWX, targetWY) {
      // 中央のリング 1個 (拡大しながらフェードアウト)
      const ring = document.createElement("div");
      ring.className = "fxCureRing";
      enemyLayer.appendChild(ring);
      // 光粒 7個 (target の周囲に散らして降下)
      const particles = [];
      const count = 7;
      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "fxCureParticle";
        // 基本位置: target 中心の周囲半径 22px ランダム
        const ang = (i / count) * Math.PI * 2 + Math.random() * 0.6;
        const r = 18 + Math.random() * 14;
        const baseX = targetWX + Math.cos(ang) * r;
        const baseY = targetWY + Math.sin(ang) * r * 0.4;  // 楕円
        p.style.animationDelay = (i * 50) + "ms";
        enemyLayer.appendChild(p);
        particles.push({ el: p, baseX, baseY });
      }
      // カメラ追従ループ (~900ms で全部消える)
      const startTime = performance.now();
      const totalMs = 1100;
      function step(now) {
        const t = (now - startTime) / totalMs;
        if (t >= 1) return;
        ring.style.left = (targetWX - camX) + "px";
        ring.style.top  = (targetWY - camY) + "px";
        for (const p of particles) {
          p.el.style.left = (p.baseX - camX) + "px";
          p.el.style.top  = (p.baseY - camY) + "px";
        }
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
      setTimeout(() => {
        ring.remove();
        for (const p of particles) p.el.remove();
      }, totalMs + 50);
    }

    // ── 地面の範囲魔法エフェクト管理 ──
    const groundFxElements = [];
    function spawnGroundFx(originTX, originTY, sizeTilesX, sizeTilesY, kind, durationMs) {
      const el = document.createElement("div");
      el.className = "groundFx " + kind;
      el.style.width  = (sizeTilesX * TILE_SIZE) + "px";
      el.style.height = (sizeTilesY * TILE_SIZE) + "px";
      enemyLayer.appendChild(el);
      groundFxElements.push({
        el, tx: originTX, ty: originTY,
        sizeTilesX, sizeTilesY,
        expireAt: Date.now() + durationMs,
      });
    }
    function updateGroundFx() {
      const now = Date.now();
      for (let i = groundFxElements.length - 1; i >= 0; i--) {
        const fx = groundFxElements[i];
        if (now >= fx.expireAt) {
          fx.el.remove();
          groundFxElements.splice(i, 1);
          continue;
        }
        // フェードアウト (残り 600ms から透明度低下)
        const remain = fx.expireAt - now;
        if (remain < 600) fx.el.style.opacity = String(remain / 600);
        fx.el.style.left = (fx.tx * TILE_SIZE - camX) + "px";
        fx.el.style.top  = (fx.ty * TILE_SIZE - camY) + "px";
      }
    }

    // 敵の汎用スプライト描画
    function updateEnemyAnim(enemy, el) {
      const def = enemy.def;
      enemy.animTick = (enemy.animTick || 0) + 1;
      let row, framesPerStep, frameCount, frame;
      if (!enemy.alive) {
        row = 4; framesPerStep = 4; frameCount = def.cols;
        frame = Math.min(frameCount - 1, Math.floor(enemy.animTick / framesPerStep));
      } else if (enemy.state === "attack" && def.hasAttackAnim) {
        row = 3;
        frame = Math.min(def.cols - 1, Math.floor(enemy.attackTimer / 4));
      } else if (enemy.state === "chase" || enemy.state === "search" || enemy.state === "returning") {
        row = 2; framesPerStep = 4; frameCount = def.cols;
        frame = Math.floor(enemy.animTick / framesPerStep) % frameCount;
      } else if (enemy.state === "alert") {
        row = 1; framesPerStep = 4; frameCount = def.cols;
        frame = Math.floor(enemy.animTick / framesPerStep) % frameCount;
      } else {
        row = 0; framesPerStep = 6; frameCount = def.cols;
        frame = Math.floor(enemy.animTick / framesPerStep) % frameCount;
      }
      row += (def.rowOffset || 0);
      const dsw = el.offsetWidth;
      const dsh = el.offsetHeight;
      el.style.backgroundPosition = `${-frame * dsw}px ${-row * dsh}px`;
      // プレイヤーへの向きで左右反転
      const pCX = playerX + 48;
      const eCX = enemy.x + dsw / 2;
      el.style.transform = (pCX < eCX) ? "scaleX(-1)" : "";
    }

        };
      } catch (e) {
        return { gold: 0, xp: 0, weaponIdx: 0, armorIdx: 0, shieldIdx: 0 };
      }
    }
    const persistent = loadPersistentProgress();

    // ── レベル・XP システム (D&D 3.5 準拠: Lv1=0, Lv2=1000, Lv3=3000, ...) ──
    // Lv N の累積XP = (N-1)*N/2 * 1000。Lv10=45000 がカンスト。
    const XP_THRESHOLDS = [0, 1000, 3000, 6000, 10000, 15000, 21000, 28000, 36000, 45000];
    function getLevelFromXP(xp) {
      let lv = 1;
      for (let i = 0; i < XP_THRESHOLDS.length; i++) {
        if (xp >= XP_THRESHOLDS[i]) lv = i + 1;
      }
      return lv;
    }
    function getNextLevelXP(xp) {
      const lv = getLevelFromXP(xp);
      if (lv >= XP_THRESHOLDS.length) return XP_THRESHOLDS[XP_THRESHOLDS.length - 1];
      return XP_THRESHOLDS[lv];  // lv は 1-index なので [lv] が次の閾値
    }
    // 現在のランでの獲得 XP (表示用)
    let earnedXpThisRun = 0;
    let currentTotalXp = persistent.xp;  // 累積XP (localStorage 書き込みはクリア時)
    // ── D&D 3.5 準拠 レベル進歩テーブル ──
    // hitDieMax: 毎レベルの HP 増加 (Q1=C 常に最大)
    // babFn(lv): その Lv での累積 BAB (Full=lv, 3/4=floor(lv*3/4), 1/2=floor(lv/2))
    // statBoost: 4 Lv ごとに +1 する固定ステ (Q2=A クラス別)
    // mpPerLevel: 呪文使い向け MP 増加
    const LEVEL_PROGRESSION = {
      warrior: { hitDieMax: 10, babFn: lv => lv,                 statBoost: "str", mpPerLevel: 0 },
      dwarf:   { hitDieMax: 10, babFn: lv => lv,                 statBoost: "con", mpPerLevel: 0 },
      cleric:  { hitDieMax: 8,  babFn: lv => Math.floor(lv * 3 / 4), statBoost: "wis", mpPerLevel: 2 },
      mage:    { hitDieMax: 4,  babFn: lv => Math.floor(lv / 2),     statBoost: "int", mpPerLevel: 2 },
      elf:     { hitDieMax: 8,  babFn: lv => Math.floor(lv * 3 / 4), statBoost: "dex", mpPerLevel: 1 },
    };

    // 1ユニット (player or ally) のレベルアップ適用
    // Q1=C (HP最大値固定増)、Q2=A (クラス別固定ステ)、Q3=B (増分のみ回復)
    function applyLevelUpToUnit(unitRef, classKey, prevLv, newLv) {
      const cfg = LEVEL_PROGRESSION[classKey];
      if (!cfg) return null;
      let hpGain = 0, atkGainBab = 0, mpGain = 0;
      const statBoosts = {};
      for (let lv = prevLv + 1; lv <= newLv; lv++) {
        hpGain += cfg.hitDieMax;
        atkGainBab += cfg.babFn(lv) - cfg.babFn(lv - 1);
        if (cfg.mpPerLevel) mpGain += cfg.mpPerLevel;
        if (lv % 4 === 0 && cfg.statBoost) {
          statBoosts[cfg.statBoost] = (statBoosts[cfg.statBoost] || 0) + 1;
        }
      }
      // 派生効果: 武器の攻撃ステに +1 が乗ったら atk/dmg ボーナスも追従
      // warrior: STR → atk + dmg、elf: DEX → atk (弓は DEX 命中)
      let atkGainStat = 0, dmgGainStat = 0;
      const strInc = statBoosts.str || 0;
      const dexInc = statBoosts.dex || 0;
      if (classKey === "warrior" && strInc) {
        atkGainStat += strInc;
        dmgGainStat += strInc;
      } else if (classKey === "elf" && dexInc) {
        atkGainStat += dexInc;
      }
      // 適用
      if (unitRef === "player") {
        maxHp += hpGain;
        hp = Math.min(maxHp, hp + hpGain);
        playerStats.atkBonus += atkGainBab + atkGainStat;
        playerStats.dmgBonus += dmgGainStat;
        for (const s of Object.keys(statBoosts)) {
          playerStats[s] = (playerStats[s] || 0) + statBoosts[s];
        }
      } else if (unitRef && typeof unitRef === "object") {
        unitRef.maxHp = (unitRef.maxHp || 0) + hpGain;
        unitRef.hp = Math.min(unitRef.maxHp, (unitRef.hp || 0) + hpGain);
        unitRef.atkBonus = (unitRef.atkBonus || 0) + atkGainBab + atkGainStat;
        if (dmgGainStat) unitRef.dmgBonus = (unitRef.dmgBonus || 0) + dmgGainStat;
        for (const s of Object.keys(statBoosts)) {
          unitRef[s] = (unitRef[s] || 0) + statBoosts[s];
        }
        if (mpGain && unitRef.maxMp != null && unitRef.maxMp > 0) {
          unitRef.maxMp += mpGain;
          unitRef.mp = Math.min(unitRef.maxMp, (unitRef.mp || 0) + mpGain);
        }
      }
      return { hpGain, atkGain: atkGainBab + atkGainStat, mpGain, statBoosts };
    }

    function gainXP(amount, source) {
      if (!amount || amount <= 0) return;
      const prevLv = getLevelFromXP(currentTotalXp);
      earnedXpThisRun += amount;
      currentTotalXp += amount;
      const newLv = getLevelFromXP(currentTotalXp);
      updateInfo(`+${amount} XP (${source || "撃破"})`);
      if (newLv > prevLv) {
        // レベルアップ演出
        showBanner(`⬆ レベルアップ! Lv${prevLv} → Lv${newLv}`, 2500);
        // 全パーティーに D&D 3.5 準拠の進歩を適用
        const STAT_LABEL = { str: "STR", dex: "DEX", con: "CON", int: "INT", wis: "WIS" };
        const lines = [];
        function fmtSummary(name, s) {
          const parts = [];
          if (s.hpGain) parts.push(`HP+${s.hpGain}`);
          if (s.atkGain) parts.push(`攻+${s.atkGain}`);
          if (s.mpGain) parts.push(`MP+${s.mpGain}`);
          for (const k of Object.keys(s.statBoosts || {})) {
            parts.push(`${STAT_LABEL[k] || k}+${s.statBoosts[k]}`);
          }
          if (parts.length) lines.push(`${name}: ${parts.join(" / ")}`);
        }
        fmtSummary(getLeaderName(), applyLevelUpToUnit("player", leaderClassKey, prevLv, newLv) || {});
        if (typeof allies !== "undefined") {
          for (const a of allies) {
            if (!a.classKey) continue;
            const s = applyLevelUpToUnit(a, a.classKey, prevLv, newLv);
            if (s) fmtSummary(a.def.name, s);
          }
        }
        if (lines.length) {
          showDMMessage(`【レベル ${newLv} の成長】\n` + lines.join("\n"), 4200);
        }
      }
    }

    // レアリティ: common/uncommon/rare/epic/legendary

      { name: "錆びた木の剣", flavor: "朽ちかけた見習い用の剣", dmgDice: "1d6", power: 1, knockback: 14, rarity: "common", enhancement: 0 },

      { name: "ロングソード", flavor: "冒険者の標準装備、均整の取れた長剣", dmgDice: "1d8", power: 2, knockback: 20, rarity: "common", enhancement: 0 },

    const chosenWeaponIdx = persistent.equipWeapon != null
      ? Math.min(Number(persistent.equipWeapon), persistent.weaponIdx)

    let currentWeaponIndex = Math.min(chosenWeaponIdx, weapons.length - 1);

    const armors = [
      // 初期: 服
      { name: "粗布の服", flavor: "村人が纏う平服", blockChance: 0.00, knockbackReduce: 0, rarity: "common", enhancement: 0 },

      // 上級: 非魔法の重装鎧 (enh=2 で AC+2)
      { name: "チェインメイル", flavor: "鋼鎖を編み込んだ堅牢な鎧", blockChance: 0.60, knockbackReduce: 10, rarity: "common", enhancement: 2 },
    ];
    const shields = [
      { name: "なし",       flavor: "盾を持たない両手持ち",       rarity: "common", enhancement: 0 },
      { name: "木の盾",     flavor: "楢材を切り出した素朴な盾",   rarity: "common", enhancement: 1 },

    const chosenShieldIdx = persistent.equipShield != null

    let currentShieldIndex = Math.min(Math.max(0, chosenShieldIdx), shields.length - 1);
    const startedWithShieldIdx = currentShieldIndex;

      ? Math.min(Number(persistent.equipArmor), persistent.armorIdx)

    let currentArmorIndex = Math.min(chosenArmorIdx, armors.length - 1);

    const enemyMaxHp = 3;
    const ironSwordDropChance = 0.15;
    const leatherArmorDropChance = 0.12;

    let currentAttackAngle = 0;
    let currentSwingProgress = 0;
    let currentAttackRadius = 54;

    let currentAttackStage = 0;
    let hitEnemiesThisSwing = new Set();

    const enemies = ENEMY_SPAWNS.map(([type, tx, ty]) => createEnemy(type, tx, ty));
    // 各敵のDOM要素を動的に作成
    enemies.forEach((e, i) => createEnemyDom(i, e.def, e.type));

    // ═══════════════════════════════════════════════════════════
    // パーティー (仲間キャラ): Phase 1 は僧侶1人固定
    // ═══════════════════════════════════════════════════════════
    const allies = [];
    function createAlly(classKey, startX, startY) {
      const cd = CLASS_DEFS[classKey];
      return {
        classKey,
        def: cd,
        x: startX, y: startY,
        hp: cd.hpMax, maxHp: cd.hpMax,
        mp: cd.mpMax || 0, maxMp: cd.mpMax || 0,
        alive: true,
        // D&D ステータス
        str: cd.str, dex: cd.dex, con: cd.con, wis: cd.wis, int: cd.int || 0,
        atkBonus: cd.atkBonus, ac: cd.ac,
        dmgDice: cd.dmgDice, dmgBonus: cd.dmgBonus,
        critRange: cd.critRange, critMult: cd.critMult,
        weaponRange: cd.weaponRange,
        equippedSkills: [...cd.defaultSkills],
        buffs: {
          atkBonusRemaining: 0, atkBonusAmount: 0,
          dmgReductionRemaining: 0, dmgReductionDice: null,
          dmgReductionFlat: 0, dmgReductionFlatRemaining: 0,  // 岩肌の皮膚 (固定 -3 など)
          statusImmunityCharges: 0,                            // 鋼の意志 (状態異常を消費式で無効化)
          antiKnockbackRemaining: 0,                           // 踏ん張り (ノックバック無効、ターン制)
          skipNextTurn: false,
          resilientFired: false,
          acBonusRemaining: 0, acBonusAmount: 0,
        },
        stunned: 0,
        skillsUsedInEncounter: new Set(),  // oncePerEncounter スキルの使用記録
        skillCooldowns: {},                // {skillId: turnsLeft} クールダウン管理
        animTick: 0,
        facing: "right",
        state: "idle",

    }

    function createAllyDom(ally, index) {
      const cd = ally.def;
      // 本体スプライト
      const el = document.createElement("div");
      el.className = "ally ally-" + ally.classKey;
      el.id = "ally" + index;
      el.style.width = "96px";
      el.style.height = "96px";

      el.style.backgroundImage = `url("${cd.sprite}")`;

      const ck = ally.classKey;

      el.style.imageRendering = "pixelated";
      el.style.zIndex = "6";

      ally.el = el;
      // HPバー
      const hpWrap = document.createElement("div");
      hpWrap.className = "allyHpBar";
      hpWrap.id = "allyHpBar" + index;
      hpWrap.innerHTML = `<div class="allyHpFill"></div>`;

      ally.hpWrapEl = hpWrap;
      ally.hpFillEl = hpWrap.querySelector(".allyHpFill");
      // 名前ラベル
      const label = document.createElement("div");
      label.className = "allyLabel";
      label.textContent = cd.name;
      document.body.appendChild(label);
      ally.nameLabelEl = label;
    }

    // (注意) 初期パーティーの push は CLASS_DEFS 定義後に実行する必要があるので
    //         ファイル末尾 (スクリプト最後) で allies.push する。

    function startGame() {
      if (gameStarted) return;
      gameStarted = true;
      startScreen.style.display = "none";
      updateInfo("ゲームスタート！");

    }

    // ── DM イベントメッセージ (羊皮紙ミニバナー) ──
    function showDMMessage(text, ms = 2500) {
      const el = document.getElementById("dmMessage");
      if (!el) return;
      el.textContent = text;
      el.classList.remove("show");

      el.classList.add("show");
      if (el._hideTimer) clearTimeout(el._hideTimer);
      el._hideTimer = setTimeout(() => el.classList.remove("show"), ms);

    // 敵種族ごとのエンカ時メッセージ
    const ENEMY_FAMILY_MSG = {
      goblinoid: "待て。物陰に気配がある…ゴブリンだ。奴らはもう気づいている。",

    function detectEnemyFamily(engagedIdxs) {
      // 最も多い種族を返す (ボスがいる場合はボスの種族)
      const counts = {};
      for (const i of engagedIdxs) {
        const t = enemies[i].type || "";
        let fam = "generic";
        if (t.startsWith("goblin")) fam = "goblinoid";
        else if (t.startsWith("bandit") || t === "scar") fam = "bandit";
        else if (t === "skeleton") fam = "undead";
        else if (t === "orc") fam = "orc";
        else if (t === "rat") fam = "beast";
        else if (t === "minotaur") fam = "orc";  // 暫定扱い
        counts[fam] = (counts[fam] || 0) + 1;
      }
      let best = "generic", max = 0;
      for (const k in counts) if (counts[k] > max) { best = k; max = counts[k]; }
      return best;
    }

    // ── フェーズ表示 (右上インジケータ) ──

    // ── DM ナレーション (シナリオ開始時の語り・タイピング演出) ──
    const SCENARIO_NARRATIONS = {

    let narrationSkipRequested = false;
    let narrationPlaying = false;
    const NARRATION_CHAR_MS = 70;     // 1文字あたりの表示間隔 (設計書0.15→実プレイ向けに短縮)
    const NARRATION_PARA_GAP_MS = 2500; // 段落送り前の自動待機

    async function typeNarrationParagraph(text, bodyEl) {
      bodyEl.textContent = "";
      narrationSkipRequested = false;
      for (let i = 0; i < text.length; i++) {
        if (narrationSkipRequested) {
          bodyEl.textContent = text;
          narrationSkipRequested = false;
          return;
        }
        bodyEl.textContent = text.substring(0, i + 1);
        await sleepMs(NARRATION_CHAR_MS);
      }
    }

    async function waitForNarrationAdvance(maxMs) {
      const start = Date.now();
      while (Date.now() - start < maxMs) {
        if (narrationSkipRequested) {
          narrationSkipRequested = false;
          return;
        }
        await sleepMs(50);
      }
    }

    async function playNarration(paragraphs) {
      narrationPlaying = true;
      const bodyEl = document.getElementById("dmBody");
      const hintEl = document.getElementById("dmHint");
      try {
        for (const paragraph of paragraphs) {
          hintEl.classList.remove("show");
          await typeNarrationParagraph(paragraph, bodyEl);
          // 段落終了時のカーソル表示
          bodyEl.innerHTML = bodyEl.textContent + `<span class="dmCursor"></span>`;
          hintEl.classList.add("show");
          await waitForNarrationAdvance(NARRATION_PARA_GAP_MS);
        }
      } finally {
        narrationPlaying = false;
      }
    }

    // 敵タイプ別CSSクラス付与(初期化時に1回)

    // リーダー別の装備プールを引くヘルパー (Step 2-C: 戦士非依存化)
    // leaderClassKey が warrior なら戦士用 weapons/armors/shields、それ以外は ALLY_EQUIP_POOLS
    function getLeaderWeapons() {
      if (leaderClassKey === "warrior") return weapons;
      const pool = (typeof ALLY_EQUIP_POOLS !== "undefined") ? ALLY_EQUIP_POOLS[leaderClassKey] : null;
      return (pool && pool.weapons) || weapons;
    }
    function getLeaderArmors() {
      if (leaderClassKey === "warrior") return armors;
      const pool = (typeof ALLY_EQUIP_POOLS !== "undefined") ? ALLY_EQUIP_POOLS[leaderClassKey] : null;
      return (pool && pool.armors) || armors;
    }
    function getLeaderShields() {
      if (leaderClassKey === "warrior") return shields;
      const pool = (typeof ALLY_EQUIP_POOLS !== "undefined") ? ALLY_EQUIP_POOLS[leaderClassKey] : null;
      return (pool && pool.shields) || shields;
    }
    function getLeaderWeaponIdx() {
      if (leaderClassKey === "warrior") return currentWeaponIndex;
      const sel = (typeof allyEquipSelection !== "undefined") ? allyEquipSelection[leaderClassKey] : null;
      return (sel && sel.weapon) || 0;
    }
    function getLeaderArmorIdx() {
      if (leaderClassKey === "warrior") return currentArmorIndex;
      const sel = (typeof allyEquipSelection !== "undefined") ? allyEquipSelection[leaderClassKey] : null;
      return (sel && sel.armor) || 0;
    }
    function getLeaderShieldIdx() {
      if (leaderClassKey === "warrior") return currentShieldIndex;
      const sel = (typeof allyEquipSelection !== "undefined") ? allyEquipSelection[leaderClassKey] : null;
      return (sel && sel.shield) || 0;
    }
    function getCurrentWeapon() {
      const pool = getLeaderWeapons();
      const idx = getLeaderWeaponIdx();
      return pool[Math.min(Math.max(0, idx), pool.length - 1)];
    }
    function getCurrentShield() {
      const pool = getLeaderShields();
      const idx = getLeaderShieldIdx();
      return pool[Math.min(Math.max(0, idx), pool.length - 1)];
    }
    function getCurrentArmor() {
      const pool = getLeaderArmors();
      const idx = getLeaderArmorIdx();
      return pool[Math.min(Math.max(0, idx), pool.length - 1)];
    }

    function hasIronSword() {
      return currentWeaponIndex === 1;
    }

    function hasLeatherArmor() {
      return currentArmorIndex === 1;
    }

    // 戦闘ログ (独立枠)
    const combatLogLines = [];
    const COMBAT_LOG_MAX = 14;
    function autoClassifyLog(msg) {
      if (/(クリティカル|CRIT|激怒|RAGE|召喚|SUMMON|敵と遭遇|勝利|倒れた|ゲームオーバー|VICTORY|DEFEAT|REINFORCE|ENCOUNTER)/i.test(msg)) {
        if (/(倒れた|ゲームオーバー|DEFEAT)/i.test(msg)) return "sys";
        if (/(クリティカル|CRIT)/i.test(msg)) return "crit";
        return "sys";
      }
      if (/(回復|HEAL|HP を|HP回復|不屈)/i.test(msg)) return "heal";
      if (/(ミス|ファンブル|スタン|OUT OF RANGE|射程外|行動不能)/i.test(msg)) return "miss";
      return "";
    }
    function appendLog(msg, cls) {
      if (!msg) return;
      const finalCls = cls || autoClassifyLog(msg);
      combatLogLines.push({ msg, cls: finalCls });
      if (combatLogLines.length > COMBAT_LOG_MAX) combatLogLines.shift();
      const el = document.getElementById("combatLog");
      if (!el) return;
      el.innerHTML = combatLogLines.map(l =>
        `<div class="logLine ${l.cls}">${l.msg}</div>`
      ).join("");
      el.scrollTop = el.scrollHeight;
    }

    // 装備の色分類 (白=通常 / 青=+Nエンハンスメント / 紫=特殊効果)
    function getItemColorClass(name, rarity) {
      if (rarity === "special" || rarity === "legendary") return "item-special";
      if (rarity === "rare" || /\+\d/.test(name || "")) return "item-magic";
      return "item-normal";
    }

    // 装備行の統一フォーマッタ
    //   武器: 名前 (1d8+3 +1d6炎, 近距離)
    //   防具: 名前
    function formatWeaponLine(name, dmgDice, dmgBonus, rangeKey, rarity, bonusDice, bonusType) {
      const rLabel = (typeof RANGE !== "undefined" && RANGE[rangeKey])
        ? RANGE[rangeKey].label : "近距離";
      const bonusStr = (dmgBonus > 0) ? `+${dmgBonus}`
                    : (dmgBonus < 0) ? `${dmgBonus}` : "";
      const cls = getItemColorClass(name, rarity);
      const ELEM = { fire: "炎", cold: "氷", lightning: "雷", holy: "聖" };
      const extraStr = bonusDice
        ? ` <span style="color:#c870ff">+${bonusDice}${ELEM[bonusType] || ""}</span>`
        : "";
      return `武器: <span class="${cls}">${name || "—"}</span> (${dmgDice || "—"}${bonusStr}${extraStr}, ${rLabel})`;
    }
    function formatArmorLine(name, rarity) {
      const cls = getItemColorClass(name, rarity);
      return `防具: <span class="${cls}">${name || "—"}</span>`;
    }

    // キャラ別ステータス枠のレンダリング
    function renderPartyStatuses() {
      // 戦士
      const wEl = document.getElementById("warriorStatus");
      if (wEl) {
        const weapon = getCurrentWeapon();
        const armor = getCurrentArmor();
        const shield = getCurrentShield();
        const lowHp = hp <= maxHp * 0.25;
        wEl.className = "statusBox" +
          (gameOver ? " dead" : "") +
          (lowHp && !gameOver ? " lowhp" : "");
        const acBonus = (typeof playerBuffs !== "undefined" && playerBuffs.acBonusRemaining > 0)
          ? `<span style="color:#2b5d8e">+${playerBuffs.acBonusAmount}</span>` : "";
        // 装備エンハンスメントを含む基本 AC / 攻撃値 (鎧 + 盾 + 武器)
        const baseAc  = playerStats.ac
          + ((armor && armor.enhancement) || 0)
          + ((shield && shield.enhancement) || 0);
        const baseAtk = playerStats.atkBonus + ((weapon && weapon.enhancement) || 0);
        // 武器表記の +N は STR + 武器エンハ込みの総ダメージボーナス (酒場の表示と統一)
        const weaponDisplayBonus = playerStats.dmgBonus + ((weapon && weapon.enhancement) || 0);
        const lv = (typeof getLevelFromXP === "function") ? getLevelFromXP(currentTotalXp) : 1;
        const nextXp = (typeof getNextLevelXP === "function") ? getNextLevelXP(currentTotalXp) : 1000;
        // 盾行 (装備あり時のみ表示)
        const shieldLine = (shield && shield.enhancement > 0)
          ? `<div class="sbStat">盾: <span class="${getItemColorClass(shield.name, shield.rarity)}">${shield.name}</span> (AC +${shield.enhancement})</div>`
          : "";
        // MP 行 (リーダーが mpMax>0 のクラス: 僧侶/魔法使い/エルフ など)
        const leaderMpLine = (maxMp > 0)
          ? `<div class="sbStat">MP <b style="color:#2b5d8e">${mp}</b>/${maxMp}</div>`
          : "";
        // スキル行 (装備スキル一覧、仲間と同じ表示パターン)
        const leaderSkillNames = (typeof equippedSkills !== "undefined" && equippedSkills)
          ? equippedSkills.map(id => {
              const sk = (typeof getSkill === "function") ? getSkill(id) : null;
              return sk ? sk.name : id;
            }).join(" / ")
          : "";
        wEl.innerHTML =
          `<div class="sbName">${getLeaderName()} <span style="font-size:12px;color:#c8a046">Lv${lv}</span></div>` +
          `<div class="sbStat">HP <b>${hp}</b>/${maxHp}` +
          `  ・ AC ${baseAc}${acBonus} 攻<b>+${baseAtk}</b></div>` +
          leaderMpLine +
          `<div class="sbStat">${formatWeaponLine(weapon.name, weapon.dmgDice || playerStats.dmgDice, weaponDisplayBonus, playerStats.weaponRange || "melee", weapon.rarity, weapon.bonusDmgDice, weapon.bonusDmgType)}</div>` +
          shieldLine +
          `<div class="sbStat">${formatArmorLine(armor.name, armor.rarity)}</div>` +
          `<div class="sbStat">スキル: ${leaderSkillNames || "—"}</div>` +
          `<div class="sbStat">XP <b>${currentTotalXp}</b>/${nextXp} ・ 金貨 ${coins}</div>`;
      }
      // 仲間 (キャラクター毎に DOM 要素を対応付け)
      const allyBoxMap = {
        dwarf:  document.getElementById("dwarfStatus"),
        cleric: document.getElementById("clericStatus"),
        mage:   document.getElementById("mageStatus"),
        elf:    document.getElementById("elfStatus"),
        rogue:  document.getElementById("rogueStatus"),
      };
      // 一旦すべて非表示にしてから、該当クラスの味方があれば描画
      for (const box of Object.values(allyBoxMap)) {
        if (box) box.style.display = "none";
      }
      if (typeof allies !== "undefined") {
        const allyLv = (typeof getLevelFromXP === "function") ? getLevelFromXP(currentTotalXp) : 1;
        const allyNextXp = (typeof getNextLevelXP === "function") ? getNextLevelXP(currentTotalXp) : 1000;
        for (const a of allies) {
          const box = allyBoxMap[a.classKey];
          if (!box) continue;
          box.style.display = "";
          const lowHp = a.alive && a.hp <= a.maxHp * 0.25;
          box.className = "statusBox" +
            (!a.alive ? " dead" : "") +
            (lowHp ? " lowhp" : "");
          const hpText = a.alive ? `<b>${a.hp}</b>/${a.maxHp}` : `<b>倒</b>`;
          const skillNames = a.equippedSkills.map(id => {
            const sk = getSkill(id);
            return sk ? sk.name : id;
          }).join(" / ");
          const acBonus = (a.buffs && a.buffs.acBonusRemaining > 0)
            ? `<span style="color:#2b5d8e">+${a.buffs.acBonusAmount}</span>` : "";
          const mpLine = (a.maxMp > 0)
            ? `<div class="sbStat">MP <b style="color:#2b5d8e">${a.mp}</b>/${a.maxMp}</div>`
            : "";
          // 武器表記は純粋な武器ダメージ (ダイスのみ、STR 修正はダメ計算で別途加算)
          box.innerHTML =
            `<div class="sbName">${a.def.name} <span style="font-size:12px;color:#c8a046">Lv${allyLv}</span></div>` +
            `<div class="sbStat">HP ${hpText}` +
            `  ・ AC ${a.ac}${acBonus} 攻<b>+${a.atkBonus}</b></div>` +
            mpLine +
            `<div class="sbStat">${formatWeaponLine(a.weaponName || a.def.weaponName, a.dmgDice, 0, a.weaponRange || "melee", a.weaponRarity, a.weaponBonusDmgDice, a.weaponBonusDmgType)}</div>` +
            `<div class="sbStat">${formatArmorLine(a.armorName || a.def.armorName, a.armorRarity)}</div>` +
            `<div class="sbStat">スキル: ${skillNames || "—"}</div>` +
            `<div class="sbStat">XP <b>${currentTotalXp}</b>/${allyNextXp}</div>`;
        }
      }
    }

    function updateInfo(message) {
      // ログには動的なメッセージだけ積む
      if (message) appendLog(message);
      // フッターはヒントだけ
      info.textContent = "[AUTO PILOT]  [ I ] でインベントリ";

    function getPlayerCenter() {
      return {
        x: playerX + playerWidth / 2,
        y: playerY + playerHeight / 2
      };
    }

    function updateFacingFromMouse() {
      const center = getPlayerCenter();
      const dx = mouseX - center.x;
      // 右向きのみ運用: X方向に十分差がある時だけ更新 (上下移動時は維持)
      if (Math.abs(dx) > 2) {
        facing = dx >= 0 ? "right" : "left";
      }
    }

    function clampPlayerToMap() {
      const maxX = MAP_W * TILE_SIZE - playerWidth;
      const maxY = MAP_H * TILE_SIZE - playerHeight;
      if (playerX < 0) playerX = 0;
      if (playerY < 0) playerY = 0;
      if (playerX > maxX) playerX = maxX;
      if (playerY > maxY) playerY = maxY;
    }

    function clampEnemyToMap(enemy) {
      const size = enemy.def ? enemy.def.displaySize : 72;
      const maxX = MAP_W * TILE_SIZE - size;
      const maxY = MAP_H * TILE_SIZE - size;
      if (enemy.x < 0) enemy.x = 0;
      if (enemy.y < 0) enemy.y = 0;
      if (enemy.x > maxX) enemy.x = maxX;
      if (enemy.y > maxY) enemy.y = maxY;
    }

    function randomEnemyPosition() {
      const floorTiles = [];
      for (let ty = 0; ty < MAP_H; ty++)
        for (let tx = 0; tx < MAP_W; tx++)
          if (mapData[ty][tx] !== 2)
            floorTiles.push({ x: tx * TILE_SIZE, y: ty * TILE_SIZE });
      const valid = floorTiles.filter(t => {
        const dx = t.x + 24 - (playerX + 48);
        const dy = t.y + 24 - (playerY + 48);
        return Math.hypot(dx, dy) > 200;
      });
      const list = valid.length > 0 ? valid : floorTiles;
      return list[Math.floor(Math.random() * list.length)];
    }

    function getPlayerHitbox() {
      return {
        left: playerX + 28,
        top: playerY + 34,
        right: playerX + 68,
        bottom: playerY + 82
      };
    }

    function getEnemyHitbox(enemy) {
      const size = enemy.def ? enemy.def.displaySize : 72;
      const inset = Math.max(6, Math.floor(size * 0.18));
      return {
        left:   enemy.x + inset,
        top:    enemy.y + inset + 2,
        right:  enemy.x + size - inset,
        bottom: enemy.y + size - inset + 2
      };
    }

    // ピックアップ判定は広めに(AUTOで拾い損ねないように)
    const PICKUP_PAD = 16;
    function getCoinHitbox(enemy) {
      return {
        left:   enemy.coinX - PICKUP_PAD,
        top:    enemy.coinY - PICKUP_PAD,
        right:  enemy.coinX + 22 + PICKUP_PAD,
        bottom: enemy.coinY + 22 + PICKUP_PAD
      };
    }

    function getWeaponDropHitbox(enemy) {
      return {
        left:   enemy.weaponX - PICKUP_PAD,
        top:    enemy.weaponY - PICKUP_PAD,
        right:  enemy.weaponX + 26 + PICKUP_PAD,
        bottom: enemy.weaponY + 26 + PICKUP_PAD
      };
    }

    function getArmorDropHitbox(enemy) {
      return {
        left:   enemy.armorX - PICKUP_PAD,
        top:    enemy.armorY - PICKUP_PAD,
        right:  enemy.armorX + 28 + PICKUP_PAD,
        bottom: enemy.armorY + 28 + PICKUP_PAD
      };
    }

    function isOverlapping(rectA, rectB) {
      return (
        rectA.left < rectB.right &&
        rectA.right > rectB.left &&
        rectA.top < rectB.bottom &&
        rectA.bottom > rectB.top
      );
    }

    function stopGuardBlink() {
      if (guardBlinkInterval) {
        clearInterval(guardBlinkInterval);
        guardBlinkInterval = null;
      }
    }

    function stopDamageBlink() {
      if (damageBlinkInterval) {
        clearInterval(damageBlinkInterval);
        damageBlinkInterval = null;
      }
      if (damageBlinkTimer) {
        clearTimeout(damageBlinkTimer);
        damageBlinkTimer = null;
      }
    }

    function applyNormalPlayerVisual() {
      if (counterVisualActive) {
        player.style.filter =
          "drop-shadow(0 0 10px rgba(80,200,255,0.95)) " +
          "drop-shadow(0 0 22px rgba(80,200,255,0.8))";
        player.style.opacity = "1";
        return;
      }

      if (guardInvincible || invincible) {
        player.style.filter = "none";
        player.style.opacity = "0.82";
        return;
      }

      player.style.filter = "none";
      player.style.opacity = "1";
    }

    function cancelTimedInvincibility() {
      invincibleToken += 1;

      if (invincibleTimer) {
        clearTimeout(invincibleTimer);
        invincibleTimer = null;
      }

      stopGuardBlink();
      stopDamageBlink();

      if (!counterInvincible) {
        invincible = false;
        guardInvincible = false;
      }

      applyNormalPlayerVisual();
    }

    function startTimedInvincibility(duration, enableBlink = false) {
      cancelTimedInvincibility();

      invincible = true;
      guardInvincible = true;

      const token = ++invincibleToken;

      if (enableBlink) {
        let blinkOn = false;
        guardBlinkInterval = setInterval(() => {
          if (token !== invincibleToken) return;
          blinkOn = !blinkOn;

          if (blinkOn) {
            player.style.filter =
              "drop-shadow(0 0 8px rgba(80,180,255,0.95)) " +
              "drop-shadow(0 0 18px rgba(80,180,255,0.75)) " +
              "hue-rotate(180deg) saturate(1.4)";
            player.style.opacity = "0.85";
          } else {
            player.style.filter = "none";
            player.style.opacity = "1";
          }
        }, guardBlinkSpeed);
      } else {
        applyNormalPlayerVisual();
      }

      invincibleTimer = setTimeout(() => {
        if (token !== invincibleToken) return;

        stopGuardBlink();
        invincible = false;
        guardInvincible = false;

        if (!counterInvincible) {
          applyNormalPlayerVisual();
        }
      }, duration);
    }

    function startDamageBlinkInvincibility(duration) {
      cancelTimedInvincibility();

      invincible = true;
      guardInvincible = false;

      let blinkOn = false;

      damageBlinkInterval = setInterval(() => {
        blinkOn = !blinkOn;
        if (blinkOn) {
          player.style.opacity = "0.35";
          player.style.filter = "drop-shadow(0 0 8px rgba(255,255,255,0.55))";
        } else {
          player.style.opacity = "1";
          player.style.filter = "none";
        }
      }, 80);

      damageBlinkTimer = setTimeout(() => {
        stopDamageBlink();
        invincible = false;
        applyNormalPlayerVisual();
      }, duration);
    }

    function clearCounterState() {
      counterActive = false;
      counterInvincible = false;
      counterVisualActive = false;
      attackActive = false;
      counterAura.style.display = "none";

      if (counterResetTimer) {
        clearTimeout(counterResetTimer);
        counterResetTimer = null;
      }

      playerKnockbackVX = 0;
      playerKnockbackVY = 0;
      playerHitStun = 0;

      invincible = false;
      guardInvincible = false;
      stopGuardBlink();
      stopDamageBlink();

      if (invincibleTimer) {
        clearTimeout(invincibleTimer);
        invincibleTimer = null;
      }

      isGuarding = rightMouseDown;
      applyNormalPlayerVisual();
      updatePositions();
    }

    function updateCounterAura() {
      if (!counterVisualActive) {
        counterAura.style.display = "none";
        return;
      }
      counterAura.style.display = "block";
      counterAura.style.left = (playerX - camX - 26) + "px";
      counterAura.style.top  = (playerY - camY - 26) + "px";
    }

    function updateEnemyDamageFlash(enemyEl, enemy) {
      if (enemy.damageFlashTimer > 0) {
        const on = enemy.damageFlashTimer % 4 < 2;
        if (on) {
          enemyEl.style.filter = "brightness(1.15) saturate(1.4) sepia(1) hue-rotate(-40deg)";
          enemyEl.style.opacity = "0.62";
        } else {
          enemyEl.style.filter = "none";
          enemyEl.style.opacity = "1";
        }
      } else {
        enemyEl.style.filter = "none";
        enemyEl.style.opacity = "1";
      }
    }

    function updatePositions() {
      updateCamera();
      renderMap();
      renderLighting();
      updateGroundFx();

      player.style.left = (playerX - camX) + "px";
      player.style.top  = (playerY - camY) + "px";
      // シールド・オブ・フェイス バフ中: 金の光輪を持続表示
      player.classList.toggle("fx-shield",
        typeof playerBuffs !== "undefined" && playerBuffs.acBonusRemaining > 0);

      // 戦士用 HP バー・名前ラベル (仲間と同じレイアウト)
      const warriorHpBar = document.getElementById("warriorHpBar");
      const warriorHpFill = document.getElementById("warriorHpFill");
      const warriorLabel = document.getElementById("warriorLabel");
      if (warriorHpBar && warriorHpFill && warriorLabel) {
        if (gameOver) {
          warriorHpBar.style.display = "none";
          warriorLabel.style.display = "none";
        } else {
          warriorHpBar.style.display = "block";
          warriorLabel.style.display = "block";
          warriorHpBar.style.left = (playerX + 18 - camX) + "px";
          warriorHpBar.style.top  = (playerY - 10 - camY) + "px";
          warriorHpFill.style.width = (hp / maxHp * 100) + "%";
          warriorLabel.style.left = (playerX + 20 - camX) + "px";
          warriorLabel.style.top  = (playerY - 28 - camY) + "px";
        }
      }

      // 騎士アニメーション(Simple Knight: 4方向×3アクション × 5フレーム)
      updateKnightSprite();
      playerMovingThisFrame = false;
      // ガード状態の見た目(インラインで直接指定してインラインfilterに勝つ)
      const guarding = isGuarding && !attackActive;
      player.classList.toggle("guarding", guarding);
      if (guarding) {
        player.style.filter =
          "drop-shadow(0 0 6px rgba(140,210,255,0.95)) " +
          "drop-shadow(0 0 14px rgba(80,170,255,0.7)) " +
          "brightness(1.08)";
        wasGuardingVisual = true;
      } else if (wasGuardingVisual) {
        // ガード解除直後: 青グロウを確実に消す
        applyNormalPlayerVisual();
        wasGuardingVisual = false;
      }

      updateCounterAura();

      // AUTO モードでは移動マーカーは表示しない
      moveMarker.style.display = "none";

      enemies.forEach((enemy, index) => {
        const enemyEl = enemyElements[index];
        const hpBarEl = hpBarElements[index];
        const hpFillEl = hpFillElements[index];
        const coinEl = coinElements[index];
        const weaponEl = weaponDropElements[index];
        const armorEl  = armorDropElements[index];
        const alertEl  = alertMarkElements[index];

        if (enemy.alive) {
          enemyEl.style.display = "block";
          enemyEl.style.left = (enemy.x - camX) + "px";
          enemyEl.style.top  = (enemy.y - camY) + "px";
          updateEnemyDamageFlash(enemyEl, enemy);
          updateEnemyAnim(enemy, enemyEl);
          // ステータスエフェクト連動: スリープ (stunned > 0)
          enemyEl.classList.toggle("fx-sleep", (enemy.stunned || 0) > 0);

          hpBarEl.style.display = "block";
          const hpBarOffX = (enemy.def.displaySize - 52) / 2;
          hpBarEl.style.left = (enemy.x + hpBarOffX - camX) + "px";
          hpBarEl.style.top  = (enemy.y - 10 - camY) + "px";
          hpFillEl.style.width = (enemy.hp / enemy.maxHp * 100) + "%";
        } else {
          enemyEl.style.display = "none";
          hpBarEl.style.display = "none";
        }

        coinEl.style.display = enemy.coinVisible ? "block" : "none";
        if (enemy.coinVisible) {
          coinEl.style.left = (enemy.coinX - camX) + "px";
          coinEl.style.top  = (enemy.coinY - camY) + "px";
        }

        weaponEl.style.display = enemy.weaponVisible ? "block" : "none";
        if (enemy.weaponVisible) {
          weaponEl.style.left = (enemy.weaponX - camX) + "px";
          weaponEl.style.top  = (enemy.weaponY - camY) + "px";
        }

        armorEl.style.display = enemy.armorVisible ? "block" : "none";
        if (enemy.armorVisible) {
          armorEl.style.left = (enemy.armorX - camX) + "px";
          armorEl.style.top  = (enemy.armorY - camY) + "px";
        }

        // ！マーク：alert 状態のときだけ表示
        if (enemy.alive && enemy.state === "alert") {
          alertEl.style.display = "block";
          alertEl.style.left = (enemy.x + 22 - camX) + "px";
          alertEl.style.top  = (enemy.y - 26 - camY) + "px";
        } else {
          alertEl.style.display = "none";
        }

        // 装備バッジ: 生存中で badge 持ちの敵にだけ頭上表示
        const badgeEl = enemyBadgeElements[index];
        if (badgeEl) {
          if (enemy.alive && enemy.def.badge) {
            badgeEl.style.display = "block";
            // 敵サイズの中央に合わせて少し上
            const offX = enemy.def.displaySize / 2 - 18;
            badgeEl.style.left = (enemy.x + offX - camX) + "px";
            badgeEl.style.top  = (enemy.y - 28 - camY) + "px";
          } else {
            badgeEl.style.display = "none";
          }
        }
      });

      // 仲間キャラの描画
      allies.forEach(ally => {
        if (!ally.el) return;
        if (ally.alive) {
          ally.el.style.display = "block";
          ally.el.style.left = (ally.x - camX) + "px";
          ally.el.style.top  = (ally.y - camY) + "px";
          updateAllySprite(ally);
          // シールド・オブ・フェイス バフ中: 金の光輪を持続表示
          ally.el.classList.toggle("fx-shield",
            (ally.buffs && ally.buffs.acBonusRemaining > 0));
          // HPバー (敵と同じスタイルで スプライト上部の外側)
          if (ally.hpWrapEl) {
            ally.hpWrapEl.style.display = "block";
            ally.hpWrapEl.style.left = (ally.x + 18 - camX) + "px";
            ally.hpWrapEl.style.top  = (ally.y - 10 - camY) + "px";
            ally.hpFillEl.style.width = (ally.hp / ally.maxHp * 100) + "%";
          }
          // 名前ラベル (HPバーの上)
          if (ally.nameLabelEl) {
            ally.nameLabelEl.style.display = "block";
            ally.nameLabelEl.style.left = (ally.x + 20 - camX) + "px";
            ally.nameLabelEl.style.top  = (ally.y - 28 - camY) + "px";
          }
        } else {
          ally.el.style.display = "none";
          if (ally.hpWrapEl) ally.hpWrapEl.style.display = "none";
          if (ally.nameLabelEl) ally.nameLabelEl.style.display = "none";
        }
      });

      // 部屋配置の宝箱 (開封済みは薄暗く残して余韻)
      //   hidden=true & found=false は「知覚チェック前」で非表示
      if (typeof roomChests !== "undefined") {
        for (const chest of roomChests) {
          if (!chest.el) continue;
          if (chest.hidden && !chest.found) {
            chest.el.classList.add("hidden-unfound");
            continue;
          }
          chest.el.classList.remove("hidden-unfound");
          const wx = chest.tx * TILE_SIZE + TILE_SIZE / 2 - 28;
          const wy = chest.ty * TILE_SIZE + TILE_SIZE / 2 - 28;
          chest.el.style.left = (wx - camX) + "px";
          chest.el.style.top  = (wy - camY) + "px";
        }
      }
      // 罠 (発見済みのみ表示。発動済みは薄暗く残す)
      if (typeof traps !== "undefined") {
        for (const trap of traps) {
          if (!trap.el) continue;
          if (!trap.found) {
            trap.el.classList.remove("found");
            continue;
          }
          trap.el.classList.add("found");
          if (trap.triggered) trap.el.classList.add("triggered");
          const wx = trap.tx * TILE_SIZE + TILE_SIZE / 2 - 26;
          const wy = trap.ty * TILE_SIZE + TILE_SIZE / 2 - 26;
          trap.el.style.left = (wx - camX) + "px";
          trap.el.style.top  = (wy - camY) + "px";
        }
      }
    }

    // 仲間用アニメーション (knight_simple.png 流用)
    // 行: walk[down=0, up=1, left=2, right=3], attack[4-7], cast[8-11]
    const DWARF_WALK_URL   = 'url("assets/dwarf_walk.png?v=2")';
    const DWARF_WALK_SIZE  = "576px 384px";
    const DWARF_ATTACK_URL = 'url("assets/dwarf_attack.png?v=3")';
    const DWARF_ATTACK_SIZE = "480px 384px";
    const CLERIC_WALK_URL   = 'url("assets/cleric_walk.png?v=1")';
    const CLERIC_WALK_SIZE  = "576px 384px";
    const CLERIC_ATTACK_URL = 'url("assets/cleric_attack.png?v=1")';
    const CLERIC_ATTACK_SIZE = "480px 384px";
    const MAGE_WALK_URL     = 'url("assets/mage_walk.png?v=2")';
    const MAGE_WALK_SIZE    = "576px 384px";
    const MAGE_ATTACK_URL   = 'url("assets/mage_attack.png?v=2")';
    const MAGE_ATTACK_SIZE  = "480px 384px";
    const ELF_WALK_URL      = 'url("assets/elf_walk.png?v=1")';
    const ELF_WALK_SIZE     = "576px 384px";
    const ELF_ATTACK_URL    = 'url("assets/elf_attack.png?v=2")';
    const ELF_ATTACK_SIZE   = "480px 384px";
    const ROGUE_WALK_URL    = 'url("assets/rogue_walk.png?v=1")';
    const ROGUE_WALK_SIZE   = "576px 384px";
    const ROGUE_ATTACK_URL  = 'url("assets/rogue_attack.png?v=1")';
    const ROGUE_ATTACK_SIZE = "480px 384px";
    const CLERIC_CAST_URL   = 'url("assets/cleric_cast.png?v=4")';
    const CLERIC_CAST_SIZE  = "576px 384px";
    // キャストシートを持つクラス (現状は僧侶のみ、魔法使い追加時に拡張)
    const CAST_SHEET_CLASSES = new Set(["cleric"]);
    function setAllySpriteSheet(ally, url, size) {
      if (ally._lastSpriteUrl === url) return;
      ally._lastSpriteUrl = url;
      ally.el.style.backgroundImage = url;
      ally.el.style.backgroundSize = size;
    }
    // 専用シートを持つクラス (歩き 6F、576×384)
    const CUSTOM_SHEET_CLASSES = new Set(["dwarf", "cleric", "mage", "elf", "rogue"]);
    // 歩きのみで攻撃シート未対応 (攻撃アニメは flashAction で代用)。新キャラ追加時のフック
    const WALK_ONLY_CLASSES = new Set();
    function startAllyAttackAnim(ally, durationMs = 500) {
      if (!CUSTOM_SHEET_CLASSES.has(ally.classKey)) return;
      if (WALK_ONLY_CLASSES.has(ally.classKey)) return;  // 攻撃シート未対応はスキップ
      if (ally._attackTimer) clearTimeout(ally._attackTimer);
      ally.attackAnimActive = true;
      ally.attackAnimStart = performance.now();
      ally.attackAnimDuration = durationMs;
      ally._attackTimer = setTimeout(() => {
        ally.attackAnimActive = false;
        ally._attackTimer = null;
      }, durationMs);
    }
    function startAllyCastAnim(ally, durationMs = 600) {
      if (!CAST_SHEET_CLASSES.has(ally.classKey)) return;
      if (ally._castTimer) clearTimeout(ally._castTimer);
      ally.castAnimActive = true;
      ally.castAnimStart = performance.now();
      ally.castAnimDuration = durationMs;
      ally._castTimer = setTimeout(() => {
        ally.castAnimActive = false;
        ally._castTimer = null;
      }, durationMs);
    }
    function updateAllySprite(ally) {
      ally.animTick++;
      const facing = ally.facing || "right";
      // FFタクティクス風: 右向き行固定、左向きは CSS flip
      const row = 3;
      ally.el.style.transform = facing === "left" ? "scaleX(-1)" : "";
      const ck = ally.classKey;
      const isCustom = CUSTOM_SHEET_CLASSES.has(ck);

      // キャストアニメ中 (攻撃より優先)
      if (CAST_SHEET_CLASSES.has(ck) && ally.castAnimActive) {
        const elapsed = performance.now() - ally.castAnimStart;
        if (elapsed >= ally.castAnimDuration) {
          // setTimeout が何らかの理由で遅延した場合の自己保険
          ally.castAnimActive = false;
        } else {
          const progress = Math.min(1, elapsed / ally.castAnimDuration);
          const frame = Math.min(5, Math.floor(progress * 6));
          if (ck === "cleric") setAllySpriteSheet(ally, CLERIC_CAST_URL, CLERIC_CAST_SIZE);
          ally.el.style.backgroundPosition = `${-frame * 96}px ${-row * 96}px`;
          ally.playerMovingThisFrame = false;
          return;
        }
      }

      // 攻撃アニメ中
      if (isCustom && ally.attackAnimActive) {
        const elapsed = performance.now() - ally.attackAnimStart;
        const progress = Math.min(1, elapsed / ally.attackAnimDuration);
        const frame = Math.min(4, Math.floor(progress * 5));
        if (ck === "dwarf") setAllySpriteSheet(ally, DWARF_ATTACK_URL, DWARF_ATTACK_SIZE);
        else if (ck === "cleric") setAllySpriteSheet(ally, CLERIC_ATTACK_URL, CLERIC_ATTACK_SIZE);
        else if (ck === "mage") setAllySpriteSheet(ally, MAGE_ATTACK_URL, MAGE_ATTACK_SIZE);
        else if (ck === "elf") setAllySpriteSheet(ally, ELF_ATTACK_URL, ELF_ATTACK_SIZE);
        else if (ck === "rogue") setAllySpriteSheet(ally, ROGUE_ATTACK_URL, ROGUE_ATTACK_SIZE);
        ally.el.style.backgroundPosition = `${-frame * 96}px ${-row * 96}px`;
        ally.playerMovingThisFrame = false;
        return;
      }

      // 通常 (歩行/待機)
      let frameCount, framesPerStep;
      if (ally.playerMovingThisFrame) {
        // カスタムシートは 6F, simple_knight は 5F
        framesPerStep = isCustom ? 5 : 6;
        frameCount    = isCustom ? 6 : 5;
      } else {
        framesPerStep = 1; frameCount = 1;
      }
      const frame = Math.floor(ally.animTick / framesPerStep) % frameCount;
      if (ck === "dwarf")       setAllySpriteSheet(ally, DWARF_WALK_URL, DWARF_WALK_SIZE);
      else if (ck === "cleric") setAllySpriteSheet(ally, CLERIC_WALK_URL, CLERIC_WALK_SIZE);
      else if (ck === "mage")   setAllySpriteSheet(ally, MAGE_WALK_URL, MAGE_WALK_SIZE);
      else if (ck === "elf")    setAllySpriteSheet(ally, ELF_WALK_URL, ELF_WALK_SIZE);
      else if (ck === "rogue")  setAllySpriteSheet(ally, ROGUE_WALK_URL, ROGUE_WALK_SIZE);
      else                      setAllySpriteSheet(ally, `url("${ally.def.sprite}")`, "480px 1152px");
      ally.el.style.backgroundPosition = `${-frame * 96}px ${-row * 96}px`;
      ally.playerMovingThisFrame = false;
    }

    function showGuardEffect() {
      let gx = playerX - 12;
      let gy = playerY - 12;
      // 右向きのみ運用: 水平2方向
      if (facing === "left") { gx = playerX - 34; gy = playerY - 12; }
      if (facing === "right") { gx = playerX + 18; gy = playerY - 12; }

      guardEffect.style.left = (gx - camX) + "px";
      guardEffect.style.top  = (gy - camY) + "px";
      guardEffect.style.display = "block";
      guardEffect.style.animation = "none";
      void guardEffect.offsetWidth;
      guardEffect.style.animation = "";

      setTimeout(() => {
        guardEffect.style.display = "none";
      }, 320);
    }

    function showHitSpark(index, strong = false) {
      // エフェクト調整中: 命中時の光る演出 (白い閃光+リング) を一旦オフ
      // 戻すには下のブロックの先頭の return を外す
      return;
      const enemy = enemies[index];
      const spark = hitSparkElements[index];
      spark.classList.toggle("strong", strong);
      spark.style.left = (enemy.x - camX - (strong ? 24 : 10)) + "px";
      spark.style.top  = (enemy.y - camY - (strong ? 24 : 10)) + "px";
      spark.style.display = "block";
      spark.style.animation = "none";
      void spark.offsetWidth;
      spark.style.animation = "";

      setTimeout(() => {
        spark.style.display = "none";
        spark.classList.remove("strong");
      }, strong ? 260 : 220);
    }

    function triggerEnemyDamageFlash(index) {
      enemies[index].damageFlashTimer = 10;
    }

    // (廃止) tryHealWithCoins — 3枚で 1HP 回復の機構は削除済

    function isGuardFacingEnemy(enemy) {
      const playerCenterX = playerX + playerWidth / 2;
      const playerCenterY = playerY + playerHeight / 2;
      const enemyCenterX = (enemy.x + enemy.def.displaySize / 2);
      const enemyCenterY = (enemy.y + enemy.def.displaySize / 2);
      const dx = enemyCenterX - playerCenterX;
      const dy = enemyCenterY - playerCenterY;

      // 右向きのみ運用: X軸の向き一致だけで判定
      if (facing === "left") return dx < 0;
      if (facing === "right") return dx > 0;
      return false;
    }

    function applyPlayerKnockbackFromEnemy(enemy, reduced = false, knockbackScale = 1, stunScale = 1) {
      // ノックバック廃止: 位置を押さない。短い flinch のみ残し、殴り合いになるように
      playerKnockbackVX = 0;
      playerKnockbackVY = 0;
      playerHitStun = reduced ? 3 : 6;

      targetX = null;
      targetY = null;
    }

    function getNearestAliveEnemy() {
      const center = getPlayerCenter();
      let bestIndex = -1;
      let bestDist = Infinity;

      enemies.forEach((enemy, index) => {
        if (!enemy.alive) return;
        const ex = (enemy.x + enemy.def.displaySize / 2);
        const ey = (enemy.y + enemy.def.displaySize / 2);
        const dist = Math.hypot(ex - center.x, ey - center.y);
        if (dist < bestDist) {
          bestDist = dist;
          bestIndex = index;
        }
      });

      return bestIndex;
    }

    function getAngleToEnemy(index) {
      const center = getPlayerCenter();
      const enemy = enemies[index];
      return Math.atan2(((enemy.y + enemy.def.displaySize / 2)) - center.y, ((enemy.x + enemy.def.displaySize / 2)) - center.x);
    }

    function applyKnockback(enemy, amount, angle) {
      // ノックバック廃止: 位置を押さない。短い flinch のみ残し、殴り合いになるように
      enemy.hitStun = 4;
      enemy.knockbackVX = 0;
      enemy.knockbackVY = 0;
    }

    function damageEnemy(index, stage = 0, angle = currentAttackAngle) {
      const enemy = enemies[index];
      if (!enemy.alive) return;

      // 攻撃を受けたら必ず追跡状態に
      if (enemy.state !== "chase") {
        enemy.state = "chase";
        enemy.alertTimer = 0;
        enemy.path = [];
        enemy.pathTimer = 0;
      }

      const weapon = getCurrentWeapon();
      let damage = weapon.power;
      let knockback = weapon.knockback;
      let strong = false;

      if (stage === 1) {
        knockback *= 2;
        strong = true;
      }

      triggerEnemyDamageFlash(index);
      showHitSpark(index, strong);
      enemy.hp -= damage;
      applyKnockback(enemy, knockback, angle);

      if (enemy.hp <= 0) {
        defeatEnemy(index);
      } else {
        if (stage === 0) {
          updateInfo("スライムに " + damage + " ダメージ！ 残りHP: " + enemy.hp);
        } else {
          updateInfo("ダッシュカウンター命中！ 残りHP: " + enemy.hp);
        }
      }
    }

    function maybeDropIronSword(index) {
      const enemy = enemies[index];
      if (hasIronSword()) return;
      if (Math.random() < ironSwordDropChance) {
        enemy.weaponVisible = true;
        enemy.weaponX = enemy.x + 38;
        enemy.weaponY = enemy.y - 2;
      }
    }

    function maybeDropLeatherArmor(index) {
      const enemy = enemies[index];
      if (hasLeatherArmor()) return;
      if (Math.random() < leatherArmorDropChance) {
        enemy.armorVisible = true;
        enemy.armorX = enemy.x - 4;
        enemy.armorY = enemy.y - 2;
      }
    }

    function defeatEnemy(index) {
      const enemy = enemies[index];
      enemy.alive = false;
      // コインドロップは廃止 (報酬は宝箱とクリア報酬に集約)
      enemy.coinVisible = false;
      enemy.knockbackVX = 0;
      enemy.knockbackVY = 0;
      enemy.hitStun = 0;
      enemy.damageFlashTimer = 0;

      maybeDropIronSword(index);
      maybeDropLeatherArmor(index);

      const nm = (enemy.def && enemy.def.name) || "敵";
      // ボス死亡セリフ (deathLine 定義時のみ)
      if (enemy.def && enemy.def.deathLine && typeof showDMMessage === "function") {
        setTimeout(() => showDMMessage(`「${enemy.def.deathLine}」 — ${nm}`, 3600), 600);
      }
      if (enemy.weaponVisible && enemy.armorVisible) {
        updateInfo(`${nm}を倒した！ 宝箱2つが落ちた`);
      } else if (enemy.weaponVisible || enemy.armorVisible) {
        updateInfo(`${nm}を倒した！ 宝箱が落ちた`);
      } else {
        updateInfo(`${nm}を倒した！`);
      }
      // XP 加算
      if (typeof gainXP === "function") {
        gainXP(enemy.def.xp || 0, nm);
      }
    }

    function respawnEnemy(index) {
      const pos = randomEnemyPosition();
      enemies[index].x = pos.x;
      enemies[index].y = pos.y;
      enemies[index].originX = pos.x;
      enemies[index].originY = pos.y;
      enemies[index].searchTimer = 0;
      enemies[index].alive = true;
      enemies[index].hp = enemies[index].maxHp;
      enemies[index].coinVisible = false;
      enemies[index].weaponVisible = false;
      enemies[index].armorVisible = false;
      enemies[index].knockbackVX = 0;
      enemies[index].knockbackVY = 0;
      enemies[index].hitStun = 0;
      enemies[index].damageFlashTimer = 0;
      enemies[index].path = [];
      enemies[index].pathTimer = 0;
      enemies[index].state = "idle";
      enemies[index].losTimer = 0;
      enemies[index].alertTimer = 0;
      enemies[index].attackTimer = 0;
      enemies[index].attackCooldown = 0;
      enemies[index].attackHitDealt = false;
      updatePositions();
    }

    function getAttackHitbox() {
      const center = getPlayerCenter();
      const hitCenterX = center.x + Math.cos(currentAttackAngle) * currentAttackRadius;
      const hitCenterY = center.y + Math.sin(currentAttackAngle) * currentAttackRadius;

      return {
        left: hitCenterX - currentAttackHitSize,
        top: hitCenterY - currentAttackHitSize,
        right: hitCenterX + currentAttackHitSize,
        bottom: hitCenterY + currentAttackHitSize
      };
    }

    function checkAttackHit() {
      // エンカウンター中はダイスロール側でダメージを処理するのでコリジョン判定は無効化
      if (encounterActive) return;
      const attackHitbox = getAttackHitbox();

      for (let i = 0; i < enemies.length; i++) {
        if (hitEnemiesThisSwing.has(i)) continue;
        if (!enemies[i].alive) continue;

        const enemyHitbox = getEnemyHitbox(enemies[i]);
        if (isOverlapping(attackHitbox, enemyHitbox)) {
          damageEnemy(i, currentAttackStage, currentAttackAngle);
          hitEnemiesThisSwing.add(i);
        }
      }
    }

    function runSwing(angle, options) {
      return new Promise((resolve) => {
        attackActive = true;
        currentAttackAngle = angle;
        currentSwingProgress = 0;
        currentAttackRadius = options.radius;
        currentAttackHitSize = options.hitSize;
        currentAttackStage = options.stage;
        hitEnemiesThisSwing = new Set();

        const startTime = performance.now();

        function animateSwing(now) {
          const elapsed = now - startTime;
          currentSwingProgress = Math.min(elapsed / options.duration, 1);

          checkAttackHit();

          if (currentSwingProgress < 1) {
            requestAnimationFrame(animateSwing);
          } else {
            attackActive = false;
            heroTurnPause = TURN_PAUSE_TICKS;   // 攻撃後もターン休止
            resolve();
          }
        }

        requestAnimationFrame(animateSwing);
      });
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function dashPlayerBy(dx, dy, duration) {
      const startX = playerX;
      const startY = playerY;
      const startTime = performance.now();

      return new Promise((resolve) => {
        function step(now) {
          const t = Math.min((now - startTime) / duration, 1);
          // 目標位置との差分を tryMove で進める(壁衝突時はそこで止まる)
          const targetX = startX + dx * t;
          const targetY = startY + dy * t;
          tryMoveX(targetX - playerX);
          tryMoveY(targetY - playerY);
          clampPlayerToMap();
          updatePositions();

          if (t < 1) {
            requestAnimationFrame(step);
          } else {
            resolve();
          }
        }
        requestAnimationFrame(step);
      });
    }

    async function startCounterCombo(enemyIndex) {
      if (counterActive || gameOver) return;

      cancelTimedInvincibility();

      counterActive = true;
      counterInvincible = true;
      counterVisualActive = true;
      invincible = true;
      isGuarding = false;
      targetX = null;
      targetY = null;

      playerKnockbackVX = 0;
      playerKnockbackVY = 0;
      playerHitStun = 0;

      applyNormalPlayerVisual();
      updatePositions();

      if (counterResetTimer) {
        clearTimeout(counterResetTimer);
        counterResetTimer = null;
      }

      try {
        let target = enemyIndex;
        if (target < 0 || !enemies[target].alive) {
          target = getNearestAliveEnemy();
        }

        if (target === -1) {
          await wait(120);
          return;
        }

        const angle = getAngleToEnemy(target);
        const backDistance = 44;
        const dashDistance = 56;

        updateInfo("ガード成功！ 体勢を崩して反撃準備！");
        await dashPlayerBy(-Math.cos(angle) * backDistance, -Math.sin(angle) * backDistance, 90);

        updateInfo("青く発光…！");
        await wait(110);

        updateInfo("ダッシュ斬り！");
        await dashPlayerBy(Math.cos(angle) * dashDistance, Math.sin(angle) * dashDistance, 95);

        await runSwing(angle, {
          stage: 1,
          duration: 230,
          radius: 72,
          hitSize: 50
        });
      } finally {
        counterResetTimer = setTimeout(() => {
          clearCounterState();
        }, 80);
      }
    }

    function damagePlayer(enemy, enemyIndex) {
      if (gameOver) return;
      if (encounterActive) return;  // 観戦フェーズ中はダイス側に任せる
      if (counterActive || counterInvincible) return;
      if (invincible || guardInvincible) return;

      if (isGuarding && isGuardFacingEnemy(enemy)) {
        showGuardEffect();
        updateInfo("正面ガード成功！ カキン！");
        startCounterCombo(enemyIndex);
        return;
      }

      const armor = getCurrentArmor();

      if (Math.random() < armor.blockChance) {
        applyPlayerKnockbackFromEnemy(enemy, true, 1, 1);
        updateInfo(armor.name + " がダメージを防いだ！ カキン！");
        showGuardEffect();
        startTimedInvincibility(guardInvincibleDuration, true);
        return;
      }

      hp -= 1;
      applyPlayerKnockbackFromEnemy(enemy, false, 2, 2);
      updateInfo("ダメージを受けた！");

      if (hp <= 0) {
        gameOver = true;
        invincible = false;
        guardInvincible = false;
        counterInvincible = false;
        counterVisualActive = false;
        stopDamageBlink();
        player.style.opacity = "1";
        player.style.filter = "none";
        updateInfo("ゲームオーバー！更新でやり直し");
        return;
      }

      // ノックバック廃止に伴い、密着継続でも連続被弾しないよう i-frame を固定化
      startDamageBlinkInvincibility(600);
    }

    function checkPlayerCollision() {
      if (gameOver || counterActive) return;
      if (encounterActive) return;  // 観戦フェーズ中はダイス側に任せる

      const playerHitbox = getPlayerHitbox();

      for (let i = 0; i < enemies.length; i++) {
        if (!enemies[i].alive) continue;
        // 攻撃モーション持ちタイプは接触ダメージなし(モーション中のヒットフレームでのみ判定)
        // 攻撃モーション持ちタイプは接触ダメージなし
        if (enemies[i].def && enemies[i].def.hasAttackAnim) continue;

        const enemyHitbox = getEnemyHitbox(enemies[i]);
        if (isOverlapping(playerHitbox, enemyHitbox)) {
          damagePlayer(enemies[i], i);
          break;
        }
      }
    }

    function openChestAt(worldX, worldY) {

        if (enemy.weaponVisible &&

          updatePositions();

        if (enemy.armorVisible &&
            worldX >= enemy.armorX && worldX <= enemy.armorX + 36 &&
            worldY >= enemy.armorY && worldY <= enemy.armorY + 30) {

          updateInfo(`宝箱を開けた！\n『${newA.name}』を手に入れた！\n${newA.flavor}`);

    async function showAttack() {
      if (!gameStarted || gameOver || attackActive || isGuarding || counterActive) return;

      targetX = null;
      targetY = null;

      const center = getPlayerCenter();
      const angle = Math.atan2(mouseY - center.y, mouseX - center.x);

    function moveTowardTarget() {
      if (targetX === null || targetY === null) return;
      if (playerHitStun > 0 || gameOver || counterActive) return;

      const playerCenterX = playerX + playerWidth / 2;
      // ヒットボックス中心Y (34-82 → 58)。スプライト中心(+48)だと1幅廊下で10px壁にめり込み停止する
      const playerCenterY = playerY + 58;
      const dx = targetX - playerCenterX;
      const dy = targetY - playerCenterY;
      const distance = Math.hypot(dx, dy);
      const speed = isGuarding ? guardMoveSpeed : mouseMoveSpeed;

      if (distance < speed + 2) {
        targetX = null;
        targetY = null;
        return;
      }

      // 4方向のみ: 差が大きい軸を優先。ブロックされたらもう一方の軸を試す
      const preX = playerX, preY = playerY;
      if (Math.abs(dx) >= Math.abs(dy)) {
        tryMoveX(Math.sign(dx) * speed);
        if (playerX === preX && dy !== 0) tryMoveY(Math.sign(dy) * speed);
      } else {
        tryMoveY(Math.sign(dy) * speed);
        if (playerY === preY && dx !== 0) tryMoveX(Math.sign(dx) * speed);
      }

      // 右向きのみ運用: 水平移動した時だけ facing を更新、上下のみは維持
      if (!isGuarding) {
        const movedDx = playerX - preX;
        if (movedDx > 0.01) facing = "right";
        else if (movedDx < -0.01) facing = "left";
      }

      clampPlayerToMap();
    }

    function updatePlayerKnockback() {
      if (playerHitStun > 0) {
        const newX = playerX + playerKnockbackVX;
        const newY = playerY + playerKnockbackVY;
        if (!wouldOverlapWall(newX+28, playerY+34, newX+68, playerY+82)) playerX = newX;
