        flashAction(enemyElements[idx], "skill");
        await sleepMs(700);
      } else {
        flashAction(enemyElements[idx], "attack");
      }

      // 激怒フェーズ: 攻撃ボーナス +2 (防御フェーズ=煙幕は攻撃強化なし)
      const offensiveRage = (enemy.phase === 1) && !def.ragePhaseDefensive;
      const phaseAtkBonus = offensiveRage ? 2 : 0;
      const phaseDmgBonus = offensiveRage ? 2 : 0;

      const natD20  = d20();
      const smokePen = (enemy.atkPenaltyRemaining > 0) ? (enemy.atkPenaltyAmount || 0) : 0;  // 盗賊 煙幕
      const atkBonus = (def.atkBonus || 0) + phaseAtkBonus - smokePen;
      const atkTotal = natD20 + atkBonus;
      const isFumble = natD20 === 1;
      const isThreat = natD20 >= (def.critRange || 20) && !isFumble;
      const leaderAc = currentPlayerAc();  // シールド等の AC バフを反映
      const atkText =
        `1d20(<b>${natD20}</b>)${signedDD(atkBonus)} = ` +
        `<span class="big">${atkTotal}</span><br>vs AC ${leaderAc}`;

      if (isFumble) {
        showRollAtEnemy(idx,
          `<span class="label">FUMBLE!</span>1d20(<b>1</b>)${signedDD(atkBonus)}`,
          "fumble");
        updateInfo(`${def.name}: ファンブル!`);
        await sleepMs(1000);
        if (autoGuardActive) isGuarding = false;
        return;
      }

      const hit = isThreat || atkTotal >= leaderAc;
      let isCrit = false;

      if (!hit) {
        showRollAtEnemy(idx, `<span class="label">MISS</span>${atkText}`, "miss");
        updateInfo(`${def.name}: ${atkTotal} vs AC${leaderAc} → ミス`);
        await playEnemyAttackVisual(idx, playerX + 48, playerY + 58);
        if (autoGuardActive) isGuarding = false;
        return;
      }

      if (isThreat) {
        showRollAtEnemy(idx,
          `<span class="label">CRIT THREAT!</span>1d20(<b>${natD20}</b>)${signedDD(atkBonus)}`,
          "crit");
        await sleepMs(650);
        const cn = d20(), ct = cn + atkBonus;
        if (ct >= leaderAc) {
          isCrit = true;
          showRollAtEnemy(idx,
            `<span class="label">CRIT CONFIRMED x${def.critMult || 2}</span>` +
            `確認: 1d20(${cn})${signedDD(atkBonus)} = <span class="big">${ct}</span>`,
            "crit");
          updateInfo(`${def.name} の一撃! ×${def.critMult || 2}`);
        } else {
          showRollAtEnemy(idx,
            `<span class="label">CRIT FAILED</span>確認 ${ct} → 通常命中`, "hit");
        }
      } else {
        showRollAtEnemy(idx, `<span class="label">HIT</span>${atkText}`, "hit");
      }
      await sleepMs(550);

      await playEnemyAttackVisual(idx, playerX + 48, playerY + 58);

      // ── Phase 2-G: アクセサリー回避判定 (PC リーダー限定) ──
      // 全攻撃 5% + 矢攻撃なら追加 50%。発動時は PC 残像を出してダメージなしで終了。
      // DEBUG: window.__evadeAlways / __evadeArrowsOnly で確定回避モード (装備時のみ)
      {
        const isArrow = def.projectile === "arrow";
        let avoidance = getTotalAvoidance("all");
        if (isArrow) avoidance += getTotalAvoidance("arrow");
        const forceEvade = avoidance > 0 && (
          window.__evadeAlways ||
          (window.__evadeArrowsOnly && isArrow)
        );
        if (forceEvade || (avoidance > 0 && Math.random() < avoidance)) {
          spawnPlayerDisplaceAfterimage();
          const evadeLabel = isArrow ? "矢をかわした!" : "攻撃を逸らした!";
          showRollAtPlayer(`<span class="label">EVADE!</span>${evadeLabel}`, "hit");
          updateInfo(`${def.name} の攻撃を残影でかわした! (${evadeLabel})`);
          if (autoGuardActive) isGuarding = false;
          await sleepMs(420);
          return;
        }
      }

      // ダメージロール
      // smash は「ダイス数を2倍」の固定強攻撃 (crit とは排他にしてバランス保つ)
      const { n, sides } = parseDiceDD(def.dmgDice || "1d4");
      const critMult = def.critMult || 2;
      const effectiveDmgBonus = (def.dmgBonus || 0) + phaseDmgBonus;
      let allRolls = [];
      let bonusTotal;
      if (bossAction === "smash") {
        // 2倍ダイス、クリット無効
        const r = rollDiceDD(n * 2, sides);
        allRolls = r.rolls;
        bonusTotal = effectiveDmgBonus;
        isCrit = false;  // crit 演出を再表示しないためフラグリセット
      } else {
        const times = isCrit ? critMult : 1;
        for (let i = 0; i < times; i++) {
          allRolls = allRolls.concat(rollDiceDD(n, sides).rolls);
        }
        bonusTotal = effectiveDmgBonus * times;
      }
      const rawDmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + bonusTotal);

      // AIオートガード軽減: -1d4 (最低1ダメは通す)
      let autoGuardReduction = 0;
      if (autoGuardActive) {
        const gr = rollDiceDD(1, 4);
        autoGuardReduction = Math.min(gr.total, rawDmg - 1);
        showBuffPop(`<span class="label">AUTO-GUARD!</span>-${autoGuardReduction} (1d4[${gr.rolls.join("+")}])`);
      }

      // 鉄壁の構え: ダメージ軽減バフが乗っていれば減算
      const dr = applyDmgReductionToPlayerDmg(rawDmg - autoGuardReduction);
      let dmg = dr.final;

      // 盗賊 回避: 被ダメージを半減 (最低1)
      if (playerBuffs.evasionRemaining > 0) {
        const before = dmg;
        dmg = Math.max(1, Math.floor(dmg / 2));
        if (before !== dmg) showBuffPop(`<span class="label">EVASION!</span>被ダメ半減 -${before - dmg}`);
      }

      // 不屈 (resilient) チェック: この一撃で HP が 0 以下になるなら、1d4 HP で踏みとどまる (1戦1回)
      const wouldBeLethal = (hp - dmg) <= 0;
      const hasResilient = equippedSkills.includes("resilient");
      const resilientTriggers = hasResilient && !playerBuffs.resilientFired && wouldBeLethal && dmg > 0;

      const rollText = allRolls.join("+");
      const drText = dr.reduction > 0
        ? ` / 軽減 -${dr.reduction}(${playerBuffs.dmgReductionDice}[${dr.rolls.join("+")}])`
        : "";

      if (resilientTriggers) {
        playerBuffs.resilientFired = true;
        const sRoll = rollDiceDD(1, 4);
        const survivalHp = sRoll.total;
        // ダメージは見た目通り表示しつつ、HP を survivalHp に固定
        showDmgAt(playerX + 48, playerY, dmg, isCrit);
        hp = survivalHp;
        showBuffPop(
          `<span class="label">不屈!</span>致命傷を 1d4(<span class="big">${survivalHp}</span>) HP で耐える`
        );
        updateInfo(`不屈発動! 致命傷を ${survivalHp}/${maxHp} HP で耐えた`);
      } else {
        hp -= dmg;
        if (hp < 0) hp = 0;
        showDmgAt(playerX + 48, playerY, dmg, isCrit);
        const dmgLabel = (bossAction === "smash") ? "×SMASH" : (isCrit ? "×" + critMult : "");
        updateInfo(`${getLeaderName()}に ${dmg} ダメージ! ` +
          `(${def.dmgDice}${dmgLabel}[${rollText}]${signedDD(bonusTotal)}${drText}) HP ${hp}/${maxHp}`);
        if (dr.reduction > 0) {
          showBuffPop(`<span class="label">鉄壁 DR</span>-${dr.reduction}`);
        }
      }
      await sleepMs(500);

      if (hp <= 0) {
        if (onHeadDowned("battle")) {
          // 頭=NPC → 委譲成功。見た目リセットして戦闘継続
          invincible = false; guardInvincible = false; counterInvincible = false; counterVisualActive = false;
          stopDamageBlink();
          return;
        }
        gameOver = true;
        invincible = false;
        guardInvincible = false;
        counterInvincible = false;
        counterVisualActive = false;
        stopDamageBlink();
        player.style.opacity = "1";
        player.style.filter = "none";
        updateInfo(isPartyWiped() ? "パーティは全滅した… ゲームオーバー(更新でやり直し)" : "あなたは倒れた… ゲームオーバー(更新でやり直し)");
        return;
      }

      // カウンター: 被弾後の自動反撃 (生存 & ダメージ>0 & 敵生存 & 近接 & 50%)
      if (shouldCounter(equippedSkills.includes("counter"), dmg, idx, playerX + 48, playerY + 58)) {
        await sleepMs(200);
        await performCounter(idx);
      }

      // オートガード解除 (次のターン用にリセット)
      if (autoGuardActive) isGuarding = false;
      }   // ← resolveOneBite 終端

      // 頭数ぶん噛撃 (multiHead 以外は 1 回 = 従来挙動と同一)。死のスパイラル上限は maxHeadsCap で有界。
      const biteCount = def.multiHead ? Math.max(1, enemy.hydraHeads || 1) : 1;
      for (let b = 0; b < biteCount; b++) {
        if (gameOver || hp <= 0 || !enemy.alive) break;
        await resolveOneBite();
        if (b === 0) bossAction = "normal";          // smash (沼の引き込み) は初撃のみ
        if (b < biteCount - 1) await sleepMs(260);    // 連続噛撃のテンポ
      }
    }

    // 敵が仲間キャラを攻撃する (DR/回避/不屈/ドワーフの意地/カウンター 対応)
    async function enemyAttackAllyTarget(enemyIdx, allyIdx, bossAction) {
      const enemy = enemies[enemyIdx];
      const def = enemy.def;
      const ally = allies[allyIdx];
      if (!ally.alive) return;

      // 射程チェック
      const rangeKey = def.range || "melee";
      const rangeTiles = getRange(rangeKey).tiles;
      const eCX = enemy.x + def.displaySize / 2;
      const eCY = enemy.y + def.displaySize / 2;
      const tCX = ally.x + ally.def.displaySize / 2;
      const tCY = ally.y + ally.def.displaySize / 2;
      if (tileChebyshev(eCX, eCY, tCX, tCY) > rangeTiles) {
        await enemyAdvanceOneTile(enemyIdx, tCX, tCY);
        return;
      }

      if (bossAction === "smash") {
        showRollAtEnemy(enemyIdx,
          `<span class="label">CLUB SMASH!</span>棍棒叩きつけ → ${ally.def.name}`,
          "crit");
        updateInfo(`${def.name}: ${ally.def.name} に棍棒叩きつけ!`);
        flashAction(enemyElements[enemyIdx], "skill");
        await sleepMs(700);
      } else {
        flashAction(enemyElements[enemyIdx], "attack");
      }

      const offensiveRage2 = (enemy.phase === 1) && !def.ragePhaseDefensive;
      const phaseAtkBonus = offensiveRage2 ? 2 : 0;
      const phaseDmgBonus = offensiveRage2 ? 2 : 0;
      const natD20 = d20();
      const smokePen = (enemy.atkPenaltyRemaining > 0) ? (enemy.atkPenaltyAmount || 0) : 0;  // 盗賊 煙幕
      const atkBonus = (def.atkBonus || 0) + phaseAtkBonus - smokePen;
      const atkTotal = natD20 + atkBonus;
      const isFumble = natD20 === 1;
      const isThreat = natD20 >= (def.critRange || 20) && !isFumble;
      const allyAcEff = currentAllyAc(ally);  // シールド等の AC バフを反映
      const atkText =
        `1d20(<b>${natD20}</b>)${signedDD(atkBonus)} = ` +
        `<span class="big">${atkTotal}</span><br>vs ${ally.def.name} AC ${allyAcEff}`;

      if (isFumble) {
        showRollAtEnemy(enemyIdx,
          `<span class="label">FUMBLE!</span>1d20(<b>1</b>)`, "fumble");
        await sleepMs(900);
        return;
      }

      const hit = isThreat || atkTotal >= allyAcEff;
      let isCrit = false;
      if (!hit) {
        showRollAtEnemy(enemyIdx, `<span class="label">MISS</span>${atkText}`, "miss");
        updateInfo(`${def.name}: ${ally.def.name} に → ミス`);
        await playEnemyAttackVisual(enemyIdx, tCX, tCY);
        return;
      }
      if (isThreat) {
        const cn = d20(), ct = cn + atkBonus;
        if (ct >= allyAcEff) isCrit = true;
      }
      showRollAtEnemy(enemyIdx,
        `<span class="label">${isCrit ? "CRIT!" : "HIT"}</span>${atkText}`,
        isCrit ? "crit" : "hit");
      await sleepMs(500);
      await playEnemyAttackVisual(enemyIdx, tCX, tCY);

      // ── Phase 2-G 拡張: 仲間用アクセサリー回避判定 ──
      // 装備中の残影の首飾り等が反応。発動時は仲間の残像を出してダメージなしで終了。
      // DEBUG: window.__evadeAlways / __evadeArrowsOnly で確定回避
      {
        const isArrowA = def.projectile === "arrow";
        let avoidanceA = getTotalAvoidance("all", ally);
        if (isArrowA) avoidanceA += getTotalAvoidance("arrow", ally);
        const forceEvadeA = avoidanceA > 0 && (
          window.__evadeAlways ||
          (window.__evadeArrowsOnly && isArrowA)
        );
        if (forceEvadeA || (avoidanceA > 0 && Math.random() < avoidanceA)) {
          spawnAllyDisplaceAfterimage(ally);
          const evadeLabel = isArrowA ? "矢をかわした!" : "攻撃を逸らした!";
          if (typeof showRollAtAlly === "function") {
            showRollAtAlly(ally, `<span class="label">EVADE!</span>${evadeLabel}`, "hit");
          }
          updateInfo(`${ally.def.name} は ${def.name} の攻撃を残影でかわした! (${evadeLabel})`);
          await sleepMs(420);
          return;
        }
      }

      // ダメージロール
      const { n, sides } = parseDiceDD(def.dmgDice || "1d4");
      const critMult = def.critMult || 2;
      const effectiveDmgBonus = (def.dmgBonus || 0) + phaseDmgBonus;
      let allRolls = [];
      let bonusTotal;
      if (bossAction === "smash") {
        const r = rollDiceDD(n * 2, sides);
        allRolls = r.rolls;
        bonusTotal = effectiveDmgBonus;
        isCrit = false;
      } else {
        const times = isCrit ? critMult : 1;
        for (let i = 0; i < times; i++) allRolls = allRolls.concat(rollDiceDD(n, sides).rolls);
        bonusTotal = effectiveDmgBonus * times;
      }
      const rawDmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + bonusTotal);

      // ── ダメージ軽減 (岩肌の皮膚 = flat -3、踏ん張り = -1d4、その他バフ) ──
      let finalDmg = rawDmg;
      const drNotes = [];
      if (ally.buffs.dmgReductionFlatRemaining > 0 && ally.buffs.dmgReductionFlat > 0) {
        const flat = ally.buffs.dmgReductionFlat;
        const before = finalDmg;
        finalDmg = Math.max(1, finalDmg - flat);
        drNotes.push(`岩肌-${before - finalDmg}`);
      }
      if (ally.buffs.dmgReductionRemaining > 0 && ally.buffs.dmgReductionDice) {
        const drDice = parseDiceDD(ally.buffs.dmgReductionDice);
        const drRoll = rollDiceDD(drDice.n, drDice.sides);
        const before = finalDmg;
        finalDmg = Math.max(1, finalDmg - drRoll.total);
        drNotes.push(`踏ん張り${ally.buffs.dmgReductionDice}(${drRoll.rolls.join("+")})-${before - finalDmg}`);
      }
      // 盗賊 回避: 被ダメージを半減 (最低1)
      if (ally.buffs.evasionRemaining > 0) {
        const before = finalDmg;
        finalDmg = Math.max(1, Math.floor(finalDmg / 2));
        if (before !== finalDmg) drNotes.push(`回避-${before - finalDmg}`);
      }

      // 不屈 (resilient): この一撃で HP が 0 以下になるなら 1d4 HP で踏みとどまる (1戦1回)。
      // ※ resilient は WARRIOR_SKILLS。装備している仲間 (戦士系) のみ発動。
      if (ally.equippedSkills && ally.equippedSkills.includes("resilient")
          && !ally.buffs.resilientFired && (ally.hp - finalDmg) <= 0 && finalDmg > 0) {
        ally.buffs.resilientFired = true;
        const sRoll = rollDiceDD(1, 4);
        showDmgAt(tCX, ally.y, finalDmg, isCrit);
        ally.hp = sRoll.total;
        showRollAtAlly(ally,
          `<span class="label">不屈!</span>致命傷を 1d4(<span class="big">${sRoll.total}</span>) HP で耐える`, "crit");
        updateInfo(`${ally.def.name}: 不屈発動! 致命傷を ${sRoll.total}/${ally.maxHp} HP で耐えた`);
        await sleepMs(700);
        await checkDwarvenGritTrigger(ally);   // 耐えた後の低HPで意地が乗る場合あり
        return;
      }

      ally.hp -= finalDmg;
      if (ally.hp < 0) ally.hp = 0;
      showDmgAt(tCX, ally.y, finalDmg, isCrit);
      const drText = drNotes.length > 0 ? ` [軽減: ${drNotes.join(", ")}, 元 ${rawDmg}]` : "";
      updateInfo(`${ally.def.name} に ${finalDmg} ダメージ${drText}! HP ${ally.hp}/${ally.maxHp}`);
      await sleepMs(500);

      if (ally.hp <= 0) {
        ally.alive = false;
        updateInfo(`${ally.npcName || ally.def.name} は倒れた…`);
        if (ally.isHero) { gameOver = true; updateInfo("主人公が倒れた… ゲームオーバー(更新でやり直し)"); }
        await sleepMs(400);
      } else {
        // ドワーフの意地: HP が閾値以下まで落ちたら自動発動
        await checkDwarvenGritTrigger(ally);
        // カウンター: 被弾後の自動反撃 (ダメージ>0 & 敵生存 & 近接 & 50%)。戦士系の "counter" 装備仲間のみ
        const aCX = ally.x + ally.def.displaySize / 2;
        const aCY = ally.y + ally.def.displaySize / 2;
        if (ally.equippedSkills
            && shouldCounter(ally.equippedSkills.includes("counter"), finalDmg, enemyIdx, aCX, aCY)) {
          await sleepMs(200);
          await performAllyCounter(ally, enemyIdx);
        }
      }
    }

    // 第三勢力 (faction="beast") が他の敵を攻撃する。
    // enemyAttackAllyTarget の軽量版 (バフ/DR/激怒フェーズなど無視)。
    // 射程チェックは呼び出し側 (enemyAttackTurn) で済んでいる前提。
    async function enemyAttackEnemyTarget(beastIdx, victimIdx) {
      const beast = enemies[beastIdx];
      const def = beast.def;
      const victim = enemies[victimIdx];
      if (!victim || !victim.alive) return;
      const vDef = victim.def;
      const tCX = victim.x + vDef.displaySize / 2;
      const tCY = victim.y + vDef.displaySize / 2;

      flashAction(enemyElements[beastIdx], "attack");

      const natD20 = d20();
      const atkBonus = def.atkBonus || 0;
      const atkTotal = natD20 + atkBonus;
      const isFumble = natD20 === 1;
      const isThreat = natD20 >= (def.critRange || 20) && !isFumble;
      const targetAc = vDef.ac;
      const atkText =
        `1d20(<b>${natD20}</b>)${signedDD(atkBonus)} = ` +
        `<span class="big">${atkTotal}</span><br>vs ${vDef.name} AC ${targetAc}`;

      if (isFumble) {
        showRollAtEnemy(beastIdx,
          `<span class="label">FUMBLE!</span>${atkText}`, "fumble");
        updateInfo(`${def.name} → ${vDef.name}: ファンブル!`);
        await sleepMs(900);
        return;
      }

      const hit = isThreat || atkTotal >= targetAc;
      let isCrit = false;
      if (!hit) {
        showRollAtEnemy(beastIdx,
          `<span class="label">MISS</span>${atkText}`, "miss");
        updateInfo(`${def.name} → ${vDef.name}: ミス`);
        await playEnemyAttackVisual(beastIdx, tCX, tCY);
        return;
      }
      if (isThreat) {
        const cn = d20(), ct = cn + atkBonus;
        if (ct >= targetAc) isCrit = true;
      }
      showRollAtEnemy(beastIdx,
        `<span class="label">${isCrit ? "CRIT!" : "HIT"}</span>${atkText}`,
        isCrit ? "crit" : "hit");
      await sleepMs(450);
      await playEnemyAttackVisual(beastIdx, tCX, tCY);

      // ダメージロール (ボスフェーズ補正なし、第三勢力は素のステ)
      const { n, sides } = parseDiceDD(def.dmgDice || "1d6");
      const critMult = def.critMult || 2;
      const times = isCrit ? critMult : 1;
      let allRolls = [];
      for (let i = 0; i < times; i++) allRolls = allRolls.concat(rollDiceDD(n, sides).rolls);
      const bonusTotal = (def.dmgBonus || 0) * times;
      const dmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + bonusTotal);

      // Phase 2-A: 残影回避 — 被攻撃側が displacementChance を持つ (= 残影の獣) なら位相ずれで空振り。
      // 双方向化により盗賊→獣の攻撃もここを通る (party→獣の playerSingleAttack L10359 と対称)。
      if (tryDisplacement(victimIdx)) {
        await sleepMs(420);
        return;
      }
      victim.hp = Math.max(0, victim.hp - dmg);
      triggerEnemyDamageFlash(victimIdx);
      noteDisplacementHit(victimIdx);  // 被弾でクールダウン開始 (2秒回避停止)
      showDmgAt(tCX, victim.y, dmg, isCrit);
      updateInfo(`${def.name} → ${vDef.name}: ${dmg} ダメージ (HP ${victim.hp}/${victim.maxHp})`);
      await sleepMs(500);

      if (victim.hp <= 0) {
        defeatEnemy(victimIdx);
        await sleepMs(400);
      }
    }

    // ═══════════════════════════════════════════════════════════
    // 初期パーティー: 酒場で選んだ partyComposition (1〜4人) を反映
    // 第1段階: 戦士は強制リーダー (プレイヤー本体)、他キャラは partyComposition の登場順で allies に追加
    // 各キャラの初期位置はスタート部屋 A (row 9-18, col 2-11) 内、戦士の周囲に展開
    // ── パーティ編成ヘルパー: partySkillsMap 正規化 / NPCキャスターのデフォルト呪文配分 ──
    function normalizePartySkillsMap(map) {
      if (!map || typeof map !== "object") return {};
      const out = {};
      for (const k of Object.keys(map)) {
        const v = map[k];
        if (Array.isArray(v)) { const o = {}; for (const id of v) o[id] = (o[id] || 0) + 1; out[k] = o; }
        else if (v && typeof v === "object") out[k] = { ...v };
      }
      return out;
    }
    function defaultCasterMap(classKey, lv) {
      // NPC キャスター用デフォルト呪文配分。cleric は自動(空でOK)、mage/elf は defaultSkills の呪文を割当
      if (!isCasterClass(classKey) || (typeof isAutoSlotClass === "function" && isAutoSlotClass(classKey))) return {};
      const def = CLASS_DEFS[classKey];
      const dict = CLASS_SKILL_DICTS[classKey];
      if (!def || !dict) return {};
      const alloc = {};
      for (const id of (def.defaultSkills || [])) {
        if (dict[id] && dict[id].mpCost > 0) alloc[id] = 2;  // 上限は init*SpellSlots が自動カット
      }
      return { [classKey]: alloc };
    }

    const ALLY_INIT_POSITIONS = {
      dwarf:  { tx: 5, ty: 14 },  // 戦士の左下 (前衛タンク)
      cleric: { tx: 5, ty: 13 },  // 戦士の後ろ (回復)
      mage:   { tx: 4, ty: 13 },  // さらに後ろ (後衛魔法)
      elf:    { tx: 4, ty: 14 },  // 後衛 (弓+魔法ハイブリッド)
      rogue:  { tx: 5, ty: 12 },  // 戦士の右上 (中衛)
    };
    // ── 新パーティ編成 (Q1=B): rich な partyMembers (隊列順 [0]=頭) を読む ──
    // formation[0] = 頭(player アバター=移動の先頭=蛇の頭)、formation[1:] = allies(隊列順)
    let formation = null;
    try {
      const pmRaw = sessionStorage.getItem("dragonfighters.partyMembers");
      if (pmRaw) {
        const pm = JSON.parse(pmRaw);
        if (Array.isArray(pm) && pm.length >= 1 && pm.every(m => m && m.classKey && PARTY_ZONES[m.classKey]))
          formation = pm;
      }
    } catch (e) { /* ignore */ }
    if (!formation) {
      // 後方互換: rich が無ければ旧 partyComposition の先頭を主人公として再構築
      let heroOld = "warrior";
      try {
        const pcRaw = sessionStorage.getItem("dragonfighters.partyComposition");
        if (pcRaw) { const pc = JSON.parse(pcRaw); if (Array.isArray(pc) && pc.length && PARTY_ZONES[pc[0]]) heroOld = pc[0]; }
      } catch (e) { /* ignore */ }
      formation = orderFormation(buildParty(heroOld));
    }
    // 既存参照 (シナリオ判定など) 用に classKey 配列も維持 (隊列順 [0]=頭)
    let partyComposition = formation.map(m => m.classKey);
    const headMember = formation[0];
    heroIsHead = !!headMember.isHero;

    // ── 頭(player アバター) を formation[0] のクラスで初期化 ──
    leaderClassKey = headMember.classKey;
    leaderVariant = headMember.isHero ? 0 : (headMember.variant || 0);  // 主人公頭=正規、NPC頭=割当て変種
    applyLeaderStats(leaderClassKey);
    headDisplayName = headMember.isHero ? "あなた"
      : (headMember.name || (CLASS_DEFS[leaderClassKey] && CLASS_DEFS[leaderClassKey].name) || "戦士");
    { const lbl = document.getElementById("warriorLabel"); if (lbl) lbl.textContent = headDisplayName; }

    // 頭のレベル (主人公=永続XP由来 / NPC=ティア帯Lv)。スキルスロット算定に使用 (仲間のフォールバックも兼ねる)
    const headLevel = headMember.isHero
      ? ((typeof getLevelFromXP === "function") ? getLevelFromXP(currentTotalXp || 0) : 1)
      : ((typeof headMember.level === "number" && headMember.level > 0) ? headMember.level : 1);
    // 頭のスキルスロット数: マーシャル職は Lv 連動 (Lv1=1→Lv10=5)、キャスターは呪文ローテ枠として従来通り 3
    const headSkillSlots = ["warrior", "dwarf", "rogue"].includes(leaderClassKey)
      ? skillSlotsForLevel(headLevel) : 3;

    // 頭の呪文スロット: 主人公頭=酒場カスタム(永続Lv)、NPC頭=ティア帯Lvでデフォルト配分
    if (typeof initLeaderSpellSlots === "function") {
      const playerLvHead = (typeof getLevelFromXP === "function") ? getLevelFromXP(currentTotalXp || 0) : 1;
      const curLvHead = headMember.isHero ? playerLvHead
        : ((typeof headMember.level === "number" && headMember.level > 0) ? headMember.level : playerLvHead);
      const headMap = headMember.isHero ? normalizePartySkillsMap(partySkillsMap)
                                        : defaultCasterMap(leaderClassKey, curLvHead);
      initLeaderSpellSlots(leaderClassKey, curLvHead, headMap);
    }
    // 頭の equippedSkills: 主人公頭=酒場カスタム、NPC頭=クラスデフォルト
    if (headMember.isHero && partySkillsMap && Array.isArray(partySkillsMap[leaderClassKey])) {
      const dict = CLASS_SKILL_DICTS[leaderClassKey] || WARRIOR_SKILLS;
      equippedSkills = partySkillsMap[leaderClassKey].filter(id => id in dict).slice(0, headSkillSlots);
    } else {
      const def = CLASS_DEFS[leaderClassKey];
      equippedSkills = (def && def.defaultSkills) ? [...def.defaultSkills].slice(0, headSkillSlots) : equippedSkills;
    }

    // ── allies = formation[1:] を隊列順に生成 (個性情報を付与) ──
    const allyMembers = formation.slice(1);
    allyMembers.forEach((m) => {
      const pos = ALLY_INIT_POSITIONS[m.classKey] || { tx: 5, ty: 13 };
      const ally = createAlly(m.classKey, pos.tx * TILE_SIZE, pos.ty * TILE_SIZE);
      ally.isHero  = !!m.isHero;
      ally.zone    = m.zone;
      ally.npcName = m.isHero ? null : (m.name || null);
      ally.npcTrait = m.trait || null;
      ally.npcLine  = m.line || null;
      // ティア連動レベル (酒場でスタンプ済): 主人公ally=永続Lv / NPC=ティア帯Lv。未設定は null
      ally.level   = (typeof m.level === "number" && m.level > 0) ? m.level : null;
      ally.variant = m.isHero ? 0 : (m.variant || 0);  // 主人公ally=正規、NPC=割当て変種
      allies.push(ally);
    });
    heroRef = heroIsHead ? null : (allies.find(a => a.isHero) || null);

    // ロードアウト適用 (職業別プリセット方式): 主人公 ally も NPC 仲間も、酒場で
    // 設定した職業別プリセット (allyEquip[class] / partySkills[class]) を読み込む。
    // 来た NPC の職業に応じて、その職業のプリセットが自動適用される。
    // プリセット未設定の職業は applyAllyEquipment 内の tier0 / createAlly デフォルトにフォールバック。
    allies.forEach((ally, idx) => {
      applyAllyEquipment(ally, ally.classKey);   // allyEquip[class] = 酒場プリセット装備
      const raw = partySkillsMap && partySkillsMap[ally.classKey];
      if (Array.isArray(raw)) {
        const dict = CLASS_SKILL_DICTS[ally.classKey];
        // マーシャル職は Lv 連動枠、キャスターは後段 initAllySpellSlots で上書きされるため値は仮 (3)
        const lim = ["warrior", "dwarf", "rogue"].includes(ally.classKey)
          ? skillSlotsForLevel(ally.level || headLevel) : 3;
        if (dict) ally.equippedSkills = raw.filter(id => id in dict).slice(0, lim);
      }
      // raw が無ければ createAlly のデフォルトスキルのまま。呪文職の equippedSkills は initAllySpellSlots で設定。
      createAllyDom(ally, idx);
    });

    // 呪文スロット初期化 (主人公 ally=酒場カスタム、NPC caster=デフォルト配分)
    (function initAlliesSpellSlots() {
      const playerLv = (typeof getLevelFromXP === "function") ? getLevelFromXP(currentTotalXp) : 1;
      const heroMap = normalizePartySkillsMap(partySkillsMap);
      for (const ally of allies) {
        if (!isCasterClass(ally.classKey)) continue;
        // NPC caster はティア帯Lv、主人公allyは永続Lv で呪文スロットを配分
        const aLv = ally.isHero ? playerLv
          : ((typeof ally.level === "number" && ally.level > 0) ? ally.level : playerLv);
        // 職業別プリセット: 主人公 ally、または当該職に酒場プリセットがある NPC は酒場配分(heroMap)を使う。
        // mage/elf でプリセット未設定の NPC のみデフォルト配分にフォールバック (cleric は autoSlot なので影響なし)。
        const hasPreset = !!(partySkillsMap && Array.isArray(partySkillsMap[ally.classKey])
          && partySkillsMap[ally.classKey].length > 0);
        const map = (ally.isHero || hasPreset) ? heroMap : defaultCasterMap(ally.classKey, aLv);
        initAllySpellSlots(ally, ally.classKey, aLv, map);
      }
    })();

    // マーシャル職仲間 (NPC含む) の装備スキルを Lv 連動でスライス (Lv1=1→Lv10=5)。
    // キャスターは equippedSkills が呪文キー集合 (上の initAllySpellSlots で設定) のため除外。
    for (const ally of allies) {
      if (!["warrior", "dwarf", "rogue"].includes(ally.classKey)) continue;
      if (!Array.isArray(ally.equippedSkills)) continue;
      ally.equippedSkills = ally.equippedSkills.slice(0, skillSlotsForLevel(ally.level || headLevel));
    }

    // Phase 2-G 拡張: accessoryState から各キャラの装備状態を復元
    (function restoreAccessoryState() {
      if (!persistent.accessoryStateJson) return;
      try {
        const snap = JSON.parse(persistent.accessoryStateJson);
        if (snap && snap.player && Array.isArray(snap.player)) {
          currentAccessoryIndices = [
            accessoryIdxFromId(snap.player[0] || "none"),
            accessoryIdxFromId(snap.player[1] || "none"),
          ];
          if (currentAccessoryIndices[0] !== 0 &&
              currentAccessoryIndices[0] === currentAccessoryIndices[1]) {
            currentAccessoryIndices[1] = 0;
          }
        }
        if (snap && snap.allies) {
          for (const a of allies) {
            const ids = snap.allies[a.classKey];
            if (Array.isArray(ids)) {
              a.accessoryIndices = [
                accessoryIdxFromId(ids[0] || "none"),
                accessoryIdxFromId(ids[1] || "none"),
              ];
              if (a.accessoryIndices[0] !== 0 &&
                  a.accessoryIndices[0] === a.accessoryIndices[1]) {
                a.accessoryIndices[1] = 0;
              }
            }
          }
        }
      } catch (e) { /* JSON 不正は無視 */ }
    })();

    // ── レベル適用: 主人公=永続 XP 由来 Lv、NPC=酒場でスタンプしたティア帯 Lv ──
    // (XP は永続、stat はランごとに base からスタート + ここで再構築)
    // member.level 未設定(直接起動/旧storage)時は従来どおり全員 currentLv にフォールバック。
    (function applyInitialLevels() {
      const currentLv = getLevelFromXP(currentTotalXp);
      // 頭(player)の実効 Lv をグローバルへ (サイドバー表示と一致させる)
      const headLv = (typeof headMember.level === "number" && headMember.level > 0)
        ? headMember.level : currentLv;
      leaderLevel = headLv;
      if (headLv > 1) applyLevelUpToUnit("player", leaderClassKey, 1, headLv);
      for (const a of allies) {
        if (!a.classKey) continue;
        const lv = (typeof a.level === "number" && a.level > 0) ? a.level : currentLv;
        if (lv > 1) applyLevelUpToUnit(a, a.classKey, 1, lv);
      }
    })();

    // 部屋配置の宝箱を初期化 (マップデータ利用)
    spawnRoomChests();
    // ダンジョン罠を初期化
    spawnTraps();
    // 隠された宝箱を初期化 (知覚チェックで発見)
    spawnHiddenChests();
    // 中ボス専用 BGM フラグをシナリオ開始時にリセット (シナリオ跨ぎの持ち越し防止)
    window.__inMidBoss = false;
    // 檻オブジェクト初期化 (Sce2 隠し要素) → ビーストを檻に紐付けて inactive 化
    spawnCages();
    linkCagedBeasts();
    initGuardians();   // Sce4 隠し要素: 休眠する古代王国の守護者を inactive 化
    initCaelum();      // Sce5 隠し要素: 神官の霊カエルムを inactive 化 + 聖域演出 (接近で対話)
    initHydra();       // Sce3 隠し要素: 沼の守護神ハイドラを封印 (inactive+passiveNpc、祭壇接近3択で覚醒)
    spawnDragonHoard();  // 最終シナリオ 隠し要素: ボス部屋の財宝の山 (ダミー宝箱+ミミック1個) を擬態配置
    // ═══════════════════════════════════════════════════════════
    setInterval(moveEnemies, 30);

    window.addEventListener("resize", () => {
      resizeCanvas();
      clampPlayerToMap();
      updatePositions();
    });

    // シナリオに応じてスタート画面のタイトル・フレーバーを差し替え
    document.getElementById("startTitle").textContent = currentScenario.title;
    document.getElementById("startFlavor").textContent = currentScenario.flavor || "";

    // ── クリア/敗北オーバーレイ制御 ──
    const resultOverlayEl = document.getElementById("resultOverlay");
    const resultTitleEl   = document.getElementById("resultTitle");
    const resultSubEl     = document.getElementById("resultSub");
    const resultRewardEl  = document.getElementById("resultReward");
    const resultBtnEl     = document.getElementById("resultBtn");
    let resultShown = false;
    function showResult(win) {
      if (window.__diag) window.__diag.beat("result", win);   // 自動デバッグ: 結果発火 (二重検出のためガード前)
      if (resultShown) return;
      resultShown = true;
      if (window.GameAudio) { GameAudio.stopBgm(); GameAudio.playJingle(win ? "victory" : "defeat"); }
      window.__inBossRoom = false;
      window.__inMidBoss = false;
      resultOverlayEl.classList.remove("defeat");
      // クリア/全滅時の DM ナレーション
      if (win) {
        showDMMessage("見事だ。ボスを倒し、ダンジョンは静寂を取り戻した。君たちの勝利だ。", 3200);
      } else {
        showDMMessage("…力尽きた。だが、冒険はまだ終わっていない。再び立ち上がれ。", 3200);
      }

      let reward = null;
      if (win) {
        // 勝利: このランで拾った金貨と装備を永続化
        const earnedGold = coins;
        const newTotalGold = persistent.gold + earnedGold;
        const newWeapon = currentWeaponIndex > startedWithWeaponIdx ? weapons[currentWeaponIndex] : null;
        const newArmor  = currentArmorIndex  > startedWithArmorIdx  ? armors[currentArmorIndex]   : null;

        // クリアボーナス XP
        const clearXp = (currentScenario && currentScenario.clearXp) || 0;
        if (clearXp > 0) gainXP(clearXp, "クリア報酬");

        // 持ち物 (最強所持) は出発時の値より下げない (戦士の武器が下がると
        // tavern.html 側の min(allyWeapon, inventory.weaponIdx) で仲間装備も clip されてしまう)
        const winSafeWeaponIdx = Math.max(currentWeaponIndex, startedWithWeaponIdx);
        const winSafeArmorIdx  = Math.max(currentArmorIndex,  startedWithArmorIdx);
        const winSafeShieldIdx = Math.max(currentShieldIndex, startedWithShieldIdx);
        try {
          localStorage.setItem("dragonfighters.gold",      String(newTotalGold));
          localStorage.setItem("dragonfighters.weaponIdx", String(winSafeWeaponIdx));
          localStorage.setItem("dragonfighters.armorIdx",  String(winSafeArmorIdx));
          localStorage.setItem("dragonfighters.shieldIdx", String(winSafeShieldIdx));
          localStorage.setItem("dragonfighters.xp",        String(currentTotalXp));
          // 装備選択も同様に保護 (拾った上位装備があれば反映、ランで下がっても出発時を維持)
          localStorage.setItem("dragonfighters.equipWeaponIdx", String(winSafeWeaponIdx));
          localStorage.setItem("dragonfighters.equipArmorIdx",  String(winSafeArmorIdx));
          localStorage.setItem("dragonfighters.equipShieldIdx", String(winSafeShieldIdx));
          // Phase 2-G: アクセサリー所持リストと装備中スロット (リーダー)
          localStorage.setItem("dragonfighters.accessoryIds",
            JSON.stringify(persistent.accessoryIds || []));
          localStorage.setItem("dragonfighters.equipAccessory1",
            (accessories[currentAccessoryIndices[0]] || accessories[0]).id);
          localStorage.setItem("dragonfighters.equipAccessory2",
            (accessories[currentAccessoryIndices[1]] || accessories[0]).id);
          // Phase 2-G 拡張: 全キャラの装備状態を JSON で保存
          if (typeof savePersistentAccessoryStock === "function") {
            savePersistentAccessoryStock();
          }
          // Phase 2-H: 道具袋 + アクセサリー在庫
          if (typeof saveInventoryBag === "function") saveInventoryBag();
          if (typeof recomputeAccessoryStock === "function") recomputeAccessoryStock();
        } catch (e) { /* localStorage 失敗は無視 */ }

        reward = {
          gold: earnedGold,
          totalGold: newTotalGold,
          newWeapon: newWeapon ? newWeapon.name : null,
          newArmor:  newArmor  ? newArmor.name  : null,
          earnedXp: earnedXpThisRun,
          totalXp:  currentTotalXp,
          level:    getLevelFromXP(currentTotalXp),
        };

        resultTitleEl.textContent = "VICTORY";
        resultSubEl.textContent = `「${currentScenario.title}」を達成！`;
        let html = `金貨 <b>+${earnedGold}</b> 獲得 (累計 <b>${newTotalGold}</b>)`;
        if (earnedXpThisRun > 0) {
          const lv = getLevelFromXP(currentTotalXp);
          const next = getNextLevelXP(currentTotalXp);
          html += `<br>XP <b>+${earnedXpThisRun}</b> (累計 ${currentTotalXp}/${next}) ・ Lv <b>${lv}</b>`;
        }
        if (newWeapon) html += `<br>新装備: <b>${newWeapon.name}</b>`;
        if (newArmor)  html += `<br>新装備: <b>${newArmor.name}</b>`;
        if (currentScenario.clearReward) {
          html += `<br>📜 入手: <b>${currentScenario.clearReward}</b>`;
        }
        resultRewardEl.innerHTML = html;
      } else {
        // 敗北: このランで拾った物は失われる(永続データは既存のまま)
        resultOverlayEl.classList.add("defeat");
        resultTitleEl.textContent = "DEFEAT";
        resultSubEl.textContent = `「${currentScenario.title}」に力尽きた…`;
        resultRewardEl.innerHTML = "<i>このランで拾った装備と金貨は失われた</i>";
      }
      resultOverlayEl.classList.add("show");

      // 酒場に返すリザルト情報を書き込む
      sessionStorage.setItem("dragonfighters.lastResult", JSON.stringify({
        scenarioId,
        scenarioTitle: currentScenario.title,
        cleared: !!win,
        defeated: !win,
        reward,
      }));
    }
    resultBtnEl.addEventListener("click", () => {
      window.location.href = "tavern.html";
    });

    // ── 撤退機能 (探索中のみ・ペナルティなしで酒場へ戻る) ──
    const retreatBtnEl = document.getElementById("retreatBtn");
    let retreatInProgress = false;
    if (retreatBtnEl) {
      retreatBtnEl.addEventListener("click", async () => {
        if (retreatInProgress) return;
        if (encounterActive || encounterRunning) return;
        if (gameOver || dungeonCleared) return;
        if (!gameStarted) return;
        retreatInProgress = true;
        retreatBtnEl.disabled = true;
        sfx("button");
        showBanner("…やむなし。君たちは撤退を選んだ。", 2000);
        updateInfo("撤退する…");
        await sleepMs(2100);
        showBanner("生きて戻ることもまた勇気。傷を癒し、再び挑め。", 2000);
        await sleepMs(2100);
        // 撤退はペナルティなし: このランで拾った金貨/装備/XP を永続化
        // (勝利時 L11559-11565 と同等。ただし clearXp ボーナスは未付与)
        const retreatTotalGold = persistent.gold + coins;
        // 持ち物 (最強所持) は出発時の値より下げない (撤退中に装備が下がる事故防止)
        const safeWeaponIdx = Math.max(currentWeaponIndex, startedWithWeaponIdx);
        const safeArmorIdx  = Math.max(currentArmorIndex,  startedWithArmorIdx);
        const safeShieldIdx = Math.max(currentShieldIndex, startedWithShieldIdx);
        try {
          localStorage.setItem("dragonfighters.gold",      String(retreatTotalGold));
          localStorage.setItem("dragonfighters.weaponIdx", String(safeWeaponIdx));
          localStorage.setItem("dragonfighters.armorIdx",  String(safeArmorIdx));
          localStorage.setItem("dragonfighters.shieldIdx", String(safeShieldIdx));
          localStorage.setItem("dragonfighters.xp",        String(currentTotalXp));
          // 装備選択は「出発時より下がらない」を保証しつつ、ランで拾った装備があれば反映
          localStorage.setItem("dragonfighters.equipWeaponIdx", String(safeWeaponIdx));
          localStorage.setItem("dragonfighters.equipArmorIdx",  String(safeArmorIdx));
          localStorage.setItem("dragonfighters.equipShieldIdx", String(safeShieldIdx));
          // Phase 2-G/H: アクセサリー状態 + 道具袋 + 在庫
          if (typeof savePersistentAccessoryStock === "function") savePersistentAccessoryStock();
          if (typeof saveInventoryBag === "function") saveInventoryBag();
          if (typeof recomputeAccessoryStock === "function") recomputeAccessoryStock();
        } catch (e) { /* localStorage 失敗は無視 */ }
        sessionStorage.setItem("dragonfighters.lastResult", JSON.stringify({
          scenarioId,
          scenarioTitle: currentScenario.title,
          cleared: false,
          defeated: false,
          retreated: true,
          reward: {
            gold: coins,
            totalGold: retreatTotalGold,
            earnedXp: earnedXpThisRun,
            totalXp:  currentTotalXp,
          },
        }));
        window.location.href = "tavern.html";
      });
    }
    // 戦闘中・リザルト表示中・未開始はボタンをグレーアウト
    function updateRetreatBtnState() {
      if (!retreatBtnEl) return;
      const blocked = !gameStarted || gameOver || dungeonCleared
        || encounterActive || encounterRunning
        || retreatInProgress;
      retreatBtnEl.disabled = blocked;
    }
    setInterval(updateRetreatBtnState, 250);
    updateRetreatBtnState();

    // dungeonCleared / gameOver を監視してオーバーレイ表示
    setInterval(() => {
      if (resultShown) return;
      if (dungeonCleared) setTimeout(() => showResult(true), 500);
      else if (gameOver)  showResult(false);
    }, 300);

    updateInfo("キーかマウスを押すとスタート");
    updatePositions();

    // ─── Phase 2-K: autoplay 時のスタート画面に [AUTOPLAY xN] ラベルを追加 ───
    if (window.__autoplay) {
      try {
        const startTextEl = document.getElementById("startText");
        if (startTextEl) {
          const lab = document.createElement("div");
          lab.style.cssText = "color:#ff8060;font-size:13px;letter-spacing:2px;margin-top:8px;font-weight:700;";
          lab.textContent = `[AUTOPLAY x${window.__autoplay}]`;
          startTextEl.appendChild(lab);
        }
      } catch (e) {}
    }

    // ═════════════════════════════════════════════════════════
    // 自動デバッグ: 不変条件ウォッチドッグ + 巡回キャンペーン制御
    //   - 有効化: ?autoplay / ?autodebug / ?diag=1 のいずれか (通常プレイは休眠)
    //   - 検査 4 カテゴリ: 致命系 / 状態整合性 / ライフサイクル / 進行バランス
    //   - レポート: localStorage["dragonfighters.debugReport"] + 画面パネル + console
    //   - 巡回: ?autodebug=N で N ラン自動リスタート + 全6シナリオ巡回
    // ═════════════════════════════════════════════════════════
    (function setupDiagnostics() {
      if (!window.__diagEnabled) return;   // 通常プレイでは完全休眠 (オーバーヘッド0)

      const REPORT_KEY = "dragonfighters.debugReport";
      const CAMPAIGN_KEY = "dragonfighters.debugCampaign";
      const nowMs = () => (typeof performance !== "undefined" && performance.now) ? performance.now() : Date.now();
      const isoNow = () => { try { return new Date().toISOString(); } catch (e) { return "" + Date.now(); } };
      const finite = (x) => typeof x === "number" && Number.isFinite(x);

      // ── レポートストア (localStorage に蓄積、ページ遷移を跨ぐ) ──
      function loadReport() {
        try {
          const r = JSON.parse(localStorage.getItem(REPORT_KEY) || "null");
          if (r && r.runs) return r;
        } catch (e) {}
        return { startedAt: isoNow(), lastUpdated: isoNow(), campaign: null,
                 current: null, runs: [], totals: { criticals: 0, warns: 0, byId: {} } };
      }
      let report = loadReport();
      let saveQueued = false;
      function saveReport() {
        // 高頻度の record でも書き込みは間引く (体感負荷回避)
        if (saveQueued) return;
        saveQueued = true;
        setTimeout(() => {
          saveQueued = false;
          report.lastUpdated = isoNow();
          try { localStorage.setItem(REPORT_KEY, JSON.stringify(report)); } catch (e) {}
        }, 250);
      }

      // ── 現在ランの初期化 ──
      const campaign = window.__autodebug || null;
      report.campaign = campaign ? {
        total: campaign.total, done: campaign.done,
        cycle: campaign.cycle, cycleIdx: campaign.done % campaign.cycle.length, speed: campaign.speed
      } : null;
      report.current = {
        idx: campaign ? campaign.done : report.runs.length,
        scenarioId: (typeof scenarioId !== "undefined" ? scenarioId : "?"),
        startedAt: isoNow(), startMs: nowMs(), rounds: 0, violations: {},
      };
      saveReport();

      // ── 違反記録 (id 単位で dedup: 同一異常は count に集約) ──
      function record(id, severity, label, detail) {
        const cur = report.current;
        if (!cur) return;
        let v = cur.violations[id];
        if (!v) {
          v = { sev: severity, label: label || id, count: 0, firstTs: isoNow(), lastTs: isoNow(), detail: detail || null };
          cur.violations[id] = v;
          if (severity === "critical") {
            report.totals.criticals++;
            console.error("[DIAG][" + id + "]", label, detail || "");
            if (typeof window.__bugBanner === "function") window.__bugBanner("異常検出: " + (label || id));
          } else {
            report.totals.warns++;
            console.warn("[DIAG][" + id + "]", label, detail || "");
          }
        }
        v.count++; v.lastTs = isoNow();
        if (detail) v.detail = detail;
        report.totals.byId[id] = (report.totals.byId[id] || 0) + 1;
        saveReport();
      }

      // ── ビート (進行情報の明示通知。sampling で取れないものだけ) ──
      const beats = {
        lastTick: nowMs(), everStarted: false,
        combatActive: false, combatStartMs: 0, lastRound: 0, lastRoundMs: nowMs(),
        resultCount: 0, hpStillCount: 0, lastHpSig: null,
        posStill: 0, lastPosKey: null,
      };
      function beat(kind, val) {
        const t = nowMs();
        if (kind === "tick") {
          const gap = t - beats.lastTick;
          beats.lastTick = t;
          if (beats.everStarted && gap > 600) {
            record("frame-lag", "warn", "フレーム落ち (tick間隔 " + Math.round(gap) + "ms)", { gapMs: Math.round(gap) });
          }
          beats.everStarted = true;
        } else if (kind === "combat") {
          beats.combatActive = !!val;
          if (val) { beats.combatStartMs = t; beats.lastRound = 0; beats.lastRoundMs = t; beats.hpStillCount = 0; beats.lastHpSig = null; }
        } else if (kind === "round") {
          beats.lastRound = val; beats.lastRoundMs = t;
          if (report.current && val > report.current.rounds) report.current.rounds = val;
          if (val > 25) record("combat-long", "warn", "戦闘が長い (" + val + " ラウンド)",
            { round: val, scen: report.current && report.current.scenarioId });
        } else if (kind === "result") {
          beats.resultCount++;
          if (beats.resultCount > 1) record("result-double-fire", "critical",
            "結果画面が複数回発火 (" + beats.resultCount + ")", { count: beats.resultCount });
        }
      }

      window.__diag = { record, beat, getReport: () => report };
      // js-error は既存エラートラップ経由でミラーされる (record 経由)
      window.dumpDebugReport = function () { try { console.table(report.totals.byId); } catch (e) {} return report; };
      window.clearDebugReport = function () {
        try { localStorage.removeItem(REPORT_KEY); } catch (e) {}
        report = loadReport(); console.log("[DIAG] debugReport cleared");
      };

      // ── 検査本体 ──
      const sampleState = {};
      let lastXp = (typeof currentTotalXp !== "undefined" && finite(currentTotalXp)) ? currentTotalXp : 0;
      let lastCoins = (typeof coins !== "undefined" && finite(coins)) ? coins : 0;
      let domPeak = 0;

      function inBounds(x, y) {
        const T = (typeof TILE_SIZE !== "undefined") ? TILE_SIZE : 96;
        const W = ((typeof MAP_W !== "undefined") ? MAP_W : 95) * T;
        const H = ((typeof MAP_H !== "undefined") ? MAP_H : 28) * T;
        return x >= -T && x <= W + T && y >= -T && y <= H + T;
      }
      // cond が連続 k 回成立で true (連続値のゆらぎ誤検知を抑制)
      function sustained(key, cond, k) {
        if (cond) sampleState[key] = (sampleState[key] || 0) + 1;
        else sampleState[key] = 0;
        return (sampleState[key] || 0) >= k;
      }

      function runChecks() {
        report.heartbeat = nowMs();   // 生存ビート (違反ゼロでも進む。外部ランナーの凍結検出用)
        if (typeof gameStarted === "undefined" || !gameStarted) return;
        if (!report.current) return;
        const spatialStable = !((typeof heroSliding !== "undefined" && heroSliding) ||
                                (typeof attackActive !== "undefined" && attackActive));

        // ── 状態整合性: リーダー ──
        if (!finite(hp) || !finite(maxHp)) record("nan-leader-hp", "critical", "リーダーHPが数値破綻", { hp: hp, maxHp: maxHp });
        if (!finite(playerX) || !finite(playerY)) record("nan-leader-pos", "critical", "リーダー座標が数値破綻", { playerX: playerX, playerY: playerY });
        if (finite(hp) && finite(maxHp) && sustained("leader-hp-over", hp > maxHp + 1, 2))
          record("leader-hp-over", "warn", "リーダーHP>maxHP", { hp: hp, maxHp: maxHp });
        if (finite(playerX) && finite(playerY) && spatialStable && sustained("leader-oob", !inBounds(playerX, playerY), 2))
          record("leader-oob", "critical", "リーダー座標がマップ範囲外", { x: Math.round(playerX), y: Math.round(playerY) });
        if (typeof currentTotalXp !== "undefined" && finite(currentTotalXp)) {
          if (currentTotalXp < lastXp) record("xp-decrease", "warn", "XPが減少", { from: lastXp, to: currentTotalXp });
          lastXp = currentTotalXp;
        }
        if (typeof coins !== "undefined" && finite(coins)) {
          if (coins < lastCoins) record("coins-decrease", "warn", "金貨が減少", { from: lastCoins, to: coins });
          lastCoins = coins;
        }

        // ── 状態整合性 + ライフサイクル: 仲間 ──
        if (typeof allies !== "undefined" && allies) {
          allies.forEach((a, i) => {
            if (!finite(a.hp) || !finite(a.maxHp)) record("nan-ally-hp", "critical", "仲間HPが数値破綻 (" + (a.classKey || i) + ")", { cls: a.classKey, hp: a.hp, maxHp: a.maxHp });
            if (!finite(a.x) || !finite(a.y)) record("nan-ally-pos", "critical", "仲間座標が数値破綻 (" + (a.classKey || i) + ")", { cls: a.classKey });
            if (a.alive && finite(a.hp) && sustained("ally-zero-" + i, a.hp <= 0, 3))
              record("ally-alive-zero-hp", "warn", "生存仲間のHPが0以下 (" + (a.classKey || i) + ")", { cls: a.classKey, hp: a.hp });
            if (finite(a.hp) && finite(a.maxHp) && sustained("ally-over-" + i, a.hp > a.maxHp + 1, 2))
              record("ally-hp-over", "warn", "仲間HP>maxHP (" + (a.classKey || i) + ")", { cls: a.classKey, hp: a.hp, maxHp: a.maxHp });
            if (a.spellSlots && a.maxSpellSlots) {
              for (const id of Object.keys(a.spellSlots)) {
                const sv = a.spellSlots[id], mx = a.maxSpellSlots[id];
                if (finite(sv) && (sv < 0 || (finite(mx) && sv > mx))) {
                  record("spellslot-range", "warn", "呪文スロット範囲外 (" + (a.classKey || i) + ":" + id + ")", { cls: a.classKey, id: id, v: sv, max: mx });
                  break;
                }
              }
            }
          });
        }

        // ── ライフサイクル + 整合性: 敵 ──
        if (typeof enemies !== "undefined" && enemies) {
          enemies.forEach((e, i) => {
            if (!finite(e.hp) || !finite(e.maxHp)) record("nan-enemy-hp", "critical", "敵HPが数値破綻 (idx " + i + ")", { type: e.type, hp: e.hp });
            if (e.__diagDead && e.alive) record("enemy-resurrect", "critical", "死亡した敵が復活 (idx " + i + ", " + (e.type || "?") + ")", { idx: i, type: e.type });
          });
        }

        // ── ライフサイクル: 全滅未検出 ──
        const wipe = finite(hp) && (typeof isPartyWiped === "function" && isPartyWiped()) &&
          !(typeof gameOver !== "undefined" && gameOver) &&
          !(typeof resultShown !== "undefined" && resultShown);
        if (sustained("wipe", wipe, 4)) record("wipe-not-detected", "critical", "全滅状態だが結果未発火 (>2秒)", { hp: hp });

        // ── 致命/進行: 戦闘無限ループ・進行なし ──
        if (typeof encounterActive !== "undefined" && encounterActive) {
          const dur = nowMs() - beats.combatStartMs;
          if (dur > 45000) record("combat-stall", "critical", "戦闘が45秒以上継続 (無限ループ疑い)",
            { durSec: Math.round(dur / 1000), round: beats.lastRound, scen: report.current.scenarioId });
          if (beats.lastRound > 0 && (nowMs() - beats.lastRoundMs) > 15000)
            record("combat-no-round", "critical", "ラウンドが15秒進行せず", { round: beats.lastRound });
          const ehp = (typeof enemies !== "undefined") ? enemies.reduce((s, e) => s + (e.alive && finite(e.hp) ? e.hp : 0), 0) : 0;
          const php = (finite(hp) ? hp : 0) + ((typeof allies !== "undefined") ? allies.reduce((s, a) => s + (a.alive && finite(a.hp) ? a.hp : 0), 0) : 0);
          const sig = ehp + "," + php;
          if (sig === beats.lastHpSig) beats.hpStillCount++;
          else { beats.hpStillCount = 0; beats.lastHpSig = sig; }
          if (beats.hpStillCount >= 24) record("combat-no-progress", "warn", "戦闘中HP総和が12秒不変 (到達不能疑い)",
            { ehp: ehp, php: php, round: beats.lastRound });
        } else {
          beats.hpStillCount = 0; beats.lastHpSig = null;
        }

        // ── 致命: 探索停滞 (旧 setupStallDetection を統合、10秒同一座標) ──
        const exploring = !(typeof encounterActive !== "undefined" && encounterActive) &&
          !(typeof encounterRunning !== "undefined" && encounterRunning) &&
          !(typeof dialogPaused !== "undefined" && dialogPaused) &&
          !(typeof gameOver !== "undefined" && gameOver) &&
          !(typeof dungeonCleared !== "undefined" && dungeonCleared);
        if (exploring && finite(playerX) && finite(playerY)) {
          const key = Math.round(playerX) + "," + Math.round(playerY);
          if (key === beats.lastPosKey) beats.posStill++;
          else { beats.posStill = 0; beats.lastPosKey = key; }
          if (beats.posStill >= 20) {   // 500ms × 20 = 10秒
            record("stall", "critical", "探索停滞: 10秒間動きなし @ (" + key + ")", {
              pos: key, round: beats.lastRound,
              hero: { pathLen: (typeof heroPath !== "undefined" && heroPath) ? heroPath.length : null },
              allies: (typeof allies !== "undefined") ? allies.map(a => ({ cls: a.classKey, alive: a.alive, hp: a.hp })) : null,
            });
            beats.posStill = 0;
          }
        } else { beats.posStill = 0; }

        // ── 進行: DOM/fx リーク ──
        try {
          const layer = document.getElementById("enemyLayer");
          const fxCount = document.querySelectorAll(".fxArrow,.fxAimLine,.actionFlash,.groundFx,.openBurst,.fxShadowPuff").length;
          const childCount = (layer ? layer.children.length : 0) + fxCount;
          if (childCount > domPeak) domPeak = childCount;
          if (sustained("dom-leak", childCount > 400, 4))
            record("dom-leak", "warn", "DOM/fx要素が過多 (" + childCount + ")", { childCount: childCount, peak: domPeak });
        } catch (e) {}
      }

      // ── ラン終了処理 + 巡回キャンペーン ──
      let runEnded = false;
      function finalizeRun(outcome) {
        if (runEnded) return;
        runEnded = true;
        const cur = report.current;
        if (cur) {
          cur.endedAt = isoNow();
          cur.durationMs = Math.round(nowMs() - cur.startMs);
          cur.outcome = outcome;
          cur.finalLeaderHp = finite(hp) ? hp : null;
          cur.partyAlive = (typeof allies !== "undefined") ? allies.filter(a => a.alive).length : null;
          report.runs.push(cur);
          report.current = null;
          report.lastUpdated = isoNow();
          try { localStorage.setItem(REPORT_KEY, JSON.stringify(report)); } catch (e) {}
        }
        console.log("[AUTODEBUG] run finalized: " + outcome + " (" + (cur && cur.scenarioId) + ", " +
          (cur ? Math.round(cur.durationMs / 1000) : "?") + "s, " + (cur ? Object.keys(cur.violations).length : 0) + " 違反種)");
      }
      function advanceCampaignAndNavigate() {
        const camp = window.__autodebug;
        if (!camp) return;   // 単発 diag → ナビゲートしない
        camp.done++;
        if (camp.done < camp.total) {
          camp.cycleIdx = camp.done % camp.cycle.length;
          try { localStorage.setItem(CAMPAIGN_KEY, JSON.stringify(camp)); } catch (e) {}
          try { sessionStorage.setItem("dragonfighters.currentScenario", camp.cycle[camp.cycleIdx]); } catch (e) {}
          console.log("[AUTODEBUG] → next run " + (camp.done + 1) + "/" + camp.total + " scen=" + camp.cycle[camp.cycleIdx]);
          setTimeout(() => { window.location.href = "index.html?autodebug=resume"; }, 1200);
        } else {
          let completedAt = ""; try { completedAt = new Date().toISOString(); } catch (e) {}
          try { localStorage.setItem(CAMPAIGN_KEY, JSON.stringify(Object.assign({}, camp, { completedAt }))); } catch (e) {}
          window.__autodebugComplete = true;
          console.log("[AUTODEBUG] ✅ 巡回完了: " + camp.total + " ラン。dumpDebugReport() で確認 / crit=" + report.totals.criticals + " warn=" + report.totals.warns);
          if (typeof window.__bugBanner === "function") window.__bugBanner("自動デバッグ巡回 完了 (" + camp.total + " ラン)");
        }
      }
      function manageCampaign() {
        if (runEnded) return;
        if (typeof resultShown !== "undefined" && resultShown) {
          const outcome = (typeof dungeonCleared !== "undefined" && dungeonCleared) ? "clear" : "defeat";
          finalizeRun(outcome);
          advanceCampaignAndNavigate();
          return;
        }
        // ハード上限 (4分) で強制 abort (凍結や詰まりで巡回が止まらないように)
        if (report.current && (nowMs() - report.current.startMs) > 240000) {
          record("run-timeout", "critical", "ランがハード上限(4分)を超過 → 強制終了", { scen: report.current.scenarioId });
          finalizeRun("aborted");
          advanceCampaignAndNavigate();
        }
      }

      // ── 画面診断パネル ──
      let panelVisible = true;
      let panel = null;
      function buildPanel() {
        panel = document.createElement("div");
        panel.id = "diagPanel";
        panel.className = "diagPanel";
        document.body.appendChild(panel);
      }
      function fmtElapsed(ms) { const s = Math.max(0, Math.floor(ms / 1000)); return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0"); }
      function updatePanel() {
        if (!panel) return;
        const cur = report.current;
        const camp = window.__autodebug;
        let head = "🐞 AUTO-DEBUG";
        if (camp && !window.__autodebugComplete) head += "  run " + (camp.done + 1) + "/" + camp.total;
        if (window.__autodebugComplete) head = "🐞 巡回完了 (" + (camp ? camp.total : 0) + " ラン)";
        const sub = [];
        if (cur) sub.push(cur.scenarioId + " · " + fmtElapsed(nowMs() - cur.startMs) + " · R" + cur.rounds);
        sub.push("crit " + report.totals.criticals + " / warn " + report.totals.warns + " · 完了 " + report.runs.length + " ラン");
        // 全ラン横断の違反集計
        const allV = {};
        const scan = report.runs.concat(cur ? [cur] : []);
        for (const r of scan) {
          for (const id of Object.keys(r.violations || {})) {
            const v = r.violations[id];
            if (!allV[id]) allV[id] = { sev: v.sev, count: 0 };
            allV[id].count += v.count;
          }
        }
        const ids = Object.keys(allV).sort((a, b) =>
          (allV[a].sev === "critical" ? 0 : 1) - (allV[b].sev === "critical" ? 0 : 1) || allV[b].count - allV[a].count);
        let body = ids.slice(0, 14).map(id => (allV[id].sev === "critical" ? "🔴 " : "🟡 ") + id + " ×" + allV[id].count).join("\n");
        if (!ids.length) body = "(異常なし)";
        panel.classList.toggle("hasCrit", report.totals.criticals > 0);
        panel.innerHTML = "<div class='diagHead'>" + head + "</div><div class='diagSub'>" +
          sub.join("<br>") + "</div><pre class='diagBody'>" + body.replace(/</g, "&lt;") + "</pre>";
        panel.style.display = panelVisible ? "block" : "none";
      }
      window.addEventListener("keydown", (e) => {
        if (e.key === "`" || e.code === "Backquote") { panelVisible = !panelVisible; updatePanel(); }
      });

      // ── 駆動 ──
      buildPanel();
      updatePanel();
      setInterval(() => { try { runChecks(); manageCampaign(); } catch (e) { console.error("[DIAG] check error", e); } }, 500);
      setInterval(() => { try { updatePanel(); } catch (e) {} }, 500);
      console.log("[DIAG] 診断有効 (autodebug=" + (!!window.__autodebug) +
        ")。dumpDebugReport()/clearDebugReport()、バッククォートでパネル開閉");
    })();

    // ── シナリオ開始時: DM ナレーションを表示してからゲーム開始 ──
    (async function initScenarioNarration() {
      const paragraphs = SCENARIO_NARRATIONS[scenarioId];
      if (!paragraphs || paragraphs.length === 0) {
        // Phase 2-K: autoplay 時はスタート画面も自動でスキップ
        if (window.__autoplay) setTimeout(() => { if (!gameStarted) startGame(); }, 300);
        return;
      }

      // タイトル画面を一旦隠し、ナレーションウィンドウを表示
      startScreen.style.display = "none";
      const narrEl = document.getElementById("dmNarration");
      const headerEl = narrEl.querySelector(".dmHeader");
      headerEl.textContent = `📜 ダンジョンマスターの語り ― ${currentScenario.title}`;
      narrEl.style.display = "block";

      // Phase 2-K: autoplay 時はナレーションを即スキップ
      if (window.__autoplay) {
        narrationSkipRequested = true;
      }

      await playNarration(paragraphs, "dungeon_intro_" + scenarioId);

      // フェードアウト
      narrEl.classList.add("fading");
      await sleepMs(650);
      narrEl.style.display = "none";

      // 探索開始
      startGame();
    })();
  </script>
</body>
</html>
