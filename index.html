    // ── 視線チェック（Bresenham） ────────────────────────────────
    const DETECTION_RANGE = 1200; // 視野距離 (world px)

    function hasLineOfSight(fromX, fromY, toX, toY) {
      let tx = Math.floor(fromX / TILE_SIZE);
      let ty = Math.floor(fromY / TILE_SIZE);
      const etx = Math.floor(toX / TILE_SIZE);
      const ety = Math.floor(toY / TILE_SIZE);
      const dx = Math.abs(etx - tx), dy = Math.abs(ety - ty);
      const sx = tx < etx ? 1 : -1, sy = ty < ety ? 1 : -1;
      let err = dx - dy;
      for (let step = 0; step < MAP_W + MAP_H; step++) {
        if (isTileWall(tx, ty)) return false;
        if (tx === etx && ty === ety) return true;
        const e2 = 2 * err;
        if (e2 > -dy) { err -= dy; tx += sx; }
        if (e2 <  dx) { err += dx; ty += sy; }
      }
      return false;
    }
    // ─────────────────────────────────────────────────────────────

    // ── A* パスファインディング ──────────────────────────────────
    // aStar: avoidTiles (Set<string> "tx,ty") に含まれるタイルは壁扱い
    //        ただしゴールタイルは常に通過可能 (接敵 / 対象隣接タイルを許可)
    // recentPenaltyMap: 任意の Map<tileKey, additionalGCost>。
    //   タイルへ「進入する」コストに加算 (heroAI のオシレーション抑制用)。
    //   key 形式は本関数内の key() = y * MAP_W + x と一致させる必要がある。
    function aStar(startTX, startTY, goalTX, goalTY, avoidTiles, recentPenaltyMap) {
      if (isTileWall(startTX, startTY) || isTileWall(goalTX, goalTY)) return null;
      if (startTX === goalTX && startTY === goalTY) return [];

      const isBlocked = (tx, ty) => {
        if (isTileWall(tx, ty)) return true;
        if (!avoidTiles) return false;
        if (tx === goalTX && ty === goalTY) return false;   // ゴールは例外
        return avoidTiles.has(tx + "," + ty);
      };

      const key = (x, y) => y * MAP_W + x;
      const startK = key(startTX, startTY);
      const goalK  = key(goalTX,  goalTY);

      const gScore   = new Map([[startK, 0]]);
      const fScore   = new Map([[startK, Math.abs(startTX - goalTX) + Math.abs(startTY - goalTY)]]);
      const cameFrom = new Map();
      const tilePos  = new Map([[startK, {tx: startTX, ty: startTY}]]);
      const openArr  = [startK];
      const inOpen   = new Set([startK]);

      while (openArr.length > 0) {
        let minIdx = 0;
        let minF   = fScore.get(openArr[0]) ?? Infinity;
        for (let i = 1; i < openArr.length; i++) {
          const f = fScore.get(openArr[i]) ?? Infinity;
          if (f < minF) { minF = f; minIdx = i; }
        }
        const curK = openArr[minIdx];
        openArr.splice(minIdx, 1);
        inOpen.delete(curK);

        if (curK === goalK) {
          const path = [];
          let k = curK;
          while (cameFrom.has(k)) { path.unshift(tilePos.get(k)); k = cameFrom.get(k); }
          return path;
        }

        const {tx: cx, ty: cy} = tilePos.get(curK);
        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = cx + dx, ny = cy + dy;
          if (isBlocked(nx, ny)) continue;
          const nk       = key(nx, ny);
          // 訪問履歴ペナルティ: 直近通ったタイルに戻る経路は重く扱う
          const movePenalty = recentPenaltyMap ? (recentPenaltyMap.get(nk) || 0) : 0;
          const tentG    = (gScore.get(curK) ?? Infinity) + 1 + movePenalty;
          if (tentG < (gScore.get(nk) ?? Infinity)) {
            cameFrom.set(nk, curK);
            gScore.set(nk, tentG);
            fScore.set(nk, tentG + Math.abs(nx - goalTX) + Math.abs(ny - goalTY));
            tilePos.set(nk, {tx: nx, ty: ny});
            if (!inOpen.has(nk)) { openArr.push(nk); inOpen.add(nk); }
          }
        }
      }
      return null;
    }

    // 現在他ユニット (プレイヤー・仲間・敵) が占有しているタイルキーの集合
    // excludeRef に渡した単位は除外 (自分は動くので避ける必要なし)
    function getUnitOccupiedTiles(excludeRef) {
      const set = new Set();
      const tileKey = (tx, ty) => tx + "," + ty;
      if (hp > 0 && !gameOver && excludeRef !== "player") {
        const tx = Math.floor((playerX + 48) / TILE_SIZE);
        const ty = Math.floor((playerY + 58) / TILE_SIZE);
        set.add(tileKey(tx, ty));
        // プレイヤーが次に向かうタイル (heroPath[0]) も予約
        if (typeof heroPath !== "undefined" && heroPath && heroPath.length > 0) {
          set.add(tileKey(heroPath[0].tx, heroPath[0].ty));
        }
      }
      if (typeof allies !== "undefined") {
        for (const a of allies) {
          if (!a.alive || a === excludeRef) continue;
          const tx = Math.floor((a.x + a.def.displaySize / 2) / TILE_SIZE);
          const ty = Math.floor((a.y + a.def.displaySize / 2) / TILE_SIZE);
          set.add(tileKey(tx, ty));
          // slide 中の移動先タイルも予約 (他ユニットの侵入を防ぐ)
          if (a.slideTargetTile) {
            set.add(tileKey(a.slideTargetTile.tx, a.slideTargetTile.ty));
          }
        }
      }
      for (const e of enemies) {
        if (!e.alive || e === excludeRef) continue;
        const tx = Math.floor((e.x + e.def.displaySize / 2) / TILE_SIZE);
        const ty = Math.floor((e.y + e.def.displaySize / 2) / TILE_SIZE);
        set.add(tileKey(tx, ty));
        // 敵の次 wp (探索追跡中) と slide target (戦闘中前進) も予約
        if (e.path && e.path.length > 0) {
          set.add(tileKey(e.path[0].tx, e.path[0].ty));
        }
        if (e.slideTargetTile) {
          set.add(tileKey(e.slideTargetTile.tx, e.slideTargetTile.ty));
        }
      }
      // 発見済み & 未発動の罠タイルも回避 (発動済みは安全、未発見は意図的に避けない)
      if (typeof traps !== "undefined") {
        for (const trap of traps) {
          if (trap.found && !trap.triggered) {
            set.add(tileKey(trap.tx, trap.ty));
          }
        }
      }
      return set;
    }
    // ────────────────────────────────────────────────────────────

    function moveEnemies() {
      if (!gameStarted || gameOver) return;

      // エンカウンター発動検出(ターン制戦闘へ移行)
      tryStartEncounter();

      enemies.forEach((enemy, index) => {
        if (!enemy.alive) return;

        if (enemy.damageFlashTimer > 0) {
          enemy.damageFlashTimer -= 1;
        }

        // 観戦フェーズ中: 交戦対象は state=attack のときだけアニメを進め、
        // 他の敵は完全凍結(意思決定・移動・攻撃判定はスキップ)
        if (encounterActive) {
          if (encounterEnemyIndices.includes(index) &&
              enemy.state === "attack" && enemy.def.hasAttackAnim) {
            enemy.attackTimer += 1;
            if (enemy.attackTimer >= enemy.def.attackDuration) {
              enemy.state = "idle";
              enemy.attackTimer = 0;
              enemy.attackHitDealt = false;
            }
          }
          clampEnemyToMap(enemy);
          return;
        }

        if (enemy.hitStun > 0) {
          const newEX = enemy.x + enemy.knockbackVX;
          const newEY = enemy.y + enemy.knockbackVY;
          if (!wouldOverlapWall(newEX+16, enemy.y+18, newEX+56, enemy.y+58)) enemy.x = newEX;
          else enemy.knockbackVX = 0;
          if (!wouldOverlapWall(enemy.x+16, newEY+18, enemy.x+56, newEY+58)) enemy.y = newEY;
          else enemy.knockbackVY = 0;
          enemy.knockbackVX *= 0.55;
          enemy.knockbackVY *= 0.55;
          enemy.hitStun -= 1;
          clampEnemyToMap(enemy);
          return;
        }

        // ── ステートマシン ────────────────────────────────────────
        const eCX = (enemy.x + enemy.def.displaySize / 2);
        const eCY = (enemy.y + enemy.def.displaySize / 2);
        const pCX = playerX + 48;
        const pCY = playerY + 48;

        if (enemy.state === "idle") {
          // 視線チェック（毎10tick = 約300ms）
          enemy.losTimer -= 1;
          if (enemy.losTimer <= 0) {
            enemy.losTimer = 10;
            if (Math.hypot(pCX - eCX, pCY - eCY) < DETECTION_RANGE &&
                hasLineOfSight(eCX, eCY, pCX, pCY)) {
              enemy.state = "alert";
              enemy.alertTimer = 16; // 約480ms 待機してから追跡
              enemy.path = [];
              enemy.pathTimer = 0;
            }
          }
          clampEnemyToMap(enemy);
          return;
        }

        if (enemy.state === "alert") {
          // 発見演出：その場で待機
          enemy.alertTimer -= 1;
          if (enemy.alertTimer <= 0) enemy.state = "chase";
          clampEnemyToMap(enemy);
          return;
        }

        const eTX = Math.floor(eCX / TILE_SIZE);
        const eTY = Math.floor(eCY / TILE_SIZE);

        // 経路上を 1 マス進む共通処理 (連続移動は廃止、ターン制 exploreEnemyTurn に委譲)
        // ここでは state 遷移判定のための呼び出しだけ受ける (no-op)
        function stepAlongPathToward(_targetTX, _targetTY) { /* no-op (turn-based) */ }

        const playerVisible =
          Math.hypot(pCX - eCX, pCY - eCY) < DETECTION_RANGE &&
          hasLineOfSight(eCX, eCY, pCX, pCY);

        // ── 攻撃モーション持ちタイプの攻撃ロジック(ENEMY_TYPES から参照) ──
        const def = enemy.def;
        if (enemy.attackCooldown > 0) enemy.attackCooldown -= 1;

        if (enemy.state === "attack" && def.hasAttackAnim) {
          enemy.attackTimer += 1;
          // ヒットフレーム時に距離判定
          if (!enemy.attackHitDealt && enemy.attackTimer >= def.attackHitFrame) {
            enemy.attackHitDealt = true;
            const distNow = Math.hypot(pCX - eCX, pCY - eCY);
            if (distNow < def.hitRange) {
              damagePlayer(enemy, index);
            }
          }
          if (enemy.attackTimer >= def.attackDuration) {
            enemy.state = "chase";
            enemy.attackTimer = 0;
            enemy.attackHitDealt = false;
            enemy.attackCooldown = def.attackCooldown;
          }
          clampEnemyToMap(enemy);
          return;
        }

        // chase中、近接&視線あり&クールダウン明け → 攻撃モーション開始
        if (def.hasAttackAnim && enemy.state === "chase" &&
            playerVisible && enemy.attackCooldown <= 0 &&
            Math.hypot(pCX - eCX, pCY - eCY) < def.meleeRange) {
          enemy.state = "attack";
          enemy.attackTimer = 0;
          enemy.attackHitDealt = false;
          enemy.path = [];
          enemy.pathTimer = 0;
          clampEnemyToMap(enemy);
          return;
        }

        if (enemy.state === "chase") {
          if (playerVisible) {
            enemy.lastSeenX = pCX;
            enemy.lastSeenY = pCY;
            const pTX = Math.floor(pCX / TILE_SIZE);
            const pTY = Math.floor(pCY / TILE_SIZE);
            stepAlongPathToward(pTX, pTY);
          } else {
            // 視線喪失 → 最後に見た地点へ捜索
            enemy.state = "search";
            enemy.searchTimer = 0;
            enemy.path = [];
            enemy.pathTimer = 0;
          }
        } else if (enemy.state === "search") {
          // 移動中も再発見チェック
          if (playerVisible) {
            enemy.state = "chase";
            enemy.path = [];
            enemy.pathTimer = 0;
          } else {
            const distToLastSeen = Math.hypot(enemy.lastSeenX - eCX, enemy.lastSeenY - eCY);
            const tx = Math.floor(enemy.lastSeenX / TILE_SIZE);
            const ty = Math.floor(enemy.lastSeenY / TILE_SIZE);
            stepAlongPathToward(tx, ty);
            // 到達条件: タイル半分以内、または経路が無い(これ以上近づけない)
            if (distToLastSeen < TILE_SIZE * 0.6 || enemy.path.length === 0) {
              enemy.searchTimer += 1;
              if (enemy.searchTimer >= 90) { // 約 2.7 秒その場で待機
                enemy.state = "returning";
                enemy.path = [];
                enemy.pathTimer = 0;
              }
            }
          }
        } else if (enemy.state === "returning") {
          if (playerVisible) {
            enemy.state = "chase";
            enemy.path = [];
            enemy.pathTimer = 0;
          } else {
            const homeCX = enemy.originX + 36;
            const homeCY = enemy.originY + 36;
            const distToHome = Math.hypot(homeCX - eCX, homeCY - eCY);
            if (distToHome < TILE_SIZE * 0.5) {
              enemy.state = "idle";
              enemy.path = [];
              enemy.losTimer = 0;
              enemy.searchTimer = 0;
            } else {
              const tx = Math.floor(homeCX / TILE_SIZE);
              const ty = Math.floor(homeCY / TILE_SIZE);
              stepAlongPathToward(tx, ty);
            }
          }
        }

        clampEnemyToMap(enemy);
      });

      updatePlayerKnockback();
      heroAI();
      moveTowardTarget();
      checkAutoAttack();
      updateAllyFollow();  // 仲間がリーダーに追従 (非戦闘時)
      updatePositions();
      checkPlayerCollision();
      checkCoinPickup();
      checkAutoChestPickup();
      checkDungeonClear();
    }

    // 仲間がリーダー(プレイヤー)に追従するロジック (ターン制グリッド)
    // プレイヤーが 1 タイル到達するたびに exploreAllyTurn() が呼ばれる。
    // 戦闘中は別ルート (allyAttackTurn) で動かす。
    const ALLY_FOLLOW_DIST = 220;   // バックラインの先頭基準
    const ALLY_FOLLOW_STEP = 120;   // バックライン 2人目以降はこの距離だけ後方に
    const FRONTLINE_FORWARD = 180;  // フロントラインはリーダーの前方オフセット
    const FRONTLINE_SIDE    = 76;   // フロントラインの左右オフセット (隣に並ぶ)
    const BACKLINE_SIDE     = 88;   // バックラインの左右オフセット (2列配置)
    const BACKLINE_IN_POSITION_TOLERANCE = 160; // この距離以内なら「配置についた」扱い

    // 探索ターン: プレイヤーが 1 タイル移動するたびに、仲間が「電車方式」で跡を辿る
    //   先頭仲間 → プレイヤーの旧タイル
    //   2人目以降 → 前の仲間の旧タイル
    //   フォーメーション (前衛/後衛の隊列配置) は廃止、ギクシャク軽減
    let exploreAllyTurnRunning = false;
    async function exploreAllyTurn(oldPlayerTile) {
      if (exploreAllyTurnRunning) return;
      if (encounterActive || encounterRunning) return;
      if (!gameStarted || gameOver) return;
      if (!oldPlayerTile) return;
      exploreAllyTurnRunning = true;
      try {
        const aliveAllies = allies.filter(a => a.alive);
        if (aliveAllies.length === 0) return;
        // 各 ally の「動く前の」タイルをスナップショット
        const startTiles = aliveAllies.map(a => {
          const cx = a.x + a.def.displaySize / 2;
          const cy = a.y + a.def.displaySize / 2;
          return { tx: Math.floor(cx / TILE_SIZE), ty: Math.floor(cy / TILE_SIZE) };
        });
        for (let i = 0; i < aliveAllies.length; i++) {
          if (encounterActive || encounterRunning) break;
          const ally = aliveAllies[i];
          const targetTile = (i === 0) ? oldPlayerTile : startTiles[i - 1];
          if (!targetTile) continue;
          const myStart = startTiles[i];
          if (myStart.tx === targetTile.tx && myStart.ty === targetTile.ty) continue;  // 既に到達
          const wx = targetTile.tx * TILE_SIZE + TILE_SIZE / 2;
          const wy = targetTile.ty * TILE_SIZE + TILE_SIZE / 2;
          await allyAdvanceTowardPoint(ally, wx, wy, {
            slideMs: 600, postSleep: 40, silent: true,
          });
        }
      } finally {
        exploreAllyTurnRunning = false;
      }
    }

    // 仲間全員がプレイヤーの近くに居るか (戦闘終了後の前進待機用)
    //   スネーク方式では厳密な隊列位置は無いので、距離ベースで「遅れてる仲間がいないか」判定
    function isBacklineInPosition() {
      if (!gameStarted || gameOver) return true;
      const MAX_LAG = 480;  // この距離を超えて離れている仲間がいれば待機
      for (const ally of allies) {
        if (!ally.alive) continue;
        const d = Math.hypot(ally.x - playerX, ally.y - playerY);
        if (d > MAX_LAG) return false;
      }
      return true;
    }

    // 探索ターン: プレイヤー 1 タイル移動後に、各敵が state に応じて 1 タイル slide
    //   state が chase/search/returning の敵のみ動く (idle/alert/attack は停止)
    //   敵同士は並列 slide (slideTargetTile 予約で重なり防止)
    let exploreEnemyTurnRunning = false;
    async function exploreEnemyTurn() {
      if (exploreEnemyTurnRunning) return;
      if (encounterActive || encounterRunning) return;
      if (!gameStarted || gameOver) return;
      exploreEnemyTurnRunning = true;
      try {
        const moves = [];
        for (let i = 0; i < enemies.length; i++) {
          const enemy = enemies[i];
          if (!enemy.alive) continue;
          if (enemy.state !== "chase" &&
              enemy.state !== "search" &&
              enemy.state !== "returning") continue;
          moves.push(exploreMoveEnemyOneTile(i));
        }
        await Promise.all(moves);
      } finally {
        exploreEnemyTurnRunning = false;
      }
    }

    async function exploreMoveEnemyOneTile(idx) {
      const enemy = enemies[idx];
      if (!enemy.alive) return;
      let targetCX, targetCY;
      if (enemy.state === "chase") {
        targetCX = playerX + 48;
        targetCY = playerY + 58;
      } else if (enemy.state === "search") {
        targetCX = enemy.lastSeenX;
        targetCY = enemy.lastSeenY;
      } else if (enemy.state === "returning") {
        targetCX = enemy.originX + enemy.def.displaySize / 2;
        targetCY = enemy.originY + enemy.def.displaySize / 2;
      } else {
        return;
      }
      await enemyAdvanceOneTile(idx, targetCX, targetCY, {
        slideMs: 500, postSleep: 40, silent: true,
      });
    }

    // プレイヤーから離れすぎた仲間をプレイヤーの位置へ呼び寄せる
    //   heroAI が isBacklineInPosition 待機中に発火、デッドロック防止
    async function exploreRallyToPlayer() {
      if (exploreAllyTurnRunning) return;
      if (encounterActive || encounterRunning) return;
      if (!gameStarted || gameOver) return;
      exploreAllyTurnRunning = true;
      try {
        const pTX = Math.floor((playerX + 48) / TILE_SIZE);
        const pTY = Math.floor((playerY + 58) / TILE_SIZE);
        const wx = pTX * TILE_SIZE + TILE_SIZE / 2;
        const wy = pTY * TILE_SIZE + TILE_SIZE / 2;
        const aliveAllies = allies.filter(a => a.alive);
        for (const ally of aliveAllies) {
          if (encounterActive || encounterRunning) break;
          const d = Math.hypot(ally.x - playerX, ally.y - playerY);
          if (d < 160) continue;  // 既に近い仲間は動かさない
          await allyAdvanceTowardPoint(ally, wx, wy, {
            slideMs: 600, postSleep: 30, silent: true,
          });
        }
      } finally {
        exploreAllyTurnRunning = false;
      }
    }
    // 旧リアルタイム連続追従は廃止。
    // 仲間の追従は exploreAllyTurn() が heroAI の 1 タイル到達時にまとめて実行する。
    function updateAllyFollow() { /* no-op (ターン制へ移行) */ }

    // ─────────────────────────────────────────────────────────
    // ヒーローAI(フルオート探索+戦闘)
    // ─────────────────────────────────────────────────────────
    const visitedRooms = new Set();
    const visitedTiles = new Set();  // フォグオブウォー用 (key = ty * 100 + tx)
    let heroPath = [];           // A*経路(ワールドタイル)
    let heroPathGoal = null;     // {tx, ty} 現在向かっている場所
    let heroPathTTL = 0;         // 経路の再計算タイマー
    let heroCurrentRoomGoal = -1;
    // スタック検知(壁に引っかかった場合の救済)
    let heroLastX = -1, heroLastY = -1, heroStuckTicks = 0;
    let heroWiggleUntil = 0;
    let heroWiggleDir = null;           // 選ばれた持続方向 [dx, dy]
    let heroWiggleDirStuckTicks = 0;    // 選んだ方向で動けない tick 数
    // ターン間休止(1タイル到着するごとに小休止)
    let heroTurnPause = 0;
    const TURN_PAUSE_TICKS = 12;         // 約360ms(1ターン間隔)
    // 訪問履歴 (探索フェーズのオシレーション抑制): 直近通ったタイルへ戻る経路に追加 g-cost
    //   履歴は古い順 → 直近末尾の配列。aStar 第6引数の Map<tileKey, penalty> を生成する。
    //   最直近タイル = 最大ペナルティ、古いほど軽くなる (年齢に応じてフェード)。
    const HERO_RECENT_HISTORY = 8;       // 履歴保持タイル数
    const HERO_RECENT_PENALTY_MAX = 6;   // 最直近タイル経由の追加 g-cost (1 タイル分のコスト = 1+penalty)
    let heroRecentTiles = [];            // [{tx, ty}, ...]
    function pushHeroRecentTile(tx, ty) {
      heroRecentTiles.push({ tx, ty });
      while (heroRecentTiles.length > HERO_RECENT_HISTORY) heroRecentTiles.shift();
    }
    function clearHeroRecentTiles() {
      heroRecentTiles.length = 0;
    }
    function heroRecentPenaltyMap() {
      const m = new Map();
      const len = heroRecentTiles.length;
      for (let i = 0; i < len; i++) {
        const t = heroRecentTiles[i];
        const k = t.ty * MAP_W + t.tx;  // aStar の key() と同一形式
        // 末尾(i = len-1)が最直近 → MAX、先頭が最古 → 1 にフェード
        const recencyAge = (len - 1) - i;  // 0 = most recent
        const penalty = Math.max(1, HERO_RECENT_PENALTY_MAX - recencyAge);
        m.set(k, penalty);
      }
      return m;
    }
    // 探索フェーズの戦士スライド進行フラグ (仲間と同じ 1タイル離散ステップ方式)
    let heroSliding = false;
    const HERO_SLIDE_MS = 380;
    const HERO_POST_SLIDE_MS = 120;

    // 壁衝突判定(プレイヤー全体ヒットボックス)
    function canMovePlayerTo(newX, newY) {
      return !wouldOverlapWall(newX + 28, newY + 34, newX + 68, newY + 82);
    }

    // 目標方向を優先しつつ、移動可能な方向を選ぶ
    function pickFreeDir(preferTowardX, preferTowardY) {
      // 4方向のみ: 目標側の優先軸(差が大きい方)から順に試す
      const dirs = [];
      if (preferTowardX != null && preferTowardY != null) {
        const ddx = preferTowardX - playerX;
        const ddy = preferTowardY - playerY;
        const dx0 = Math.sign(ddx);
        const dy0 = Math.sign(ddy);
        if (Math.abs(ddx) >= Math.abs(ddy)) {
          if (dx0) dirs.push([dx0, 0]);
          if (dy0) dirs.push([0, dy0]);
        } else {
          if (dy0) dirs.push([0, dy0]);
          if (dx0) dirs.push([dx0, 0]);
        }
      }
      const allDirs = [
        [ 1, 0],[-1, 0],[0, 1],[0,-1]
      ];
      for (let i = allDirs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allDirs[i], allDirs[j]] = [allDirs[j], allDirs[i]];
      }
      for (const d of allDirs) dirs.push(d);

      for (const d of dirs) {
        if (d[0] === 0 && d[1] === 0) continue;
        if (canMovePlayerTo(playerX + d[0] * 24, playerY + d[1] * 24)) return d;
      }
      for (const d of dirs) {
        if (d[0] === 0 && d[1] === 0) continue;
        if (canMovePlayerTo(playerX + d[0] * 4, playerY + d[1] * 4)) return d;
      }
      return null;
    }

    // 壁に引っかかったときに脱出する(通常速度でゆっくり抜ける)
    function heroWiggle() {
      const preX = playerX, preY = playerY;
      if (!heroWiggleDir || heroWiggleDirStuckTicks > 3) {
        // 元の目標があればその方向を優先
        heroWiggleDir = pickFreeDir(heroPathGoal ? heroPathGoal.tx * TILE_SIZE : null,
                                    heroPathGoal ? heroPathGoal.ty * TILE_SIZE : null);
        heroWiggleDirStuckTicks = 0;
      }
      if (heroWiggleDir) {
        // 通常の歩行速度で移動(急加速感をなくす)
        const step = mouseMoveSpeed;
        tryMoveX(heroWiggleDir[0] * step);
        tryMoveY(heroWiggleDir[1] * step);
        mouseX = playerX + 48 + heroWiggleDir[0] * 100;
        mouseY = playerY + 48 + heroWiggleDir[1] * 100;
        updateFacingFromMouse();
      }
      if (Math.hypot(playerX - preX, playerY - preY) < 0.5) {
        heroWiggleDirStuckTicks++;
      } else {
        heroWiggleDirStuckTicks = 0;
      }
    }

    function markVisitedAround(ptx, pty, radius) {
      const r2 = radius * radius + 1;
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          if (dx * dx + dy * dy > r2) continue;
          const tx = ptx + dx, ty = pty + dy;
          if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) continue;
          visitedTiles.add(ty * 100 + tx);
        }
      }
    }

    function roomContainsTile(room, tx, ty) {
      const [r1, c1, r2, c2] = room;
      return ty >= r1 && ty <= r2 && tx >= c1 && tx <= c2;
    }

    function nearestFloorTileIn(room) {
      // 部屋中央、壁なら近傍を走査
      const [r1, c1, r2, c2] = room;
      const cTX = Math.floor((c1 + c2) / 2);
      const cTY = Math.floor((r1 + r2) / 2);
      if (mapData[cTY][cTX] !== 2) return { tx: cTX, ty: cTY };
      for (let r = 0; r < 4; r++) {
        for (let dx = -r; dx <= r; dx++) for (let dy = -r; dy <= r; dy++) {
          const tx = cTX + dx, ty = cTY + dy;
          if (tx >= c1 && tx <= c2 && ty >= r1 && ty <= r2 && mapData[ty][tx] !== 2) {
            return { tx, ty };
          }
        }
      }
      return { tx: cTX, ty: cTY };
    }

    function findNearestAliveEnemy() {
      // 視界(探索済みタイル)内の敵のみを標的にする
      const pCX = playerX + 48, pCY = playerY + 48;
      let best = null, bestDist = Infinity;
      for (const e of enemies) {
        if (!e.alive) continue;
        const size = e.def.displaySize;
        const eCX = e.x + size / 2;
        const eCY = e.y + size / 2;
        const eTX = Math.floor(eCX / TILE_SIZE);
        const eTY = Math.floor(eCY / TILE_SIZE);
        if (!visitedTiles.has(eTY * 100 + eTX)) continue;  // 未発見の敵は無視
        const d = Math.hypot(pCX - eCX, pCY - eCY);
        if (d < bestDist) { best = e; bestDist = d; }
      }
      return best;
    }

    // 回収可能なドロップ(コイン/武器/防具)のうち最も近いもの
    // 到達不可と判明したドロップタイルを記憶(findNearestDrop で除外)
    const unreachableDropTiles = new Set();
    function dropTileKey(tx, ty) { return ty * 1000 + tx; }

    function findNearestDrop() {
      const pCX = playerX + 48, pCY = playerY + 48;
      let best = null, bestDist = Infinity;
      // 敵ドロップ (コイン/武器/防具)
      for (const e of enemies) {
        const candidates = [];
        if (e.coinVisible)   candidates.push({ x: e.coinX + 11,  y: e.coinY + 11 });
        if (e.weaponVisible) candidates.push({ x: e.weaponX + 13, y: e.weaponY + 13 });
        if (e.armorVisible)  candidates.push({ x: e.armorX + 14,  y: e.armorY + 14 });
        for (const c of candidates) {
          const tx = Math.floor(c.x / TILE_SIZE);
          const ty = Math.floor(c.y / TILE_SIZE);
          // 壁タイル/到達不可タイルのドロップはスキップ
          if (isTileWall(tx, ty)) continue;
          if (unreachableDropTiles.has(dropTileKey(tx, ty))) continue;
          const d = Math.hypot(pCX - c.x, pCY - c.y);
          if (d < bestDist) { best = { x: c.x, y: c.y, tx, ty }; bestDist = d; }
        }
      }
      // 部屋配置の宝箱 (未開封のみ) — heroAI が自発的に近寄るよう目的地候補に加える
      //   隠された宝箱は「発見済み (found=true)」のみ対象 (未発見は見えてないので寄らない)
      if (typeof roomChests !== "undefined") {
        for (const chest of roomChests) {
          if (chest.opened) continue;
          if (chest.hidden && !chest.found) continue;
          const tx = chest.tx, ty = chest.ty;
          if (isTileWall(tx, ty)) continue;
          if (unreachableDropTiles.has(dropTileKey(tx, ty))) continue;
          const cx = tx * TILE_SIZE + TILE_SIZE / 2;
          const cy = ty * TILE_SIZE + TILE_SIZE / 2;
          const d = Math.hypot(pCX - cx, pCY - cy);
          if (d < bestDist) { best = { x: cx, y: cy, tx, ty }; bestDist = d; }
        }
      }
      return best;
    }

    // 接触した宝箱を自動で開く(タイル一致 or 近接で回収)
    function checkAutoChestPickup() {
      if (!gameStarted || gameOver) return;
      const pHB = getPlayerHitbox();
      const pCX = playerX + 48, pCY = playerY + 58;
      const pTX = Math.floor(pCX / TILE_SIZE);
      const pTY = Math.floor(pCY / TILE_SIZE);
      for (const enemy of enemies) {
        if (enemy.weaponVisible) {
          const cx = enemy.weaponX + 13, cy = enemy.weaponY + 13;
          const sameTile = Math.floor(cx / TILE_SIZE) === pTX && Math.floor(cy / TILE_SIZE) === pTY;
          const nearEnough = Math.hypot(cx - pCX, cy - pCY) < 128;
          if (sameTile || nearEnough || isOverlapping(pHB, getWeaponDropHitbox(enemy))) {
            openChestAt(enemy.weaponX + 13, enemy.weaponY + 13);
            return;
          }
        }
        if (enemy.armorVisible) {
          const cx = enemy.armorX + 14, cy = enemy.armorY + 14;
          const sameTile = Math.floor(cx / TILE_SIZE) === pTX && Math.floor(cy / TILE_SIZE) === pTY;
          const nearEnough = Math.hypot(cx - pCX, cy - pCY) < 128;
          if (sameTile || nearEnough || isOverlapping(pHB, getArmorDropHitbox(enemy))) {
            openChestAt(enemy.armorX + 14, enemy.armorY + 14);
            return;
          }
        }
      }
    }

    function findNextRoomGoal() {
      // まだ訪れていない部屋を距離順に選ぶ
      const pCX = playerX + 48, pCY = playerY + 48;
      let best = -1, bestDist = Infinity;
      for (let i = 0; i < ROOMS.length; i++) {
        if (visitedRooms.has(i)) continue;
        const [r1, c1, r2, c2] = ROOMS[i];
        const cx = ((c1 + c2) / 2) * TILE_SIZE + TILE_SIZE / 2;
        const cy = ((r1 + r2) / 2) * TILE_SIZE + TILE_SIZE / 2;
        const d = Math.hypot(pCX - cx, pCY - cy);
        if (d < bestDist) { best = i; bestDist = d; }
      }
      return best;
    }

    // 探索フェーズの戦士「1タイル離散スライド」 (仲間の allyAdvanceTowardPoint と同方式)
    async function heroSlideOneTileExplore(wp, oldPlayerTile) {
      if (heroSliding) return;
      heroSliding = true;
      try {
        if (wp.tx < oldPlayerTile.tx) facing = "left";
        else if (wp.tx > oldPlayerTile.tx) facing = "right";
        flashAction(player, "move");
        const fromX = playerX, fromY = playerY;
        const toX = wp.tx * TILE_SIZE + SNAP_X_OFFSET;
        const toY = wp.ty * TILE_SIZE + SNAP_Y_OFFSET;
        playerMovingThisFrame = true;
        await slideAnim((x, y) => {
          playerX = x; playerY = y; playerMovingThisFrame = true;
        }, fromX, fromY, toX, toY, HERO_SLIDE_MS);
        playerMovingThisFrame = false;
        // 1タイル消費 (heroPath 先頭が wp と一致してれば shift)
        if (heroPath.length > 0 && heroPath[0].tx === wp.tx && heroPath[0].ty === wp.ty) {
          heroPath.shift();
        }
        // 訪問履歴に「離れたタイル」を push (オシレーション抑制)
        // 直後の経路再計算で逆方向 (oldPlayerTile に戻る経路) が重く扱われる
        pushHeroRecentTile(oldPlayerTile.tx, oldPlayerTile.ty);
        // 探索ターン: 知覚 → 罠 → 仲間 → 敵 → 再罠
        if (typeof runPerceptionCheck === "function") runPerceptionCheck();
        if (typeof checkTrapTrigger === "function") checkTrapTrigger();
        await exploreAllyTurn(oldPlayerTile);
        await exploreEnemyTurn();
        if (typeof checkTrapTrigger === "function") checkTrapTrigger();
        await sleepMs(HERO_POST_SLIDE_MS);
        heroTurnPause = TURN_PAUSE_TICKS;
      } finally {
        heroSliding = false;
      }
    }

    let heroWaitForBacklineStartAt = 0;
    function heroAI() {
      if (!gameStarted || gameOver) return;
      if (encounterActive) return;  // 観戦フェーズ中は turn loop が制御
      if (attackActive || counterActive || playerHitStun > 0) return;
      if (heroSliding) return;  // 1タイル離散スライド進行中は新しい指示を出さない
      // 仲間 or 敵の探索ターン中はプレイヤー前進を抑制
      if (exploreAllyTurnRunning || exploreEnemyTurnRunning) return;
      // バックラインが配置につくまで前進を待つ (戦闘終了直後の置き去り防止)
      // ただし 5秒経っても揃わないなら詰み回避で強制解除
      if (!isBacklineInPosition()) {
        if (!heroWaitForBacklineStartAt) heroWaitForBacklineStartAt = Date.now();
        if (Date.now() - heroWaitForBacklineStartAt < 5000) {
          // 待機中、遅れてる仲間をプレイヤーの位置へ呼び寄せる
          exploreRallyToPlayer();
          return;
        }
      } else {
        heroWaitForBacklineStartAt = 0;
      }

      // ヒットボックス中心(+58)でタイル座標を計算 — スプライト中心(+48)は1幅廊下でズレる
      const pCX = playerX + 48, pCY = playerY + 58;
      const pTX = Math.floor(pCX / TILE_SIZE);
      const pTY = Math.floor(pCY / TILE_SIZE);

      // スタック検知: 移動していない時間をカウント(休止中は無視)
      const moved = Math.hypot(playerX - heroLastX, playerY - heroLastY) > 0.4;
      if (moved || heroTurnPause > 0) heroStuckTicks = 0;
      else heroStuckTicks += 1;
      heroLastX = playerX;
      heroLastY = playerY;

      // ウィグル中: 8方向に脱出移動を試みる(moveTowardTargetに邪魔されないよう target も消す)
      if (heroWiggleUntil > 0) {
        heroWiggleUntil -= 1;
        targetX = null;
        targetY = null;
        heroWiggle();
        return;
      }

      // 緊急脱出: 60tick(1.8s)動けない → 隣接フロアタイルへワープ(ヒットボックス中心を合わせる)
      if (heroStuckTicks > 60) {
        const dirs = [[1,0],[-1,0],[0,1],[0,-1],[2,0],[-2,0],[0,2],[0,-2],[1,1],[-1,1],[1,-1],[-1,-1]];
        for (const [dx, dy] of dirs) {
          const nx = pTX + dx, ny = pTY + dy;
          if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) continue;
          if (mapData[ny][nx] !== 2) {
            // ヒットボックス中心 (playerX+48, playerY+58) をタイル中心 (nx*48+24, ny*48+24) に揃える
            playerX = nx * TILE_SIZE + SNAP_X_OFFSET;
            playerY = ny * TILE_SIZE + SNAP_Y_OFFSET;
            heroStuckTicks = 0;
            heroPath = [];
            heroPathGoal = null;
            // ワープでは履歴の連続性が断たれるのでリセット (ワープ後の経路に古いペナルティを残さない)
            clearHeroRecentTiles();
            return;
          }
        }
      }

      // 20tick動けない → ウィグル開始(stuckTicks はリセットせず、ウィグルでも動けない場合 60tick でワープ)
      if (heroStuckTicks > 20) {
        heroPath = [];
        heroPathTTL = 0;
        // heroPathGoal は残す(ウィグル時に目標方向を参照)
        heroWiggleUntil = 18;            // 18tick(約540ms)だけ
        heroWiggleDir = null;
        heroWiggleDirStuckTicks = 0;
        targetX = null;
        targetY = null;
        return;
      }

      // 現在位置の部屋を訪問済みにマーク
      for (let i = 0; i < ROOMS.length; i++) {
        if (roomContainsTile(ROOMS[i], pTX, pTY)) visitedRooms.add(i);
      }
      // 周囲タイルをフォグオブウォーで「見た」扱いに
      markVisitedAround(pTX, pTY, 6);

      // ① 敵発見 → 最も近い敵を目標
      const enemy = findNearestAliveEnemy();
      let goalTX, goalTY;
      if (enemy) {
        const size = enemy.def.displaySize;
        const eCX = enemy.x + size / 2;
        const eCY = enemy.y + size / 2;
        goalTX = Math.floor(eCX / TILE_SIZE);
        goalTY = Math.floor(eCY / TILE_SIZE);
        // 向きを敵に合わせる(攻撃判定のため)
        mouseX = eCX; mouseY = eCY;
        updateFacingFromMouse();
        // 攻撃レンジ内かつ視線が通っているなら停止して自動攻撃に任せる
        // (視線が通らない = 壁越し の場合は A* で回り込む)
        const dist = Math.hypot(pCX - eCX, pCY - eCY);
        if (dist < 80 && hasLineOfSight(pCX, pCY, eCX, eCY)) {
          targetX = null; targetY = null;
          heroPath = []; heroPathGoal = null;
          // 攻撃レンジ内で待機中も heroTurnPause を減らす(減らさないと checkAutoAttack が永久に止まる)
          if (heroTurnPause > 0) heroTurnPause -= 1;
          return;
        }
      } else {
        // ② 敵なし → まずドロップアイテムを回収
        const drop = findNearestDrop();
        if (drop) {
          goalTX = Math.floor(drop.x / TILE_SIZE);
          goalTY = Math.floor(drop.y / TILE_SIZE);
        } else {
          // ③ ドロップなし → 未訪問の部屋へ
          const roomIdx = findNextRoomGoal();
          if (roomIdx >= 0) {
            heroCurrentRoomGoal = roomIdx;
            const t = nearestFloorTileIn(ROOMS[roomIdx]);
            goalTX = t.tx; goalTY = t.ty;
          } else {
            // ④ 全部屋探索済みだが敵が残っている → 霧を無視して最寄り敵へ
            let globalEnemy = null, bestD = Infinity;
            for (const e of enemies) {
              if (!e.alive) continue;
              const size = e.def.displaySize;
              const d = Math.hypot(pCX - (e.x + size/2), pCY - (e.y + size/2));
              if (d < bestD) { globalEnemy = e; bestD = d; }
            }
            if (globalEnemy) {
              const size = globalEnemy.def.displaySize;
              goalTX = Math.floor((globalEnemy.x + size/2) / TILE_SIZE);
              goalTY = Math.floor((globalEnemy.y + size/2) / TILE_SIZE);
            } else {
              targetX = null; targetY = null;
              return;
            }
          }
        }
      }

      // A*経路を計算(目標変化 or TTL切れ or 経路無し時)
      heroPathTTL -= 1;
      const needsRecalc =
        heroPath.length === 0 ||
        heroPathTTL <= 0 ||
        !heroPathGoal ||
        heroPathGoal.tx !== goalTX ||
        heroPathGoal.ty !== goalTY;
      if (needsRecalc) {
        // 仲間を避けた経路と、仲間を無視した(壁のみ考慮)経路を両方計算
        const allyAvoid = getUnitOccupiedTiles("player");
        // 訪問履歴ペナルティ: 直近通ったタイルに戻る経路に追加 g-cost (オシレーション抑制)
        const recentPenalty = heroRecentPenaltyMap();
        const pathAvoidAllies = aStar(pTX, pTY, goalTX, goalTY, allyAvoid, recentPenalty) || [];
        const pathIgnoreAllies = aStar(pTX, pTY, goalTX, goalTY, null, recentPenalty) || [];

        // 壁を考慮しても到達不可 = 本当に届かない → unreachable 登録
        if (pathIgnoreAllies.length === 0 && !(pTX === goalTX && pTY === goalTY)) {
          heroPath = [];
          unreachableDropTiles.add(dropTileKey(goalTX, goalTY));
          heroPathGoal = null;
          targetX = null; targetY = null;
          return;
        }

        // 仲間塞がれ or 大回り判定:
        //   - 避けた経路が無い → 仲間タイルを通る経路にフォールバック (deadlock 回避)
        //   - 無視経路の 2.5倍超 → 待機 (本当に大回りすぎる場合のみ)
        const DETOUR_RATIO = 2.5;
        if (pathAvoidAllies.length === 0 && pathIgnoreAllies.length > 0) {
          // 仲間が完全に塞いでいる → 仲間を押しのけて通る (5人パーティの密集対策)
          heroPath = pathIgnoreAllies;
          heroPathGoal = { tx: goalTX, ty: goalTY };
          heroPathTTL = 20;
        } else if (pathIgnoreAllies.length > 0 &&
                   pathAvoidAllies.length > pathIgnoreAllies.length * DETOUR_RATIO) {
          // 大回りすぎる → 待機して仲間が動くのを待つ
          heroPath = [];
          heroPathGoal = null;
          heroPathTTL = 6;
          return;
        } else {
          // 通常: 仲間を避けた経路を採用
          heroPath = pathAvoidAllies;
          heroPathGoal = { tx: goalTX, ty: goalTY };
          heroPathTTL = 20;
        }
      }

      // 休止中: 動かない (前回スライドの post-slide 余韻を維持)
      if (heroTurnPause > 0) {
        heroTurnPause -= 1;
        targetX = null;
        targetY = null;
        return;
      }

      if (heroPath.length > 0) {
        const wp = heroPath[0];
        // 1タイル離散スライド (380ms) → 探索ターン → 休止 を非同期で実行
        const oldPlayerTile = { tx: pTX, ty: pTY };
        targetX = null; targetY = null;
        heroSlideOneTileExplore(wp, oldPlayerTile);
      } else {
        // ゴール到達: 何もしない (タイル一致時のドロップ回収は checkCoinPickup 等が処理)
        targetX = null; targetY = null;
      }
    }

    let dungeonCleared = false;
    function checkDungeonClear() {
      if (dungeonCleared || gameOver) return;
      if (enemies.every(e => !e.alive) && visitedRooms.size >= ROOMS.length - 2) {
        dungeonCleared = true;
        updateInfo("ダンジョン制覇！\n全ての敵を倒した");
      }
    }

    function checkAutoAttack() {
      if (encounterActive) return;  // 観戦フェーズ中は turn loop 側が発動を管理
      if (attackActive || isGuarding || counterActive || gameOver || !gameStarted) return;
      // ターン休止中は攻撃しない(1ターン1アクション制)
      if (heroTurnPause > 0) return;

      const center = getPlayerCenter();
      const attackRange = 170;
      let nearestIndex = -1;
      let nearestDist = Infinity;

      for (let i = 0; i < enemies.length; i++) {
        if (!enemies[i].alive) continue;
        const ex = enemies[i].x + enemies[i].def.displaySize / 2;
        const ey = enemies[i].y + enemies[i].def.displaySize / 2;
        const dx = ex - center.x;
        const dy = ey - center.y;
        const dist = Math.hypot(dx, dy);

        // 向いている方向に敵がいるか確認 (右向きのみ運用: X軸で判定)
        const inFacing =
          (facing === "right" && dx > 0) ||
          (facing === "left"  && dx < 0);

        if (dist <= attackRange && inFacing && dist < nearestDist) {
          nearestDist = dist;
          nearestIndex = i;
        }
      }

      if (nearestIndex < 0) return;

      const enemy = enemies[nearestIndex];
      const ex = (enemy.x + enemy.def.displaySize / 2);
      const ey = (enemy.y + enemy.def.displaySize / 2);
      const angle = Math.atan2(ey - center.y, ex - center.x);

      // 敵の方向に向く (右向きのみ運用: X軸のみ判定、真上/真下時は維持)
      if (Math.abs(ex - center.x) > 2) {
        facing = ex > center.x ? "right" : "left";
      }

      // 移動を止めて攻撃
      targetX = null;
      targetY = null;

      runSwing(angle, {
        stage: 0,
        duration: 1024,
        radius: 54,
        hitSize: 34
      });
    }

    // ═══════════════════════════════════════════════════════════
    // D&D 観戦フェーズ(ターン制ダイスロール戦闘)
    // ═══════════════════════════════════════════════════════════

    // ── プレイヤー D&D ステータス ──
    // playerStats の中身は applyLeaderStats() でリーダークラスの def から動的構築。
    // 初期値は warrior (Lv1) を仮で入れておく (起動時に applyLeaderStats で上書き)
    const playerStats = {
      str: 3, dex: 1, con: 2, wis: 0, int: 0,
      atkBonus: 4, ac: 16,
      dmgDice: "1d8", dmgBonus: 3,
      critRange: 19, critMult: 2,
      weaponRange: "melee",
    };
    // リーダー名を動的に取得 (ログ表示用)
    function getLeaderName() {
      const def = (typeof CLASS_DEFS !== "undefined") ? CLASS_DEFS[leaderClassKey] : null;
      return (def && def.name) || "戦士";
    }
    // リーダーが MP 持ちのクラスか
    function leaderHasMp() {
      const def = (typeof CLASS_DEFS !== "undefined") ? CLASS_DEFS[leaderClassKey] : null;
      return def ? (def.mpMax || 0) > 0 : false;
    }
    // ── リーダーアダプタ (Step 2-C-3 a): プレイヤーを ally っぽいオブジェクトに変換 ──
    // 既存 ally系スキル関数 (allyXxx) を流用するため。位置・ステ・武器は現実値、
    // hp/mp/x/y/buffs は actor 経由で書き換え可能、関数完了後に syncLeaderFromActor で実値へ反映
    function makeLeaderActor() {
      const def = CLASS_DEFS[leaderClassKey] || CLASS_DEFS.warrior;
      const weapon = getCurrentWeapon();
      const armor  = getCurrentArmor();
      const shield = getCurrentShield();
      // ステ枠と整合した攻撃ボーナス (武器エンハ込み)
      const weaponEnh = (weapon && weapon.enhancement) || 0;
      const actor = {
        isLeader: true,
        classKey: leaderClassKey,
        def: def,
        x: playerX,
        y: playerY,
        el: player,
        hp: hp,
        maxHp: maxHp,
        mp: mp,
        maxMp: maxMp,
        alive: hp > 0,
        stunned: 0,
        facing: facing,
        str: playerStats.str,
        dex: playerStats.dex,
        con: playerStats.con,
        wis: playerStats.wis,
        int: playerStats.int,
        atkBonus: playerStats.atkBonus + weaponEnh,
        ac: playerStats.ac,
        dmgDice: (weapon && weapon.dmgDice) || playerStats.dmgDice,
        dmgBonus: playerStats.dmgBonus + weaponEnh,
        critRange: playerStats.critRange,
        critMult: playerStats.critMult,
        weaponRange: (weapon && weapon.range) || playerStats.weaponRange,
        spellAtkBonus: def.spellAtkBonus || 0,
        weaponName: weapon && weapon.name,
        weaponBonusDmgDice: (weapon && weapon.bonusDmgDice) || null,
        weaponBonusDmgType: (weapon && weapon.bonusDmgType) || null,
        weaponCritStun: (weapon && weapon.critStun) || 0,
        weaponLifeStealDice: (weapon && weapon.lifeStealDice) || null,
        armorName: armor && armor.name,
        shieldName: shield && shield.name,
        buffs: playerBuffs,
        skillsUsedInEncounter: leaderSkillsUsedInEncounter,
        skillCooldowns: leaderSkillCooldowns,
        equippedSkills: equippedSkills,
      };
      return actor;
    }
    function syncLeaderFromActor(actor) {
      if (!actor) return;
      hp = Math.max(0, Math.min(maxHp, actor.hp));
      mp = Math.max(0, Math.min(maxMp, actor.mp));
      // x/y の変動 (例: 盗賊シャドウステップでワープ) はリーダーに反映
      if (actor.x !== playerX || actor.y !== playerY) {
        playerX = actor.x;
        playerY = actor.y;
      }
      if (actor.facing) facing = actor.facing;
    }
    // リーダー版スキル発動: 戦士は executeWarriorSkill、それ以外は ally系関数をアダプタ経由で呼ぶ
    async function executeLeaderSkill(skillId, targetIdx) {
      if (leaderClassKey === "warrior") {
        await executeWarriorSkill(skillId, targetIdx);
        return;
      }
      const actor = makeLeaderActor();
      try {
        // ドワーフ (Step a-2 + フェーズ A 攻撃 3 + フェーズ B 防御 3 + フェーズ C バフ 3 追加)
        if (leaderClassKey === "dwarf") {
          if (skillId === "throwing-axe")       await allyThrowingAxe(actor, targetIdx);
          else if (skillId === "axe-storm")     await allyAxeStorm(actor);
          else if (skillId === "earth-shatter") await allyEarthShatter(actor);
          else if (skillId === "stone-skin")    await allyStoneSkin(actor);
          else if (skillId === "steel-will")    await allySteelWill(actor);
          else if (skillId === "brace")         await allyBrace(actor);
          else if (skillId === "battle-roar")   await allyBattleRoar(actor);
          else if (skillId === "big-eater")     await allyBigEater(actor);
          // dwarven-grit はリアクティブのため明示発動できない (HP 閾値で自動発動。leader 用 hook は将来課題)
          else if (skillId === "power-attack")  await allyPowerAttack(actor, targetIdx);
          else if (skillId === "shield-wall")   await allyShieldWall(actor);
          else if (skillId === "battle-rest")   await allyBattleRest(actor);
        }
        // 僧侶 (Step a-3 第1弾) ─ 回復&バフは味方ターゲットを構築して渡す
        else if (leaderClassKey === "cleric") {
          if (skillId === "cure-light-wounds") {
            const tgt = findLowestHpPartyMember();
            if (tgt) await allyCureLight(actor, tgt);
          } else if (skillId === "shield-of-faith") {
            // 未バフ候補から優先度付きで選ぶ (前衛 > リーダー > 後衛)
            const candidates = [];
            if (hp > 0 && !gameOver && playerBuffs.acBonusRemaining <= 0) {
              candidates.push({
                kind: "leader", priority: 2,
                cx: playerX + 48, cy: playerY + 58,
              });
            }
            for (const a of allies) {
              if (!a.alive) continue;
              if (a.buffs.acBonusRemaining > 0) continue;
              const pri = (a.def.role === "frontline") ? 3 : 1;
              candidates.push({
                kind: "ally", ally: a, priority: pri,
                cx: a.x + a.def.displaySize / 2,
                cy: a.y + a.def.displaySize / 2,
              });
            }
            if (candidates.length > 0) {
              candidates.sort((a, b) => b.priority - a.priority);
              await allyShieldOfFaith(actor, candidates[0]);
            }
          }
        }
        // 魔法使い (Step a-3 第2弾)
        else if (leaderClassKey === "mage") {
          if (skillId === "magic-missile")     await allyMagicMissile(actor, targetIdx);
          else if (skillId === "fire-bolt")    await allyFireBolt(actor, targetIdx);
          else if (skillId === "sleep")        await allySleep(actor, targetIdx);
          else if (skillId === "arcane-shield") await allyArcaneShield(actor);
        }
        // エルフ (Step a-3 第3弾)
        else if (leaderClassKey === "elf") {
          if (skillId === "aimed-shot")       await allyAimedShot(actor, targetIdx);
          else if (skillId === "magic-arrow") await allyMagicArrow(actor, targetIdx);
          else if (skillId === "cure-minor")  await allyCureMinor(actor);
        }
        // 盗賊 (Step a-3 第4弾) ─ shadow-step は sneak 条件 (helpless or flanking) を要する
        else if (leaderClassKey === "rogue") {
          if (skillId === "shadow-step") {
            // sneak 可能 & 移動先確保可な敵を探す。なければ通常攻撃にフォールバック
            const candidates = [];
            for (let i = 0; i < enemies.length; i++) {
              if (!enemies[i].alive) continue;
              if (canSneakOnTarget(actor, enemies[i])) candidates.push(i);
            }
            // HP 残量低い順 (確実にトドメを刺せる相手優先)
            candidates.sort((a, b) => enemies[a].hp - enemies[b].hp);
            let fired = false;
            for (const idx of candidates) {
              if (pickShadowStepTile(actor, enemies[idx])) {
                await allyShadowStep(actor, idx);
                fired = true;
                break;
              }
            }
            if (!fired) await playerSingleAttack(targetIdx, {});
          }
        }
        // 未対応クラス → 通常攻撃にフォールバック
        else {
          await playerSingleAttack(targetIdx, {});
        }
      } finally {
        syncLeaderFromActor(actor);
      }
    }
    // プレイヤーの MP 状態 (リーダーが mpMax>0 のクラスなら有効)
    let mp = 0, maxMp = 0;
    // リーダー (= プレイヤー) のスキル使用記録 (1戦1回・クールダウン管理、Step 2-C-3 a)
    const leaderSkillsUsedInEncounter = new Set();
    const leaderSkillCooldowns = {};

    // リーダークラスの def を引いて playerStats / hp / maxHp を構築
    function applyLeaderStats(leaderKey) {
      // CLASS_DEFS は後段で定義されるので、参照可能なことを呼出側で保証
      const def = (typeof CLASS_DEFS !== "undefined") ? CLASS_DEFS[leaderKey] : null;
      if (!def) return;
      playerStats.str = def.str || 0;
      playerStats.dex = def.dex || 0;
      playerStats.con = def.con || 0;
      playerStats.wis = def.wis || 0;
      playerStats.int = def.int || 0;
      playerStats.atkBonus  = def.atkBonus || 0;
      playerStats.ac        = def.ac || 10;
      playerStats.dmgDice   = def.dmgDice || "1d6";
      playerStats.dmgBonus  = def.dmgBonus || 0;
      playerStats.critRange = def.critRange || 20;
      playerStats.critMult  = def.critMult || 2;
      playerStats.weaponRange = def.weaponRange || "melee";
      // HP も動的化 (Lv up での加算は applyInitialLevels で別途やる)
      maxHp = def.hpMax || 30;
      hp = maxHp;
      // MP (リーダーが MP 持ちなら初期化)
      maxMp = def.mpMax || 0;
      mp = maxMp;
      // 頭上ラベル (#warriorLabel) のテキストもリーダー名に
      const lbl = document.getElementById("warriorLabel");
      if (lbl) lbl.textContent = def.name || "戦士";
    }

    // ── 射程システム (戦闘はタイル制) ──
    // semantic key → (tiles, label, engagePx)
    // グリッド戦闘化に伴い melee=1 の厳格射程に戻す(接近演出が活きる)
    const RANGE = {
      melee:  { tiles: 1,  label: "近距離", engagePx: 400 },
      medium: { tiles: 3,  label: "中距離", engagePx: 520 },
      long:   { tiles: 99, label: "遠距離", engagePx: 840 },
    };
    function getRange(key) { return RANGE[key] || RANGE.melee; }
    function tileChebyshev(ax, ay, bx, by) {
      const dx = Math.abs(Math.floor(ax / TILE_SIZE) - Math.floor(bx / TILE_SIZE));
      const dy = Math.abs(Math.floor(ay / TILE_SIZE) - Math.floor(by / TILE_SIZE));
      return Math.max(dx, dy);
    }

    // ── タイル整列 & 移動アニメ (グリッド戦闘用) ──
    function snapPlayerToTile(tx, ty) {
      // ヒットボックス中心 (playerX+48, playerY+58) をタイル中心 (tx*48+24, ty*48+24) に揃える
      playerX = tx * TILE_SIZE + SNAP_X_OFFSET;
      playerY = ty * TILE_SIZE + SNAP_Y_OFFSET;
    }
    function snapEnemyToTile(enemy, tx, ty) {
      enemy.x = tx * TILE_SIZE + TILE_SIZE / 2 - enemy.def.displaySize / 2;
      enemy.y = ty * TILE_SIZE + TILE_SIZE / 2 - enemy.def.displaySize / 2;
    }
    function slideAnim(setPos, fromX, fromY, toX, toY, durationMs) {
      return new Promise((resolve) => {
        const startTime = performance.now();
        function step(now) {
          const t = Math.min((now - startTime) / durationMs, 1);
          const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
          setPos(fromX + (toX - fromX) * eased, fromY + (toY - fromY) * eased);
          if (t < 1) requestAnimationFrame(step);
          else resolve();
        }
        requestAnimationFrame(step);
      });
    }

    // A* で1タイル分だけ前進(次のウェイポイント返却)。到達不可は null
    function firstTileStep(startTX, startTY, goalTX, goalTY, avoidTiles) {
      if (startTX === goalTX && startTY === goalTY) return null;
      const path = aStar(startTX, startTY, goalTX, goalTY, avoidTiles);
      if (!path || path.length === 0) return null;
      return path[0];
    }

    // プレイヤーを1タイル前進 (対象に向かって)
    async function playerAdvanceOneTile(targetWX, targetWY) {
      const pTX = Math.floor((playerX + 48) / TILE_SIZE);
      const pTY = Math.floor((playerY + 58) / TILE_SIZE);
      const gTX = Math.floor(targetWX / TILE_SIZE);
      const gTY = Math.floor(targetWY / TILE_SIZE);
      // 仲間・他敵のタイルを避けるパスを探す
      const avoidSet = getUnitOccupiedTiles("player");
      const next = firstTileStep(pTX, pTY, gTX, gTY, avoidSet);
      if (!next) {
        showRollAtPlayer(`<span class="label">CAN'T ADVANCE</span>経路なし`, "miss");
        updateInfo("進めない…");
        await sleepMs(700);
        return;
      }
      // 向き更新 (右向きのみ運用: 水平方向のみ facing 更新、上下は維持)
      if (next.tx < pTX) facing = "left";
      else if (next.tx > pTX) facing = "right";

      showRollAtPlayer(`<span class="label">ADVANCE</span>前進 1タイル`, "init");
      flashAction(player, "move");

      const fromX = playerX, fromY = playerY;
      const toX = next.tx * TILE_SIZE + SNAP_X_OFFSET;
      const toY = next.ty * TILE_SIZE + SNAP_Y_OFFSET;
      playerMovingThisFrame = true;
      await slideAnim((x, y) => {
        playerX = x; playerY = y; playerMovingThisFrame = true;
      }, fromX, fromY, toX, toY, 380);
      playerMovingThisFrame = false;
      await sleepMs(120);
    }

    // 敵を1タイル前進 (targetCX/CY 省略時はプレイヤーへ)
    async function enemyAdvanceOneTile(idx, targetCX, targetCY, opts = {}) {
      const slideMs   = (opts.slideMs   != null) ? opts.slideMs   : 380;
      const postSleep = (opts.postSleep != null) ? opts.postSleep : 120;
      const silent    = !!opts.silent;
      if (targetCX == null) targetCX = playerX + 48;
      if (targetCY == null) targetCY = playerY + 58;
      const enemy = enemies[idx];
      const def = enemy.def;
      const eCX = enemy.x + def.displaySize / 2;
      const eCY = enemy.y + def.displaySize / 2;
      const eTX = Math.floor(eCX / TILE_SIZE);
      const eTY = Math.floor(eCY / TILE_SIZE);
      const pTX = Math.floor(targetCX / TILE_SIZE);
      const pTY = Math.floor(targetCY / TILE_SIZE);

      // 対象タイルの隣接4方向で、壁でなく、他ユニットが居ないタイルを候補に
      const avoidSet = getUnitOccupiedTiles(enemy);
      let goalTX = pTX, goalTY = pTY;
      const neighbors = [[1,0],[-1,0],[0,1],[0,-1]];
      let bestD = Infinity;
      for (const [dx, dy] of neighbors) {
        const ntx = pTX + dx, nty = pTY + dy;
        if (ntx < 0 || ntx >= MAP_W || nty < 0 || nty >= MAP_H) continue;
        if (isTileWall(ntx, nty)) continue;
        if (avoidSet.has(ntx + "," + nty)) continue;  // 味方敵含め占有済は避ける
        const d = Math.abs(ntx - eTX) + Math.abs(nty - eTY);
        if (d < bestD) { bestD = d; goalTX = ntx; goalTY = nty; }
      }

      const next = firstTileStep(eTX, eTY, goalTX, goalTY, avoidSet);
      if (!next) {
        if (!silent) showRollAtEnemy(idx, `<span class="label">CAN'T ADVANCE</span>進めない`, "miss");
        await sleepMs(silent ? 100 : 700);
        return;
      }

      if (!silent) showRollAtEnemy(idx, `<span class="label">ADVANCE</span>前進 1タイル`, "init");
      flashAction(enemyElements[idx], "move");

      const fromX = enemy.x, fromY = enemy.y;
      const toX = next.tx * TILE_SIZE + TILE_SIZE / 2 - def.displaySize / 2;
      const toY = next.ty * TILE_SIZE + TILE_SIZE / 2 - def.displaySize / 2;
      const prevState = enemy.state;
      enemy.state = "chase";  // 歩行アニメを再生
      enemy.slideTargetTile = { tx: next.tx, ty: next.ty };  // 他ユニットの侵入防止
      try {
        await slideAnim((x, y) => {
          enemy.x = x; enemy.y = y;
        }, fromX, fromY, toX, toY, slideMs);
      } finally {
        enemy.slideTargetTile = null;
      }
      enemy.state = silent ? prevState : "idle";  // 探索中は元 state を維持
      await sleepMs(postSleep);
    }

    // ── ダイスユーティリティ ──
    function d20() { return 1 + Math.floor(Math.random() * 20); }
    function rollDiceDD(n, sides) {
      const rolls = [];
      for (let i = 0; i < n; i++) rolls.push(1 + Math.floor(Math.random() * sides));
      return { rolls, total: rolls.reduce((a, b) => a + b, 0) };
    }
    function parseDiceDD(notation) {
      const m = notation.match(/^(\d+)d(\d+)$/);
      return { n: +m[1], sides: +m[2] };
    }
    function signedDD(n) { return (n >= 0 ? "+" : "") + n; }
    function sleepMs(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ── 行動点滅エフェクト (non-blocking) ──
    // kind: "move" (青) / "attack" (赤) / "skill" (黄)
    // host: キャラ DOM 要素 (子として .actionFlash を追加)
    function flashAction(host, kind) {
      // エフェクト調整中: 行動時の円形リング (青=move/赤=attack/黄=skill) を廃止
      // 戻すには下のブロックの先頭の return を外す
      return;
      if (!host) return;
      let i = 0;
      const spawn = () => {
        if (i >= 2) return;
        const el = document.createElement("div");
        el.className = "actionFlash " + (kind || "move");
        host.appendChild(el);
        setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 220);
        i++;
        setTimeout(spawn, 320);
      };
      spawn();
    }

    // ── エンカウンター状態 ──
    let encounterActive = false;
    let encounterRunning = false;
    let encounterEnemyIndices = [];

    // ── ポップアップ(ワールド座標→スクリーン座標) ──

    function resetAllyBuffs(ally) {
      ally.buffs.atkBonusRemaining = 0;
      ally.buffs.atkBonusAmount = 0;
      ally.buffs.dmgReductionRemaining = 0;

    function showDmgAt(worldX, worldY, dmg, isCrit) {

    const battleBannerEl = document.getElementById("battleBanner");
    function showBanner(text, ms = 1000) {
      battleBannerEl.textContent = text;
      battleBannerEl.classList.remove("show");
      void battleBannerEl.offsetWidth;
      battleBannerEl.classList.add("show");
      setTimeout(() => battleBannerEl.classList.remove("show"), ms);

    // ── エンカウンター検出 ──
    // 初期検知: 各敵の射程 (engagePx) に基づいて判定
    // 増援検知: 同じく各敵の射程 + 少し余裕 (同室の敵を拾う)
    const REINFORCE_MARGIN_PX = 160;

    function detectEnemiesEngagedByRange(excludeSet, extraPx) {
      const pCX = playerX + 48, pCY = playerY + 58;
      const list = [];
      for (let i = 0; i < enemies.length; i++) {
        if (excludeSet && excludeSet.has(i)) continue;
        const e = enemies[i];
        if (!e.alive) continue;
        const ex = e.x + e.def.displaySize / 2;
        const ey = e.y + e.def.displaySize / 2;
        const d = Math.hypot(pCX - ex, pCY - ey);
        const enemyRange = getRange(e.def.range || "melee");
        const engageDist = enemyRange.engagePx + (extraPx || 0);
        if (d < engageDist && hasLineOfSight(pCX, pCY, ex, ey)) {
          list.push(i);
        }
      }
      return list;
    }
    function detectEngaged() {
      return detectEnemiesEngagedByRange(null, 0);
    }
    function detectReinforcements() {
      return detectEnemiesEngagedByRange(new Set(encounterEnemyIndices), REINFORCE_MARGIN_PX);
    }

    function tryStartEncounter() {
      if (encounterActive || encounterRunning) return;
      if (!gameStarted || gameOver) return;
      if (attackActive || counterActive || playerHitStun > 0) return;
      const engaged = detectEngaged();
      if (engaged.length > 0) {
        encounterRunning = true;
        runEncounter(engaged).finally(() => { encounterRunning = false; });
      }
    }

    // ── ヒット演出用の敵フラッシュ・スパーク呼び出し ──
    // (既存 triggerEnemyDamageFlash / showHitSpark を使う)

    // ── ヒット判定なしスイング(視覚のみ) ──
    function runSwingNoHit(angle) {
      return new Promise((resolve) => {
        attackActive = true;
        currentAttackAngle = angle;
        currentSwingProgress = 0;
        currentAttackRadius = 54;
        currentAttackHitSize = 34;
        currentAttackStage = 0;
        hitEnemiesThisSwing = new Set();
        const duration = 900;
        const startTime = performance.now();
        function anim(now) {
          currentSwingProgress = Math.min((now - startTime) / duration, 1);
          if (currentSwingProgress < 1) {
            requestAnimationFrame(anim);
          } else {
            attackActive = false;
            resolve();
          }
        }
        requestAnimationFrame(anim);
      });
    }

    // ── 敵の攻撃演出 ──
    async function playEnemyAttackVisual(idx, targetWX, targetWY) {
      const enemy = enemies[idx];
      const def = enemy.def;
      if (def.hasAttackAnim) {
        enemy.state = "attack";
        enemy.attackTimer = 0;
        enemy.attackHitDealt = true;  // 既存の damagePlayer 呼び出しを抑止
        await sleepMs((def.attackDuration || 28) * 30);
        enemy.state = "idle";
        enemy.attackTimer = 0;
        enemy.attackHitDealt = false;
      } else {
        const el = enemyElements[idx];
        if (el) {
          el.style.filter = "brightness(2.4) saturate(3)";
          await sleepMs(280);
          el.style.filter = "";
        } else {
          await sleepMs(350);
        }
      }
      // 遠距離 (def.projectile = "arrow"): 矢を発射演出
      if (def.projectile === "arrow" && targetWX != null && targetWY != null) {
        const eCX = enemy.x + def.displaySize / 2;
        const eCY = enemy.y + def.displaySize / 2 - 6;  // 弓の高さ補正
        await spawnArrow(eCX, eCY, targetWX, targetWY, 280, { variant: "enemyArrow" });
      }
    }

    // ── エンカウンターメインフロー ──
    async function runEncounter(initialEngaged) {
      encounterActive = true;
      setPhase("combat");
      encounterEnemyIndices = initialEngaged.slice();
      // DM ナレーション: ボスがいればボス戦前メッセージ、そうでなければ敵種族別
      const bossIdx = initialEngaged.find(i => enemies[i].def.maxSummons > 0);
      if (bossIdx !== undefined) {
        const bossName = enemies[bossIdx].def.name;
        showDMMessage(`…部屋の奥から、重い足音が近づいてくる。これが${bossName}か。覚悟はいいか。`, 2800);
      } else {
        const fam = detectEnemyFamily(initialEngaged);
        showDMMessage(ENEMY_FAMILY_MSG[fam] || ENEMY_FAMILY_MSG.generic, 2200);
      }

      try {
        // プレイヤー状態をリセット
        targetX = null; targetY = null;
        heroPath = []; heroPathGoal = null;
        heroTurnPause = 0;

        // 交戦対象の敵もリセット
        for (const i of encounterEnemyIndices) {
          const e = enemies[i];
          e.state = "idle";
          e.attackTimer = 0;
          e.attackHitDealt = false;
          e.path = [];
          e.pathTimer = 0;
          e.stunned = 0;
        }

        // プレイヤーのバフ・デバフもリセット
        resetPlayerBuffs();
        // 仲間の 1戦1回スキル使用記録 + クールダウンをリセット
        for (const a of allies) {
          if (a.skillsUsedInEncounter) a.skillsUsedInEncounter.clear();
          if (a.skillCooldowns) a.skillCooldowns = {};
        }
        // リーダー (プレイヤー) も同様にリセット
        leaderSkillsUsedInEncounter.clear();
        for (const k of Object.keys(leaderSkillCooldowns)) delete leaderSkillCooldowns[k];

        // ── タイル整列 (グリッド戦闘化): プレイヤー・全交戦対象をタイル中央へスナップ ──
        const pSnapTX = Math.floor((playerX + 48) / TILE_SIZE);
        const pSnapTY = Math.floor((playerY + 58) / TILE_SIZE);
        snapPlayerToTile(pSnapTX, pSnapTY);
        for (const i of encounterEnemyIndices) {
          const e = enemies[i];
          const eCX = e.x + e.def.displaySize / 2;
          const eCY = e.y + e.def.displaySize / 2;
          const eSnapTX = Math.floor(eCX / TILE_SIZE);
          const eSnapTY = Math.floor(eCY / TILE_SIZE);
          snapEnemyToTile(e, eSnapTX, eSnapTY);
        }

        showBanner("⚔  ENCOUNTER  ⚔", 1100);
        updateInfo("敵と遭遇!");
        await sleepMs(1050);

        // 仲間キャラもタイル整列 + バフリセット (他ユニットと同タイルなら隣接空タイルへずらす)
        for (const ally of allies) {
          if (!ally.alive) continue;
          const aCX = ally.x + ally.def.displaySize / 2;
          const aCY = ally.y + ally.def.displaySize / 2;
          let aTX = Math.floor(aCX / TILE_SIZE);
          let aTY = Math.floor(aCY / TILE_SIZE);
          const occupied = getUnitOccupiedTiles(ally);
          if (occupied.has(aTX + "," + aTY) || isTileWall(aTX, aTY)) {
            // 近い空タイルを探して退避
            let found = false;
            for (let r = 1; r <= 3 && !found; r++) {
              for (let dy = -r; dy <= r && !found; dy++) {
                for (let dx = -r; dx <= r && !found; dx++) {
                  if (Math.max(Math.abs(dx), Math.abs(dy)) !== r) continue;
                  const ntx = aTX + dx, nty = aTY + dy;
                  if (ntx < 0 || ntx >= MAP_W || nty < 0 || nty >= MAP_H) continue;
                  if (isTileWall(ntx, nty)) continue;
                  if (occupied.has(ntx + "," + nty)) continue;
                  aTX = ntx; aTY = nty;
                  found = true;
                }
              }
            }
          }
          snapEnemyToTile(ally, aTX, aTY);
          resetAllyBuffs(ally);
        }

        // ── イニシアチブロール (プレイヤー + 仲間 + 敵) ──
        const units = [
          { kind: "player", name: getLeaderName(), dex: playerStats.dex },
          ...allies.filter(a => a.alive).map(a => ({
            kind: "ally",
            ally: a,
            name: a.def.name,
            dex: a.dex || 0,
          })),
          ...encounterEnemyIndices.map(i => ({
            kind: "enemy",
            idx: i,
            name: enemies[i].def.name,
            dex: enemies[i].def.dex || 0,
          })),
        ];
        for (const u of units) {
          const n = d20();
          u.initiative = n + u.dex;
          const html =
            `<span class="label">INITIATIVE</span>` +
            `1d20(${n})${signedDD(u.dex)} = <span class="big">${u.initiative}</span>`;
          if (u.kind === "player") showRollAtPlayer(html, "init");
          else if (u.kind === "ally") showRollAtAlly(u.ally, html, "init");
          else                     showRollAtEnemy(u.idx, html, "init");
          await sleepMs(380);
        }
        const sortUnits = () => units.sort((a, b) => {
          if (b.initiative !== a.initiative) return b.initiative - a.initiative;
          // 同値: プレイヤー > 仲間 > 敵
          const prio = { player: 0, ally: 1, enemy: 2 };
          return (prio[a.kind] || 2) - (prio[b.kind] || 2);
        });
        sortUnits();
        updateInfo("行動順: " + units.map(u => `${u.name}(${u.initiative})`).join(" → "));
        await sleepMs(600);

        // ── ラウンドループ ──
        let round = 1;
        while (!gameOver && hp > 0 &&
               encounterEnemyIndices.some(i => enemies[i].alive)) {
          // 2ラウンド目以降: 近くに未参戦の敵がいれば増援として合流
          if (round > 1) {
            const reinforce = detectReinforcements();
            if (reinforce.length > 0) {
              const names = reinforce.map(i => enemies[i].def.name).join("、");
              showBanner("⚠ REINFORCEMENT ⚠", 1200);
              updateInfo(`敵の増援が合流! (${names})`);
              await sleepMs(900);
              for (const i of reinforce) {
                encounterEnemyIndices.push(i);
                const e = enemies[i];
                e.state = "idle";
                e.attackTimer = 0;
                e.attackHitDealt = false;
                e.path = [];
                e.pathTimer = 0;
                e.stunned = 0;

                const dexVal = e.def.dex || 0;
                const n = d20();
                const init = n + dexVal;
                units.push({
                  kind: "enemy",
                  idx: i,
                  name: e.def.name,
                  dex: dexVal,
                  initiative: init,
                });
                showRollAtEnemy(i,
                  `<span class="label">REINFORCE</span>1d20(${n})${signedDD(dexVal)} = <span class="big">${init}</span>`,
                  "init");
                await sleepMs(400);
              }
              sortUnits();
              await sleepMs(500);
            }
          }

          showBanner(`ROUND ${round}`, 850);
          await sleepMs(650);

          for (const actor of units) {
            if (gameOver || hp <= 0) break;
            if (!encounterEnemyIndices.some(i => enemies[i].alive)) break;
            if (actor.kind === "enemy" && !enemies[actor.idx].alive) continue;
            if (actor.kind === "ally" && !actor.ally.alive) continue;

            if (actor.kind === "player") {
              const tgtIdx = pickAliveEngagedIdx();
              if (tgtIdx < 0) break;
              await playerAttackTurn(tgtIdx);
            } else if (actor.kind === "ally") {
              await allyAttackTurn(actor.ally);
            } else {
              await enemyAttackTurn(actor.idx);
            }
            await sleepMs(220);
          }
          round++;
          if (round > 40) break;  // 安全ブレーキ
        }

        if (!(hp <= 0 || gameOver)) {
          // ── PT 立て直しフェーズ (演出は短めに、体感「固まり」を回避) ──
          showBanner("VICTORY", 1200);
          setPhase("rest");
          updateInfo("敵を撃破!");
          // 戦闘専用バフ (シールド・オブ・フェイス等の AC バフ、攻撃バフ、ダメ軽減) を消去
          // ターン経過で減算する仕様のため、戦闘終了時は明示的に切る必要がある
          resetPlayerBuffs();
          for (const a of allies) {
            if (a.alive) resetAllyBuffs(a);
          }
          await sleepMs(900);

          // 1. MP 回復 (勝利ボーナス: maxMp × 25% 切上げ)
          //    対象者が1人でもいれば「息を整える…」バナーを出す
          const mpRestorable = allies.some(a => a.alive && a.maxMp > 0 && a.mp < a.maxMp);
          if (mpRestorable) showBanner("息を整える…", 1500);
          let anyMpRestored = false;
          for (const a of allies) {
            if (!a.alive || a.maxMp <= 0) continue;
            const amt = Math.ceil(a.maxMp * 0.25);
            const prev = a.mp;
            a.mp = Math.min(a.maxMp, a.mp + amt);
            const actual = a.mp - prev;
            if (actual > 0) {
              anyMpRestored = true;
              flashAction(a.el, "skill");
              showHealAtAllyMp(a, actual);
              updateInfo(`${a.def.name}のMPが、${actual} 回復した。`);
              await sleepMs(450);
            }
          }
          await sleepMs(anyMpRestored ? 500 : 200);

          // 2. セカンドウィンド (装備していて HP 減っていれば発動)
          await triggerSecondWind();

          // 3. 行軍再開
          showBanner("行軍再開", 1100);
          updateInfo("探索再開");
          await sleepMs(700);
        }
      } catch (err) {
        console.error("encounter error", err);
      } finally {
        encounterEnemyIndices = [];
        encounterActive = false;
        // エンカウンター終了でセカンドウィンドの使用権を回復 (次戦の立て直し用)
        secondWindUsed = false;
        // 探索フェーズへ復帰 (敗北/ゲームオーバー以外)
        if (!gameOver && !dungeonCleared) setPhase("explore");
      }
    }

    // ═════════════════════════════════════════════════════════
    // スキルシステム(戦士)
    // ═════════════════════════════════════════════════════════
    // クラス定義 (僧侶)。Phase 1 は1キャラ分のみ。Phase 2 で他4クラス追加予定
    const CLASS_DEFS = {
      warrior: {
        name: "戦士",
        flavor: "鋼の意志と剣で道を切り開く前衛",
        sprite: "assets/warrior_walk.png?v=7",
        displaySize: 96,
        hpMax: 30,
        mpMax: 0,
        str: 3, dex: 1, con: 2, wis: 0, int: 0,
        atkBonus: 4, ac: 16,
        dmgDice: "1d8", dmgBonus: 3,
        critRange: 19, critMult: 2,
        weaponRange: "melee",
        weaponName: "ロングソード",
        armorName: "鋲打ち革鎧 +1",
