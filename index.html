  <div id="info"></div>
  <div id="battleBanner"></div>

  <!-- クリア/敗北オーバーレイ -->
  <div id="resultOverlay">
    <div id="resultBox">
      <div id="resultTitle">勝利</div>
      <div id="resultSub"></div>
      <div id="resultReward"></div>
      <button id="resultBtn">酒場に戻る</button>
    </div>
  </div>
  <div id="inventory">
    <h2>インベントリ</h2>
    <div class="invRow"><span class="invLabel">武器</span><span class="invValue" id="invWeapon">―</span></div>
    <div class="invRow"><span class="invLabel">防具</span><span class="invValue" id="invArmor">―</span></div>
    <div class="invRow"><span class="invLabel">コイン</span><span class="invValue" id="invCoins">0</span></div>
    <div class="invHint">[ I ] を押して閉じる</div>
  </div>
  <div id="player"></div>
  <div id="warriorHpBar" class="allyHpBar warrior"><div class="allyHpFill" id="warriorHpFill"></div></div>
  <div id="warriorLabel" class="allyLabel warrior">戦士</div>
  <div id="guardEffect"></div>
  <div id="counterAura"></div>
  <div id="moveMarker"></div>

  <!-- 敵関連の要素はJSで動的に生成 -->
  <div id="enemyLayer"></div>

  <script>
    // ── オーディオ薄ラッパ (audio.js 未読込でも安全に no-op) ──
    function sfx(n, o) { try { if (window.GameAudio) GameAudio.playSfx(n, o); } catch (e) {} }
    function bgm(n) { try { if (window.GameAudio) GameAudio.playBgm(n); } catch (e) {} }
    function voice(id) { try { if (window.GameAudio) GameAudio.playVoice(id); } catch (e) {} }
    if (window.GameAudio) GameAudio.applySettings();
    // 事前生成ナレーション音声 (VOICEVOX) の manifest を読込 (未生成なら no-op)
    try { if (window.GameAudio && GameAudio.loadVoiceManifest) GameAudio.loadVoiceManifest("assets/voice/manifest.json", "assets/voice/"); } catch (e) {}
    (function wireSettingsBtn() {
      var sb = document.getElementById("settingsBtn");
      if (sb) sb.addEventListener("click", function (ev) { ev.stopPropagation(); if (window.GameAudio) GameAudio.openSettings(); });
    })();
    // ─── Phase 2-K: 自動バグチェック (エラートラップ + バナー + localStorage 記録) ───
    (function setupErrorTrap() {
      const HISTORY_KEY = "dragonfighters.bugReport";
      const MAX_HISTORY = 20;
      function record(label, info) {
        try {
          const list = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
          list.unshift({ ts: new Date().toISOString(), label, info });
          while (list.length > MAX_HISTORY) list.pop();
          localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
        } catch (e) { /* localStorage 不可なら無視 */ }
      }
      function bugBanner(msg) {
        try {
          const el = document.createElement("div");
          el.className = "errorBugBanner";
          el.textContent = "⚠ " + msg;
          document.body.appendChild(el);
          setTimeout(() => { try { el.remove(); } catch {} }, 6000);
        } catch (e) {}
      }
      window.addEventListener("error", (ev) => {
        const msg = `${ev.message} @ ${ev.filename}:${ev.lineno}:${ev.colno}`;
        console.error("[BUG]", msg, ev.error);
        record("error", { msg, stack: ev.error && ev.error.stack });
        if (window.__diag) window.__diag.record("js-error", "critical", "JS エラー: " + ev.message, { msg });
        bugBanner(`JS エラー: ${ev.message}`);
      });
      window.addEventListener("unhandledrejection", (ev) => {
        const reason = ev.reason && (ev.reason.message || String(ev.reason));
        console.error("[BUG] unhandledrejection:", reason, ev.reason);
        record("rejection", { reason, stack: ev.reason && ev.reason.stack });
        if (window.__diag) window.__diag.record("js-rejection", "critical", "非同期エラー: " + reason, { reason });
        bugBanner(`非同期エラー: ${reason}`);
      });
      // ヘルパー API (console コマンドで使う)
      window.dumpBugReport = function() {
        return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
      };
      window.clearBugReport = function() {
        localStorage.removeItem(HISTORY_KEY);
        console.log("[BUG] history cleared");
      };
      window.__recordBugReport = record;   // 停滞検出から呼ぶ
      window.__bugBanner = bugBanner;
    })();

    // ─── Phase 2-K: autoplay モード URL パラメータ解析 ───
    // ?autoplay=1 → 5x 速度、?autoplay=10 → 10x、?autoplay=N (1-20 clamp)
    (function setupAutoplay() {
      try {
        const p = new URLSearchParams(window.location.search);
        const v = (p.get("autoplay") || "").toLowerCase();
        if (v === "" || v === "0" || v === "false") {
          window.__autoplay = 0;
        } else if (v === "1" || v === "true") {
          window.__autoplay = 5;
        } else {
          const n = parseInt(v, 10);
          window.__autoplay = isNaN(n) ? 0 : Math.max(1, Math.min(30, n));
        }
        if (window.__autoplay) {
          console.log("[AUTOPLAY] enabled, speed x" + window.__autoplay);
        }
      } catch (e) { window.__autoplay = 0; }
    })();

    // ─── 自動デバッグ巡回: ?autodebug=N / ?diag=1 パース + キャンペーン状態復元 ───
    // ?autodebug=N    → N ラン連続実行 (既定で全6シナリオ巡回)、autoplay 自動 ON
    // ?autodebug=resume → 巡回途中のページ再入 (localStorage のキャンペーン状態を継続)
    // ?scen=<id>      → 巡回を1シナリオ固定、?autoplay=N → 巡回速度上書き、?diag=1 → 検査のみ
    (function setupAutoDebugFlags() {
      const CK = "dragonfighters.debugCampaign";
      let campaign = null;
      try {
        const p = new URLSearchParams(window.location.search);
        const adRaw = (p.get("autodebug") || "").toLowerCase();
        if (adRaw === "resume") {
          try { campaign = JSON.parse(localStorage.getItem(CK) || "null"); } catch (e) {}
        } else if (adRaw && adRaw !== "0" && adRaw !== "false") {
          const n = Math.max(1, Math.min(50, parseInt(adRaw, 10) || 1));
          const ALL = ["goblin-mine", "bandits-forest", "lizard-swamp", "orc-fort", "undead-temple", "dragon-lair"];
          const scenParam = p.get("scen");
          const cycle = scenParam ? [scenParam] : ALL.slice();
          const speed = Math.max(1, Math.min(30, parseInt(p.get("autoplay") || "", 10) || 15));
          let startedAt = ""; try { startedAt = new Date().toISOString(); } catch (e) {}
          campaign = { total: n, done: 0, cycle, cycleIdx: 0, speed, startedAt };
          try { localStorage.setItem(CK, JSON.stringify(campaign)); } catch (e) {}
          // 新規巡回開始時は古いレポートを一掃 (累積を混ぜない)
          try { localStorage.removeItem("dragonfighters.debugReport"); } catch (e) {}
        }
        if (campaign && typeof campaign.done === "number" && campaign.done < campaign.total) {
          const idx = campaign.done % campaign.cycle.length;
          campaign.cycleIdx = idx;
          // line 3951 が sessionStorage を読む前にシナリオを確定させる
          try { sessionStorage.setItem("dragonfighters.currentScenario", campaign.cycle[idx]); } catch (e) {}
          window.__autodebug = campaign;
          window.__autoplay = campaign.speed || 15;
          console.log("[AUTODEBUG] run " + (campaign.done + 1) + "/" + campaign.total +
            " scenario=" + campaign.cycle[idx] + " speed x" + window.__autoplay);
        } else {
          window.__autodebug = null;
          if (campaign) console.log("[AUTODEBUG] campaign already complete");
        }
        window.__diagEnabled = !!(window.__autoplay || window.__autodebug || p.get("diag") === "1");
      } catch (e) {
        window.__autodebug = null;
        window.__diagEnabled = !!window.__autoplay;
      }
    })();

    const startScreen = document.getElementById("startScreen");
    const player = document.getElementById("player");
    const guardEffect = document.getElementById("guardEffect");
    const counterAura = document.getElementById("counterAura");
    const info = document.getElementById("info");
    const moveMarker = document.getElementById("moveMarker");

    // ── タイルマップ / カメラ ──────────────────────────────────────
    const mapCanvas = document.getElementById("mapCanvas");
    const ctx = mapCanvas.getContext("2d");
    const lightingCanvas = document.getElementById("lightingCanvas");
    const lctx = lightingCanvas.getContext("2d");

    const TILE_SIZE = 96;
    const MAP_W = 95;
    const MAP_H = 28;
    // スプライト中心(96px)→タイル中心の整合オフセット
    // playerWidth=playerHeight=96 = TILE_SIZE なので両軸ゼロ
    // (=スプライト top-left をセル top-left に置けばスプライト中心がセル中心になる)
    const SNAP_X_OFFSET = TILE_SIZE / 2 - 48;
    const SNAP_Y_OFFSET = TILE_SIZE / 2 - 48;

    // ── タイルセット(Calciumtrice dungeon tileset, CC-BY 3.0) ──
    const tileset = new Image();
    tileset.src = "assets/tileset.png";
    let tilesetLoaded = false;
    tileset.onload = () => { tilesetLoaded = true; updateCamera(); renderMap(); renderLighting(); };

    // ── 統一床テクスチャ (93x93 石畳、回転バリエーションで単調さ防止) ──
    const floorTex = new Image();
    floorTex.src = "assets/床2.png";
    let floorTexLoaded = false;
    floorTex.onload = () => { floorTexLoaded = true; renderMap(); };

    // ── シナリオ別シームレステクスチャ (ワールド座標アンカーで連続描画) ──
    // 新シナリオの素材を追加するときは下の SCENARIO_TEX に1行足すだけでよい
    // 生成クエスト (酒場の掲示板) があれば themeId をテクスチャ/情景のテーマ選択に優先採用
    let _genScenForTex = null;
    try {
      const _gtRaw = sessionStorage.getItem("dragonfighters.generatedScenario");
      _genScenForTex = _gtRaw ? JSON.parse(_gtRaw) : null;
    } catch (e) { _genScenForTex = null; }
    const _scenIdForTex = (_genScenForTex && _genScenForTex.themeId)
      ? _genScenForTex.themeId
      : (sessionStorage.getItem("dragonfighters.currentScenario") || "goblin-mine");
    const SCENARIO_TEX = {
      "goblin-mine":    { floor: "床1.png",        wall: "壁1.png" },
      "bandits-forest": { floor: "シナリオ2床.png", wall: "シナリオ2壁.png" },
      "lizard-swamp":   { floor: "シナリオ3床.png", wall: "シナリオ3壁.png" },
      "orc-fort":       { floor: "シナリオ4床.png", wall: "シナリオ4壁.png" },
      "undead-temple":  { floor: "シナリオ5床.png", wall: "シナリオ5壁.png" },
      "dragon-lair":    { floor: "シナリオ6床.png", wall: "シナリオ6壁.png" },
      // 未登録 scenarioId は廃坑テクスチャにフォールバック (素材追加時にここへ)
    };
    const _texSet = SCENARIO_TEX[_scenIdForTex] || SCENARIO_TEX["goblin-mine"];

    let floorPattern = null;
    const floorTex1 = new Image();
    floorTex1.src = "assets/" + _texSet.floor;
    floorTex1.onload = () => {
      floorPattern = ctx.createPattern(floorTex1, "repeat");
      renderMap();
    };
    let wallPattern = null;
    const wallTex1 = new Image();
    wallTex1.src = "assets/" + _texSet.wall;
    wallTex1.onload = () => {
      wallPattern = ctx.createPattern(wallTex1, "repeat");
      renderMap();
    };

    // 壁掛け松明 (painterly・正面ビュー、北壁にぶら下がる)
    let torchWallImgLoaded = false;
    const torchWallImg = new Image();
    torchWallImg.src = "assets/torch_wall.png";
    torchWallImg.onload = () => {
      torchWallImgLoaded = true;
      renderMap();
    };

    // スプライト座標(tileset.png 内ピクセル)
    const SPR_CEILING = [160, 16, 16, 16];                          // 暗い天井
    // 床バリエーション(16x16): 中央用タイルのみ厳選(エッジタイル除外で部屋中央に違和感が出ない)
    // 廃坑トーン: 黒い斑点・汚れ多めを混ぜる
    const SPR_FLOORS  = [
      [ 32, 80], [ 64, 80], [ 80, 80], [ 96, 80],   // 中央床(普通)
      [240, 80], [256, 80], [272, 80],              // 中央床(エッジなし)
      [ 16, 96], [ 32, 96], [ 48, 96],              // 中央床(黒斑あり、廃坑感)
    ];
    // レア床(mapData=1)用: 暗い灰色で「日陰の岩場/濡れた石床」を表現
    const SPR_FLOORS_RARE = [
      [144, 96], [160, 96], [176, 96],
    ];
    // 壁中央バリエーション(16x32): プレーン+ヒビ違いで景観に変化
    const SPR_WALL_MID_VARIANTS = [
      [ 48, 16, 16, 32], [ 48, 16, 16, 32], [ 48, 16, 16, 32],  // プレーン(出現率多め)
      [ 64, 16, 16, 32], [ 96, 16, 16, 32],                     // プレーン違い
      [ 16, 16, 16, 32], [ 32, 16, 16, 32],                     // ヒビ深め(廃坑感)
    ];
    const SPR_WALL_MID  = [ 48, 16, 16, 32];  // 壁中央(フォールバック)
    const SPR_WALL_LEND = [  0, 16, 16, 32];  // 壁左端
    const SPR_WALL_REND = [ 80, 16, 16, 32];  // 壁右端

    function tileHash(tx, ty) {
      let h = ((tx | 0) * 73856093) ^ ((ty | 0) * 19349663);
      return (h >>> 0);
    }

    let camX = 0;
    let camY = 0;

    function resizeCanvas() {
      mapCanvas.width = window.innerWidth;
      mapCanvas.height = window.innerHeight;
      ctx.imageSmoothingEnabled = false;
      lightingCanvas.width = window.innerWidth;
      lightingCanvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // 部屋定義: [r1, c1, r2, c2](ワールド共通)
    // 廃坑シナリオ: 6部屋の横一本道構成
    const ROOMS = [
      [ 9,  2, 18, 11],   // 0 A スタート (10×10)
      [ 8, 15, 19, 26],   // 1 B 中 (12×12)
      [ 7, 30, 20, 43],   // 2 C 大広間 (14×14)
      [ 8, 47, 19, 58],   // 3 D 中 (12×12)
      [ 7, 62, 20, 75],   // 4 E 大広間 (14×14)
      [ 5, 79, 22, 94],   // 5 F ボス部屋 (18×16)
    ];
    // 廊下: [r1, c1, r2, c2] 3幅 (row 13-15)、横一本道
    // (scenery 配置の auto-reserve でも参照するためグローバル化)
    const CORRIDORS = [
      [13, 11, 15, 15],   // A-B
      [13, 26, 15, 30],   // B-C
      [13, 43, 15, 47],   // C-D
      [13, 58, 15, 62],   // D-E
      [13, 75, 15, 79],   // E-F (ボスへ)
    ];

    function buildMap() {
      const map = Array.from({length: MAP_H}, () => Array(MAP_W).fill(2));
      function fill(r1, c1, r2, c2, t) {
        for (let r = r1; r <= r2; r++)
          for (let c = c1; c <= c2; c++)
            map[r][c] = t;
      }

      // 13 部屋(大/中/小ミックス) + 不規則な廊下
      for (const [r1, c1, r2, c2] of ROOMS) {
        fill(r1, c1, r2, c2, 0);
        for (let r = r1; r <= r2; r++)
          for (let c = c1; c <= c2; c++)
            if (((r * 7 + c * 13) ^ (r * 3 - c)) % 5 === 0) map[r][c] = 1;
      }
      for (const [r1, c1, r2, c2] of CORRIDORS) fill(r1, c1, r2, c2, 0);

      return map;
    }
    const mapData = buildMap();

    // ── フォグオブウォー強化: 職業別視界レンジ + 探索記憶 ──────────────
    // tiles=視界半径(タイル数、視界/エンカウント判定用)、inner/outer=放射光半径(px、drawLight用)
    // 仕様: ドワーフ広い(インフラビジョン)→エルフやや広い→戦士/僧侶/盗賊 標準→魔法使いやや狭い
    const CLASS_SIGHT = {
      mage:    { tiles: 3, inner: 120, outer: 260 },
      warrior: { tiles: 4, inner: 150, outer: 330 },
      cleric:  { tiles: 4, inner: 150, outer: 330 },
      rogue:   { tiles: 4, inner: 150, outer: 330 },
      elf:     { tiles: 5, inner: 180, outer: 400 },
      dwarf:   { tiles: 6, inner: 210, outer: 470 },
    };
    const DEFAULT_SIGHT = CLASS_SIGHT.warrior;
    function getSight(classKey) { return CLASS_SIGHT[classKey] || DEFAULT_SIGHT; }
    // 探索記憶(ロード毎に0初期化、シナリオ跨ぎリセット不要)。
    //   exploredTiles: 一度視認したタイル=1(累積)。visibleTiles: 現在視界内=1(毎更新クリア)。
    const exploredTiles = Array.from({ length: MAP_H }, () => new Uint8Array(MAP_W));
    const visibleTiles  = Array.from({ length: MAP_H }, () => new Uint8Array(MAP_W));
    let lastVisSignature = "";

    // ── 部屋ペインティング(painterly オーバーレイ)──────────────────
    // シナリオ別に、特定の部屋を 1枚絵 (PNG) でレンダリング。
    // tileBounds = [r1, c1, r2, c2] (両端含む、画像はこの矩形ぴったりを覆う)
    // 画像が無ければ自動でタイルベース描画にフォールバック。
    const ROOM_PAINTINGS_DEF = {
      "lizard-swamp": {
        0: {  // ROOM 0 スタート部屋 (沼地の畔)
          src: "assets/room_lizard-swamp_0.png",
          tileBounds: [7, 0, 20, 13],   // 14×14 = 1344×1344px
        },
        1: {  // ROOM 1 古い橋桁の残骸エリア (12×12 床 + 外周 1 タイル壁 + 余白 1 タイル)
          src: "assets/room_lizard-swamp_1.png",
          tileBounds: [7, 14, 20, 27],  // 14×14 = 1344×1344px、東西両側に廊下開口
        },
        2: {  // ROOM 2 古代石組の祭壇広場 (14×14 床 + 外周 1 タイル壁)
          src: "assets/room_lizard-swamp_2.png",
          tileBounds: [6, 29, 21, 44],  // 16×16 = 1536×1536px、東西両側に廊下開口
        },
        3: {  // ROOM 3 リザードマンの見張り野営跡 (12×12 床 + 外周 1 タイル壁 + 余白 1 タイル)
          src: "assets/room_lizard-swamp_3.png",
          tileBounds: [7, 46, 20, 59],  // 14×14 = 1344×1344px、東西両側に廊下開口
        },
        4: {  // ROOM 4 蛇神の社・血染めの儀式広場 (14×14 床 + 外周 1 タイル壁)
          src: "assets/room_lizard-swamp_4.png",
          tileBounds: [6, 61, 21, 76],  // 16×16 = 1536×1536px、東西両側に廊下開口 (ファラクサス信仰の伏線)
        },
        5: {  // ROOM 5 族長の謁見の間・血塗聖域 (18×16 床、Sce3 最深部ボス部屋)
          src: "assets/room_lizard-swamp_5.png",
          tileBounds: [6, 79, 21, 94],  // 16×16 = 1536×1536px、床中心部のみ painting、西開口・東は巨大蛇神像で impassable
        },
      },
    };

    const roomPaintings = [];        // { img, canvas, loaded, tx, ty, tw, th, px, py, pw, ph }
    const paintedTileMask = new Uint8Array(MAP_W * MAP_H);
    // 外周 N タイル分は painting の alpha をフェードし、下のタイル描画と混ぜる
    // (painting と周辺タイル両方を描く帯 → 継ぎ目が溶け込む)
    const PAINTING_FEATHER_TILES = 1;
    (function loadRoomPaintings() {
      const defs = ROOM_PAINTINGS_DEF[_scenIdForTex];
      if (!defs) return;
      for (const def of Object.values(defs)) {
        const [r1, c1, r2, c2] = def.tileBounds;
        const entry = {
          loaded: false,
          canvas: null,
          tx: c1, ty: r1, tw: c2 - c1 + 1, th: r2 - r1 + 1,
          px: c1 * TILE_SIZE,
          py: r1 * TILE_SIZE,
          pw: (c2 - c1 + 1) * TILE_SIZE,
          ph: (r2 - r1 + 1) * TILE_SIZE,
          img: new Image(),
        };
        entry.img.onload = () => {
          // 四辺フェード処理 (各辺 1 タイル分を alpha 1→0 にグラデで削る)
          const w = entry.img.naturalWidth;
          const h = entry.img.naturalHeight;
          const off = document.createElement("canvas");
          off.width = w;
          off.height = h;
          const octx = off.getContext("2d");
          octx.drawImage(entry.img, 0, 0);
          const featherW = Math.round(w * PAINTING_FEATHER_TILES / entry.tw);
          const featherH = Math.round(h * PAINTING_FEATHER_TILES / entry.th);
          octx.globalCompositeOperation = "destination-out";
          let g;
          // 上辺: 外側 (y=0) で alpha=1 (削る) → 内側 (y=featherH) で alpha=0 (残す)
          g = octx.createLinearGradient(0, 0, 0, featherH);
          g.addColorStop(0, "rgba(0,0,0,1)"); g.addColorStop(1, "rgba(0,0,0,0)");
          octx.fillStyle = g; octx.fillRect(0, 0, w, featherH);
          // 下辺
          g = octx.createLinearGradient(0, h, 0, h - featherH);
          g.addColorStop(0, "rgba(0,0,0,1)"); g.addColorStop(1, "rgba(0,0,0,0)");
          octx.fillStyle = g; octx.fillRect(0, h - featherH, w, featherH);
          // 左辺
          g = octx.createLinearGradient(0, 0, featherW, 0);
          g.addColorStop(0, "rgba(0,0,0,1)"); g.addColorStop(1, "rgba(0,0,0,0)");
          octx.fillStyle = g; octx.fillRect(0, 0, featherW, h);
          // 右辺
          g = octx.createLinearGradient(w, 0, w - featherW, 0);
          g.addColorStop(0, "rgba(0,0,0,1)"); g.addColorStop(1, "rgba(0,0,0,0)");
          octx.fillStyle = g; octx.fillRect(w - featherW, 0, featherW, h);
          entry.canvas = off;
          entry.loaded = true;
        };
        entry.img.onerror = () => { /* フォールバック: 通常タイル描画のまま */ };
        entry.img.src = def.src;
        roomPaintings.push(entry);
        // painted-skip マスクは内側 (feather 帯を除く) のみ
        // 外側の帯は painting (feather alpha) と下のタイル描画を両方描く
        const inset = PAINTING_FEATHER_TILES;
        for (let r = r1 + inset; r <= r2 - inset; r++) {
          for (let c = c1 + inset; c <= c2 - inset; c++) {
            if (r < 0 || r >= MAP_H || c < 0 || c >= MAP_W) continue;
            paintedTileMask[r * MAP_W + c] = 1;
          }
        }
      }
    })();
    function isPaintedTile(tx, ty) {
      if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
      return paintedTileMask[ty * MAP_W + tx] === 1;
    }
    function isPaintedAndLoaded(tx, ty) {
      if (!isPaintedTile(tx, ty)) return false;
      for (const p of roomPaintings) {
        if (!p.loaded) continue;
        if (tx >= p.tx && tx < p.tx + p.tw && ty >= p.ty && ty < p.ty + p.th) return true;
      }
      return false;
    }

    // ── 情景スプライト (草/葦/倒木/雑多) ─────────────────────────────
    // 部屋ペインティング上に procedural seeded random で散らす。
    // 大型 (倒木 全種, 葦 variant 2-3) のみ衝突あり → obstacleTileMask に登録。
    // シード = scenarioId + roomIdx で固定 → セッションをまたいで同じ配置。
    const SCENERY_FRAMES = {
      grass: [
        {x:75,y:460,w:211,h:87},   {x:331,y:405,w:226,h:148},
        {x:596,y:398,w:267,h:157}, {x:880,y:436,w:224,h:123},
        {x:1101,y:433,w:180,h:118},{x:1297,y:451,w:191,h:102},
      ],
      reed: [
        {x:114,y:374,w:200,h:250}, {x:393,y:340,w:327,h:314},
        {x:747,y:320,w:363,h:340}, {x:1124,y:325,w:370,h:335},
      ],
      log: [
        {x:49,y:472,w:480,h:122}, {x:555,y:471,w:449,h:130},
        {x:1043,y:472,w:441,h:125},
      ],
      detail: [
        {x:27,y:431,w:187,h:130},  {x:218,y:429,w:260,h:139},
        {x:480,y:426,w:170,h:141}, {x:657,y:418,w:168,h:147},
        {x:831,y:419,w:152,h:148}, {x:976,y:438,w:236,h:132},
        {x:1209,y:456,w:173,h:112},{x:1381,y:468,w:128,h:86},
      ],
      // ── 廃坑 (Sce1) 情景。frames.json (mine_scenery/_extract.py 出力) の実測値 ──
      rubble: [
        {x:16,y:298,w:272,h:177},   {x:324,y:251,w:333,h:247},
        {x:696,y:252,w:322,h:253},  {x:1057,y:306,w:311,h:187},
        {x:1401,y:160,w:431,h:360}, {x:1865,y:199,w:302,h:330},

    // シートメタデータ: src, blocking[variant], displayMax (画面上の最大辺 px)
    const SCENERY_SHEETS = {

      reed:   { src: "assets/swamp_reeds.png",  blocking: [false,false,true,true],                displayMax: [88,120,150,160],
                img: new Image(), loaded: false },
      log:    { src: "assets/fallen_logs.png",  blocking: [true,true,true],                       displayMax: 200,
                img: new Image(), loaded: false },
      detail: { src: "assets/swamp_detail.png", blocking: [false,false,false,false,false,false,false,false], displayMax: 60,
                img: new Image(), loaded: false },
      // ── 廃坑 (Sce1): 大型(トロッコ/大崩落/折れ支柱)はブロック、線路/小瓦礫は踏める ──
      rubble: { src: "assets/mine_rubble.png", blocking: [false,false,false,false,true,true], displayMax: [100,120,130,110,170,150],
                img: new Image(), loaded: false },

                img: new Image(), loaded: false },

    for (const [k, s] of Object.entries(SCENERY_SHEETS)) {
      s.img.onload  = () => { s.loaded = true; };
      s.img.onerror = () => { /* フォールバック: 描画 skip */ };

    }

    // シナリオ × 部屋ごとの配置レシピ (Sce3 全 6 部屋)
    // floorBounds = ROOMS[idx] と同値 (部屋床範囲)
    // 障害物配置禁止帯は CORRIDORS + ENEMY_SPAWNS + プレイヤー起点 から自動導出
    const SCENERY_RECIPES = {
      "lizard-swamp": {
        0: { floorBounds: [ 9,  2, 18, 11], counts: { grass: 40, reed: 14, log: 3, detail: 25 } },
        1: { floorBounds: [ 8, 15, 19, 26], counts: { grass: 56, reed: 20, log: 4, detail: 35 } },
        2: { floorBounds: [ 7, 30, 20, 43], counts: { grass: 78, reed: 27, log: 5, detail: 48 } },
        3: { floorBounds: [ 8, 47, 19, 58], counts: { grass: 56, reed: 20, log: 4, detail: 35 } },
        4: { floorBounds: [ 7, 62, 20, 75], counts: { grass: 78, reed: 27, log: 5, detail: 48 } },
        5: { floorBounds: [ 5, 79, 22, 94], counts: { grass: 90, reed: 28, log: 4, detail: 55 } },
      },
      // 廃坑: 入口Aは瓦礫(壊れた場所)中心、奥(B〜E)に線路+トロッコ、F(ボス)は控えめ
      "goblin-mine": {
        0: { floorBounds: [ 9,  2, 18, 11], counts: { rubble: 16, rail: 2, cart: 1 } },
        1: { floorBounds: [ 8, 15, 19, 26], counts: { rubble: 12, rail: 4, cart: 2 } },
        2: { floorBounds: [ 7, 30, 20, 43], counts: { rubble: 18, rail: 7, cart: 4 } },
        3: { floorBounds: [ 8, 47, 19, 58], counts: { rubble: 12, rail: 4, cart: 2 } },
        4: { floorBounds: [ 7, 62, 20, 75], counts: { rubble: 18, rail: 7, cart: 4 } },
        5: { floorBounds: [ 5, 79, 22, 94], counts: { rubble: 8,  rail: 3, cart: 1 } },
      },
    };

    // mulberry32 PRNG + FNV-1a 文字列 hash → 決定論的 RNG
    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
        let t = seed;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    function hashStr(s) {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < s.length; i++) {
        h ^= s.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    const obstacleTileMask = new Uint8Array(MAP_W * MAP_H);
    const sceneryPlacements = [];  // { kind, variant, tx, ty, jx, jy, blocking }

    // ENEMY_SPAWNS / プレイヤー起点情報がそろってから呼ぶ (currentScenario 確定後)
    function generateScenery(enemySpawns, playerStartTx, playerStartTy) {
      const recipes = SCENERY_RECIPES[_scenIdForTex];
      if (!recipes) return;
      // 自動 reserved: 廊下 + 2タイル膨張、敵スポーン + 1タイル膨張、プレイヤー起点 + 1タイル膨張
      const globalReserved = new Set();
      function reserveAround(r, c, buf) {
        for (let dr = -buf; dr <= buf; dr++) {
          for (let dc = -buf; dc <= buf; dc++) {
            const rr = r + dr, cc = c + dc;
            if (rr < 0 || rr >= MAP_H || cc < 0 || cc >= MAP_W) continue;
            globalReserved.add(rr * MAP_W + cc);
          }
        }
      }
      for (const [cr1, cc1, cr2, cc2] of CORRIDORS) {
        for (let r = cr1; r <= cr2; r++) {
          for (let c = cc1; c <= cc2; c++) reserveAround(r, c, 2);
        }
      }
      for (const sp of (enemySpawns || [])) {
        // sp = [type, x, y] (x=col, y=row)
        reserveAround(sp[2], sp[1], 1);
      }
      if (playerStartTx != null && playerStartTy != null) {
        reserveAround(playerStartTy, playerStartTx, 1);
      }

      for (const [roomIdx, def] of Object.entries(recipes)) {
        const rng = mulberry32(hashStr(_scenIdForTex + ":" + roomIdx));
        const [r1, c1, r2, c2] = def.floorBounds;
        const blockedTiles = new Set();
        function tryPlace(kind, count) {
          const sheet = SCENERY_SHEETS[kind];
          const frames = SCENERY_FRAMES[kind];
          let placed = 0, attempts = 0;
          const maxAttempts = count * 8;
          while (placed < count && attempts < maxAttempts) {
            attempts++;
            const variant = Math.floor(rng() * frames.length);
            const isBlocking = sheet.blocking[variant];
            const r = r1 + Math.floor(rng() * (r2 - r1 + 1));
            const c = c1 + Math.floor(rng() * (c2 - c1 + 1));
            const tileKey = r * MAP_W + c;
            if (isBlocking) {
              if (globalReserved.has(tileKey)) continue;
              if (blockedTiles.has(tileKey)) continue;
              blockedTiles.add(tileKey);
            }
            // flat 種(線路など)は地面に平置きするので jitter を抑える
            const isFlat = SCENERY_SHEETS[kind] && SCENERY_SHEETS[kind].flat;
            const jitterAmp = isFlat ? 6 : 28;
            const jx = (rng() - 0.5) * jitterAmp;
            const jy = (rng() - 0.5) * jitterAmp;
            sceneryPlacements.push({ kind, variant, tx: c, ty: r, jx, jy, blocking: isBlocking });
            placed++;
          }
        }
        for (const [kind, count] of Object.entries(def.counts)) tryPlace(kind, count);
        for (const k of blockedTiles) obstacleTileMask[k] = 1;
      }
      // 描画 z-order: 上(奥)→下(手前)、同 ty 帯では flat 種(線路)を先(下)に、その後 jy 昇順
      sceneryPlacements.sort((a, b) => {
        if (a.ty !== b.ty) return a.ty - b.ty;
        const fa = (SCENERY_SHEETS[a.kind] && SCENERY_SHEETS[a.kind].flat) ? 0 : 1;
        const fb = (SCENERY_SHEETS[b.kind] && SCENERY_SHEETS[b.kind].flat) ? 0 : 1;
        if (fa !== fb) return fa - fb;
        return a.jy - b.jy;
      });
    }

    // ── 装飾オブジェクト(非衝突)生成 ──────────────────────────────
    // タイルセット内座標(16x16)。ジャンルごとに複数バリエーション
    const DECO_SPRITES = {
      barrel: [[ 0, 256], [ 16, 256], [ 32, 256], [ 48, 256]],
      crate:  [[ 64, 256], [ 80, 256], [ 96, 256]],
      pot:    [[112, 256], [128, 256]],
      torch:  [[160, 256], [176, 256], [192, 256], [208, 256]],
      bones:  [[  0, 307], [ 16, 307], [ 32, 307]],
      potion: [[  0, 356], [ 16, 356], [ 32, 356], [ 48, 356]],
      scroll: [[144, 307], [160, 307], [176, 307]],
      // 廃坑感UP用 (floor decoration / levers)
      puddle: [[128, 192]],                       // 水たまり(青っぽい雲)
      gravel: [[144, 192], [160, 192]],           // 砂塵・瓦礫
      lever:  [[240, 256], [256, 256]],           // 廃坑の機械跡(レバー)
    };

    function buildDecorations() {
      const decos = [];
      const used = new Set();
      function key(tx, ty) { return ty * 100 + tx; }
      function place(tx, ty, kind, offsetY = 0) {
        if (used.has(key(tx, ty))) return;
        if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return;
        if (mapData[ty][tx] === 2) return;
        const variants = DECO_SPRITES[kind];
        const v = variants[tileHash(tx, ty * 13 + 7) % variants.length];
        decos.push({ tx, ty, sx: v[0], sy: v[1], offsetY, kind });
        used.add(key(tx, ty));
      }

      // 部屋の角や壁際に装飾を置く
      for (let ty = 0; ty < MAP_H; ty++) {
        for (let tx = 0; tx < MAP_W; tx++) {
          if (mapData[ty][tx] === 2) continue;
          const wallN = ty > 0 && mapData[ty - 1][tx] === 2;
          const wallS = ty < MAP_H - 1 && mapData[ty + 1][tx] === 2;
          const wallW = tx > 0 && mapData[ty][tx - 1] === 2;
          const wallE = tx < MAP_W - 1 && mapData[ty][tx + 1] === 2;
          const corner = (wallN && wallW) || (wallN && wallE) || (wallS && wallW) || (wallS && wallE);
          const h = tileHash(tx, ty);

          // 北壁の真下 → 松明(壁面に取り付ける) — 他の装飾はいったん廃止
          // 旧 h%11 (1/11) は疎すぎて部屋に1個も入らないことがあった → h%5 (1/5) に
          if (wallN && (h % 5 === 0)) { place(tx, ty, 'torch', -8); continue; }
        }
      }
      return decos;
    }
    const decorations = buildDecorations();

    function isTileWall(tileX, tileY) {
      if (tileX < 0 || tileY < 0 || tileX >= MAP_W || tileY >= MAP_H) return true;
      if (mapData[tileY][tileX] === 2) return true;
      // 情景スプライト (倒木 / 大型葦) もブロック扱い
      return obstacleTileMask[tileY * MAP_W + tileX] === 1;
    }

    let playerMovingThisFrame = false;
    let wasGuardingVisual = false;

    // ── 戦士スプライト (流浪の傭兵 painterly、他キャラと同規格) ─────
    // 歩行: warrior_walk.png (576×384, 4行×6列、row 3 のみ実データ)
    // 攻撃: warrior_attack.png (480×384, 4行×5列、row 3 のみ実データ)
    // 待機/ガード: 旧 simple_knight.png (480×1152, 12行) を一部流用
    const KNIGHT_CAST_ROW   = { down: 8, up: 9, left: 10, right: 11 };
    const KNIGHT_SHEET_URL  = 'url("assets/simple_knight.png")';
    const KNIGHT_SHEET_SIZE = "480px 1152px";
    const WARRIOR_WALK_URL  = 'url("assets/warrior_walk.png?v=7")';
    const WARRIOR_WALK_SIZE = "576px 384px";
    const WARRIOR_ATTACK_URL  = 'url("assets/warrior_attack.png?v=10")';
    const WARRIOR_ATTACK_SIZE = "480px 384px";
    // ── Phase 3 第2段階: リーダークラス別スプライト (見た目だけ動的化) ──
    // 全キャラ 6F walk + 5F attack 規格、サイズ統一 (576×384 walk / 480×384 attack)
    const LEADER_SPRITES = {
      warrior: { walk: WARRIOR_WALK_URL, attack: WARRIOR_ATTACK_URL,
                 walkSize: WARRIOR_WALK_SIZE, attackSize: WARRIOR_ATTACK_SIZE },
      dwarf:   { walk: 'url("assets/dwarf_walk.png")',   attack: 'url("assets/dwarf_attack.png")',
                 walkSize: "576px 384px", attackSize: "480px 384px" },
      cleric:  { walk: 'url("assets/cleric_walk.png")',  attack: 'url("assets/cleric_attack.png")',
                 walkSize: "576px 384px", attackSize: "480px 384px" },
      mage:    { walk: 'url("assets/mage_walk.png")',    attack: 'url("assets/mage_attack.png")',
                 walkSize: "576px 384px", attackSize: "480px 384px" },
      elf:     { walk: 'url("assets/elf_walk.png")',     attack: 'url("assets/elf_attack.png")',
                 walkSize: "576px 384px", attackSize: "480px 384px" },
      rogue:   { walk: 'url("assets/rogue_walk.png")',   attack: 'url("assets/rogue_attack.png")',
                 walkSize: "576px 384px", attackSize: "480px 384px" },
    };
    // パーティ編成 (sessionStorage 経由) の先頭がリーダー = プレイヤーキャラ
    let leaderClassKey = "warrior";  // 初期値、後で partyComposition から上書き
    let leaderVariant = 0;           // 頭のスプライト変種 (主人公=0/正規、NPC頭=割当て変種)
    // ── パーティ編成 (Q1=B): 頭(player アバター)と主人公(isHero)を分離 ──
    let heroIsHead = true;       // 頭(player)が主人公本人か (主人公が前衛=warrior/dwarf なら true)
    let heroRef = null;          // 主人公が ally の場合の参照 (頭でない時=主人公が mid/rear)
    let headDisplayName = "";    // 頭の表示名 (NPC=個人名 / 主人公="あなた")
    let leaderLevel = 1;         // 頭(player)の実効レベル (主人公=永続Lv / NPC=ティア帯Lv)
    let knightFrameTick = 0;
    let lastSpriteUrl = null;
    function setSpriteSheet(url, size) {
      if (lastSpriteUrl === url) return;
      lastSpriteUrl = url;
      player.style.backgroundImage = url;
      player.style.backgroundSize = size;
    }
    function updateKnightSprite() {
      knightFrameTick++;
      let framesPerStep, frameCount;
      // FFタクティクス風: 右向きのみ使用、左向きは CSS flip
      // シートの右向き行を基準に使用 (row=3 が右向き)
      const row = 3;
      // 左向き時だけ水平反転
      player.style.transform = facing === "left" ? "scaleX(-1)" : "";
      // リーダークラス + 変種のスプライトを引く (主人公=0/正規、NPC頭=割当て変種)
      const sprites = getSpriteSet(leaderClassKey, leaderVariant) || LEADER_SPRITES[leaderClassKey] || LEADER_SPRITES.warrior;
      if (attackActive) {
        const atkFrame = Math.min(4, Math.floor(currentSwingProgress * 5));
        setSpriteSheet(sprites.attack, sprites.attackSize);
        player.style.backgroundPosition = `${-atkFrame * 96}px ${-row * 96}px`;
        return;
      } else if (leaderSpellAnimActive) {
        // ally系スキルをリーダーがアダプタ経由で使ったとき: 攻撃シートを elapsed 比例で再生
        const elapsed = performance.now() - leaderSpellAnimStart;
        if (elapsed >= leaderSpellAnimDuration) {
          // setTimeout 遅延の保険
          leaderSpellAnimActive = false;
        } else {
          const progress = Math.min(1, elapsed / leaderSpellAnimDuration);
          const frame = Math.min(4, Math.floor(progress * 5));
          setSpriteSheet(sprites.attack, sprites.attackSize);
          player.style.backgroundPosition = `${-frame * 96}px ${-row * 96}px`;
          return;
        }
      }
      if (isGuarding) {
        // 戦士のみ simple_knight のガードフレームを使う (他クラスは walk 静止で代用)
        if (leaderClassKey === "warrior") {
          setSpriteSheet(KNIGHT_SHEET_URL, KNIGHT_SHEET_SIZE);
          const guardFrame = 3;
          player.style.backgroundPosition = `${-guardFrame * 96}px ${-11 * 96}px`;
        } else {
          setSpriteSheet(sprites.walk, sprites.walkSize);
          player.style.backgroundPosition = `0 ${-row * 96}px`;
        }
        return;
      } else if (playerMovingThisFrame) {
        setSpriteSheet(sprites.walk, sprites.walkSize);
        framesPerStep = 5;
        frameCount = 6;
      } else {
        setSpriteSheet(sprites.walk, sprites.walkSize);
        framesPerStep = 1;
        frameCount = 1;
      }
      const frame = Math.floor(knightFrameTick / framesPerStep) % frameCount;
      player.style.backgroundPosition = `${-frame * 96}px ${-row * 96}px`;
    }

    function tryMoveX(delta) {
      if (delta === 0) return;
      let remaining = delta;
      while (Math.abs(remaining) > 0.25) {
        const nx = playerX + remaining;
        if (!wouldOverlapWall(nx+28, playerY+34, nx+68, playerY+82)) {
          if (nx !== playerX) playerMovingThisFrame = true;
          playerX = nx;
          return;
        }
        remaining *= 0.5;
      }
    }
    function tryMoveY(delta) {
      if (delta === 0) return;
      let remaining = delta;
      while (Math.abs(remaining) > 0.25) {
        const ny = playerY + remaining;
        if (!wouldOverlapWall(playerX+28, ny+34, playerX+68, ny+82)) {
          if (ny !== playerY) playerMovingThisFrame = true;
          playerY = ny;
          return;
        }
        remaining *= 0.5;
      }
    }

    function wouldOverlapWall(left, top, right, bottom) {
      const tx0 = Math.floor(left / TILE_SIZE);
      const ty0 = Math.floor(top / TILE_SIZE);
      const tx1 = Math.floor((right - 1) / TILE_SIZE);
      const ty1 = Math.floor((bottom - 1) / TILE_SIZE);
      for (let ty = ty0; ty <= ty1; ty++)
        for (let tx = tx0; tx <= tx1; tx++)
          if (isTileWall(tx, ty)) return true;
      return false;
    }

    // UI 領域サイズ (ダンジョン描画を避ける領域)
    const UI_MENU_WIDTH = 280;   // 左側ステータスパネル領域
    const UI_LOG_HEIGHT = 170;   // 下側ログ領域
    // 主人公(hero)のワールド座標を取得。カメラは前衛(隊列先頭)ではなく主人公を中央に据えるため、
    // heroIsHead なら先頭 playerX/Y、主人公が ally なら heroRef(無ければ allies 内の hero) を返す。
    function getHeroWorldPos() {
      if (heroIsHead) return { x: playerX, y: playerY, w: playerWidth, h: playerHeight };
      const h = heroRef || (typeof allies !== "undefined" ? allies.find(a => a && a.isHero) : null);
      if (h && h.alive) {
        const s = (h.def && h.def.displaySize) || 96;
        return { x: h.x, y: h.y, w: s, h: s };
      }
      return { x: playerX, y: playerY, w: playerWidth, h: playerHeight };   // フォールバック (主人公不在/死亡)
    }

    function updateCamera() {
      // 主人公を「ダンジョン領域 (メニュー/ログ除外後)」の中央に据える
      const usableW = window.innerWidth - UI_MENU_WIDTH;
      const usableH = window.innerHeight - UI_LOG_HEIGHT;
      const centerScreenX = UI_MENU_WIDTH + usableW / 2;
      const centerScreenY = usableH / 2;
      // (1) 主人公中央の希望カメラ
      const hero = getHeroWorldPos();
      let cx = hero.x + hero.w / 2 - centerScreenX;
      let cy = hero.y + hero.h / 2 - centerScreenY;
      // (2) 工夫: 隊列(先頭+生存仲間)が画面外に出ないよう、全員が収まる範囲にカメラをクランプ。
      //     可視ワールド矩形 x∈[camX+UI_MENU_WIDTH, camX+innerWidth] / y∈[camY, camY+usableH]。
      //     通常は主人公が中央、隊列が端に達した時だけ最小限ずれて全員を画面内に保つ。
      let minX = playerX, minY = playerY, maxX = playerX + playerWidth, maxY = playerY + playerHeight;
      if (typeof allies !== "undefined") {
        for (const a of allies) {
          if (!a || !a.alive) continue;
          const s = (a.def && a.def.displaySize) || 96;
          if (a.x < minX) minX = a.x;
          if (a.y < minY) minY = a.y;
          if (a.x + s > maxX) maxX = a.x + s;
          if (a.y + s > maxY) maxY = a.y + s;
        }
      }
      const M = 48;   // 画面端マージン
      const loCx = maxX - window.innerWidth + M, hiCx = minX - UI_MENU_WIDTH - M;
      const loCy = maxY - usableH + M,          hiCy = minY - M;
      // 区間が成立(隊列が画面に収まる)→希望カメラを範囲にクランプ / 空(隊列が画面より大)→bbox 中央寄せ
      cx = (loCx <= hiCx) ? Math.max(loCx, Math.min(cx, hiCx)) : (loCx + hiCx) / 2;
      cy = (loCy <= hiCy) ? Math.max(loCy, Math.min(cy, hiCy)) : (loCy + hiCy) / 2;
      // (3) マップ境界クランプ (既存): マップ左端が menu 右側に張り付くまで / 下端が log 上端より下に行かない
      const minCamX = -UI_MENU_WIDTH;
      const maxCamX = Math.max(minCamX, MAP_W * TILE_SIZE - window.innerWidth);
      const minCamY = 0;
      const maxCamY = Math.max(minCamY, MAP_H * TILE_SIZE - (window.innerHeight - UI_LOG_HEIGHT));
      camX = Math.max(minCamX, Math.min(cx, maxCamX));
      camY = Math.max(minCamY, Math.min(cy, maxCamY));
    }

    function isNorthWall(tx, ty) {
      // 「床の北側にある壁」= 壁立て描画の対象
      if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
      if (mapData[ty][tx] !== 2) return false;
      if (ty + 1 >= MAP_H) return false;
      return mapData[ty + 1][tx] !== 2;
    }

    // ── 動的ライティング(フォグオブウォー + 松明 + プレイヤー視野) ──
    function renderLighting() {
      const W = lightingCanvas.width;
      const H = lightingCanvas.height;
      // 未探索タイル用: ほぼ完全な暗闇
      lctx.globalCompositeOperation = "source-over";
      lctx.fillStyle = "rgba(3, 5, 10, 1.0)";
      lctx.fillRect(0, 0, W, H);

      // 明かりは destination-out で暗闇を削って描画する
      lctx.globalCompositeOperation = "destination-out";

      // 探索記憶レイヤー(3状態フォグ): 一度視認したタイルを薄明で「記憶」表示する。
      // destination-out なので暗幕の α を 0.30 だけ削る = 薄明(dst≈0.70)。
      // 現在視界はこの後の放射 drawLight 群が高 α で更に削り「明るい(dst≈0)」状態にする。
      // タイル 1 回ずつ塗る(同タイル重複塗りでの削りすぎを防止)。
      {
        const exStartTX = Math.max(0, Math.floor(camX / TILE_SIZE));
        const exStartTY = Math.max(0, Math.floor(camY / TILE_SIZE));
        const exEndTX = Math.min(MAP_W - 1, Math.ceil((camX + W) / TILE_SIZE));
        const exEndTY = Math.min(MAP_H - 1, Math.ceil((camY + H) / TILE_SIZE));
        lctx.fillStyle = "rgba(255,255,255,0.30)";
        for (let ty = exStartTY; ty <= exEndTY; ty++) {
          const exRow = exploredTiles[ty];
          for (let tx = exStartTX; tx <= exEndTX; tx++) {
            if (!exRow[tx]) continue;          // 未探索 → 塗らない → 暗黒のまま
            lctx.fillRect(tx * TILE_SIZE - camX, ty * TILE_SIZE - camY, TILE_SIZE, TILE_SIZE);
          }
        }
      }

      function drawLight(cx, cy, inner, outer, strongAlpha = 1, midAlpha = 0.55, rgb = "255,255,255") {
        const grad = lctx.createRadialGradient(cx, cy, 0, cx, cy, outer);
        grad.addColorStop(0, `rgba(${rgb},${strongAlpha})`);
        grad.addColorStop(inner / outer, `rgba(${rgb},${midAlpha})`);
        grad.addColorStop(1, `rgba(${rgb},0)`);
        lctx.fillStyle = grad;
        lctx.beginPath();
        lctx.arc(cx, cy, outer, 0, Math.PI * 2);
        lctx.fill();
      }

      // プレイヤー戦士の松明(大きめ&明るい・暖色)
      const pScreenX = playerX + 48 - camX;
      const pScreenY = playerY + 48 - camY;
      // ちらつき(tickで微変動)
      const flicker = 1 + Math.sin(Date.now() / 120) * 0.04 + Math.cos(Date.now() / 83) * 0.03;
      const pSight = getSight(leaderClassKey);
      drawLight(pScreenX, pScreenY, pSight.inner * flicker, pSight.outer * flicker, 1, 0.65);

      // 各仲間の視界 (クラスごとに色味を変えて差別化、プレイヤーより一回り小さい)
      const ALLY_LIGHT_RGB = {
        cleric: "255,240,200",   // 神聖な金色
        mage:   "200,220,255",   // 秘術の青
        dwarf:  "255,210,170",   // 暖炉の橙
        elf:    "220,255,220",   // 森の薄緑
      };
      if (typeof allies !== "undefined") {
        for (let i = 0; i < allies.length; i++) {
          const ally = allies[i];
          if (!ally.alive) continue;
          const cx = ally.x + ally.def.displaySize / 2 - camX;
          const cy = ally.y + ally.def.displaySize / 2 - camY;
          if (cx < -500 || cx > W + 500 || cy < -500 || cy > H + 500) continue;
          // 仲間ごとに位相をずらしたちらつき
          const af = 1 + Math.sin(Date.now() / 135 + i * 1.7) * 0.04
                       + Math.cos(Date.now() / 91  + i * 2.3) * 0.03;
          const rgb = ALLY_LIGHT_RGB[ally.classKey] || "255,255,255";
          const aSight = getSight(ally.classKey);
          drawLight(cx, cy, aSight.inner * af, aSight.outer * af, 0.9, 0.55, rgb);
        }
      }

      // 部屋の松明(装飾の torch を光源に)
      // 光源は炎の位置に合わせる: 新painterly画像なら床線から 60px 上 (画像上部の炎中心)、旧tilesetなら元位置
      // プレイヤーの光に負けないよう半径&明るさUP、暖色オレンジで「火」感を出す
      for (const d of decorations) {
        if (d.kind !== "torch") continue;
        const sx = d.tx * TILE_SIZE + TILE_SIZE / 2 - camX;
        const sy = torchWallImgLoaded
          ? (d.ty * TILE_SIZE - 60 - camY)
          : (d.ty * TILE_SIZE + TILE_SIZE / 2 - camY + d.offsetY * 6);
        if (sx < -200 || sx > W + 200 || sy < -200 || sy > H + 200) continue;
        const f = 1 + Math.sin(Date.now() / 140 + d.tx * 3 + d.ty * 5) * 0.06;
        drawLight(sx, sy, 80 * f, 200 * f, 0.95, 0.6, "255,180,90");
      }

      // Phase 2-I: 呪文の動的光源 (飛翔中の弾道 + 着弾フラッシュ)
      // spellLightSources は配列 [{worldX, worldY, inner, outer, strongAlpha, midAlpha, rgb, expireAt}, ...]
      const nowMs = Date.now();
      for (let i = spellLightSources.length - 1; i >= 0; i--) {
        const ls = spellLightSources[i];
        if (ls.expireAt && nowMs > ls.expireAt) {
          spellLightSources.splice(i, 1);
          continue;
        }
        const sx = ls.worldX - camX;
        const sy = ls.worldY - camY;
        if (sx < -ls.outer || sx > W + ls.outer || sy < -ls.outer || sy > H + ls.outer) continue;
        // フェード: expireAt が指定されていれば残り時間で alpha 減衰
        let alpha = ls.strongAlpha || 1;
        let midA  = ls.midAlpha || 0.55;
        if (ls.fadeMs && ls.expireAt) {
          const remain = Math.max(0, ls.expireAt - nowMs);
          const ratio = Math.min(1, remain / ls.fadeMs);
          alpha *= ratio;
          midA  *= ratio;
        }
        drawLight(sx, sy, ls.inner, ls.outer, alpha, midA, ls.rgb || "255,200,120");
      }

      lctx.globalCompositeOperation = "source-over";
    }

    // ── Phase 2-I: 呪文 fx の動的光源リスト ──
    // 弾道や着弾の動く/光る効果を renderLighting で描画する。
    // フィールド: worldX, worldY, inner, outer, strongAlpha, midAlpha, rgb, expireAt, fadeMs
    const spellLightSources = [];
    function addSpellLight(opts) {
      const src = {
        worldX: opts.worldX, worldY: opts.worldY,
        inner: opts.inner || 60, outer: opts.outer || 220,
        strongAlpha: opts.strongAlpha != null ? opts.strongAlpha : 1,
        midAlpha:    opts.midAlpha    != null ? opts.midAlpha    : 0.65,
        rgb: opts.rgb || "255,200,120",
        expireAt: opts.duration ? Date.now() + opts.duration : 0,
        fadeMs: opts.fadeMs || 0,
      };
      spellLightSources.push(src);
      return src;
    }

    function renderMap() {
      ctx.fillStyle = "#0a0a0a";
      ctx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);
      if (!tilesetLoaded) return;
      // canvas 範囲外への描画漏れ防止 (松明・部屋ペインティング等が画面外にはみ出すのを clip)
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 0, mapCanvas.width, mapCanvas.height);
      ctx.clip();
      const startTX = Math.max(0, Math.floor(camX / TILE_SIZE));
      const startTY = Math.max(0, Math.floor(camY / TILE_SIZE));
      const endTX = Math.min(MAP_W - 1, Math.ceil((camX + mapCanvas.width) / TILE_SIZE));
      const endTY = Math.min(MAP_H - 1, Math.ceil((camY + mapCanvas.height) / TILE_SIZE));

      // ── Pass 1a: 天井(void)セル — 暗い背景 ──
      // 部屋ペインティングが覆うセルはスキップ(painting に含まれる)
      for (let ty = startTY; ty <= endTY; ty++) {
        for (let tx = startTX; tx <= endTX; tx++) {
          if (mapData[ty][tx] !== 2) continue;
          if (isPaintedAndLoaded(tx, ty)) continue;
          const screenX = Math.round(tx * TILE_SIZE - camX);
          const screenY = Math.round(ty * TILE_SIZE - camY);
          const [sx, sy, sw, sh] = SPR_CEILING;
          ctx.drawImage(tileset, sx, sy, sw, sh, screenX, screenY, TILE_SIZE, TILE_SIZE);
        }
      }
      // ── Pass 1b: 床セル — 床1 シームレステクスチャをワールド座標アンカーで pattern fill ──
      // (隣接セルで模様が連続する。fall back は 床2 (1セル1枚) → tileset)
      // 部屋ペインティングが覆うセルはスキップ(painting に含まれる)
      if (floorPattern) {
        ctx.save();
        ctx.translate(-camX, -camY);
        ctx.fillStyle = floorPattern;
        for (let ty = startTY; ty <= endTY; ty++) {
          for (let tx = startTX; tx <= endTX; tx++) {
            if (mapData[ty][tx] === 2) continue;
            if (isPaintedAndLoaded(tx, ty)) continue;
            ctx.fillRect(tx * TILE_SIZE, ty * TILE_SIZE, TILE_SIZE, TILE_SIZE);
          }
        }
        ctx.restore();
      } else {
        for (let ty = startTY; ty <= endTY; ty++) {
          for (let tx = startTX; tx <= endTX; tx++) {
            if (mapData[ty][tx] === 2) continue;
            if (isPaintedAndLoaded(tx, ty)) continue;
            const screenX = Math.round(tx * TILE_SIZE - camX);
            const screenY = Math.round(ty * TILE_SIZE - camY);
            if (floorTexLoaded) {
              ctx.drawImage(floorTex, screenX, screenY, TILE_SIZE, TILE_SIZE);
            } else {
              const vi = tileHash(tx, ty) % SPR_FLOORS.length;
              const [sx, sy] = SPR_FLOORS[vi];
              ctx.drawImage(tileset, sx, sy, 16, 16, screenX, screenY, TILE_SIZE, TILE_SIZE);
            }
          }
        }
      }

      // ── Pass 1b.5: 部屋ペインティング — 床と天井の上に painterly 1枚絵を貼る ──
      // 画像未ロードならフォールバック(タイル描画は既に走っている)
      // フェザー済 canvas を優先 (外周 1タイル分が alpha フェード)
      for (const p of roomPaintings) {
        if (!p.loaded) continue;
        // 簡易カリング (画面外なら skip)
        const sx = Math.round(p.px - camX);
        const sy = Math.round(p.py - camY);
        if (sx + p.pw < 0 || sx > mapCanvas.width) continue;
        if (sy + p.ph < 0 || sy > mapCanvas.height) continue;
        ctx.drawImage(p.canvas || p.img, sx, sy, p.pw, p.ph);
      }

      // ── Pass 1b.6: 情景スプライト (草/葦/倒木/雑多) ──
      // 各 placement は seeded random で固定配置済 (sceneryPlacements)
      // sheet 未ロードなら skip (placement 自体は残るので後で出現)
      for (const sp of sceneryPlacements) {
        const sheet = SCENERY_SHEETS[sp.kind];
        if (!sheet || !sheet.loaded) continue;
        const fr = SCENERY_FRAMES[sp.kind][sp.variant];
        const dispMax = Array.isArray(sheet.displayMax) ? sheet.displayMax[sp.variant] : sheet.displayMax;
        const scale = dispMax / Math.max(fr.w, fr.h);
        const dw = fr.w * scale;
        const dh = fr.h * scale;
        const cx = sp.tx * TILE_SIZE + TILE_SIZE / 2 + sp.jx - camX;
        const cy = sp.ty * TILE_SIZE + TILE_SIZE / 2 + sp.jy - camY;
        // タイル中央に bbox 中央を合わせる (足元寄せはせず、jitter で散らす)
        const dx = Math.round(cx - dw / 2);
        const dy = Math.round(cy - dh / 2);
        // 画面外カリング
        if (dx + dw < 0 || dx > mapCanvas.width)  continue;
        if (dy + dh < 0 || dy > mapCanvas.height) continue;
        ctx.drawImage(sheet.img, fr.x, fr.y, fr.w, fr.h, dx, dy, dw, dh);
      }

      // ── Pass 1.2: 床にグリッド線 (床セルのみ、天井=2 にはひかない) ──
      ctx.strokeStyle = "rgba(0, 0, 0, 0.22)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let ty = startTY; ty <= endTY; ty++) {
        for (let tx = startTX; tx <= endTX; tx++) {
          if (mapData[ty][tx] === 2) continue;
          const screenX = Math.round(tx * TILE_SIZE - camX) + 0.5;
          const screenY = Math.round(ty * TILE_SIZE - camY) + 0.5;
          ctx.moveTo(screenX, screenY);
          ctx.lineTo(screenX + TILE_SIZE, screenY);
          ctx.moveTo(screenX, screenY);
          ctx.lineTo(screenX, screenY + TILE_SIZE);
          // 右端・下端のセルはマップ端の線も引く
          if (tx === endTX || mapData[ty][tx + 1] === 2) {
            ctx.moveTo(screenX + TILE_SIZE, screenY);
            ctx.lineTo(screenX + TILE_SIZE, screenY + TILE_SIZE);
          }
          if (ty === endTY || mapData[ty + 1] && mapData[ty + 1][tx] === 2) {
            ctx.moveTo(screenX, screenY + TILE_SIZE);
            ctx.lineTo(screenX + TILE_SIZE, screenY + TILE_SIZE);
          }
        }
      }
      ctx.stroke();

      // ── Pass 1.5: 装飾(床の上に置く小物、タイル中央に半分サイズで) ──
      // 壁掛け松明は壁の上に重ねるため Pass 2.5 で別途描画 (ここではスキップ)
      const DECO_SIZE = TILE_SIZE / 2;
      const DECO_PAD = (TILE_SIZE - DECO_SIZE) / 2;
      for (const d of decorations) {
        if (d.kind === "torch" && torchWallImgLoaded) continue;
        if (d.tx < startTX - 1 || d.tx > endTX + 1) continue;
        if (d.ty < startTY - 1 || d.ty > endTY + 1) continue;
        const screenX = Math.round(d.tx * TILE_SIZE - camX + DECO_PAD);
        const screenY = Math.round(d.ty * TILE_SIZE - camY + d.offsetY * 6 + DECO_PAD);
        ctx.drawImage(tileset, d.sx, d.sy, 16, 16, screenX, screenY, DECO_SIZE, DECO_SIZE);
      }

      // ── Pass 2: 壁立て描画 (壁1 パターンで床境界の壁を 2セル高さで描画) ──
      // 部屋ペインティングが覆う壁位置はスキップ(painting に壁の上部が含まれる)
      const ty0 = Math.max(0, startTY - 1);
      if (wallPattern) {
        ctx.save();
        ctx.translate(-camX, -camY);
        ctx.fillStyle = wallPattern;
        for (let ty = ty0; ty <= endTY; ty++) {
          for (let tx = startTX; tx <= endTX; tx++) {
            if (!isNorthWall(tx, ty)) continue;
            if (isPaintedAndLoaded(tx, ty)) continue;
            // 1セル上から 2セル分塗る (壁の「立体感」)
            ctx.fillRect(tx * TILE_SIZE, (ty - 1) * TILE_SIZE, TILE_SIZE, TILE_SIZE * 2);
          }
        }
        ctx.restore();
      } else {
        // フォールバック: 旧 tileset 壁スプライト
        for (let ty = ty0; ty <= endTY; ty++) {
          for (let tx = startTX; tx <= endTX; tx++) {
            if (!isNorthWall(tx, ty)) continue;
            if (isPaintedAndLoaded(tx, ty)) continue;
            const westIsWall = isNorthWall(tx - 1, ty);
            const eastIsWall = isNorthWall(tx + 1, ty);
            let spr;
            if (!westIsWall && !eastIsWall)      spr = SPR_WALL_MID;
            else if (!westIsWall)                spr = SPR_WALL_LEND;
            else if (!eastIsWall)                spr = SPR_WALL_REND;
            else {
              spr = SPR_WALL_MID_VARIANTS[tileHash(tx, ty * 17 + 3) % SPR_WALL_MID_VARIANTS.length];
            }
            const [sx, sy, sw, sh] = spr;
            const screenX = Math.round(tx * TILE_SIZE - camX);
            const screenY = Math.round((ty - 1) * TILE_SIZE - camY);
            ctx.drawImage(tileset, sx, sy, sw, sh, screenX, screenY, TILE_SIZE, TILE_SIZE * 2);
          }
        }
      }

      // ── Pass 2.5: 壁掛け松明 (壁の上に重ねて描画・painterly) ──
      // 配置: 床タイル中央に水平センタリング、底面を床線から 12px 下げて壁マウント感
      // 描画後に炎周りに加算ブルーム (光輪) を重ねて燃えてる感を出す
      if (torchWallImgLoaded) {
        const TORCH_W = 56, TORCH_H = 84, TORCH_FLOOR_OVERLAP = 12;
        const TORCH_X_OFFSET = (TILE_SIZE - TORCH_W) / 2;
        for (const d of decorations) {
          if (d.kind !== "torch") continue;
          if (d.tx < startTX - 1 || d.tx > endTX + 1) continue;
          if (d.ty < startTY - 1 || d.ty > endTY + 1) continue;
          const screenX = Math.round(d.tx * TILE_SIZE - camX + TORCH_X_OFFSET);
          const screenY = Math.round(d.ty * TILE_SIZE - camY + TORCH_FLOOR_OVERLAP - TORCH_H);
          ctx.drawImage(torchWallImg, screenX, screenY, TORCH_W, TORCH_H);

          // 炎中心の加算ブルーム (画像上部=炎の位置、ゆらぎ付き)
          const flameCX = screenX + TORCH_W / 2;
          const flameCY = screenY + 12;
          const f = 1 + Math.sin(Date.now() / 140 + d.tx * 3 + d.ty * 5) * 0.08;
          const bloomR = 70 * f;
          const grad = ctx.createRadialGradient(flameCX, flameCY, 0, flameCX, flameCY, bloomR);
          grad.addColorStop(0,    "rgba(255, 220, 140, 0.85)");
          grad.addColorStop(0.35, "rgba(255, 170,  60, 0.45)");
          grad.addColorStop(1,    "rgba(255, 140,  40, 0)");
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(flameCX, flameCY, bloomR, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }
      ctx.restore();
    }

    // 生成クエスト (酒場の掲示板) があれば ad-hoc シナリオとして採用 (敵キーは ENEMY_TYPES で検証)
    let _genScenario = null;

      const _gsRaw = sessionStorage.getItem("dragonfighters.generatedScenario");

    } catch (e) { _genScenario = null; }
    let scenarioId, currentScenario;
    if (_genScenario) {

    } else {

      currentScenario = SCENARIOS[scenarioId] || SCENARIOS["goblin-mine"];
    }
    const ENEMY_SPAWNS = currentScenario.spawns;

    // 情景スプライト生成 (敵スポーンとプレイヤー起点を avoid して配置)
    // プレイヤー起点 tile(6,13) は L3346 playerX = 6 * TILE_SIZE の前提
    generateScenery(ENEMY_SPAWNS, 6, 13);

    const enemyLayer = document.getElementById("enemyLayer");

    // ── マジックミサイル: 1発の光弾を弧軌道で飛ばす ──
    function spawnMagicMissile(fromX, fromY, toX, toY, durationMs = 600) {
      const el = document.createElement("div");
      el.className = "fxMissile";
      enemyLayer.appendChild(el);
      // 弧軌道のためのランダム化 (左右どちら/曲り具合)
      const curveSign = (Math.random() < 0.5) ? 1 : -1;
      const curveAmp  = 26 + Math.random() * 36;  // 26〜62px
      const startTime = performance.now();
      // Phase 2-I: 飛翔中の動的光源 (青紫の魔力光が暗闇を照らす)
      const light = (typeof addSpellLight === "function") ? addSpellLight({
        worldX: fromX, worldY: fromY,
        inner: 60, outer: 200,
        strongAlpha: 0.95, midAlpha: 0.6,
        rgb: "200,180,255",
        duration: durationMs + 320, fadeMs: 0,
      }) : null;
      return new Promise(resolve => {
        function step(now) {
          const t = Math.min((now - startTime) / durationMs, 1);
          const dx = toX - fromX, dy = toY - fromY;
          const len = Math.hypot(dx, dy) || 1;
          // 進行方向の垂直ベクトルへ sin で膨らむ
          const px = -dy / len, py = dx / len;
          const offset = Math.sin(t * Math.PI) * curveAmp * curveSign;
          const cx = fromX + dx * t + px * offset;
          const cy = fromY + dy * t + py * offset;
          el.style.left = (cx - camX) + "px";
          el.style.top  = (cy - camY) + "px";
          if (light) { light.worldX = cx; light.worldY = cy; }
          if (t < 1) requestAnimationFrame(step);
          else {
            el.classList.add("burst");
            setTimeout(() => el.remove(), 280);
            resolve();
          }
        }
        requestAnimationFrame(step);
      });
    }
    // 複数発を staggered で発射 (ターゲットが死んでも続行)
    async function castMagicMissileBarrage(fromX, fromY, toX, toY, count = 3, staggerMs = 130) {
      const promises = [];
      for (let i = 0; i < count; i++) {
        promises.push((async () => {
          await sleepMs(i * staggerMs);
          await spawnMagicMissile(fromX, fromY, toX, toY);
        })());
      }
      await Promise.all(promises);
    }

    // ── エイムドショット: 照準線(線が一瞬光って消える) ──
    function showAimLine(fromX, fromY, toX, toY, durationMs = 700) {
      const el = document.createElement("div");
      el.className = "fxAimLine";
      enemyLayer.appendChild(el);
      const dx0 = toX - fromX, dy0 = toY - fromY;
      const len = Math.hypot(dx0, dy0);
      const angle = Math.atan2(dy0, dx0);
      // カメラ追従のためフレーム毎に再配置
      const startTime = performance.now();
      function step(now) {
        const t = (now - startTime) / durationMs;
        if (t >= 1 || !el.parentNode) return;
        el.style.left = (fromX - camX) + "px";
        el.style.top  = (fromY - camY) + "px";
        el.style.width = len + "px";
        el.style.transform = `rotate(${angle}rad)`;
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
      setTimeout(() => el.remove(), durationMs + 50);
    }

    // ── エイムドショット: 矢を一直線で飛ばす (回転で進行方向に向ける) ──
    function spawnArrow(fromX, fromY, toX, toY, durationMs = 380, opts = {}) {
      const el = document.createElement("div");
      el.className = "fxArrow" + (opts.variant ? " " + opts.variant : "");
      enemyLayer.appendChild(el);
      const dx = toX - fromX, dy = toY - fromY;
      const angle = Math.atan2(dy, dx);
      const startTime = performance.now();
      // spinning=true: 進行方向回転を JS でセットせず CSS アニメに委ねる (投げ斧用)
      const spinning = !!opts.spinning;
      return new Promise(resolve => {
        function step(now) {
          const t = Math.min((now - startTime) / durationMs, 1);
          const cx = fromX + dx * t;
          const cy = fromY + dy * t;
          el.style.left = (cx - camX) + "px";
          el.style.top  = (cy - camY) + "px";
          if (!spinning) el.style.transform = `rotate(${angle}rad)`;
          if (t < 1) requestAnimationFrame(step);
          else {
            // 着弾後、一瞬刺さって見えるようにフェードアウト
            el.classList.add("embed");
            setTimeout(() => el.remove(), 340);
            resolve();
          }
        }
        requestAnimationFrame(step);
      });
    }

    // ── キュアライト: 中央リング + 周囲に降り注ぐ光粒 ──
    function spawnCureFx(targetWX, targetWY) {
      // 中央のリング 1個 (拡大しながらフェードアウト)
      const ring = document.createElement("div");
      ring.className = "fxCureRing";
      enemyLayer.appendChild(ring);
      // 光粒 7個 (target の周囲に散らして降下)
      const particles = [];
      const count = 7;
      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "fxCureParticle";
        // 基本位置: target 中心の周囲半径 22px ランダム
        const ang = (i / count) * Math.PI * 2 + Math.random() * 0.6;
        const r = 18 + Math.random() * 14;
        const baseX = targetWX + Math.cos(ang) * r;
        const baseY = targetWY + Math.sin(ang) * r * 0.4;  // 楕円
        p.style.animationDelay = (i * 50) + "ms";
        enemyLayer.appendChild(p);
        particles.push({ el: p, baseX, baseY });
      }
      // カメラ追従ループ (~900ms で全部消える)
      const startTime = performance.now();
      const totalMs = 1100;
      function step(now) {
        const t = (now - startTime) / totalMs;
        if (t >= 1) return;
        ring.style.left = (targetWX - camX) + "px";
        ring.style.top  = (targetWY - camY) + "px";
        for (const p of particles) {
          p.el.style.left = (p.baseX - camX) + "px";
          p.el.style.top  = (p.baseY - camY) + "px";
        }
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
      setTimeout(() => {
        ring.remove();
        for (const p of particles) p.el.remove();
      }, totalMs + 50);
    }

    // ── 地面の範囲魔法エフェクト管理 ──
    const groundFxElements = [];
    function spawnGroundFx(originTX, originTY, sizeTilesX, sizeTilesY, kind, durationMs) {

    // ─── Phase 2-I: 呪文 fx ヘルパー群 ───

    // 詠唱オーブ (ally の手元に膨張する小球)
    function spawnCastOrb(ally, color, durationMs = 700) {
      if (!ally || !ally.el) return;

             color === "rgba(255,200,90,1)"  ? "255,200,120" : "200,230,255",

    // 飛翔火球: from → to を duration で移動、軌跡に光源と火粉
    function spawnFireballProjectile(fromWX, fromWY, toWX, toWY, durationMs = 380) {
      return new Promise((resolve) => {
        const ball = document.createElement("div");
        ball.className = "fxFireballProjectile";
        document.body.appendChild(ball);
        // 動的光源 (飛翔と一緒に移動)
        const light = addSpellLight({
          worldX: fromWX, worldY: fromWY,
          inner: 80, outer: 260,
          strongAlpha: 1.0, midAlpha: 0.7,
          rgb: "255,180,80",
          duration: durationMs + 50, fadeMs: 0,
        });
        const start = performance.now();
        function step(now) {
          const t = Math.min(1, (now - start) / durationMs);
          const wx = fromWX + (toWX - fromWX) * t;
          const wy = fromWY + (toWY - fromWY) * t;
          ball.style.left = (wx - camX) + "px";
          ball.style.top  = (wy - camY) + "px";
          light.worldX = wx; light.worldY = wy;
          // 火粉軌跡 (5 フレームに 1 回)
          if (Math.random() < 0.5) {
            const spark = document.createElement("div");
            spark.className = "fxFireSpark";
            spark.style.left = (wx - camX + (Math.random() - 0.5) * 12) + "px";
            spark.style.top  = (wy - camY + (Math.random() - 0.5) * 12) + "px";
            document.body.appendChild(spark);
            setTimeout(() => { try { spark.remove(); } catch {} }, 450);
          }
          if (t < 1) requestAnimationFrame(step);
          else {
            try { ball.remove(); } catch {}
            resolve();
          }
        }
        requestAnimationFrame(step);
      });
    }

    // 着弾爆発スプライトシート (単一行 6 フレーム横ストリップ)
    const EXPLOSION_SHEET = {
      src: "assets/explosion_anim.png?v=1",
      img: new Image(), loaded: false,
      frameW: 192, frameH: 192, cols: 6,
    };
    EXPLOSION_SHEET.img.onload  = () => { EXPLOSION_SHEET.loaded = true; };
    EXPLOSION_SHEET.img.onerror = () => {};   // loaded=false のまま → フォールバック
    EXPLOSION_SHEET.img.src = EXPLOSION_SHEET.src;

    // 爆発スプライト再生 (単発: 0→N フレームを 1 巡して消える / カメラ追従 / フォグ上)
    function spawnExplosionSprite(centerWX, centerWY, opts = {}) {
      const sheet = EXPLOSION_SHEET;
      // 検証補助 (本番無害): 直近の着弾点を露出
      window.__fxProbe = { lastExplosion: { wx: centerWX, wy: centerWY, t: performance.now() } };
      // シート未ロード → 旧リング+火柱に退避 (演出を絶対消さない)
      if (!sheet.loaded) { spawnFireballExplosionFallback(centerWX, centerWY); return; }

      const size    = opts.size    || 320;          // 画面表示の一辺 px (3タイル≈288 よりやや大)
      const frames  = opts.frames  || sheet.cols;   // 6
      const frameMs = opts.frameMs || 90;           // 1 フレーム
      const fadeMs  = opts.fadeMs  || 120;          // 最終フレーム後の余韻フェード
      const playMs  = frameMs * frames;             // 再生尺 (~540ms)

      const el = document.createElement("div");
      el.className = "fxExplosionSprite";
      el.style.width  = size + "px";
      el.style.height = size + "px";
      el.style.backgroundImage = `url("${sheet.src}")`;
      el.style.backgroundSize  = `${size * sheet.cols}px ${size}px`;  // 横6枚を size 単位に換算
      document.body.appendChild(el);

      const start = performance.now();
      function step(now) {
        const t = now - start;
        // (a) 経過時間 → フレーム index (最終フレームで頭打ち)
        const frame = Math.min(frames - 1, Math.floor(t / frameMs));
        // (b) フレーム切り出し (横ストリップなので row=0。updateEnemyAnim と同方式)
        el.style.backgroundPosition = `${-frame * size}px 0px`;
        // (c) カメラ追従 (spawnFireballProjectile / updateGroundFx と同式)
        el.style.left = (centerWX - camX) + "px";
        el.style.top  = (centerWY - camY) + "px";
        // (d) 再生終了 → フェード → remove (フェード中もカメラ追従)
        if (t >= playMs) {
          el.style.transition = `opacity ${fadeMs}ms linear`;
          el.style.opacity = "0";
          const fadeStart = now;
          (function fadeStep(n2) {
            el.style.left = (centerWX - camX) + "px";
            el.style.top  = (centerWY - camY) + "px";
            if (n2 - fadeStart < fadeMs) requestAnimationFrame(fadeStep);
            else { try { el.remove(); } catch {} }
          })(now);
          return;
        }
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // 着弾: 爆発スプライト + 動的光源 + 画面フラッシュ (Fireball)
    function spawnFireballExplosion(centerWX, centerWY) {
      // 動的光源 (大きく明るく、800ms フェード) — 発光の主役、残す
      addSpellLight({
        worldX: centerWX, worldY: centerWY,
        inner: 180, outer: 460,
        strongAlpha: 1.0, midAlpha: 0.8,
        rgb: "255,200,100",
        duration: 800, fadeMs: 800,
      });
      // 爆発スプライト (旧 3連リング+火柱を置換)
      spawnExplosionSprite(centerWX, centerWY);
      // 画面フラッシュ — 衝撃感、残す
      const flash = document.createElement("div");
      flash.className = "fxScreenFlash";
      document.body.appendChild(flash);
      setTimeout(() => { try { flash.remove(); } catch {} }, 350);
    }

    // 炎着弾バースト (横展開用): フォグ貫通の爆発スプライト + 小型動的光源。
    // Fireball ほど大げさにしない可変サイズ版。既存VFX (火柱/敵燃焼) に加算する想定。
    function spawnFireImpactBurst(centerWX, centerWY, opts = {}) {
      const size = opts.size || 160;
      spawnExplosionSprite(centerWX, centerWY, { size, frameMs: opts.frameMs || 75 });
      if (opts.light !== false) {
        addSpellLight({
          worldX: centerWX, worldY: centerWY,
          inner: size * 0.55, outer: size * 1.4,
          strongAlpha: 0.9, midAlpha: 0.6,
          rgb: "255,185,85", duration: 480, fadeMs: 480,
        });
      }
    }

    // フォールバック: シート未ロード時の旧描画 (3 連リング + 火柱)
    function spawnFireballExplosionFallback(centerWX, centerWY) {
      // 3 連リング
      for (let i = 1; i <= 3; i++) {
        const ring = document.createElement("div");
        ring.className = "fxFireballRing r" + i;
        ring.style.left = (centerWX - camX) + "px";
        ring.style.top  = (centerWY - camY) + "px";
        document.body.appendChild(ring);
        setTimeout(() => { try { ring.remove(); } catch {} }, 900);
      }
      // 火柱
      const pillar = document.createElement("div");
      pillar.className = "fxFirePillar";
      pillar.style.left = (centerWX - camX) + "px";
      pillar.style.top  = (centerWY - camY) + "px";
      document.body.appendChild(pillar);
      setTimeout(() => { try { pillar.remove(); } catch {} }, 850);
    }

    // 稲妻 SVG ライン (jagged path) — Phase 2-I 派手版: メイン稲妻 5 本 + 分岐 6 本 + 余韻線
    function spawnLightningBolt(fromWX, fromWY, toWX, toWY) {
      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNS, "svg");
      svg.classList.add("fxLightningSvg");
      const minX = Math.min(fromWX, toWX) - 90;
      const minY = Math.min(fromWY, toWY) - 90;
      const w = Math.abs(toWX - fromWX) + 180;
      const h = Math.abs(toWY - fromWY) + 180;
      svg.setAttribute("width", w);
      svg.setAttribute("height", h);
      svg.style.left = (minX - camX) + "px";
      svg.style.top  = (minY - camY) + "px";

      // jagged path 生成 (ジグザグ振幅と位置オフセットを変えて 5 本生成)
      // jitter: 振幅、curveOff: メインラインからの全体オフセット
      function genPathD(jitter, curveOff) {
        const segs = 8;
        const dx = (toWX - fromWX) / segs;
        const dy = (toWY - fromWY) / segs;
        // 進行方向に直交するベクトル
        const len = Math.hypot(toWX - fromWX, toWY - fromWY) || 1;
        const nx = -(toWY - fromWY) / len;
        const ny =  (toWX - fromWX) / len;
        let d = `M ${fromWX - minX + nx * curveOff} ${fromWY - minY + ny * curveOff}`;
        for (let i = 1; i <= segs; i++) {
          const jx = (Math.random() - 0.5) * jitter;
          const jy = (Math.random() - 0.5) * jitter;
          const x = fromWX + dx * i + jx + nx * curveOff - minX;
          const y = fromWY + dy * i + jy + ny * curveOff - minY;
          d += ` L ${x} ${y}`;
        }
        return d;
      }

      // メイン稲妻 5 本 (中心 + 左右にずらした副ライン、それぞれに細い白芯を重ねる)
      const mainConfigs = [
        { jitter: 36, off: 0,   widths: [10, 5, 2], alphas: [0.45, 0.75, 1.0] },
        { jitter: 28, off: -18, widths: [7,  3, 1.5], alphas: [0.35, 0.6, 0.85] },
        { jitter: 28, off: 18,  widths: [7,  3, 1.5], alphas: [0.35, 0.6, 0.85] },
        { jitter: 22, off: -36, widths: [5,  2, 1],   alphas: [0.25, 0.45, 0.7] },
        { jitter: 22, off: 36,  widths: [5,  2, 1],   alphas: [0.25, 0.45, 0.7] },
      ];
      for (const cfg of mainConfigs) {
        const d = genPathD(cfg.jitter, cfg.off);
        for (let i = 0; i < cfg.widths.length; i++) {
          const path = document.createElementNS(svgNS, "path");
          path.setAttribute("d", d);
          // 重ね順: 太外側 → 細白芯。色も外側ほど青、芯は白
          const rgb = i === cfg.widths.length - 1
            ? `rgba(255,255,255,${cfg.alphas[i]})`     // 白芯
            : i === 0
            ? `rgba(140,200,255,${cfg.alphas[i]})`     // 外側青
            : `rgba(200,225,255,${cfg.alphas[i]})`;    // 中間青白
          path.setAttribute("stroke", rgb);
          path.setAttribute("stroke-width", cfg.widths[i]);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke-linecap", "round");
          path.setAttribute("stroke-linejoin", "round");
          svg.appendChild(path);
        }
      }

      // 分岐稲妻 (メインラインの中間点から枝分かれする短い稲妻 6 本)
      const segs = 8;
      const dxMain = (toWX - fromWX) / segs;
      const dyMain = (toWY - fromWY) / segs;
      for (let b = 0; b < 6; b++) {
        const startSeg = 2 + Math.floor(Math.random() * 5);   // 中間付近から
        const branchFromX = fromWX + dxMain * startSeg;
        const branchFromY = fromWY + dyMain * startSeg;
        // 分岐先: 進行方向に直交する側面へランダムに伸ばす
        const dirAng = Math.atan2(toWY - fromWY, toWX - fromWX);
        const perp = dirAng + (Math.random() < 0.5 ? Math.PI / 2 : -Math.PI / 2)
                            + (Math.random() - 0.5) * 0.9;
        const blen = 50 + Math.random() * 80;
        const branchToX = branchFromX + Math.cos(perp) * blen;
        const branchToY = branchFromY + Math.sin(perp) * blen;
        // 分岐の jagged path
        const subSegs = 4;
        const sdx = (branchToX - branchFromX) / subSegs;
        const sdy = (branchToY - branchFromY) / subSegs;
        let bd = `M ${branchFromX - minX} ${branchFromY - minY}`;
        for (let i = 1; i <= subSegs; i++) {
          const jx = (Math.random() - 0.5) * 18;
          const jy = (Math.random() - 0.5) * 18;
          const x = branchFromX + sdx * i + jx - minX;
          const y = branchFromY + sdy * i + jy - minY;
          bd += ` L ${x} ${y}`;
        }
        // 分岐も 2 本重ね (外青 + 白芯)
        const outer = document.createElementNS(svgNS, "path");
        outer.setAttribute("d", bd);
        outer.setAttribute("stroke", "rgba(160,210,255,0.5)");
        outer.setAttribute("stroke-width", 4);
        outer.setAttribute("fill", "none");
        outer.setAttribute("stroke-linecap", "round");
        outer.setAttribute("stroke-linejoin", "round");
        svg.appendChild(outer);
        const core = document.createElementNS(svgNS, "path");
        core.setAttribute("d", bd);
        core.setAttribute("stroke", "rgba(255,255,255,0.95)");
        core.setAttribute("stroke-width", 1.5);
        core.setAttribute("fill", "none");
        core.setAttribute("stroke-linecap", "round");
        core.setAttribute("stroke-linejoin", "round");
        svg.appendChild(core);
      }

      document.body.appendChild(svg);

      // 動的光源 (始点 / 中央 / 終点の 3 つ、全体に強烈なフラッシュ)
      const midX = (fromWX + toWX) / 2;
      const midY = (fromWY + toWY) / 2;
      addSpellLight({
        worldX: midX, worldY: midY,
        inner: 260, outer: 640,
        strongAlpha: 1.0, midAlpha: 0.75,
        rgb: "200,220,255",
        duration: 320, fadeMs: 320,
      });
      addSpellLight({
        worldX: fromWX, worldY: fromWY,
        inner: 120, outer: 300,
        strongAlpha: 0.95, midAlpha: 0.65,
        rgb: "220,230,255",
        duration: 280, fadeMs: 280,
      });
      addSpellLight({
        worldX: toWX, worldY: toWY,
        inner: 160, outer: 400,
        strongAlpha: 1.0, midAlpha: 0.75,
        rgb: "180,210,255",
        duration: 360, fadeMs: 360,
      });

      // 着弾点に火花 (8 → 16 個に増量)
      for (let i = 0; i < 16; i++) {
        const spark = document.createElement("div");
        spark.className = "fxLightningSpark";
        const ang = (Math.PI * 2 * i) / 16 + (Math.random() - 0.5) * 0.4;
        const dist = 30 + Math.random() * 50;
        spark.style.setProperty("--dx", (Math.cos(ang) * dist) + "px");
        spark.style.setProperty("--dy", (Math.sin(ang) * dist) + "px");
        spark.style.left = (toWX - camX) + "px";
        spark.style.top  = (toWY - camY) + "px";
        document.body.appendChild(spark);
        setTimeout(() => { try { spark.remove(); } catch {} }, 520);
      }
      // 始点にも軽く火花を散らす (5 個)
      for (let i = 0; i < 5; i++) {
        const spark = document.createElement("div");
        spark.className = "fxLightningSpark";
        const ang = Math.random() * Math.PI * 2;
        const dist = 18 + Math.random() * 24;
        spark.style.setProperty("--dx", (Math.cos(ang) * dist) + "px");
        spark.style.setProperty("--dy", (Math.sin(ang) * dist) + "px");
        spark.style.left = (fromWX - camX) + "px";
        spark.style.top  = (fromWY - camY) + "px";
        document.body.appendChild(spark);
        setTimeout(() => { try { spark.remove(); } catch {} }, 460);
      }
      // 画面フラッシュ (青白)
      const flash = document.createElement("div");
      flash.className = "fxScreenFlash lightning";
      document.body.appendChild(flash);
      setTimeout(() => { try { flash.remove(); } catch {} }, 280);

      setTimeout(() => { try { svg.remove(); } catch {} }, 340);
    }

    function spawnConeCrystals(originWX, originWY, dirX, dirY) {
      // dirX, dirY: -1/0/1 の方向ベクトル

    function updateGroundFx() {
      const now = Date.now();
      for (let i = groundFxElements.length - 1; i >= 0; i--) {
        const fx = groundFxElements[i];
        if (now >= fx.expireAt) {
          fx.el.remove();
          groundFxElements.splice(i, 1);
          continue;
        }
        // フェードアウト (残り 600ms から透明度低下)
        const remain = fx.expireAt - now;
        if (remain < 600) fx.el.style.opacity = String(remain / 600);
        fx.el.style.left = (fx.tx * TILE_SIZE - camX) + "px";
        fx.el.style.top  = (fx.ty * TILE_SIZE - camY) + "px";
      }
    }

    // 敵の汎用スプライト描画
    function updateEnemyAnim(enemy, el) {
      const def = enemy.def;
      // 単フレーム流用スプライト (ミミックの chest_open.png 等): 状態に依らず frame0/row0 を表示。
      // (多行シート前提の row 計算だと chase/alert/death 状態で背景が画像外→透明になるのを防ぐ)
      if (def.staticSprite) {
        el.style.backgroundPosition = "0 0";
        const pCXs = playerX + 48, eCXs = enemy.x + el.offsetWidth / 2;
        el.style.transform = (pCXs < eCXs) ? "scaleX(-1)" : "";
        return;
      }
      enemy.animTick = (enemy.animTick || 0) + 1;
      let row, framesPerStep, frameCount, frame;
      if (!enemy.alive) {
        row = 4; framesPerStep = 4; frameCount = def.cols;
        frame = Math.min(frameCount - 1, Math.floor(enemy.animTick / framesPerStep));
      } else if (enemy.state === "attack" && def.hasAttackAnim) {
        row = 3;
        frame = Math.min(def.cols - 1, Math.floor(enemy.attackTimer / 4));
      } else if (enemy.state === "chase" || enemy.state === "search" || enemy.state === "returning") {
        row = 2; framesPerStep = 4; frameCount = def.cols;
        frame = Math.floor(enemy.animTick / framesPerStep) % frameCount;
      } else if (enemy.state === "alert") {
        row = 1; framesPerStep = 4; frameCount = def.cols;
        frame = Math.floor(enemy.animTick / framesPerStep) % frameCount;
      } else {
        row = 0; framesPerStep = 6; frameCount = def.cols;
        frame = Math.floor(enemy.animTick / framesPerStep) % frameCount;
      }
      row += (def.rowOffset || 0);
      const dsw = el.offsetWidth;
      const dsh = el.offsetHeight;
      el.style.backgroundPosition = `${-frame * dsw}px ${-row * dsh}px`;
      // プレイヤーへの向きで左右反転
      const pCX = playerX + 48;
      const eCX = enemy.x + dsw / 2;
      el.style.transform = (pCX < eCX) ? "scaleX(-1)" : "";
    }

    // ── レベル・XP システム (D&D 3.5 準拠: Lv1=0, Lv2=1000, Lv3=3000, ...) ──
    // Lv N の累積XP = (N-1)*N/2 * 1000。Lv10=45000 がカンスト。
    const XP_THRESHOLDS = [0, 1000, 3000, 6000, 10000, 15000, 21000, 28000, 36000, 45000];
    function getLevelFromXP(xp) {
      let lv = 1;
      for (let i = 0; i < XP_THRESHOLDS.length; i++) {
        if (xp >= XP_THRESHOLDS[i]) lv = i + 1;
      }
      return lv;
    }
    function getNextLevelXP(xp) {
      const lv = getLevelFromXP(xp);
      if (lv >= XP_THRESHOLDS.length) return XP_THRESHOLDS[XP_THRESHOLDS.length - 1];
      return XP_THRESHOLDS[lv];  // lv は 1-index なので [lv] が次の閾値
    }

    let currentTotalXp = persistent.xp;  // 累積XP (localStorage 書き込みはクリア時)
    // ── D&D 3.5 準拠 レベル進歩テーブル ──
