        const chest = { tx, ty, opened: false, found: false, hidden: false, loot: pickChestLoot(), el: null };
        roomChests.push(chest);
        createRoomChestDom(chest, roomChests.length - 1);
      }
      // ミミック宝箱 1個 (擬態。接近/察知で awakenMimic)。本物と同じ .roomChest として描画される。
      const [mtx, mty] = tiles[dummyN];
      mimicChest = { tx: mtx, ty: mty, opened: false, found: true, hidden: false,
                     isMimic: true, awakened: false, _percRolled: false, loot: null, el: null };
      roomChests.push(mimicChest);
      createRoomChestDom(mimicChest, roomChests.length - 1);
    }

    // 接近tick: ミミック宝箱に近づいたら不意打ち起動 (戦闘状態を問わない=「触れた瞬間に襲う」)。
    function tryApproachMimic() {
      if (!gameStarted || gameOver || !mimicChest || mimicChest.awakened || hp <= 0) return;
      const pCX = playerX + 48, pCY = playerY + 58;
      const cx = mimicChest.tx * TILE_SIZE + TILE_SIZE / 2;
      const cy = mimicChest.ty * TILE_SIZE + TILE_SIZE / 2;
      if (Math.hypot(pCX - cx, pCY - cy) > MIMIC_APPROACH_RADIUS) return;
      if (!hasLineOfSight(pCX, pCY, cx, cy)) return;
      awakenMimic(mimicChest, { forewarned: false });
    }
    setInterval(tryApproachMimic, 400);

    // ミミック起動: ナレ → 宝箱タイルに敵スポーン → 宝箱 DOM 除去。不意打ちはリーダーを粘着拘束。
    // (spawnMinionNearBoss と同じ動的スポーン手順。await 不要なので同期関数)
    function awakenMimic(chest, opts = {}) {
      if (!chest || chest.awakened) return;
      chest.awakened = true;
      const forewarned = !!opts.forewarned;
      if (typeof sfx === "function") sfx("chestOpen");
      if (typeof showBanner === "function") showBanner("🧰 ミミック! 🧰", 1800);
      if (typeof showDMMessage === "function") {
        showDMMessage(forewarned
          ? "盗賊の目が、宝箱の1つを見据えた。『……これ、宝箱じゃない』\n警戒した瞬間、その箱がぬるりと身を捻らせ、牙を剥いた!"
          : "箱に手を伸ばした瞬間、蓋が大きく開いた! 内側は全て舌と歯だった。\nしまった — ミミックだ!", 4200);
      }
      // 敵スポーン
      const mi = createEnemy("mimic", chest.tx, chest.ty);
      mi.everSeen = true;       // フォグで隠れない (目の前で起動)
      mi.inactive = false;
      enemies.push(mi);
      const idx = enemies.length - 1;
      createEnemyDom(idx, mi.def, mi.type);
      snapEnemyToTile(mi, chest.tx, chest.ty);
      // 宝箱 DOM を除去 (敵に化けた)
      chest.opened = true;
      if (chest.el) { try { chest.el.remove(); } catch (e) {} chest.el = null; }
      // 粘着 (不意打ちのみ): リーダー=最初に触れた者を拘束
      if (!forewarned) {
        playerBuffs.stuck = true;
        if (typeof showDMMessage === "function") {
          setTimeout(() => showDMMessage(`粘着質の舌が ${getLeaderName()} に絡みつく! 引き剥がさねば動けない (STR判定)`, 2600), 900);
        }
      }
    }

    // ═════════════════════════════════════════════════════════
    // 檻オブジェクト (Sce2 隠し要素「残影の獣」を閉じ込めている)
    // ═════════════════════════════════════════════════════════
    const cages = [];
    const CAGE_INTERACT_RADIUS = 240;   // この距離以内に入ると接近判定発火

    function spawnCages() {
      const spawns = currentScenario.cageSpawns;
      if (!spawns || spawns.length === 0) return;
      for (const sp of spawns) {
        const cage = {
          tx: sp.tx, ty: sp.ty,
          opened: false,
          warningShown: false,    // 鍵なしで接近した時の警告は 1 戦闘あたり 1 回だけ
          dialogActive: false,    // showChoice 表示中フラグ (重複起動防止)
          lured: false,           // 「誘導」選択で誘発状態 → 盗賊近接で確定脱走 (餅になる脱走)
          beastIdx: -1,           // linkCagedBeasts() で紐付け
          el: null,
        };
        cages.push(cage);
        createCageDom(cage, cages.length - 1);
      }
    }

    function createCageDom(cage, idx) {
      const el = document.createElement("div");
      el.className = "roomCage";
      el.id = "roomCage" + idx;
      document.body.appendChild(el);
      cage.el = el;
    }

    // ENEMY_SPAWNS で startsCaged フラグを持つ敵を、最寄りの cage と紐付けて初期 inactive 化。
    // spawn 順序: createEnemy → linkCagedBeasts (spawnEnemies の直後に呼ぶ)
    function linkCagedBeasts() {
      for (let ei = 0; ei < enemies.length; ei++) {
        const e = enemies[ei];
        if (!e || !e.def || !e.def.startsCaged) continue;
        let bestCage = -1, bestDist = Infinity;
        const eTX = e.x / TILE_SIZE, eTY = e.y / TILE_SIZE;
        for (let ci = 0; ci < cages.length; ci++) {
          if (cages[ci].beastIdx >= 0) continue;     // 既にビースト紐付け済の檻は skip
          const d = Math.hypot(eTX - cages[ci].tx, eTY - cages[ci].ty);
          if (d < bestDist) { bestDist = d; bestCage = ci; }
        }
        if (bestCage >= 0) {
          cages[bestCage].beastIdx = ei;
          e.inactive = true;
          const el = enemyElements[ei];
          if (el) {
            el.classList.add("beast-caged");
            // 防御的にサイズ再適用 (.enemy.beast-caged クラス追加で width/height が消える事故防止)
            const ds = e.def.displaySize || TILE_SIZE;
            const scale = ds / e.def.frameW;
            el.style.width  = Math.round(e.def.frameW * scale) + "px";
            el.style.height = Math.round(e.def.frameH * scale) + "px";
            el.style.backgroundSize = `${Math.round(e.def.sheetW * scale)}px ${Math.round(e.def.sheetH * scale)}px`;
          }
          // 檻位置にビーストを固定 (檻のタイル中央と敵中央を一致させる)
          const ds = e.def.displaySize || TILE_SIZE;
          e.x = cages[bestCage].tx * TILE_SIZE + TILE_SIZE / 2 - ds / 2;
          e.y = cages[bestCage].ty * TILE_SIZE + TILE_SIZE / 2 - ds / 2;
        }
      }
    }

    // 接近時インタラクション: 400ms tick でリーダー / 仲間が檻に十分近づいたら判定。
    // 鍵あり → showChoice で「檻を開けますか?」、鍵なし → 警告 DM ナレ (1 戦闘 1 回)。
    async function tryInteractCage() {
      if (!gameStarted || gameOver) return;
      if (encounterActive || encounterRunning) return;   // 戦闘中は判定しない
      if (hp <= 0) return;
      const pCX = playerX + 48, pCY = playerY + 58;

      for (const cage of cages) {
        if (cage.opened) continue;
        if (cage.lured) continue;       // 誘導済み: 再プロンプトせず盗賊近接の確定脱走を待つ
        if (cage.dialogActive) continue;
        const cx = cage.tx * TILE_SIZE + TILE_SIZE / 2;
        const cy = cage.ty * TILE_SIZE + TILE_SIZE / 2;
        const d = Math.hypot(pCX - cx, pCY - cy);
        // 「やめる」した後は半径外に出るまで再プロンプトしない
        if (cage.declined) {
          if (d > CAGE_INTERACT_RADIUS) cage.declined = false;  // 距離を離れたら次の接近で再プロンプト可
          continue;
        }
        if (d > CAGE_INTERACT_RADIUS) continue;

        if (!hasKey) {
          if (!cage.warningShown) {
            cage.warningShown = true;
            showDMMessage(
              "鉄檻の奥で、黒い獣の輪郭が二重に揺れている…触手が鉄格子を叩いている。" +
              "この檻を開けるのは危険そうだ。だが、開ける鍵は持っていない。", 3800);
          }
          continue;
        }

        // 鍵あり: 逃がす / 誘導 / 無視 の3択
        cage.dialogActive = true;
        const choice = await showCharChoice(
          "盗賊の鍵束を取り出した。この鉄檻をどうする?\n" +
          "(中の獣は敵味方の区別なく襲う)",
          [
            { label: "逃がす — 今すぐ解き放つ" },
            { label: "誘導 — 獣を煽り、盗賊を誘い込む" },
          ],
          "無視する (Esc)"
        );
        cage.dialogActive = false;
        if (choice === 0) {
          // 逃がす: その場で即解放 (獣は最寄りの盗賊へワープ、プレイヤーも近いのでリスク)
          await openCage(cage);
          break;   // 1 tick で複数檻を扱わない
        } else if (choice === 1) {
          // 誘導: 檻を煽って誘発状態に。戦闘中に盗賊が近づいた瞬間に確定で弾ける (餅になる脱走)
          cage.lured = true;
          if (cage.el) cage.el.classList.add("agitated");
          showBanner("🪤 獣を煽った — 盗賊が近づけば檻は弾ける", 2000);
          showDMMessage(
            "君は鉄格子を打ち鳴らし、獣を煽り立てた。\n" +
            "檻はもう長くは保つまい。盗賊が近づいた時、それは弾け飛ぶだろう…", 3600);
          break;
        } else {
          // 無視 (idx 2 相当 / Esc=null): 半径外に出るまで再プロンプト抑制
          cage.declined = true;
          break;
        }
      }
    }

    // 檻を開放してビーストを活性化する。
    // ビーストは開放と同時に「最寄りの他陣営敵 (盗賊)」の隣へワープし、
    // プレイヤー視界外で第三勢力 AI が盗賊と交戦する演出になる。
    async function openCage(cage) {
      if (cage.opened) return;
      cage.opened = true;
      sfx("cageOpen");
      // Phase 2-F: 咆哮硬直 (1500ms) — まずは鍵で錠は外れたが、獣が咆哮で威圧
      // 檻に振動 + ビーストに赤紫グロウ。プレイヤーの理不尽事故死を防ぐためのインターバル。
      if (cage.el) { cage.el.classList.remove("agitated"); cage.el.classList.add("roaring"); }
      const beastEl0 = (cage.beastIdx >= 0) ? enemyElements[cage.beastIdx] : null;
      if (beastEl0) beastEl0.classList.add("beast-roaring");
      showBanner("💢 残影の獣 解き放たれた! 💢", 1500);
      showDMMessage(
        "鉄格子が軋み、二重に揺れる黒い影が咆哮を上げた…!\n" +
        "獣は砦の奥へ駆け去り、闇から盗賊たちの悲鳴が響き始める…", 4400);
      await sleepMs(1500);
      // 咆哮終了 → 檻は床に倒れる、ビーストは活性化
      if (cage.el) {
        cage.el.classList.remove("roaring");
        cage.el.classList.add("opened");
      }
      if (beastEl0) beastEl0.classList.remove("beast-roaring");

      // 連動するビーストを「奥の盗賊」の隣へワープ + 活性化
      if (cage.beastIdx >= 0) {
        const beast = enemies[cage.beastIdx];
        if (beast) {
          // 最寄りの「他陣営敵 (faction != "beast")」を探す
          let targetIdx = -1, targetDist = Infinity;
          for (let i = 0; i < enemies.length; i++) {
            if (i === cage.beastIdx) continue;
            const o = enemies[i];
            if (!o || !o.alive || o.inactive) continue;
            if (o.def.faction === "beast") continue;
            const d = Math.hypot(beast.x - o.x, beast.y - o.y);
            if (d < targetDist) { targetDist = d; targetIdx = i; }
          }
          if (targetIdx >= 0) {
            // target の左隣 1 タイル分の位置にワープ (即座に第三勢力 AI が攻撃開始)
            const target = enemies[targetIdx];
            const ds = beast.def.displaySize || TILE_SIZE;
            beast.x = target.x - ds * 0.9;
            beast.y = target.y;
          }
          beast.inactive = false;
          window.__inMidBoss = true;
          if (encounterActive) bgm(combatBgmTrack());   // 戦闘中の檻破壊なら即座に midboss 曲へ
          const el = enemyElements[cage.beastIdx];
          if (el) {
            el.classList.remove("beast-caged");
            // ワープ後の出現演出 (見えない場所だが念のため)
            el.style.filter = "brightness(1.6) saturate(1.4)";
            setTimeout(() => { el.style.filter = ""; }, 600);
          }
        }
      }
    }

    setInterval(tryInteractCage, 400);

    // ── Sce4 隠し要素: 古代王国の守護者 (休眠 → 接近で覚醒、専用トリガー) ──
    // 残影の檻 (beast cage) には一切依存しない独立実装。faction:"beast" を流用して
    // 覚醒後は第三勢力 (オークも PT も無差別) として行動する。
    let guardiansAwakened = false;
    const GUARDIAN_AWAKEN_RADIUS = 270;   // この距離以内に入ると一斉覚醒

    // startsDormant の守護者を初期 inactive 化 + 休眠ビジュアル (石化フィルタ)。
    // spawnCages / linkCagedBeasts の直後に呼ぶ。
    function initGuardians() {
      for (let ei = 0; ei < enemies.length; ei++) {
        const e = enemies[ei];
        if (!e || !e.def || !e.def.startsDormant) continue;
        e.inactive = true;
        e.dormant = true;
        const el = enemyElements[ei];
        if (el) {
          el.classList.add("guardian-dormant");
          el.style.filter = "grayscale(0.85) brightness(0.78) contrast(0.9)";
        }
      }
    }

    async function awakenGuardians() {
      showBanner("⚙ 古代王国の守護者、起動! ⚙", 1800);
      showDMMessage(
        "床が震え、石の巨人がゆっくりと頭をもたげた。\n" +
        "古の術式が再び駆動する…『侵入者を、排除する』。\n" +
        "守護者は敵味方を問わず、この間のすべてを敵と見なした…!", 4600);
      try { sfx("cageOpen"); } catch (e) {}
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e || !e.alive || !e.dormant) continue;
        e.dormant = false;
        e.inactive = false;
        const el = enemyElements[i];
        if (el) {
          el.classList.remove("guardian-dormant");
          el.style.filter = "brightness(1.8) saturate(1.3) drop-shadow(0 0 12px rgba(180,200,255,0.9))";
          setTimeout(() => { el.style.filter = ""; }, 700);
        }
      }
      window.__inMidBoss = true;
      if (encounterActive) bgm(combatBgmTrack());   // 戦闘中の守護者覚醒なら即座に midboss 曲へ
      await sleepMs(900);
    }

    // 接近tick: 休眠守護者に十分近づいたら一斉覚醒 (戦闘外でのみ判定、cage と同方針)
    async function tryAwakenGuardian() {
      if (!gameStarted || gameOver || guardiansAwakened) return;
      if (encounterActive || encounterRunning) return;
      if (hp <= 0) return;
      const pCX = playerX + 48, pCY = playerY + 58;
      let near = false;
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e || !e.alive || !e.dormant) continue;
        const ds = e.def.displaySize || TILE_SIZE;
        const ecx = e.x + ds / 2, ecy = e.y + ds / 2;
        if (Math.hypot(pCX - ecx, pCY - ecy) <= GUARDIAN_AWAKEN_RADIUS) { near = true; break; }
      }
      if (!near) return;
      guardiansAwakened = true;
      await awakenGuardians();
    }

    setInterval(tryAwakenGuardian, 400);

    // ── Sce5 隠し要素: 神殿の高位神官の霊カエルム (temple-ghost.md) ──
    // 接近で対話ポップアップ → 弔い(友好=神官の祝福)/無視(中立)/攻撃(霊戦)。
    // tryAwakenGuardian と同方針 (400ms tick + 距離判定、戦闘外でのみ起動)。
    let caelumIdx = -1, caelumResolved = false;
    const CAELUM_TALK_RADIUS = 150;

    // isNpcSpirit を初期 inactive + passiveNpc 化 (勝利判定除外) + 聖域の発光ビジュアル。
    // spawnCages/linkCagedBeasts/initGuardians と並んでセットアップ末尾で呼ぶ。
    function initCaelum() {
      for (let ei = 0; ei < enemies.length; ei++) {
        const e = enemies[ei];
        if (!e || !e.def || !e.def.isNpcSpirit) continue;
        e.inactive = true;
        e.passiveNpc = true;            // 戦わない間はクリア判定からも除外
        caelumIdx = ei;
        const el = enemyElements[ei];
        if (el) {
          el.classList.add("caelum-spirit");
          el.style.filter = "brightness(1.25) saturate(0.6) drop-shadow(0 0 14px rgba(160,200,255,0.85))";
          el.style.opacity = "0.82";
        }
      }
    }

    // 接近tick: カエルムに十分近づいたら対話を1回だけ起動 (戦闘外でのみ)。
    async function tryApproachCaelum() {
      if (!gameStarted || gameOver || caelumResolved || caelumIdx < 0) return;
      if (encounterActive || encounterRunning) return;
      if (hp <= 0) return;
      const e = enemies[caelumIdx];
      if (!e || !e.alive || !e.inactive) return;
      const pCX = playerX + 48, pCY = playerY + 58;
      const ds = e.def.displaySize || TILE_SIZE;
      const ecx = e.x + ds / 2, ecy = e.y + ds / 2;
      if (Math.hypot(pCX - ecx, pCY - ecy) > CAELUM_TALK_RADIUS) return;
      caelumResolved = true;            // 多重起動防止 (async 前に確定)
      await runCaelumDialog();
    }
    setInterval(tryApproachCaelum, 400);

    // 対話本体: 第一遭遇ナレ → 3択 → 分岐。
    async function runCaelumDialog() {
      showDMMessage("神殿の最奥、青白い光の小部屋。墓碑の前に、儚げな人影が漂っていた…", 3200);
      await sleepMs(900);
      showDMMessage("「……人が来たのは、何年ぶりか。君らは、ファラクサスを討つ者か?」", 3200);
      await sleepMs(700);
      // 先頭=弔い: showCharChoice は autoplay 時 index 0 を自動選択するため、巡回検証が
      // 友好ルート(戦闘なし)で安全に完走できる。
      const c = await showCharChoice(
        "墓碑の前の霊が、こちらを見つめている。",
        [{ label: "弔いの言葉を述べる" }, { label: "無視して通り過ぎる" }, { label: "剣を抜く(霊と戦う)" }],
        "そっとしておく (Esc)");
      if (c === 2) await caelumHostileRoute();
      else if (c === 0) await caelumFriendlyRoute();
      // c === 1 または null (無視/Esc): passiveNpc のまま放置 (クリア非ブロック、報酬なし)
      else showDMMessage("霊は何も言わず、ただ静かにこちらを見送った…", 2600);
    }

    // 友好ルート: lore ナレ → 神官の祝福(永続恐怖免疫) → 安らかに薄れて消える。
    async function caelumFriendlyRoute() {
      showDMMessage("「私はカエルム。この神殿の高位神官だった。ファラクサスは100年前、人の姿で訪れ、地下に儀式の祭壇を築いた…」", 4400);
      await sleepMs(2100);
      showDMMessage("「私はそれを見抜き止めようとした。だが奴の手下に殺され、神殿はアンデッドの巣に堕ちた…」", 4400);
      await sleepMs(2100);
      showDMMessage("「ファラクサスの真名は『ファラクスス』 — 古代語で炎の支配者。強大だが不死ではない。呪われし剣を恐れる…」", 4400);
      await sleepMs(2100);
      showBanner("✝ 神官の祝福 ✝", 1800);
      showDMMessage("「私の祝福を受けよ。君らの心は龍の咆哮に屈さぬ。行け勇者たちよ — 私の遺志を、果たせ。」", 4400);
      grantTempleBlessing();
      await sleepMs(1600);
      const el = enemyElements[caelumIdx];   // passiveNpc は維持 (クリア非ブロック)、視覚だけ消す
      if (el) { el.style.transition = "opacity 1.4s"; el.style.opacity = "0"; }
    }

    // 敵対ルート: Horrifying Visage (恐怖セーヴ DC13 流用) → 戦闘化 (tryStartEncounter が単体戦を開始)。
    async function caelumHostileRoute() {
      showDMMessage("霊の表情が一瞬で歪む。神官の慈悲は消え、死者の怨嗟だけが残った…!", 3600);
      showBanner("👁 HORRIFYING VISAGE 👁", 1600);
      await sleepMs(700);
      partyWillSave(13);                     // 仕込み済の恐怖セーヴを流用
      await sleepMs(900);
      const e = enemies[caelumIdx];
      if (e) { e.passiveNpc = false; e.inactive = false; }
      window.__inMidBoss = true;
      if (encounterActive) bgm(combatBgmTrack());   // 戦闘中のカエルム敵対化なら即座に midboss 曲へ
      const el = enemyElements[caelumIdx];
      if (el) {
        el.classList.remove("caelum-spirit");
        el.style.opacity = "1";
        el.style.filter = "brightness(1.6) saturate(1.3)";
        setTimeout(() => { if (el) el.style.filter = ""; }, 700);
      }
    }

    // ── Sce3 隠し要素: 沼の守護神・古代ハイドラ (swamp-hydra.md) ──
    // 封印中は inactive+passiveNpc (クリア非ブロック)。祭壇 (=ハイドラ位置) 接近で3択 →
    // 破壊/供物強奪で覚醒、立ち去れば封印維持で回避可能。initCaelum と同方針。
    let hydraIdx = -1, hydraResolved = false, hydraAwakened = false;
    let altarGlowEl = null;                        // 封印中に祭壇中央へ置く微光オーラ (覚醒で消去)
    const ALTAR_APPROACH_RADIUS = 220;   // 祭壇3択の接近半径。実測でnear-miss(182px)を拾うため160→220に拡大

    function initHydra() {
      for (let ei = 0; ei < enemies.length; ei++) {
        const e = enemies[ei];
        if (!e || !e.def || !e.def.isHydra) continue;
        e.inactive = true;
        e.passiveNpc = true;                       // 封印中はクリア判定からも除外
        e.hydraHeads = e.def.maxHeads || 5;
        e.headHpMax = e.def.headHp || e.def.hp || 34;
        e.hp = e.headHpMax; e.maxHp = e.headHpMax;  // HPバー=現在の頭ぶん
        e.dragDone = false; e.roarDone = false;
        e.__tookFireAcid = false; e.__regrowNarrated = false;
        e.breathCooldown = 0; e.__breathNarrated = false;   // 火炎ブレス: 連続抑止 + 初回ナレ
        hydraIdx = ei;
        // 封印中はハイドラ本体を完全非表示。背景画 (room_lizard-swamp_4) の蛇祭壇だけを見せる。
        // (描画ループの isHydra && inactive ガードでも隠すが、初フレーム前から確実に隠す)
        const el = enemyElements[ei];
        if (el) el.style.display = "none";
      }
      // 祭壇 (=ハイドラ位置) に微光オーラ+ゆらめきを置き「何かある」と静かに示す。
      // 宝箱/罠と同じ body 直下 position:absolute、カメラ追従は描画ループで毎フレーム配置。
      if (hydraIdx >= 0 && !altarGlowEl) {
        altarGlowEl = document.createElement("div");
        altarGlowEl.className = "altarGlow";
        altarGlowEl.id = "altarGlow";
        document.body.appendChild(altarGlowEl);
      }
    }

    // 接近tick: 祭壇 (=ハイドラ) に近づいたら3択を1回だけ起動 (戦闘外・封印中のみ)。
    async function tryApproachAltar() {
      if (!gameStarted || gameOver || hydraResolved || hydraIdx < 0) return;
      if (encounterActive || encounterRunning) return;
      if (hp <= 0) return;
      const e = enemies[hydraIdx];
      if (!e || !e.alive || !e.inactive) return;
      const pCX = playerX + 48, pCY = playerY + 58;
      const ds = e.def.displaySize || TILE_SIZE;
      const ecx = e.x + ds / 2, ecy = e.y + ds / 2;
      if (Math.hypot(pCX - ecx, pCY - ecy) > ALTAR_APPROACH_RADIUS) return;
      hydraResolved = true;                        // 多重起動防止 (async 前に確定)
      await runAltarDialog();
    }
    setInterval(tryApproachAltar, 400);

    // 祭壇対話: 発見ナレ → 3択 → 破壊/供物強奪で覚醒、立ち去りで封印維持 (回避ルート)。
    async function runAltarDialog() {
      showDMMessage("沼の最深部、水没した遺跡の中央に、苔むした巨大な祭壇がある。周囲には新鮮な供物 — 魚、宝石、磨かれた骨が並べられている。リザードマンたちが、ここで何かを敬っているのは間違いない。", 5200);
      await sleepMs(1300);
      // 先頭=立ち去る: showCharChoice は autoplay 時 index 0 を自動選択するため、巡回検証は
      // 封印維持 (戦闘なし) で安全に完走できる。
      const c = await showCharChoice(
        "苔むした祭壇。供物が捧げられている。どうする?",
        [{ label: "立ち去る(封印を保つ)" }, { label: "祭壇を破壊する" }, { label: "供物を奪う" }],
        "そっとしておく (Esc)");
      if (c === 1 || c === 2) {
        await awakenHydra(c);
      } else {
        // c === 0 または null: 封印維持 (passiveNpc のままクリア非ブロック、報酬なし)
        showDMMessage("供物に手を触れず、静かにその場を後にした。守護神は、眠ったままだ…", 3000);
      }
    }

    // 覚醒: 砕け散る祭壇ナレ → passiveNpc/inactive 解除で戦闘化 (tryStartEncounter が単体戦を開始)。
    async function awakenHydra(choice) {
      if (hydraAwakened || hydraIdx < 0) return;
      hydraAwakened = true;
      const e = enemies[hydraIdx];
      showDMMessage(choice === 1
        ? "祭壇に刃を振り下ろした。古き石が砕け散った瞬間、沼の水が爆ぜた…!"
        : "供物の宝石を奪い取った。封印の均衡が崩れ、沼の水が音を立てて渦巻きはじめる…!", 4200);
      await sleepMs(1500);
      showBanner("🐲 守護神、覚醒! 🐲", 2000);
      showDMMessage("巨大な影が、五つの頭をもたげながら、闇から這い上がってくる。リザードマンたちが一斉に叫んだ — 『守護神よ!守護神よ!』", 5200);
      try { if (typeof sfx === "function") sfx("bossDeath"); } catch (err) {}
      await sleepMs(1400);
      // 祭壇の微光を消す (脈動アニメを止めてフェード → 除去)
      if (altarGlowEl) {
        const g = altarGlowEl;
        g.style.animation = "none";
        g.style.opacity = "0";
        setTimeout(() => { try { g.remove(); } catch (e2) {} }, 600);
        altarGlowEl = null;
      }
      if (e) { e.passiveNpc = false; e.inactive = false; e.everSeen = true; }  // 戦闘化 (描画ガードを抜け display:block へ。everSeen でフォグ消失を防止)
      window.__inMidBoss = true;
      if (encounterActive) bgm(combatBgmTrack());   // 戦闘中のハイドラ覚醒なら即座に midboss 曲へ
      const el = enemyElements[hydraIdx];
      if (el) {
        el.style.display = "block";
        el.style.opacity = "1";
        // 沼の底からせり上がる出現: clip-path で下→全身リビール
        // (transform はスプライト左右反転 scaleX(-1) と競合するため不使用)
        el.classList.add("hydra-emerge");
        el.style.filter = "brightness(1.7) saturate(1.4) drop-shadow(0 0 18px rgba(80,200,140,0.9))";
        setTimeout(() => {
          if (el) { el.style.filter = ""; el.classList.remove("hydra-emerge"); el.style.clipPath = ""; }
        }, 1000);
      }
    }

    // ── Phase 2-B: 確率脱走 (檻近くで戦闘 → 5秒ごとに 20% で自動解放) ──
    // 戦闘開始から 5 秒経過したら、5 秒ごとに、戦闘地点 (player) と檻の距離が 800px 以内の
    // 閉じた檻について 20% で自動解放判定。発動したら openCage() を呼ぶ (咆哮 → ワープ → 第三勢力化)。
    const CAGE_ESCAPE_INTERVAL_MS = 5000;
    const CAGE_ESCAPE_CHANCE = 0.20;
    const CAGE_ESCAPE_PROXIMITY_PX = 800;
    const CAGE_LURE_RELEASE_PX = 420;   // 誘導済みの檻: 盗賊がこの距離に来たら確定脱走 (餅になる脱走)
    let _lastCageEscapeCheck = 0;
    setInterval(async () => {
      if (!gameStarted || gameOver) return;
      if (!encounterActive) return;              // 戦闘中のみ
      if (dialogPaused) return;                  // showChoice 中は休止

      // 誘導された檻 (餅になる脱走): 5秒throttle に関係なく毎tick判定。
      // 盗賊 (非beast) が檻に近づいた瞬間に確定で弾ける → 獣はその盗賊に襲いかかる。
      for (const cage of cages) {
        if (cage.opened || cage.dialogActive || !cage.lured) continue;
        const lcx = cage.tx * TILE_SIZE + TILE_SIZE / 2;
        const lcy = cage.ty * TILE_SIZE + TILE_SIZE / 2;
        let banditNear = false;
        for (let i = 0; i < enemies.length; i++) {
          const o = enemies[i];
          if (!o || !o.alive || o.inactive) continue;
          if (o.def.faction === "beast") continue;
          const ocx = o.x + o.def.displaySize / 2;
          const ocy = o.y + o.def.displaySize / 2;
          if (Math.hypot(lcx - ocx, lcy - ocy) <= CAGE_LURE_RELEASE_PX) { banditNear = true; break; }
        }
        if (banditNear) {
          showDMMessage("…煽られた獣が檻に体当たりしている。獲物が、近い…!", 2000);
          await openCage(cage);
          return;   // このtickは終了 (下の確率脱走は走らせない)
        }
      }

      const now = (typeof performance !== "undefined" && performance.now)
        ? performance.now() : Date.now();
      // 戦闘開始から 5 秒未満は対象外
      if (now - encounterStartedAt < CAGE_ESCAPE_INTERVAL_MS) return;
      // 5 秒ごとにのみ判定
      if (now - _lastCageEscapeCheck < CAGE_ESCAPE_INTERVAL_MS) return;
      _lastCageEscapeCheck = now;

      const pCX = playerX + 48, pCY = playerY + 58;
      for (const cage of cages) {
        if (cage.opened) continue;
        if (cage.dialogActive) continue;
        // 戦闘地点との距離 (檻中央 from player center)
        const cx = cage.tx * TILE_SIZE + TILE_SIZE / 2;
        const cy = cage.ty * TILE_SIZE + TILE_SIZE / 2;
        const d = Math.hypot(pCX - cx, pCY - cy);
        if (d > CAGE_ESCAPE_PROXIMITY_PX) continue;
        // 20% 判定
        if (Math.random() >= CAGE_ESCAPE_CHANCE) continue;
        // 発動: 自動解放 (DM ナレが咆哮 → ワープを描写)
        showDMMessage("…檻の中で何かが暴れている。戦闘の音に反応している…!", 2200);
        await openCage(cage);
        break;   // 1 tick で複数檻は扱わない
      }
    }, 1000);

    // ═════════════════════════════════════════════════════════
    // ダンジョン罠 (知覚チェックで発見、未発見で踏むとダメージ)
    // ═════════════════════════════════════════════════════════
    const traps = [];
    const TRAP_PERCEPTION_RADIUS = 6;  // このタイル以内の罠を毎ターン判定

    function spawnTraps() {
      const count = currentScenario.trapCount || 3;
      const bossIdx = ROOMS.length - 1;
      const excludeRooms = new Set([0, bossIdx]);  // スタート・ボス部屋は除外
      const candidates = [];
      for (let r = 0; r < MAP_H; r++) {
        for (let c = 0; c < MAP_W; c++) {
          if (mapData[r][c] !== 0) continue;
          if (isTileWall(c, r)) continue;              // 倒木/大型葦の上は避ける
          // 除外部屋内ならスキップ
          let inExcluded = false;
          for (const i of excludeRooms) {
            const [r1, c1, r2, c2] = ROOMS[i];
            if (r >= r1 && r <= r2 && c >= c1 && c <= c2) { inExcluded = true; break; }
          }
          if (inExcluded) continue;
          candidates.push([c, r]);
        }
      }
      if (candidates.length === 0) return;
      // Fisher-Yates シャッフル
      for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
      }
      const spawnN = Math.min(count, candidates.length);
      for (let i = 0; i < spawnN; i++) {
        const [tx, ty] = candidates[i];
        const trap = {
          tx, ty,
          type: "damage",
          damageDice: "1d6",
          found: false,
          triggered: false,
          el: null,
        };
        traps.push(trap);
        createTrapDom(trap, traps.length - 1);
      }
    }

    function createTrapDom(trap, idx) {
      const el = document.createElement("div");
      el.className = "trap";
      el.id = "trap" + idx;
      document.body.appendChild(el);
      trap.el = el;
    }

    // 知覚チェック: プレイヤー 1 タイル移動後に呼ばれる
    //   周辺 TRAP_PERCEPTION_RADIUS 以内の未発見罠 + 隠された宝箱を
    //   PT 全員で 1d20+WIS+perceptionBonus 判定、1人成功で発見
    // ── 罠/隠し宝箱 発見: 職業別確率モデル (classes.md 準拠) ──
    // 旧実装は「移動ごと×全員×d20」で累積発見しほぼ必中=職業差消失。
    // 1対象につき半径内で1回だけ職業別確率で判定し、職業差を効かせる。
    const CLASS_TRAP_FIND_CHANCE = {
      rogue: 0.80, dwarf: 0.40, elf: 0.35, warrior: 0.20, cleric: 0.20, mage: 0.20,
    };
    const FIND_TRAPS_CHANCE = 0.95;  // 盗賊が「罠探知強化」装備時
    function memberTrapChance(classKey, equipped) {
      if (Array.isArray(equipped) && equipped.includes("find-traps")) return FIND_TRAPS_CHANCE;
      return CLASS_TRAP_FIND_CHANCE[classKey] != null ? CLASS_TRAP_FIND_CHANCE[classKey] : 0.20;
    }
    // 生存メンバー中の最良発見確率 + その担当者名 (最も鋭い者が見つける)
    function partyBestTrapFinder() {
      let best = 0, name = "";
      if (hp > 0 && !gameOver) {
        const c = memberTrapChance(leaderClassKey, equippedSkills);
        if (c > best) { best = c; name = getLeaderName(); }
      }
      for (const a of allies) {
        if (!a.alive) continue;
        const c = memberTrapChance(a.classKey, a.equippedSkills);
        if (c > best) { best = c; name = a.def.name; }
      }
      return { chance: best, name };
    }

    function runPerceptionCheck() {
      if (encounterActive || encounterRunning) return;
      if (!gameStarted || gameOver) return;
      const pCX = playerX + 48, pCY = playerY + 58;
      const pTX = Math.floor(pCX / TILE_SIZE);
      const pTY = Math.floor(pCY / TILE_SIZE);
      const finder = partyBestTrapFinder();   // {chance, name}
      const pct = Math.round(finder.chance * 100);

      // 罠の発見判定 (半径内に入った対象につき1回だけ確率判定)
      for (const trap of traps) {
        if (trap.found || trap.triggered || trap._percRolled) continue;
        if (Math.abs(trap.tx - pTX) > TRAP_PERCEPTION_RADIUS) continue;
        if (Math.abs(trap.ty - pTY) > TRAP_PERCEPTION_RADIUS) continue;
        trap._percRolled = true;   // この罠は判定済 (見逃したら踏むまで未発見)
        if (Math.random() < finder.chance) {
          trap.found = true;
          showBanner("⚠ 罠を見つけた!", 1400);
          showDMMessage("足を止めろ。床に不自然な跡がある。罠だ。慎重に進め。", 2400);
          updateInfo(`${finder.name} が罠を発見! (発見率 ${pct}%)`);
        }
      }

      // 隠された宝箱の発見判定
      if (typeof roomChests !== "undefined") {
        for (const chest of roomChests) {
          if (!chest.hidden || chest.found || chest._percRolled) continue;
          if (Math.abs(chest.tx - pTX) > TRAP_PERCEPTION_RADIUS) continue;
          if (Math.abs(chest.ty - pTY) > TRAP_PERCEPTION_RADIUS) continue;
          chest._percRolled = true;
          if (Math.random() < finder.chance) {
            chest.found = true;
            showBanner("🎁 隠された宝箱を見つけた!", 1400);
            updateInfo(`${finder.name} が隠された宝箱を発見! (発見率 ${pct}%)`);
          }
        }
      }

      // ミミック (偽宝箱) の事前察知: 罠と同じ職業別確率で1回判定。見抜くと粘着なしで先制起動。
      if (typeof mimicChest !== "undefined" && mimicChest && !mimicChest.awakened && !mimicChest._percRolled) {
        if (Math.abs(mimicChest.tx - pTX) <= TRAP_PERCEPTION_RADIUS && Math.abs(mimicChest.ty - pTY) <= TRAP_PERCEPTION_RADIUS) {
          mimicChest._percRolled = true;
          if (Math.random() < finder.chance) {
            updateInfo(`${finder.name} が偽宝箱を見抜いた! (発見率 ${pct}%)`);
            if (typeof awakenMimic === "function") awakenMimic(mimicChest, { forewarned: true });
          }
        }
      }
    }

    // 罠発動チェック: 誰かが罠タイルに入ったら発動
    function checkTrapTrigger() {
      if (!gameStarted || gameOver) return;
      if (encounterActive || encounterRunning) return;
      const pTX = Math.floor((playerX + 48) / TILE_SIZE);
      const pTY = Math.floor((playerY + 58) / TILE_SIZE);
      for (const trap of traps) {
        if (trap.triggered) continue;
        // プレイヤー
        if (trap.tx === pTX && trap.ty === pTY && !trap.found) {
          triggerTrapOnPlayer(trap);
        }
        // 仲間
        for (const ally of allies) {
          if (!ally.alive || trap.triggered) continue;
          const aTX = Math.floor((ally.x + ally.def.displaySize / 2) / TILE_SIZE);
          const aTY = Math.floor((ally.y + ally.def.displaySize / 2) / TILE_SIZE);
          if (trap.tx === aTX && trap.ty === aTY && !trap.found) {
            triggerTrapOnAlly(trap, ally);
          }
        }
      }
    }

    function triggerTrapOnPlayer(trap) {
      trap.triggered = true;
      trap.found = true;
      sfx("trap");
      const r = rollDiceDD(1, 6);
      const dmg = r.total;
      // 不屈: 罠の致命傷でも 1d4 HP で踏みとどまる (1戦1回)
      if (equippedSkills.includes("resilient") && !playerBuffs.resilientFired
          && (hp - dmg) <= 0 && dmg > 0) {
        playerBuffs.resilientFired = true;
        const s = rollDiceDD(1, 4);
        hp = s.total;
        showBuffPop(`<span class="label">不屈!</span>罠の致命傷を 1d4(<span class="big">${s.total}</span>) HP で耐える`);
      } else {
        hp = Math.max(0, hp - dmg);
      }
      showBanner("罠発動!", 1200);
      showDMMessage("しまった! 罠だ!", 1800);
      updateInfo(`${getLeaderName()}が罠を踏んだ! 1d6(${r.rolls.join("+")}) = ${dmg} ダメージ`);
      showDmgAt(playerX + 48, playerY + 48, dmg, false);
      if (hp <= 0) { if (!onHeadDowned("explore")) gameOver = true; }
    }

    function triggerTrapOnAlly(trap, ally) {
      trap.triggered = true;
      trap.found = true;
      const r = rollDiceDD(1, 6);
      const dmg = r.total;
      // 不屈: 罠の致命傷でも 1d4 HP で踏みとどまる (戦士系の仲間のみ・1戦1回)
      let trapResilientNote = "";
      if (ally.equippedSkills && ally.equippedSkills.includes("resilient")
          && !ally.buffs.resilientFired && (ally.hp - dmg) <= 0 && dmg > 0) {
        ally.buffs.resilientFired = true;
        const s = rollDiceDD(1, 4);
        ally.hp = s.total;
        trapResilientNote = ` → 不屈! ${s.total} HP で耐えた`;
      } else {
        ally.hp = Math.max(0, ally.hp - dmg);
      }
      showBanner("罠発動!", 1200);
      showDMMessage("しまった! 罠だ!", 1800);
      updateInfo(`${ally.def.name} が罠を踏んだ! 1d6(${r.rolls.join("+")}) = ${dmg} ダメージ${trapResilientNote}`);
      showDmgAt(ally.x + ally.def.displaySize / 2, ally.y + 40, dmg, false);
      if (ally.hp <= 0) {
        ally.alive = false;
        updateInfo(`${ally.npcName || ally.def.name} は倒れた…`);
        if (ally.isHero) { gameOver = true; updateInfo("主人公が倒れた… ゲームオーバー(更新でやり直し)"); }
      }
    }

    // ── カウンター (被弾後の自動反撃) ──
    // バランス: 被弾ごと 50% 発動 + 近接間合いの敵にのみ反撃 (プレイヤー/仲間 共通)
    const COUNTER_CHANCE = 0.5;
    // 指定座標 (cx,cy) から見て enemyIdx が近接間合い (1タイル) にいるか
    function isEnemyInMeleeReach(originCX, originCY, enemyIdx) {
      const e = enemies[enemyIdx];
      if (!e) return false;
      const eCX = e.x + e.def.displaySize / 2;
      const eCY = e.y + e.def.displaySize / 2;
      return tileChebyshev(originCX, originCY, eCX, eCY) <= getRange("melee").tiles;
    }
    // 被弾後カウンターを発動すべきか (生存後に呼ぶ)。dmg>0 / 敵生存 / 近接 / 50% を満たす
    function shouldCounter(hasCounterSkill, dmg, enemyIdx, originCX, originCY) {
      return hasCounterSkill && dmg > 0 && enemies[enemyIdx] && enemies[enemyIdx].alive
        && isEnemyInMeleeReach(originCX, originCY, enemyIdx)
        && Math.random() < COUNTER_CHANCE;
    }

    async function performCounter(enemyIdx) {
      if (!enemies[enemyIdx].alive) return;
      sfx("counter");
      showSkillAnnounce("カウンター");
      flashAction(player, "skill");
      await sleepMs(400);
      await playerSingleAttack(enemyIdx, {
        skillName: "カウンター",
        dmgDice: "1d8",
        dmgBonus: playerStats.str,
        range: "melee",
      });
    }

    // ── 仲間カウンター (被弾後の自動反撃、1d8+STR、近接) ──
    async function performAllyCounter(ally, enemyIdx) {
      const target = enemies[enemyIdx];
      if (!target || !target.alive) return;
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;
      const aCX = ally.x + ally.def.displaySize / 2;
      if (Math.abs(ex - aCX) > 2) ally.facing = ex > aCX ? "right" : "left";

      sfx("counter");
      showRollAtAlly(ally, `<span class="label">カウンター</span>反撃!`, "crit");
      flashAction(ally.el, "skill");
      startAllyAttackAnim(ally);
      await sleepMs(400);

      const helpless = target.stunned > 0;
      const natD20 = d20();
      const aAtk = ally.atkBonus + allyAtkBuff(ally);
      const atkTotal = natD20 + aAtk;
      const isFumble = !helpless && natD20 === 1;
      const isThreat = natD20 >= effectiveCritRange(ally) && !isFumble;
      const ac = effectiveEnemyAc(target);

      if (isFumble) {
        showRollAtAlly(ally, `<span class="label">FUMBLE!</span>1d20(<b>1</b>)${signedDD(aAtk)}`, "fumble");
        await sleepMs(700);
        return;
      }
      const hit = helpless || isThreat || atkTotal >= ac;
      let isCrit = helpless;
      if (!hit) {
        showRollAtAlly(ally,
          `<span class="label">カウンター MISS</span>1d20(<b>${natD20}</b>)${signedDD(aAtk)} = ${atkTotal}<br>vs AC ${ac}`,
          "miss");
        await sleepMs(450);
        return;
      }
      if (!helpless && isThreat) {
        const cn = d20(), ct = cn + aAtk;
        if (ct >= ac) isCrit = true;
      }
      showRollAtAlly(ally,
        `<span class="label">${isCrit ? "カウンター CRIT!" : "カウンター HIT"}</span>1d20(<b>${natD20}</b>)${signedDD(aAtk)} = <span class="big">${atkTotal}</span><br>vs AC ${ac}`,
        isCrit ? "crit" : "hit");
      await sleepMs(300);

      // ダメージ: 1d8 + STR (crit で 1d8 とボーナス両方を倍化)
      const times = isCrit ? ally.critMult : 1;
      let rolls = [];
      for (let i = 0; i < times; i++) rolls = rolls.concat(rollDiceDD(1, 8).rolls);
      const dmg = Math.max(1, rolls.reduce((a, b) => a + b, 0) + ally.str * times);

      // 残影回避 / ゴーレム非魔法物理免疫 はカウンターでも尊重
      if (tryDisplacement(enemyIdx)) { await sleepMs(420); return; }
      if (golemPhysImmune(enemyIdx, ally.weaponEnhancement || 0)) {
        showRollAtEnemy(enemyIdx, `<span class="label">IMMUNE</span>通用しない!`, "miss");
        updateInfo(`${ally.def.name}: 非魔法のカウンターは ${tgtDef.name} に通用しない!`);
        noteDisplacementHit(enemyIdx);
        await sleepMs(380);
        return;
      }
      target.hp -= dmg;
      if (target.hp < 0) target.hp = 0;
      triggerEnemyDamageFlash(enemyIdx);
      noteDisplacementHit(enemyIdx);
      showHitSpark(enemyIdx, isCrit);
      showDmgAt(ex, target.y, dmg, isCrit);
      updateInfo(`${ally.def.name}: カウンター! ${tgtDef.name} に ${dmg} ダメージ`);
      await sleepMs(400);
      if (target.hp <= 0) { defeatEnemy(enemyIdx); await sleepMs(400); }
    }

    // ═══════════════════════════════════════════════════════════
    // パーティー戦闘: 敵ターゲット選択 + 仲間のターン
    // ═══════════════════════════════════════════════════════════

    // 敵がパーティーの誰を狙うか (最寄りの生存メンバー)
    function pickEnemyTarget(enemyIdx) {
      const e = enemies[enemyIdx];
      const eCX = e.x + e.def.displaySize / 2;
      const eCY = e.y + e.def.displaySize / 2;
      const candidates = [];
      if (hp > 0 && !gameOver) {
        candidates.push({ kind: "leader", zone: PARTY_ZONES[leaderClassKey] || "front", cx: playerX + 48, cy: playerY + 58 });
      }
      for (let i = 0; i < allies.length; i++) {
        if (!allies[i].alive) continue;
        const a = allies[i];
        candidates.push({
          kind: "ally", idx: i,
          zone: a.zone || PARTY_ZONES[a.classKey] || "mid",
          cx: a.x + a.def.displaySize / 2,
          cy: a.y + a.def.displaySize / 2
        });
      }
      // 第三勢力 (beast) は他陣営の敵と相互に敵対する (双方向)。
      //   beast → 非beast の敵 / 非beast → アクティブな beast の敵 を candidates に追加。
      // PT も盗賊も区別なく最寄りを襲い、解放された獣には盗賊も反撃する (仕様: 戦場の混乱)。
      // 同陣営 (beast 同士 / 通常の敵同士) は対象外。inactive な敵 (檻内) も除外。
      const eIsBeast = e.def.faction === "beast";
      for (let i = 0; i < enemies.length; i++) {
        if (i === enemyIdx) continue;
        const o = enemies[i];
        if (!o.alive || o.inactive) continue;
        if ((o.def.faction === "beast") === eIsBeast) continue;  // 同陣営は除外
        candidates.push({
          kind: "enemy", idx: i,
          cx: o.x + o.def.displaySize / 2,
          cy: o.y + o.def.displaySize / 2
        });
      }
      if (candidates.length === 0) return null;
      // 前衛バイアス (Q1=B/§7): 前衛ほど実効距離を短く扱い「最も狙われる」。第三勢力(enemy)は等倍。
      const ZONE_PULL = { front: 0.75, mid: 1.0, rear: 1.25 };
      let best = null, bestDist = Infinity;
      for (const c of candidates) {
        const base = Math.hypot(eCX - c.cx, eCY - c.cy);
        const d = base * (c.kind === "enemy" ? 1.0 : (ZONE_PULL[c.zone] || 1.0));
        if (d < bestDist) { bestDist = d; best = c; }
      }
      return best;
    }

    // 回復ポップ (緑色のダメージポップ再利用)
    function showHealAt(worldX, worldY, heal) {
      const pop = document.createElement("div");
      pop.className = "dmgPop";
      pop.style.color = "#8effa0";
      pop.style.textShadow =
        "0 1px 0 #000, 0 2px 6px rgba(0,0,0,0.9), 0 0 10px rgba(140,255,160,0.85)";
      pop.textContent = "+" + heal;
      pop.style.left = (worldX - camX) + "px";
      pop.style.top  = (worldY - camY - 4) + "px";
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), 900);
    }

    // MP 回復ポップ (青色)
    function showHealAtAllyMp(ally, amount) {
      if (!ally || !ally.def) return;
      const pop = document.createElement("div");
      pop.className = "dmgPop";
      pop.style.color = "#6ab0ff";
      pop.style.textShadow =
        "0 1px 0 #000, 0 2px 6px rgba(0,0,0,0.9), 0 0 10px rgba(80,140,255,0.9)";
      // Phase 2-J: MP → 呪文スロット表記に変更
      pop.textContent = `呪文 +${amount}`;
      const wx = ally.x + ally.def.displaySize / 2;
      const wy = ally.y;
      pop.style.left = (wx - camX) + "px";
      pop.style.top  = (wy - camY - 4) + "px";
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), 1000);
    }

    function findLowestHpPartyMember() {
      const list = [];
      if (hp > 0 && !gameOver) {
        list.push({
          kind: "leader",
          hp, maxHp, ratio: hp / maxHp,
          cx: playerX + 48, cy: playerY + 58,
        });
      }
      for (const a of allies) {
        if (!a.alive) continue;
        list.push({
          kind: "ally", ally: a,
          hp: a.hp, maxHp: a.maxHp, ratio: a.hp / a.maxHp,
          cx: a.x + a.def.displaySize / 2,
          cy: a.y + a.def.displaySize / 2,
        });
      }
      if (list.length === 0) return null;
      list.sort((a, b) => a.ratio - b.ratio);
      return list[0];
    }

    function pickClosestEngagedEnemyFromAlly(ally) {
      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      let best = -1, bestDist = Infinity;
      for (const i of encounterEnemyIndices) {
        if (!enemies[i].alive) continue;
        const eCX = enemies[i].x + enemies[i].def.displaySize / 2;
        const eCY = enemies[i].y + enemies[i].def.displaySize / 2;
        const d = Math.hypot(aCX - eCX, aCY - eCY);
        if (d < bestDist) { bestDist = d; best = i; }
      }
      return best;
    }

    // 仲間を1タイル前進 (任意座標へ)。戦士・他仲間・敵のタイルを回避
    async function allyAdvanceTowardPoint(ally, targetWX, targetWY, opts = {}) {
      const slideMs   = (opts.slideMs   != null) ? opts.slideMs   : 380;
      const postSleep = (opts.postSleep != null) ? opts.postSleep : 120;
      const silent    = !!opts.silent;  // ログ/ロール表示を抑制 (探索中向け)
      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const aTX = Math.floor(aCX / TILE_SIZE);
      const aTY = Math.floor(aCY / TILE_SIZE);
      const gTX = Math.floor(targetWX / TILE_SIZE);
      const gTY = Math.floor(targetWY / TILE_SIZE);
      // 他ユニット (戦士・他仲間・敵) を避ける
      const avoidSet = getUnitOccupiedTiles(ally);
      const next = firstTileStep(aTX, aTY, gTX, gTY, avoidSet);
      if (!next) {
        if (!silent) showRollAtAlly(ally, `<span class="label">CAN'T ADVANCE</span>経路なし`, "miss");
        await sleepMs(silent ? 100 : 600);
        return;
      }
      // 右向きのみ運用: 水平移動時のみ facing 更新、上下は維持
      if (next.tx < aTX) ally.facing = "left";
      else if (next.tx > aTX) ally.facing = "right";

      if (!silent) showRollAtAlly(ally, `<span class="label">ADVANCE</span>前進 1タイル`, "init");
      flashAction(ally.el, "move");
      const fromX = ally.x, fromY = ally.y;
      const toX = next.tx * TILE_SIZE + TILE_SIZE / 2 - ally.def.displaySize / 2;
      const toY = next.ty * TILE_SIZE + TILE_SIZE / 2 - ally.def.displaySize / 2;
      ally.slideTargetTile = { tx: next.tx, ty: next.ty };  // 他ユニットの侵入防止
      ally.playerMovingThisFrame = true;
      try {
        await slideAnim((x, y) => {
          ally.x = x; ally.y = y; ally.playerMovingThisFrame = true;
        }, fromX, fromY, toX, toY, slideMs);
      } finally {
        ally.slideTargetTile = null;
        ally.playerMovingThisFrame = false;
      }
      await sleepMs(postSleep);
    }

    // 仲間の通常攻撃
    async function allyBasicAttack(ally, enemyIdx) {
      const target = enemies[enemyIdx];
      if (!target.alive) return;
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      // 向き調整
      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const dfx = ex - aCX, dfy = ey - aCY;
      // 右向きのみ運用: X軸に差があれば更新、ほぼ真上/真下なら facing 維持
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      // 射程 + 視線チェック (遠距離武器は壁越しに撃てない)
      const rangeKey = ally.weaponRange || "melee";
      const rangeTiles = getRange(rangeKey).tiles;
      const distT = tileChebyshev(aCX, aCY, ex, ey);
      const needLOS = (rangeKey !== "melee");
      if (distT > rangeTiles || (needLOS && !hasLineOfSight(aCX, aCY, ex, ey))) {
        await allyAdvanceTowardPoint(ally, ex, ey);
        return;
      }

      flashAction(ally.el, "attack");
      startAllyAttackAnim(ally);

      const helpless = target.stunned > 0;
      const natD20 = d20();
      const aAtk = ally.atkBonus + allyAtkBuff(ally);   // ブレス/咆哮等の攻撃バフを反映
      const atkTotal = natD20 + aAtk;
      const isFumble = !helpless && natD20 === 1;
      const isThreat = natD20 >= effectiveCritRange(ally) && !isFumble;

      // 弓使い (weaponProjectile=arrow) は矢発射ヘルパー
      const fireArrowFromAlly = async () => {
        if (ally.def.weaponProjectile !== "arrow") return;
        const launchX = aCX + (ally.facing === "right" ? 22 : -22);
        const launchY = aCY - 6;
        await spawnArrow(launchX, launchY, ex, ey, 320);
      };

      if (isFumble) {
        showRollAtAlly(ally,
          `<span class="label">FUMBLE!</span>1d20(<b>1</b>)${signedDD(aAtk)}`,
          "fumble");
        await sleepMs(900);
        return;
      }

      const hit = helpless || isThreat || atkTotal >= effectiveEnemyAc(target);
      let isCrit = helpless;
      if (!hit) {
        showRollAtAlly(ally,
          `<span class="label">MISS</span>1d20(<b>${natD20}</b>)${signedDD(aAtk)} = ${atkTotal}<br>vs AC ${effectiveEnemyAc(target)}`,
          "miss");
        await fireArrowFromAlly();
        await sleepMs(500);
        return;
      }

      if (!helpless && isThreat) {
        const cn = d20(), ct = cn + aAtk;
        if (ct >= effectiveEnemyAc(target)) isCrit = true;
      }
      if (helpless) {
        showRollAtAlly(ally,
          `<span class="label">HELPLESS!</span>無抵抗の敵に自動命中 ×${ally.critMult}`,
          "crit");
      } else {
        showRollAtAlly(ally,
          `<span class="label">${isCrit ? "CRIT!" : "HIT"}</span>1d20(<b>${natD20}</b>)${signedDD(aAtk)} = <span class="big">${atkTotal}</span><br>vs AC ${effectiveEnemyAc(target)}`,
          isCrit ? "crit" : "hit");
      }
      await sleepMs(300);
      // 命中側でも矢飛翔 (着弾 → ダメージ)
      await fireArrowFromAlly();

      const { n, sides } = parseDiceDD(ally.dmgDice);
      const times = isCrit ? ally.critMult : 1;
      let allRolls = [];
      for (let i = 0; i < times; i++) allRolls = allRolls.concat(rollDiceDD(n, sides).rolls);
      const bonusTotal = ally.dmgBonus * times;
      let dmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + bonusTotal);
      // ストライキング: 命中ごとに +1dX (crit 非倍化)
      if (ally.buffs.strikingRemaining > 0 && ally.buffs.strikingDie > 0) {
        dmg += rollDiceDD(1, ally.buffs.strikingDie).total;
      }
      // ハンターズ・マーク: 標的が烙印されていれば武器命中ごとに +1dX (crit 非倍化)
      if (target.huntMarkRemaining > 0 && target.huntMarkDie > 0) {
        dmg += rollDiceDD(1, target.huntMarkDie).total;
      }

      // Phase 2-A: 残影回避判定 (shadowBeast 等)
      if (tryDisplacement(enemyIdx)) {
        await sleepMs(420);
        return;
      }
      // 非魔法物理免疫 (ストーンゴーレム等): 仲間は当面 weaponEnhancement 未設定=0 で無効化
      if (golemPhysImmune(enemyIdx, ally.weaponEnhancement || 0)) {
        showRollAtEnemy(enemyIdx, `<span class="label">IMMUNE</span>通用しない!`, "miss");
        updateInfo(`${ally.def.name}: 非魔法の武器は ${tgtDef.name} に通用しない!`);
        noteDisplacementHit(enemyIdx);
        await sleepMs(380);
        return;
      }
      target.hp -= dmg;
      if (target.hp < 0) target.hp = 0;
      triggerEnemyDamageFlash(enemyIdx);
      noteDisplacementHit(enemyIdx);
      showHitSpark(enemyIdx, isCrit);
      showDmgAt(ex, target.y, dmg, isCrit);
      updateInfo(`${ally.def.name}: ${tgtDef.name} に ${dmg} ダメージ`);
      await sleepMs(400);

      // ── レア武器の特殊効果 (ally 武器のフィールドから読み出し) ──
      const allyWeaponLike = {
        bonusDmgDice:  ally.weaponBonusDmgDice,
        bonusDmgType:  ally.weaponBonusDmgType,
        critStun:      ally.weaponCritStun,
        lifeStealDice: ally.weaponLifeStealDice,
        shockwaveDice:   ally.weaponShockwaveDice,
        shockwaveType:   ally.weaponShockwaveType,
        shockwaveSaveDC: ally.weaponShockwaveSaveDC,
      };
      await applyWeaponSpecialEffects(allyWeaponLike, target, enemyIdx, ex, isCrit, ally.def.name, { kind:"ally", ally });

      if (target.hp <= 0) {
        defeatEnemy(enemyIdx);
        await sleepMs(400);
      }
    }

    // アンデッド判定 (ターンアンデッド用)。将来の不死敵は def.undead=true を付与。
    function isUndeadEnemy(e) {
      return !!(e && ((e.def && e.def.undead) || e.type === "skeleton"));
    }
    // frightened (-2) ペナルティ。allyAtkBuff/currentPlayerAtkBonus に内包して to-hit へ反映。
    function allyFearPenalty(ally) {
      return (ally && ally.buffs && ally.buffs.frightenedRemaining > 0) ? (ally.buffs.frightenedPenalty || 0) : 0;
    }
    function playerFearPenalty() {
      return (playerBuffs.frightenedRemaining > 0) ? (playerBuffs.frightenedPenalty || 0) : 0;
    }
    // 仲間の攻撃バフ (atkBonusRemaining) − frightened ペナルティ。リーダーは currentPlayerAtkBonus が別途反映。
    // 主要近接 (allyBasicAttack/performAllyCounter) は本関数経由で恐怖が自動反映される。
    function allyAtkBuff(ally) {
      const buff = (ally && ally.buffs && ally.buffs.atkBonusRemaining > 0) ? (ally.buffs.atkBonusAmount || 0) : 0;
      return buff - allyFearPenalty(ally);
    }
    // スロットのある最良(emergency=true)/最小(温存)の回復呪文 id を返す。無ければ null
    function bestAffordableHeal(ally, emergency) {
      const order = ["cure-critical-wounds", "cure-serious-wounds", "cure-moderate-wounds", "cure-light-wounds"];
      const ids = emergency ? order : order.slice().reverse();
      for (const id of ids) {
        if (ally.equippedSkills.includes(id) && hasSpellSlot(ally, id)) return id;
      }
      return null;
    }

    // 僧侶の回復呪文 (汎用: skill.healDice を可変ロール)。leader/ally 両対応。
    async function allyCureWounds(ally, target, skillId) {
      sfx("heal");
      const skill = CLERIC_SKILLS[skillId] || CLERIC_SKILLS["cure-light-wounds"];
      const rangeTiles = getRange(skill.range).tiles;
      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const distT = tileChebyshev(aCX, aCY, target.cx, target.cy);
      if (distT > rangeTiles || !hasLineOfSight(aCX, aCY, target.cx, target.cy)) {
        await allyAdvanceTowardPoint(ally, target.cx, target.cy);
        return;
      }

      // 発動確定 → MP + スロット消費
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      if (ally.spellSlots && skill._slotId && ally.spellSlots[skill._slotId] != null) {
        ally.spellSlots[skill._slotId] = Math.max(0, ally.spellSlots[skill._slotId] - 1);
      }
      flashAction(ally.el, "skill");

      const dfx = target.cx - aCX;
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      showRollAtAlly(ally, `<span class="label">SKILL</span><span class="big">${skill.name}</span>`, "skill");
      startAllyAttackAnim(ally);
      await sleepMs(2400);

      // 回復ロール (skill.healDice 可変、useWis なら WIS 加算)
      const { n, sides } = parseDiceDD(skill.healDice || "1d8");
      const r = rollDiceDD(n, sides);
      const heal = Math.max(1, r.total + (skill.useWis ? ally.wis : 0));
      let actualHeal = 0;
      if (target.kind === "leader") {
        const prev = hp;
        hp = Math.min(maxHp, hp + heal);
        actualHeal = hp - prev;
      } else {
        const prev = target.ally.hp;
        target.ally.hp = Math.min(target.ally.maxHp, target.ally.hp + heal);
        actualHeal = target.ally.hp - prev;
      }

      spawnCureFx(target.cx, target.cy);
      showRollAtAlly(ally,
        `<span class="label">CURE</span>${skill.healDice}(${r.rolls.join("+")})${skill.useWis ? signedDD(ally.wis) : ""} = <span class="big">+${actualHeal}</span>`,
        "init");
      showHealAt(target.cx, target.cy - 4, actualHeal);
      const targetName = target.kind === "leader" ? getLeaderName() : target.ally.def.name;
      updateInfo(`${ally.def.name}: ${targetName} を ${actualHeal} HP 回復`);
      await sleepMs(700);
    }
    // 互換ラッパ (既存呼出箇所と AI から)
    async function allyCureLight(ally, target) {
      await allyCureWounds(ally, target, "cure-light-wounds");
    }

    // 僧侶のシールド・オブ・フェイス (味方1人に AC +2 を 3ターン付与)
    async function allyShieldOfFaith(ally, target) {
      const skill = CLERIC_SKILLS["shield-of-faith"];
      const rangeTiles = getRange(skill.range).tiles;
      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      if (tileChebyshev(aCX, aCY, target.cx, target.cy) > rangeTiles
          || !hasLineOfSight(aCX, aCY, target.cx, target.cy)) {
        await allyAdvanceTowardPoint(ally, target.cx, target.cy);
        return;
      }

      // 発動確定 → MP 消費
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      if (ally.spellSlots && skill && skill._slotId && ally.spellSlots[skill._slotId] != null) {
        ally.spellSlots[skill._slotId] = Math.max(0, ally.spellSlots[skill._slotId] - 1);
      }
      flashAction(ally.el, "skill");

      // 向きを対象へ
      const dfx = target.cx - aCX, dfy = target.cy - aCY;
      // 右向きのみ運用: X軸に差があれば更新、ほぼ真上/真下なら facing 維持
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      showRollAtAlly(ally,
        `<span class="label">SKILL</span><span class="big">${skill.name}</span>`,
        "skill");
      startAllyAttackAnim(ally);
      await sleepMs(2700);

      // AC バフ適用 (持続 = duration + 1、次ターンの tick 分を見越して)
      const dur = skill.duration + 1;
      const amt = skill.acBonusAmount;
      if (target.kind === "leader") {
        playerBuffs.acBonusRemaining = dur;
        playerBuffs.acBonusAmount = amt;
      } else {
        target.ally.buffs.acBonusRemaining = dur;
        target.ally.buffs.acBonusAmount = amt;
      }

      const targetName = target.kind === "leader" ? getLeaderName() : target.ally.def.name;
      showBuffPop(
        `<span class="label">SHIELD</span>` +
        `${targetName}: AC <span class="big">+${amt}</span> (${skill.duration}T)`
      );
      updateInfo(`${ally.def.name}: ${targetName} に シールド AC+${amt} 付与`);
      await sleepMs(700);
    }

    // 僧侶のストライキング (味方1人の武器に +1dX ダメージを付与、leader/ally 両対応)
    async function allyStriking(ally, target) {
      const skill = CLERIC_SKILLS["striking"];
      const rangeTiles = getRange(skill.range).tiles;
      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      if (tileChebyshev(aCX, aCY, target.cx, target.cy) > rangeTiles
          || !hasLineOfSight(aCX, aCY, target.cx, target.cy)) {
        await allyAdvanceTowardPoint(ally, target.cx, target.cy);
        return;
      }
      // 発動確定 → スロット消費
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      if (ally.spellSlots && skill._slotId && ally.spellSlots[skill._slotId] != null) {
        ally.spellSlots[skill._slotId] = Math.max(0, ally.spellSlots[skill._slotId] - 1);
      }
      flashAction(ally.el, "skill");
      const dfx = target.cx - aCX;
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";
      showRollAtAlly(ally, `<span class="label">SKILL</span><span class="big">${skill.name}</span>`, "skill");
      startAllyAttackAnim(ally);
      await sleepMs(2500);

      const dur = (skill.duration || 3) + 1;   // 次ターン tick 分を見越す
      const die = skill.strikingDie || 6;
      if (target.kind === "leader") {
        playerBuffs.strikingRemaining = dur;
        playerBuffs.strikingDie = die;
      } else {
        target.ally.buffs.strikingRemaining = dur;
        target.ally.buffs.strikingDie = die;
      }
      spawnCureFx(target.cx, target.cy);
      const targetName = target.kind === "leader" ? getLeaderName() : target.ally.def.name;
      showBuffPop(`<span class="label">STRIKING</span>${targetName}: 武器 <span class="big">+1d${die}</span> ダメージ (${skill.duration}T)`);
      updateInfo(`${ally.def.name}: ${targetName} の武器にストライキング +1d${die} 付与`);
      await sleepMs(700);
    }

    // 僧侶のブレス (味方全体の攻撃ロールに +1d4。詠唱時1回ロール→持続中フラット、leader/ally 両対応)
    async function allyBless(ally) {
      sfx("buff");
      const skill = CLERIC_SKILLS["bless"];
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      if (ally.spellSlots && skill._slotId && ally.spellSlots[skill._slotId] != null) {
        ally.spellSlots[skill._slotId] = Math.max(0, ally.spellSlots[skill._slotId] - 1);
      }
      flashAction(ally.el, "skill");
      showRollAtAlly(ally, `<span class="label">SKILL</span><span class="big">${skill.name}</span>`, "skill");
      startAllyAttackAnim(ally);
      await sleepMs(2200);

      const roll = rollDiceDD(1, skill.blessDie || 4).total;
      const dur = (skill.duration || 3) + 1;   // 次ターン tick 分を見越す
      let n = 0;
      // リーダー (currentPlayerAtkBonus が atkBonusRemaining を反映)
      if (hp > 0 && !gameOver) {
        playerBuffs.atkBonusRemaining = Math.max(playerBuffs.atkBonusRemaining || 0, dur);
        playerBuffs.atkBonusAmount = Math.max(playerBuffs.atkBonusAmount || 0, roll);
        n++;
      }
      // 全生存仲間 (allyAtkBuff が攻撃ロールに反映)
      for (const a of allies) {
        if (!a.alive) continue;
        a.buffs.atkBonusRemaining = Math.max(a.buffs.atkBonusRemaining || 0, dur);
        a.buffs.atkBonusAmount = Math.max(a.buffs.atkBonusAmount || 0, roll);
        n++;
      }
      spawnCureFx(playerX + 48, playerY + 58);
      showBuffPop(`<span class="label">BLESS</span>味方${n}人: 攻撃 <span class="big">+${roll}</span> (${skill.duration}T)`);
      updateInfo(`${ally.def.name}: ブレス! 味方${n}人の攻撃ロール +${roll} (1d${skill.blessDie || 4})`);
      await sleepMs(700);
    }

    // 僧侶のターンアンデッド (射程内アンデッドを畏怖行動不能 + 低HP個体を浄化)
    async function allyTurnUndead(ally) {
      const skill = CLERIC_SKILLS["turn-undead"];
      const rangeTiles = getRange(skill.range).tiles;
      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const targets = [];
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e.alive || !isUndeadEnemy(e)) continue;
        const ecx = e.x + e.def.displaySize / 2;
        const ecy = e.y + e.def.displaySize / 2;
        if (tileChebyshev(aCX, aCY, ecx, ecy) > rangeTiles) continue;
        if (!hasLineOfSight(aCX, aCY, ecx, ecy)) continue;
        targets.push(i);
      }
      // 消費 + 詠唱
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      if (ally.spellSlots && skill._slotId && ally.spellSlots[skill._slotId] != null) {
        ally.spellSlots[skill._slotId] = Math.max(0, ally.spellSlots[skill._slotId] - 1);
      }
      flashAction(ally.el, "skill");
      const dfx = (enemies[targets[0]] ? (enemies[targets[0]].x - ally.x) : 0);
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";
      showRollAtAlly(ally, `<span class="label">SKILL</span><span class="big">${skill.name}</span>`, "skill");
      startAllyAttackAnim(ally);
      await sleepMs(2600);

      if (targets.length === 0) {
        updateInfo(`${ally.def.name}: ターンアンデッド — 範囲内にアンデッドはいない`);
        await sleepMs(500);
        return;
      }

      const lvl = (typeof getLevelFromXP === "function") ? getLevelFromXP(currentTotalXp) : 1;
      const threshold = lvl * 3;   // ≤Lv×3 HP のアンデッドは浄化
      let destroyed = 0, turned = 0;
      for (const i of targets) {
        const e = enemies[i];
        const ecx = e.x + e.def.displaySize / 2;
        spawnCureFx(ecx, e.y + e.def.displaySize / 2);   // 神聖な光
        if (e.hp <= threshold) {
          showDmgAt(ecx, e.y, e.hp, true);
          e.hp = 0;
          defeatEnemy(i);
          destroyed++;
        } else {
          e.stunned = Math.max(e.stunned || 0, skill.turnDuration || 3);
          showRollAtEnemy(i, `<span class="label">TURNED</span>畏怖 ${skill.turnDuration || 3}T`, "skill");
          turned++;
        }
        await sleepMs(180);
      }
      updateInfo(`${ally.def.name}: ターンアンデッド! 浄化 ${destroyed} / 畏怖 ${turned}`);
      await sleepMs(600);
    }

    // ══════════ 魔法使いスキル (Phase 2) ══════════
    // 呪文の命中補正 = atkBonus + INT (BAB + 能力値)
    function spellAtkBonus(ally) {
      return ally.atkBonus + (ally.int || 0) + (ally.def.spellAtkBonus || 0) - allyFearPenalty(ally);
    }

    // 必中ダメージ演出を含む魔法単体攻撃 (マジックミサイル)
    async function allyMagicMissile(ally, enemyIdx) {
      const skill = MAGE_SKILLS["magic-missile"];
      const target = enemies[enemyIdx];
      if (!target || !target.alive) return;
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      // 射程 + 視線チェック (long なのでほぼ届くが、壁越しは不可)
      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const rangeTiles = getRange(skill.range).tiles;
      if (tileChebyshev(aCX, aCY, ex, ey) > rangeTiles || !hasLineOfSight(aCX, aCY, ex, ey)) {
        await allyAdvanceTowardPoint(ally, ex, ey);
        return;
      }

      // 発動確定 → MP 消費
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      if (ally.spellSlots && skill && skill._slotId && ally.spellSlots[skill._slotId] != null) {
        ally.spellSlots[skill._slotId] = Math.max(0, ally.spellSlots[skill._slotId] - 1);
      }
      flashAction(ally.el, "skill");

      // 向き
      const dfx = ex - aCX, dfy = ey - aCY;
      // 右向きのみ運用: X軸に差があれば更新、ほぼ真上/真下なら facing 維持
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      showRollAtAlly(ally, `<span class="label">SKILL</span><span class="big">${skill.name}</span>`, "skill");
      startAllyAttackAnim(ally);
      await sleepMs(1700);  // 詠唱 (短縮、続けて光弾飛翔へ)

      // 3発の光弾を弧軌道で発射 (約 600 + 2*130 = 860ms)
      // 詠唱位置をやや手前に補正 (杖から放たれる感)
      const launchX = aCX + (ally.facing === "right" ? 18 : -18);
      const launchY = aCY - 8;
      await castMagicMissileBarrage(launchX, launchY, ex, ey, 3, 130);

      // 必中: 命中判定スキップ、ダメージのみ (無抵抗ならダメージ倍)
      const helpless = target.stunned > 0;
      const critMult = ally.critMult || 2;
      const { n, sides } = parseDiceDD(skill.dmgDice);
      const times = helpless ? critMult : 1;
      let allRolls = [];
      for (let i = 0; i < times; i++) allRolls = allRolls.concat(rollDiceDD(n, sides).rolls);
      const bonusTotal = (skill.dmgBonusFlat || 0) * times;
      const dmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + bonusTotal);

      if (helpless) {
        showRollAtAlly(ally,
          `<span class="label">HELPLESS HIT!</span>${skill.dmgDice}×${critMult}(${allRolls.join("+")})+${bonusTotal} = <span class="big">${dmg}</span>`,
          "crit");
      } else {
        showRollAtAlly(ally,
          `<span class="label">AUTO HIT</span>${skill.dmgDice}(${allRolls.join("+")})+${bonusTotal} = <span class="big">${dmg}</span>`,
          "crit");
      }
      await sleepMs(300);

      // Phase 2-A: 残影回避判定 (Magic Missile も例外なく、必中の魔力矢でも位相ずれで外す)
      if (tryDisplacement(enemyIdx)) {
        await sleepMs(420);
        return;
      }
      target.hp = Math.max(0, target.hp - dmg);
      triggerEnemyDamageFlash(enemyIdx);
      noteDisplacementHit(enemyIdx);
      showHitSpark(enemyIdx, helpless);
      showDmgAt(ex, target.y, dmg, helpless);
      updateInfo(`${ally.def.name}: ${tgtDef.name} に ${dmg} ダメージ ${helpless ? "(無抵抗×" + critMult + ")" : "(必中)"}`);
      await sleepMs(500);
      if (target.hp <= 0) {
        defeatEnemy(enemyIdx);
        await sleepMs(400);
      }
    }

    // ファイアボルト: 命中判定あり、ヒットで 2d6+INT
    // Phase 2-I 拡張: 詠唱オーブ + 火球飛翔 (動的光源) + 着弾時はフレイムタンインパクト fx
    async function allyFireBolt(ally, enemyIdx) {
      const skill = MAGE_SKILLS["fire-bolt"];
      const target = enemies[enemyIdx];
      if (!target || !target.alive) return;
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const rangeTiles = getRange(skill.range).tiles;
      if (tileChebyshev(aCX, aCY, ex, ey) > rangeTiles || !hasLineOfSight(aCX, aCY, ex, ey)) {
        await allyAdvanceTowardPoint(ally, ex, ey);
        return;
      }

      // 発動確定 → MP 消費
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      if (ally.spellSlots && skill && skill._slotId && ally.spellSlots[skill._slotId] != null) {
        ally.spellSlots[skill._slotId] = Math.max(0, ally.spellSlots[skill._slotId] - 1);
      }
      flashAction(ally.el, "skill");

      const dfx = ex - aCX, dfy = ey - aCY;
      // 右向きのみ運用: X軸に差があれば更新、ほぼ真上/真下なら facing 維持
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      showRollAtAlly(ally, `<span class="label">SKILL</span><span class="big">${skill.name}</span>`, "skill");
      startAllyAttackAnim(ally);
      // Phase 2-I: 詠唱オーブ (手元に火球が膨張、動的光源で暗闇を照らす)
      spawnCastOrb(ally, "rgba(255,200,90,1)", 700);
      await sleepMs(2400);

      // 命中判定
      const helpless = target.stunned > 0;
      const atkBonus = spellAtkBonus(ally);
      const natD20 = d20();
      const atkTotal = natD20 + atkBonus;
      const isFumble = !helpless && natD20 === 1;
      const isThreat = natD20 >= effectiveCritRange(ally) && !isFumble;

      if (isFumble) {
        showRollAtAlly(ally,
          `<span class="label">FUMBLE!</span>1d20(<b>1</b>)${signedDD(atkBonus)}`,
          "fumble");
        await sleepMs(900);
        return;
      }
      const hit = helpless || isThreat || atkTotal >= effectiveEnemyAc(target);
      let isCrit = helpless;
      if (!hit) {
        // Phase 2-I: MISS でも火球は飛ぶ (敵の手前で外れる演出)
        const fallDist = 60;
        const dist = Math.hypot(dfx, dfy);
        const fallX = ex - (dfx / dist) * fallDist;
        const fallY = ey - (dfy / dist) * fallDist;
        const flyP = spawnFireballProjectile(aCX, aCY - 8, fallX, fallY, 320);
        showRollAtAlly(ally,
          `<span class="label">MISS</span>1d20(<b>${natD20}</b>)${signedDD(atkBonus)} = ${atkTotal}<br>vs AC ${effectiveEnemyAc(target)}`,
          "miss");
        await flyP;
        await sleepMs(400);
        return;
      }
      if (!helpless && isThreat) {
        const cn = d20(), ct = cn + atkBonus;
        if (ct >= effectiveEnemyAc(target)) isCrit = true;
      }
      if (helpless) {
        showRollAtAlly(ally,
          `<span class="label">HELPLESS!</span>無抵抗の敵に自動命中 ×${ally.critMult || 2}`,
          "crit");
      } else {
        showRollAtAlly(ally,
          `<span class="label">${isCrit ? "CRIT!" : "HIT"}</span>1d20(<b>${natD20}</b>)${signedDD(atkBonus)} = <span class="big">${atkTotal}</span><br>vs AC ${effectiveEnemyAc(target)}`,
          isCrit ? "crit" : "hit");
      }

      // Phase 2-I: 火球が敵まで飛翔 (動的光源で暗闇を照らす)
      await spawnFireballProjectile(aCX, aCY - 8, ex, ey, 360);

      // ダメージ
      const { n, sides } = parseDiceDD(skill.dmgDice);
      const times = isCrit ? (ally.critMult || 2) : 1;
      let allRolls = [];
      for (let i = 0; i < times; i++) allRolls = allRolls.concat(rollDiceDD(n, sides).rolls);
      const intBonus = (ally.int || 0) * times;
      const dmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + intBonus);

      // Phase 2-I: 着弾はフレイムタンインパクト fx (中央フラッシュ + 炎柱)
      const fxY = target.y + (tgtDef.displaySize || 64) / 2;
      playFlameTongueImpactFx(ex, fxY, enemyIdx, isCrit);
      spawnFireImpactBurst(ex, fxY, { size: 170, light: true });   // フォグ貫通の爆発 (単発)

      target.__tookFireAcid = true;   // ハイドラ: ファイアボルトの炎で首切除可
      target.hp = Math.max(0, target.hp - dmg);
      triggerEnemyDamageFlash(enemyIdx);
      noteDisplacementHit(enemyIdx);
      showDmgAt(ex, target.y, dmg, isCrit);
      updateInfo(`${ally.def.name}: ${tgtDef.name} に ${dmg} 炎ダメージ`);
      await sleepMs(500);
      if (target.hp <= 0) {
        defeatEnemy(enemyIdx);
        await sleepMs(400);
      }
    }

    // スリープ: 命中判定、ヒットで 2T スタン
    async function allySleep(ally, enemyIdx) {
      const skill = MAGE_SKILLS["sleep"];
      const target = enemies[enemyIdx];
      if (!target || !target.alive) return;
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const rangeTiles = getRange(skill.range).tiles;
      if (tileChebyshev(aCX, aCY, ex, ey) > rangeTiles || !hasLineOfSight(aCX, aCY, ex, ey)) {
        await allyAdvanceTowardPoint(ally, ex, ey);
        return;
      }

      // 範囲(2x2)選定: ターゲットを含む 4通りの origin から最多敵を含むものを採用
      const targetTX = Math.floor(ex / TILE_SIZE);
      const targetTY = Math.floor(ey / TILE_SIZE);
      const enemiesInArea = (originTX, originTY) => {
        const out = [];
        for (let i = 0; i < enemies.length; i++) {
          const e = enemies[i];
          if (!e.alive) continue;
          const eTX = Math.floor((e.x + e.def.displaySize / 2) / TILE_SIZE);
          const eTY = Math.floor((e.y + e.def.displaySize / 2) / TILE_SIZE);
          if (eTX >= originTX && eTX < originTX + 2 &&
              eTY >= originTY && eTY < originTY + 2) out.push(i);
        }
        return out;
      };
      const candidates = [
        { tx: targetTX,     ty: targetTY     },
        { tx: targetTX - 1, ty: targetTY     },
        { tx: targetTX,     ty: targetTY - 1 },
        { tx: targetTX - 1, ty: targetTY - 1 },
      ];
      let best = candidates[0], bestCount = enemiesInArea(best.tx, best.ty).length;
      for (let i = 1; i < candidates.length; i++) {
        const c = candidates[i];
        const cnt = enemiesInArea(c.tx, c.ty).length;
        if (cnt > bestCount) { best = c; bestCount = cnt; }
      }
      const affectedIdxs = enemiesInArea(best.tx, best.ty);
      if (affectedIdxs.length === 0) return;  // 範囲に敵なし

      // 発動確定 → MP 消費
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      if (ally.spellSlots && skill && skill._slotId && ally.spellSlots[skill._slotId] != null) {
        ally.spellSlots[skill._slotId] = Math.max(0, ally.spellSlots[skill._slotId] - 1);
      }
      flashAction(ally.el, "skill");

      const dfx = ex - aCX;
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      showRollAtAlly(ally,
        `<span class="label">SKILL</span><span class="big">${skill.name}</span> 範囲 ${affectedIdxs.length}体`,
        "skill");
      startAllyAttackAnim(ally);
      await sleepMs(2400);

      // 地面の霧: スタン継続中ずっと見えるように
      const mistDurationMs = Math.max(2800, skill.stunTarget * 2200);
      spawnGroundFx(best.tx, best.ty, 2, 2, "sleep", mistDurationMs);

      // 範囲内各敵に個別命中ロール
      const atkBonus = spellAtkBonus(ally);
      let hits = 0, resists = 0;
      const hitNames = [];
      for (const idx of affectedIdxs) {
        const t = enemies[idx];
        if (!t.alive) continue;
        const natD20 = d20();
        const atkTotal = natD20 + atkBonus;
        const hit = (natD20 !== 1) && (natD20 >= effectiveCritRange(ally) || atkTotal >= effectiveEnemyAc(t));
        if (hit) {
          t.stunned = Math.max(t.stunned || 0, skill.stunTarget);
          hits++;
          hitNames.push(t.def.name);
        } else {
          resists++;
        }
      }
      showRollAtAlly(ally,
        `<span class="label">${hits > 0 ? "SLEEP!" : "RESIST"}</span>` +
        `命中 ${hits} / 抵抗 ${resists}<br>範囲 ${affectedIdxs.length}体`,
        hits > 0 ? "skill" : "miss");
      const hitNamesStr = hitNames.length > 0 ? hitNames.join(", ") : "—";
      updateInfo(`${ally.def.name}: 範囲スリープ → ${hits}体睡眠 (${hitNamesStr}) / ${resists}体抵抗`);
      await sleepMs(900);
    }

    // アーケイン・シールド: 自分に AC +4 / 3ターン
    async function allyArcaneShield(ally) {
      const skill = MAGE_SKILLS["arcane-shield"];
      // 発動確定 → MP 消費 (self なので射程チェック不要)
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      if (ally.spellSlots && skill && skill._slotId && ally.spellSlots[skill._slotId] != null) {
        ally.spellSlots[skill._slotId] = Math.max(0, ally.spellSlots[skill._slotId] - 1);
      }
      flashAction(ally.el, "skill");
      showRollAtAlly(ally,
        `<span class="label">SKILL</span><span class="big">${skill.name}</span>`,
        "skill");
      startAllyAttackAnim(ally);
      await sleepMs(2700);

      const dur = skill.duration + 1;  // tick 分を見越して+1
      ally.buffs.acBonusRemaining = dur;
      ally.buffs.acBonusAmount = skill.acBonusAmount;

      showBuffPop(
        `<span class="label">ARCANE SHIELD</span>` +
        `${ally.def.name}: AC <span class="big">+${skill.acBonusAmount}</span> (${skill.duration}T)`
      );
      updateInfo(`${ally.def.name}: アーケイン・シールド AC+${skill.acBonusAmount}`);
      await sleepMs(700);
    }

    // ─── Phase 2-I: PT 巻き込みなし判定ヘルパー ───
    // origin タイル中心と sizeTilesX×sizeTilesY 範囲に味方 (リーダー or ally) がいるか判定
    function partyInArea(originTX, originTY, sizeTilesX, sizeTilesY) {
      const lTX = Math.floor((playerX + 48) / TILE_SIZE);
      const lTY = Math.floor((playerY + 58) / TILE_SIZE);
      if (lTX >= originTX && lTX < originTX + sizeTilesX &&
          lTY >= originTY && lTY < originTY + sizeTilesY) return true;
      if (typeof allies !== "undefined") {
        for (const a of allies) {
          if (!a || !a.alive) continue;
          const aTX = Math.floor((a.x + a.def.displaySize / 2) / TILE_SIZE);
          const aTY = Math.floor((a.y + a.def.displaySize / 2) / TILE_SIZE);
          if (aTX >= originTX && aTX < originTX + sizeTilesX &&
              aTY >= originTY && aTY < originTY + sizeTilesY) return true;
        }
      }
      return false;
    }
    function enemiesInArea(originTX, originTY, sizeTilesX, sizeTilesY) {
      const out = [];
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e.alive || e.inactive) continue;
        const eTX = Math.floor((e.x + e.def.displaySize / 2) / TILE_SIZE);
        const eTY = Math.floor((e.y + e.def.displaySize / 2) / TILE_SIZE);
        if (eTX >= originTX && eTX < originTX + sizeTilesX &&
            eTY >= originTY && eTY < originTY + sizeTilesY) out.push(i);
      }
      return out;
    }

    // ─── Phase 2-I A: ファイアボール (3x3 範囲、5d6+INT 火炎、DEX セーヴ半減) ───
    async function allyFireball(ally, enemyIdx) {
      const skill = MAGE_SKILLS["fireball"];
      const target = enemies[enemyIdx];
      if (!target || !target.alive) return;
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const rangeTiles = getRange(skill.range).tiles;
      if (tileChebyshev(aCX, aCY, ex, ey) > rangeTiles || !hasLineOfSight(aCX, aCY, ex, ey)) {
        await allyAdvanceTowardPoint(ally, ex, ey);
        return;
      }

      // 3x3 候補生成: ターゲットを含む 9 通りの origin。PT 不在 + 敵密集を最大化
      const targetTX = Math.floor(ex / TILE_SIZE);
      const targetTY = Math.floor(ey / TILE_SIZE);
      const candidates = [];
      for (let dy = -2; dy <= 0; dy++) {
        for (let dx = -2; dx <= 0; dx++) {
          candidates.push({ tx: targetTX + dx, ty: targetTY + dy });
        }
      }
      let best = null, bestCount = 0;
      for (const c of candidates) {
        if (partyInArea(c.tx, c.ty, 3, 3)) continue;   // PT 巻き込み回避
        const cnt = enemiesInArea(c.tx, c.ty, 3, 3).length;
        if (cnt > bestCount) { best = c; bestCount = cnt; }
      }
      if (!best || bestCount === 0) {
        // 発動できる安全な範囲なし → 通常基本攻撃 (スリング) にフォールバック
        await allyBasicAttack(ally, enemyIdx);
        return;
      }
      const affectedIdxs = enemiesInArea(best.tx, best.ty, 3, 3);

      // MP 消費 + 詠唱
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));
      if (ally.spellSlots && skill && skill._slotId && ally.spellSlots[skill._slotId] != null) {
        ally.spellSlots[skill._slotId] = Math.max(0, ally.spellSlots[skill._slotId] - 1);
      }
      flashAction(ally.el, "skill");
      const dfx = ex - aCX;
      if (Math.abs(dfx) > 2) ally.facing = dfx > 0 ? "right" : "left";

      showRollAtAlly(ally,
        `<span class="label">SPELL</span><span class="big">${skill.name}</span> 範囲 ${affectedIdxs.length}体`,
        "skill");
      startAllyAttackAnim(ally);
      // 詠唱: 火球が手元で膨張 (700ms)
      spawnCastOrb(ally, "rgba(255,200,90,1)", 700);
      await sleepMs(750);

      // 飛翔: 火球が中心へ
      const centerWX = best.tx * TILE_SIZE + 1.5 * TILE_SIZE;
      const centerWY = best.ty * TILE_SIZE + 1.5 * TILE_SIZE;
      const fromWX = aCX, fromWY = aCY - 8;
      await spawnFireballProjectile(fromWX, fromWY, centerWX, centerWY, 380);

      // 着弾: 爆発リング + 火柱 + 動的光源 + 衝撃光
      spawnFireballExplosion(centerWX, centerWY);
      // 焼夷地面 (1.5 秒)
      spawnGroundFx(best.tx, best.ty, 3, 3, "fireball-scorch", 1500);
      await sleepMs(250);

      // 全敵に DEX セーヴ + ダメージ
      const intMod = ally.int || 4;
      const spellDC = 12 + intMod;
      let totalHits = 0, halved = 0;
      const killedNames = [];
      for (const idx of affectedIdxs) {
        const t = enemies[idx];
        if (!t.alive) continue;
        const tDef = t.def;
        const saveRoll = d20() + (tDef.dex || 0);
        const halvedSave = saveRoll >= spellDC;
        const { n, sides } = parseDiceDD(skill.dmgDice);
        let dmg = 0;
        for (let k = 0; k < n; k++) dmg += Math.floor(Math.random() * sides) + 1;
        dmg += intMod;
        if (halvedSave) { dmg = Math.floor(dmg / 2); halved++; }
        dmg = Math.max(1, dmg);
        // 残影回避判定 (Phase 2-A)
        if (tryDisplacement(idx)) continue;
        t.__tookFireAcid = true;   // ハイドラ: ファイアボールの炎で首切除可 (per-target)
        t.hp = Math.max(0, t.hp - dmg);
        triggerEnemyDamageFlash(idx);
        noteDisplacementHit(idx);
        const tex = t.x + tDef.displaySize / 2;
        showDmgAt(tex, t.y, dmg, false);
        totalHits++;
        if (t.hp <= 0) { defeatEnemy(idx); killedNames.push(tDef.name); }
      }
      const msg = `${ally.def.name}: ファイアボール ${affectedIdxs.length}体に着弾 (${halved}体セーヴ半減)`;
      updateInfo(msg);
      if (killedNames.length > 0) updateInfo(`${killedNames.join(", ")} を撃破!`);
      await sleepMs(700);
    }

    // ─── Phase 2-I B: ライトニングボルト (直線 3 タイル、5d6 雷、DEX セーヴ半減) ───
    async function allyLightningBolt(ally, enemyIdx) {
      const skill = MAGE_SKILLS["lightning-bolt"];
      const target = enemies[enemyIdx];
      if (!target || !target.alive) return;

      const aCX = ally.x + ally.def.displaySize / 2;
      const aCY = ally.y + ally.def.displaySize / 2;
      const aTX = Math.floor(aCX / TILE_SIZE);
      const aTY = Math.floor(aCY / TILE_SIZE);

      // 8 方向の直線候補 (上/下/左/右 + 4 斜め、3 タイル先まで)
      // 各方向で「PT 不在 + 敵数」を評価
      const directions = [
        { dx:  1, dy:  0, name: "right"    },
        { dx: -1, dy:  0, name: "left"     },
        { dx:  0, dy:  1, name: "down"     },
        { dx:  0, dy: -1, name: "up"       },
        { dx:  1, dy: -1, name: "up-right"   },
        { dx:  1, dy:  1, name: "down-right" },
        { dx: -1, dy: -1, name: "up-left"    },
        { dx: -1, dy:  1, name: "down-left"  },
      ];
      let best = null, bestCount = 0;
      for (const d of directions) {
        // 3 タイルの直線 (aTX+dx, aTY+dy) から (aTX+3dx, aTY+3dy)
        let blocked = false;
        const lineIdxs = [];
        for (let step = 1; step <= 3; step++) {
          const tx = aTX + d.dx * step;
          const ty = aTY + d.dy * step;
          if (partyInArea(tx, ty, 1, 1)) { blocked = true; break; }
          lineIdxs.push(...enemiesInArea(tx, ty, 1, 1));
        }
        if (blocked) continue;
        if (lineIdxs.length > bestCount) { best = d; bestCount = lineIdxs.length; }
      }
      if (!best || bestCount === 0) {
        // PT 巻き込みなしで撃てる方向なし → 通常基本攻撃にフォールバック
        await allyBasicAttack(ally, enemyIdx);
        return;
      }
      // 直線範囲内の全敵
      const lineEnemyIdxs = new Set();
      for (let step = 1; step <= 3; step++) {
        const tx = aTX + best.dx * step;
        const ty = aTY + best.dy * step;
        for (const i of enemiesInArea(tx, ty, 1, 1)) lineEnemyIdxs.add(i);
      }

      // MP 消費 + 詠唱
      ally.mp = Math.max(0, ally.mp - (skill.mpCost || 0));

    async function allyConeOfCold(ally, enemyIdx) {
      const skill = MAGE_SKILLS["cone-of-cold"];
      const target = enemies[enemyIdx];
      if (!target || !target.alive) return;

      const aCX = ally.x + ally.def.displaySize / 2;
