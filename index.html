        facing = ex > center.x ? "right" : "left";
      }

      // 移動を止めて攻撃
      targetX = null;
      targetY = null;

      runSwing(angle, {
        stage: 0,
        duration: 1024,
        radius: 54,
        hitSize: 34
      });
    }

    // ═══════════════════════════════════════════════════════════
    // D&D 観戦フェーズ(ターン制ダイスロール戦闘)
    // ═══════════════════════════════════════════════════════════

    // ── プレイヤー D&D ステータス ──
    // playerStats の中身は applyLeaderStats() でリーダークラスの def から動的構築。
    // 初期値は warrior (Lv1) を仮で入れておく (起動時に applyLeaderStats で上書き)
    const playerStats = {
      str: 3, dex: 1, con: 2, wis: 0, int: 0,
      atkBonus: 4, ac: 16,
      dmgDice: "1d8", dmgBonus: 3,
      critRange: 19, critMult: 2,
      weaponRange: "melee",
    };
    // リーダー名を動的に取得 (ログ表示用)
    function getLeaderName() {
      // 頭の表示名 (主人公="あなた" / NPC=個人名)。未設定時はクラス名にフォールバック
      if (typeof headDisplayName === "string" && headDisplayName) return headDisplayName;
      const def = (typeof CLASS_DEFS !== "undefined") ? CLASS_DEFS[leaderClassKey] : null;
      return (def && def.name) || "戦士";
    }

    // ── パーティ生存 / 全滅 判定 (Q1=B GO 条件: 主人公死亡 or 全滅) ──
    function isHeroAlive() {
      if (heroIsHead) return hp > 0;
      const h = (heroRef && typeof heroRef.alive !== "undefined") ? heroRef : allies.find(a => a.isHero);
      return !!(h && h.alive);
    }
    function isPartyWiped() {
      return hp <= 0 && allies.length > 0 && allies.every(a => !a.alive);
    }

    // バフ obj を in-place で総入替 (const playerBuffs 用)
    function copyBuffsInto(dst, src) {
      if (!dst) return;
      for (const k of Object.keys(dst)) {
        const v = dst[k];
        if (typeof v === "number") dst[k] = 0;
        else if (typeof v === "boolean") dst[k] = false;
        else dst[k] = null;
      }
      if (src) for (const k of Object.keys(src)) dst[k] = src[k];
    }

    // 隊列順(前→後)で最初の生存 ally の index。委譲先。なければ -1 (=全滅)
    function pickNextHeadIndex() {
      for (let i = 0; i < allies.length; i++) if (allies[i].alive) return i;
      return -1;
    }

    // ── 頭委譲 (Q1=B): 頭(player)が倒れたら次の最前生存メンバーを頭に昇格 ──
    // グローバル群 + #player を新頭へ差し替え、旧頭(ally)の DOM を撤去。true=昇格成功 / false=不能(全滅)
    function tryPromoteNewHead(context) {
      const ni = pickNextHeadIndex();
      if (ni < 0) return false;
      const nh = allies[ni];
      leaderClassKey = nh.classKey;
      applyLeaderStats(leaderClassKey);                 // playerStats/maxHp 再構築 (hp は満タンになる)
      hp = Math.max(1, Math.min(maxHp, nh.hp || 1));    // ★現在 hp を復元
      equippedSkills = Array.isArray(nh.equippedSkills) ? nh.equippedSkills.slice() : equippedSkills;
      currentSpellSlots = { ...(nh.spellSlots || {}) };
      currentMaxSpellSlots = { ...(nh.maxSpellSlots || {}) };
      currentMaxSpellSlotsTotal = nh.maxSpellSlotsTotal || 0;
      copyBuffsInto(playerBuffs, nh.buffs);
      if (leaderSkillsUsedInEncounter && leaderSkillsUsedInEncounter.clear) {
        leaderSkillsUsedInEncounter.clear();
        if (nh.skillsUsedInEncounter && nh.skillsUsedInEncounter.forEach)
          nh.skillsUsedInEncounter.forEach(id => leaderSkillsUsedInEncounter.add(id));
      }
      if (leaderSkillCooldowns) {
        for (const k of Object.keys(leaderSkillCooldowns)) delete leaderSkillCooldowns[k];
        if (nh.skillCooldowns) for (const k of Object.keys(nh.skillCooldowns)) leaderSkillCooldowns[k] = nh.skillCooldowns[k];
      }
      playerX = nh.x; playerY = nh.y; facing = nh.facing || "right";
      heroIsHead = !!nh.isHero;
      if (heroIsHead) heroRef = null;
      headDisplayName = nh.isHero ? "あなた"
        : (nh.npcName || (CLASS_DEFS[leaderClassKey] && CLASS_DEFS[leaderClassKey].name) || "戦士");
      const lbl = document.getElementById("warriorLabel");
      if (lbl) lbl.textContent = headDisplayName;
      // 旧頭(player)の見た目をリセット
      if (typeof player !== "undefined" && player) { player.style.opacity = "1"; player.style.filter = "none"; }
      // 新頭の ally DOM を撤去 (#player が描画を担う → 二重描画防止)
      if (nh.el && nh.el.remove) nh.el.remove();
      if (nh.hpWrapEl && nh.hpWrapEl.remove) nh.hpWrapEl.remove();
      if (nh.nameLabelEl && nh.nameLabelEl.remove) nh.nameLabelEl.remove();
      allies.splice(ni, 1);
      lastSpriteUrl = null;   // updateKnightSprite の差分キャッシュ無効化
      if (typeof updateKnightSprite === "function") updateKnightSprite();
      if (typeof updatePositions === "function") updatePositions();
      updateInfo(`${headDisplayName}が前線に立った!`);
      return true;
    }

    // 頭が hp<=0 になった時: 主人公頭なら GO(false)、NPC頭なら委譲を試みる(成功=true で継続)
    function onHeadDowned(context) {
      if (heroIsHead) return false;       // 頭=主人公の死 → GO
      return tryPromoteNewHead(context);  // NPC頭 → 委譲(不能なら false=GO)
    }
    // リーダーが MP 持ちのクラスか
    function leaderHasMp() {
      const def = (typeof CLASS_DEFS !== "undefined") ? CLASS_DEFS[leaderClassKey] : null;
      return def ? (def.mpMax || 0) > 0 : false;
    }
    // ── リーダーアダプタ (Step 2-C-3 a): プレイヤーを ally っぽいオブジェクトに変換 ──
    // 既存 ally系スキル関数 (allyXxx) を流用するため。位置・ステ・武器は現実値、
    // hp/mp/x/y/buffs は actor 経由で書き換え可能、関数完了後に syncLeaderFromActor で実値へ反映
    function makeLeaderActor() {
      const def = CLASS_DEFS[leaderClassKey] || CLASS_DEFS.warrior;
      const weapon = getCurrentWeapon();
      const armor  = getCurrentArmor();
      const shield = getCurrentShield();
      // ステ枠と整合した攻撃ボーナス (武器エンハ込み)
      const weaponEnh = (weapon && weapon.enhancement) || 0;
      const actor = {
        isLeader: true,
        classKey: leaderClassKey,
        def: def,
        x: playerX,
        y: playerY,
        el: player,
        hp: hp,
        maxHp: maxHp,
        mp: mp,
        maxMp: maxMp,
        // Phase 2-J: 呪文スロットを参照 (同一オブジェクトでなく現在値をコピー渡し)
        spellSlots: currentSpellSlots,
        maxSpellSlots: currentMaxSpellSlots,
        maxSpellSlotsTotal: currentMaxSpellSlotsTotal,
        alive: hp > 0,
        stunned: 0,
        facing: facing,
        str: playerStats.str,
        dex: playerStats.dex,
        con: playerStats.con,
        wis: playerStats.wis,
        int: playerStats.int,
        atkBonus: playerStats.atkBonus + weaponEnh,
        ac: playerStats.ac,
        dmgDice: (weapon && weapon.dmgDice) || playerStats.dmgDice,
        dmgBonus: playerStats.dmgBonus + weaponEnh,
        critRange: playerStats.critRange,
        critMult: playerStats.critMult,
        weaponRange: (weapon && weapon.range) || playerStats.weaponRange,
        spellAtkBonus: def.spellAtkBonus || 0,
        weaponName: weapon && weapon.name,
        weaponBonusDmgDice: (weapon && weapon.bonusDmgDice) || null,
        weaponBonusDmgType: (weapon && weapon.bonusDmgType) || null,
        weaponCritStun: (weapon && weapon.critStun) || 0,
        weaponLifeStealDice: (weapon && weapon.lifeStealDice) || null,
        armorName: armor && armor.name,
        shieldName: shield && shield.name,
        buffs: playerBuffs,
        skillsUsedInEncounter: leaderSkillsUsedInEncounter,
        skillCooldowns: leaderSkillCooldowns,
        equippedSkills: equippedSkills,
      };
      return actor;
    }
    function syncLeaderFromActor(actor) {
      if (!actor) return;
      hp = Math.max(0, Math.min(maxHp, actor.hp));
      mp = Math.max(0, Math.min(maxMp, actor.mp));
      // Phase 2-J: actor.spellSlots は currentSpellSlots と同一オブジェクト参照なので
      // ally* 関数内での減算がそのまま反映される。明示書き戻しは不要。
      // x/y の変動 (例: 盗賊シャドウステップでワープ) はリーダーに反映
      if (actor.x !== playerX || actor.y !== playerY) {
        playerX = actor.x;
        playerY = actor.y;
      }
      if (actor.facing) facing = actor.facing;
    }
    // リーダー版スキル発動: 戦士は executeWarriorSkill、それ以外は ally系関数をアダプタ経由で呼ぶ
    async function executeLeaderSkill(skillId, targetIdx) {
      if (leaderClassKey === "warrior") {
        await executeWarriorSkill(skillId, targetIdx);
        return;
      }
      const actor = makeLeaderActor();
      try {
        // ドワーフ (Step a-2 + フェーズ A 攻撃 3 + フェーズ B 防御 3 + フェーズ C バフ 3 追加)
        if (leaderClassKey === "dwarf") {
          if (skillId === "throwing-axe")       await allyThrowingAxe(actor, targetIdx);
          else if (skillId === "axe-storm")     await allyAxeStorm(actor);
          else if (skillId === "earth-shatter") await allyEarthShatter(actor);
          else if (skillId === "stone-skin")    await allyStoneSkin(actor);
          else if (skillId === "steel-will")    await allySteelWill(actor);
          else if (skillId === "brace")         await allyBrace(actor);
          else if (skillId === "battle-roar")   await allyBattleRoar(actor);
          else if (skillId === "big-eater")     await allyBigEater(actor);
          // dwarven-grit はリアクティブのため明示発動できない (HP 閾値で自動発動。leader 用 hook は将来課題)
          else if (skillId === "power-attack")  await allyPowerAttack(actor, targetIdx);
          else if (skillId === "shield-wall")   await allyShieldWall(actor);
          else if (skillId === "battle-rest")   await allyBattleRest(actor);
        }
        // 僧侶 (Step a-3 第1弾) ─ 回復&バフは味方ターゲットを構築して渡す
        else if (leaderClassKey === "cleric") {
          if (skillId === "cure-light-wounds" || skillId === "cure-moderate-wounds"
              || skillId === "cure-serious-wounds" || skillId === "cure-critical-wounds") {
            const tgt = findLowestHpPartyMember();
            if (tgt) await allyCureWounds(actor, tgt, skillId);
          } else if (skillId === "bless") {
            await allyBless(actor);
          } else if (skillId === "turn-undead") {
            await allyTurnUndead(actor);
          } else if (skillId === "striking") {
            // 前衛/近接の未バフ PT 員を選んで武器強化
            const cands = [];
            if (hp > 0 && !gameOver && playerBuffs.strikingRemaining <= 0
                && (playerStats.weaponRange === "melee" || leaderClassKey === "warrior" || leaderClassKey === "dwarf")) {
              cands.push({ kind: "leader", priority: 2, cx: playerX + 48, cy: playerY + 58 });
            }
            for (const a of allies) {
              if (!a.alive || a.buffs.strikingRemaining > 0) continue;
              const pri = (a.def.role === "frontline") ? 3 : ((a.weaponRange === "melee" || a.def.weaponRange === "melee") ? 2 : 0);
              if (pri <= 0) continue;
              cands.push({ kind: "ally", ally: a, priority: pri, cx: a.x + a.def.displaySize / 2, cy: a.y + a.def.displaySize / 2 });
            }
            if (cands.length > 0) {
              cands.sort((a, b) => b.priority - a.priority);
              await allyStriking(actor, cands[0]);
            }
          } else if (skillId === "shield-of-faith") {
            // 未バフ候補から優先度付きで選ぶ (前衛 > リーダー > 後衛)
            const candidates = [];
            if (hp > 0 && !gameOver && playerBuffs.acBonusRemaining <= 0) {
              candidates.push({
                kind: "leader", priority: 2,
                cx: playerX + 48, cy: playerY + 58,
              });
            }
            for (const a of allies) {
              if (!a.alive) continue;
              if (a.buffs.acBonusRemaining > 0) continue;
              const pri = (a.def.role === "frontline") ? 3 : 1;
              candidates.push({
                kind: "ally", ally: a, priority: pri,
                cx: a.x + a.def.displaySize / 2,
                cy: a.y + a.def.displaySize / 2,
              });
            }
            if (candidates.length > 0) {
              candidates.sort((a, b) => b.priority - a.priority);
              await allyShieldOfFaith(actor, candidates[0]);
            }
          }
        }
        // 魔法使い (Step a-3 第2弾)
        else if (leaderClassKey === "mage") {
          if (skillId === "magic-missile")     await allyMagicMissile(actor, targetIdx);
          else if (skillId === "fire-bolt")    await allyFireBolt(actor, targetIdx);
          else if (skillId === "sleep")        await allySleep(actor, targetIdx);
          else if (skillId === "arcane-shield") await allyArcaneShield(actor);
          // Phase 2-I: 新規 3 呪文
          else if (skillId === "fireball")        await allyFireball(actor, targetIdx);
          else if (skillId === "lightning-bolt")  await allyLightningBolt(actor, targetIdx);
          else if (skillId === "cone-of-cold")    await allyConeOfCold(actor, targetIdx);
          else if (skillId === "burning-hands")   await allyBurningHands(actor, targetIdx);
        }
        // エルフ (Step a-3 第3弾)
        else if (leaderClassKey === "elf") {
          if (skillId === "aimed-shot")       await allyAimedShot(actor, targetIdx);
          else if (skillId === "magic-arrow") await allyMagicArrow(actor, targetIdx);
          else if (skillId === "cure-minor")  await allyCureMinor(actor);
          // spells.md Ranger 5呪文 (Phase 2-V)
          else if (skillId === "hail-of-thorns") await allyHailOfThorns(actor, targetIdx);
          else if (skillId === "conjure-volley") await allyConjureVolley(actor, targetIdx);
          else if (skillId === "hunters-mark")   await allyHuntersMark(actor, targetIdx);
          else if (skillId === "lightning-arrow") await allyLightningArrow(actor, targetIdx);
          else if (skillId === "cordon-of-arrows") await allyCordonOfArrows(actor, targetIdx);
        }
        // 盗賊 (Step a-3 第4弾) ─ shadow-step は sneak 条件 (helpless or flanking) を要する
        else if (leaderClassKey === "rogue") {
          if (skillId === "shadow-step") {
            // sneak 可能 & 移動先確保可な敵を探す。なければ通常攻撃にフォールバック
            const candidates = [];
            for (let i = 0; i < enemies.length; i++) {
              if (!enemies[i].alive) continue;
              if (canSneakOnTarget(actor, enemies[i])) candidates.push(i);
            }
            // HP 残量低い順 (確実にトドメを刺せる相手優先)
            candidates.sort((a, b) => enemies[a].hp - enemies[b].hp);
            let fired = false;
            for (const idx of candidates) {
              if (pickShadowStepTile(actor, enemies[idx])) {
                await allyShadowStep(actor, idx);
                fired = true;
                break;
              }
            }
            if (!fired) await playerSingleAttack(targetIdx, {});
          }
          else if (skillId === "thrown-dagger") await allyThrownDagger(actor, targetIdx);
          else if (skillId === "poison-blade")  await allyPoisonBlade(actor, targetIdx);
          else if (skillId === "evasion")       await allyEvasion(actor);
          else if (skillId === "smoke-bomb")    await allySmokeBomb(actor);
          else if (skillId === "lucky")         await allyLucky(actor);
          else await playerSingleAttack(targetIdx, {});  // find-traps(パッシブ) 等は通常攻撃
        }
        // 未対応クラス → 通常攻撃にフォールバック
        else {
          await playerSingleAttack(targetIdx, {});
        }
      } finally {
        syncLeaderFromActor(actor);
      }
    }
    // プレイヤーの MP 状態 (リーダーが mpMax>0 のクラスなら有効、Phase 2-J で 0 固定)
    let mp = 0, maxMp = 0;
    // Phase 2-J: リーダー (= プレイヤー) の呪文記憶スロット
    let currentSpellSlots = {};
    let currentMaxSpellSlots = {};
    let currentMaxSpellSlotsTotal = 0;
    // リーダー (= プレイヤー) のスキル使用記録 (1戦1回・クールダウン管理、Step 2-C-3 a)
    const leaderSkillsUsedInEncounter = new Set();
    const leaderSkillCooldowns = {};

    // Phase 2-J: リーダーの spellSlots を初期化 (Lv 別自動配分 / 酒場 partySkillsMap から)
    function initLeaderSpellSlots(classKey, lv, partySkillsMap) {
      if (!isCasterClass(classKey)) {
        currentSpellSlots = {};
        currentMaxSpellSlots = {};
        currentMaxSpellSlotsTotal = 0;
        return;
      }
      let allocMap = {};
      if (isAutoSlotClass(classKey)) {
        allocMap = getClericSlots(lv);
        Object.keys(allocMap).forEach(id => { if (!isSpellKnown(classKey, id)) delete allocMap[id]; });   // 完全ゲート
      } else {
        const fromTavern = (partySkillsMap && partySkillsMap[classKey]) || {};
        const upperCap = getMaxSpellSlotsForClass(classKey, lv);
        let used = 0;
        for (const [id, n] of Object.entries(fromTavern)) {
          if (n > 0) {
            const skill = (typeof getSkill === "function") ? getSkill(id) : null;
            const lvReq = (skill && skill.levelReq) || 1;
            if (lv < lvReq) continue;
            if (!isSpellKnown(classKey, id)) continue;   // 完全ゲート: 未習得は不可
            const take = Math.min(n, upperCap - used);
            if (take > 0) { allocMap[id] = take; used += take; }
          }
        }
      }
      currentSpellSlots = { ...allocMap };
      currentMaxSpellSlots = { ...allocMap };
      currentMaxSpellSlotsTotal = Object.values(allocMap).reduce((a, b) => a + b, 0);
    }

    // レベルアップ時にリーダー spellSlots を再計算 (applyLevelUpToUnit から呼ばれる)
    function recalcLeaderSpellSlotsOnLevelUp(classKey, newLv) {
      if (!isCasterClass(classKey)) return;
      const oldMax = { ...currentMaxSpellSlots };
      if (isAutoSlotClass(classKey)) {
        const fresh = getClericSlots(newLv);
        Object.keys(fresh).forEach(id => { if (!isSpellKnown(classKey, id)) delete fresh[id]; });   // 完全ゲート
        currentMaxSpellSlots = { ...fresh };
        const newSlots = {};
        for (const id of Object.keys(fresh)) {
          const cap = fresh[id];
          const prevCur = currentSpellSlots[id] || 0;
          const prevMax = oldMax[id] || 0;
          newSlots[id] = Math.min(cap, prevCur + Math.max(0, cap - prevMax));
        }
        currentSpellSlots = newSlots;
      } else {
        const upperCap = getMaxSpellSlotsForClass(classKey, newLv);
        let used = 0;
        const fresh = {};
        for (const [id, n] of Object.entries(currentMaxSpellSlots)) {
          const take = Math.min(n, upperCap - used);
          if (take > 0) { fresh[id] = take; used += take; }
        }
        currentMaxSpellSlots = { ...fresh };
        const newSlots = {};
        for (const id of Object.keys(fresh)) {
          newSlots[id] = Math.min(fresh[id], currentSpellSlots[id] || 0);
        }
        currentSpellSlots = newSlots;
      }
      currentMaxSpellSlotsTotal = Object.values(currentMaxSpellSlots).reduce((a, b) => a + b, 0);
    }

    // リーダークラスの def を引いて playerStats / hp / maxHp を構築
    function applyLeaderStats(leaderKey) {
      // CLASS_DEFS は後段で定義されるので、参照可能なことを呼出側で保証
      const def = (typeof CLASS_DEFS !== "undefined") ? CLASS_DEFS[leaderKey] : null;
      if (!def) return;
      playerStats.str = def.str || 0;
      playerStats.dex = def.dex || 0;
      playerStats.con = def.con || 0;
      playerStats.wis = def.wis || 0;
      playerStats.int = def.int || 0;
      playerStats.atkBonus  = def.atkBonus || 0;
      playerStats.ac        = def.ac || 10;
      playerStats.dmgDice   = def.dmgDice || "1d6";
      playerStats.dmgBonus  = def.dmgBonus || 0;
      playerStats.critRange = def.critRange || 20;
      playerStats.critMult  = def.critMult || 2;
      playerStats.weaponRange = def.weaponRange || "melee";
      // HP も動的化 (Lv up での加算は applyInitialLevels で別途やる)
      maxHp = def.hpMax || 30;
      hp = maxHp;
      // MP (Phase 2-J: 完全廃止、互換性のため 0 で初期化)
      maxMp = 0;
      mp = 0;
      // Phase 2-J: 呪文記憶スロット初期化 (リーダー Lv は applyInitialLevels 後に再計算可能)
      const curLv = (typeof getLevelFromXP === "function") ? getLevelFromXP(currentTotalXp || 0) : 1;
      initLeaderSpellSlots(leaderKey, curLv, partySkillsMap);
      // 頭上ラベル (#warriorLabel) のテキストもリーダー名に
      const lbl = document.getElementById("warriorLabel");
      if (lbl) lbl.textContent = def.name || "戦士";
    }

    // ── 射程システム (戦闘はタイル制) ──
    // semantic key → (tiles, label, engagePx)
    // グリッド戦闘化に伴い melee=1 の厳格射程に戻す(接近演出が活きる)
    const RANGE = {
      melee:  { tiles: 1,  label: "近距離", engagePx: 400 },
      medium: { tiles: 3,  label: "中距離", engagePx: 520 },
      long:   { tiles: 99, label: "遠距離", engagePx: 840 },
    };
    function getRange(key) { return RANGE[key] || RANGE.melee; }
    function tileChebyshev(ax, ay, bx, by) {
      const dx = Math.abs(Math.floor(ax / TILE_SIZE) - Math.floor(bx / TILE_SIZE));
      const dy = Math.abs(Math.floor(ay / TILE_SIZE) - Math.floor(by / TILE_SIZE));
      return Math.max(dx, dy);
    }

    // ── タイル整列 & 移動アニメ (グリッド戦闘用) ──
    function snapPlayerToTile(tx, ty) {
      // ヒットボックス中心 (playerX+48, playerY+58) をタイル中心 (tx*48+24, ty*48+24) に揃える
      playerX = tx * TILE_SIZE + SNAP_X_OFFSET;
      playerY = ty * TILE_SIZE + SNAP_Y_OFFSET;
    }
    function snapEnemyToTile(enemy, tx, ty) {
      enemy.x = tx * TILE_SIZE + TILE_SIZE / 2 - enemy.def.displaySize / 2;
      enemy.y = ty * TILE_SIZE + TILE_SIZE / 2 - enemy.def.displaySize / 2;
    }
    function slideAnim(setPos, fromX, fromY, toX, toY, durationMs) {
      return new Promise((resolve) => {
        const startTime = performance.now();
        function step(now) {
          const t = Math.min((now - startTime) / durationMs, 1);
          const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
          setPos(fromX + (toX - fromX) * eased, fromY + (toY - fromY) * eased);
          if (t < 1) requestAnimationFrame(step);
          else resolve();
        }
        requestAnimationFrame(step);
      });
    }

    // A* で1タイル分だけ前進(次のウェイポイント返却)。到達不可は null
    function firstTileStep(startTX, startTY, goalTX, goalTY, avoidTiles) {
      if (startTX === goalTX && startTY === goalTY) return null;
      const path = aStar(startTX, startTY, goalTX, goalTY, avoidTiles);
      if (!path || path.length === 0) return null;
      return path[0];
    }

    // プレイヤーを1タイル前進 (対象に向かって)
    async function playerAdvanceOneTile(targetWX, targetWY) {
      const pTX = Math.floor((playerX + 48) / TILE_SIZE);
      const pTY = Math.floor((playerY + 58) / TILE_SIZE);
      const gTX = Math.floor(targetWX / TILE_SIZE);
      const gTY = Math.floor(targetWY / TILE_SIZE);
      // 仲間・他敵のタイルを避けるパスを探す
      const avoidSet = getUnitOccupiedTiles("player");
      const next = firstTileStep(pTX, pTY, gTX, gTY, avoidSet);
      if (!next) {
        showRollAtPlayer(`<span class="label">CAN'T ADVANCE</span>経路なし`, "miss");
        updateInfo("進めない…");
        await sleepMs(700);
        return;
      }
      // 向き更新 (右向きのみ運用: 水平方向のみ facing 更新、上下は維持)
      if (next.tx < pTX) facing = "left";
      else if (next.tx > pTX) facing = "right";

      showRollAtPlayer(`<span class="label">ADVANCE</span>前進 1タイル`, "init");
      flashAction(player, "move");

      const fromX = playerX, fromY = playerY;
      const toX = next.tx * TILE_SIZE + SNAP_X_OFFSET;
      const toY = next.ty * TILE_SIZE + SNAP_Y_OFFSET;
      playerMovingThisFrame = true;
      await slideAnim((x, y) => {
        playerX = x; playerY = y; playerMovingThisFrame = true;
      }, fromX, fromY, toX, toY, 380);
      playerMovingThisFrame = false;
      await sleepMs(120);
    }

    // 敵を1タイル前進 (targetCX/CY 省略時はプレイヤーへ)
    async function enemyAdvanceOneTile(idx, targetCX, targetCY, opts = {}) {
      const slideMs   = (opts.slideMs   != null) ? opts.slideMs   : 380;
      const postSleep = (opts.postSleep != null) ? opts.postSleep : 120;
      const silent    = !!opts.silent;
      if (targetCX == null) targetCX = playerX + 48;
      if (targetCY == null) targetCY = playerY + 58;
      const enemy = enemies[idx];
      const def = enemy.def;
      const eCX = enemy.x + def.displaySize / 2;
      const eCY = enemy.y + def.displaySize / 2;
      const eTX = Math.floor(eCX / TILE_SIZE);
      const eTY = Math.floor(eCY / TILE_SIZE);
      const pTX = Math.floor(targetCX / TILE_SIZE);
      const pTY = Math.floor(targetCY / TILE_SIZE);

      // 対象タイルの隣接4方向で、壁でなく、他ユニットが居ないタイルを候補に
      const avoidSet = getUnitOccupiedTiles(enemy);
      let goalTX = pTX, goalTY = pTY;
      const neighbors = [[1,0],[-1,0],[0,1],[0,-1]];
      let bestD = Infinity;
      for (const [dx, dy] of neighbors) {
        const ntx = pTX + dx, nty = pTY + dy;
        if (ntx < 0 || ntx >= MAP_W || nty < 0 || nty >= MAP_H) continue;
        if (isTileWall(ntx, nty)) continue;
        if (avoidSet.has(ntx + "," + nty)) continue;  // 味方敵含め占有済は避ける
        const d = Math.abs(ntx - eTX) + Math.abs(nty - eTY);
        if (d < bestD) { bestD = d; goalTX = ntx; goalTY = nty; }
      }

      const next = firstTileStep(eTX, eTY, goalTX, goalTY, avoidSet);
      if (!next) {
        if (!silent) showRollAtEnemy(idx, `<span class="label">CAN'T ADVANCE</span>進めない`, "miss");
        await sleepMs(silent ? 100 : 700);
        return;
      }

      if (!silent) showRollAtEnemy(idx, `<span class="label">ADVANCE</span>前進 1タイル`, "init");
      flashAction(enemyElements[idx], "move");

      const fromX = enemy.x, fromY = enemy.y;
      const toX = next.tx * TILE_SIZE + TILE_SIZE / 2 - def.displaySize / 2;
      const toY = next.ty * TILE_SIZE + TILE_SIZE / 2 - def.displaySize / 2;
      const prevState = enemy.state;
      enemy.state = "chase";  // 歩行アニメを再生
      enemy.slideTargetTile = { tx: next.tx, ty: next.ty };  // 他ユニットの侵入防止
      try {
        await slideAnim((x, y) => {
          enemy.x = x; enemy.y = y;
        }, fromX, fromY, toX, toY, slideMs);
      } finally {
        enemy.slideTargetTile = null;
      }
      enemy.state = silent ? prevState : "idle";  // 探索中は元 state を維持
      await sleepMs(postSleep);
    }

    // ── ダイスユーティリティ ──
    function d20() { return 1 + Math.floor(Math.random() * 20); }
    function rollDiceDD(n, sides) {
      const rolls = [];
      for (let i = 0; i < n; i++) rolls.push(1 + Math.floor(Math.random() * sides));
      return { rolls, total: rolls.reduce((a, b) => a + b, 0) };
    }
    function parseDiceDD(notation) {
      const m = notation.match(/^(\d+)d(\d+)$/);
      return { n: +m[1], sides: +m[2] };
    }
    function signedDD(n) { return (n >= 0 ? "+" : "") + n; }
    function sleepMs(ms) {
      // Phase 2-K: autoplay 時は速度倍率で短縮 (最小 8ms 保証で stable)
      const speed = window.__autoplay || 1;
      const actual = speed > 1 ? Math.max(8, Math.floor(ms / speed)) : ms;
      return new Promise(r => setTimeout(r, actual));
    }

    // ── 行動点滅エフェクト (non-blocking) ──
    // kind: "move" (青) / "attack" (赤) / "skill" (黄)
    // host: キャラ DOM 要素 (子として .actionFlash を追加)
    function flashAction(host, kind) {
      // エフェクト調整中: 行動時の円形リング (青=move/赤=attack/黄=skill) を廃止
      // 戻すには下のブロックの先頭の return を外す
      return;
      if (!host) return;
      let i = 0;
      const spawn = () => {
        if (i >= 2) return;
        const el = document.createElement("div");
        el.className = "actionFlash " + (kind || "move");
        host.appendChild(el);
        setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 220);
        i++;
        setTimeout(spawn, 320);
      };
      spawn();
    }

    // ── エンカウンター状態 ──
    let encounterActive = false;
    let encounterRunning = false;
    const cordonZones = [];   // エルフ コードン・オブ・アロー: 設置型ゾーン (ラウンド開始時に発動)
    let encounterEnemyIndices = [];
    let encounterStartedAt = 0;   // Phase 2-B: 戦闘開始時刻 (確率脱走の経過時間基準)

    // ── ポップアップ(ワールド座標→スクリーン座標) ──
    function showRollAtPlayer(html, type) {
      const pop = document.createElement("div");
      pop.className = "rollPop " + type;
      pop.innerHTML = html;
      pop.style.left = (playerX + 48 - camX) + "px";
      pop.style.top  = (playerY - 24 - camY) + "px";
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), type === "crit" ? 1500 : 1300);
    }
    function showRollAtEnemy(idx, html, type) {
      const e = enemies[idx];
      const pop = document.createElement("div");
      pop.className = "rollPop " + type;
      pop.innerHTML = html;
      pop.style.left = (e.x + e.def.displaySize / 2 - camX) + "px";
      pop.style.top  = (e.y - 32 - camY) + "px";
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), type === "crit" ? 1500 : 1300);
    }
    function showRollAtAlly(ally, html, type) {
      const pop = document.createElement("div");
      pop.className = "rollPop " + type;
      pop.innerHTML = html;
      pop.style.left = (ally.x + ally.def.displaySize / 2 - camX) + "px";
      pop.style.top  = (ally.y - 24 - camY) + "px";
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), type === "crit" ? 1500 : 1300);
    }

    // ── 恐怖セーヴ (Will save) ──────────────────────────────────────
    // frightened = 攻撃ロール -2 (spec.md)。リッチの Frightful Presence (DC16) と
    // Sce6 ファラクサス (DC18) で共用。免疫フック (playerFearImmune/allyFearImmune) は
    // 現状 false 固定、カエルム「神官の祝福」が後で fearImmuneRemaining を立てる。
    const FRIGHTENED_DURATION = 3;   // 恐怖は3ターン継続
    const FRIGHTENED_PENALTY  = 2;   // frightened: 攻撃ロール -2
    // Sce5 隠し要素「神官の祝福」(カエルム友好ルート): 全パーティ恐怖免疫。
    // 永続 + シナリオ跨ぎ (localStorage)。Sce5 リッチ・Sce6 ファラクサスの Frightful Presence を無効化。
    let templeBlessing = false;
    try { templeBlessing = (localStorage.getItem("dragonfighters.templeBlessing") === "1"); } catch (e) {}
    function grantTempleBlessing() {
      templeBlessing = true;
      try { localStorage.setItem("dragonfighters.templeBlessing", "1"); } catch (e) {}
      try { sfx("levelup"); } catch (e) {}
    }
    function playerFearImmune() {
      return !!(window.__fearImmune || templeBlessing || (playerBuffs && playerBuffs.fearImmuneRemaining > 0));
    }
    function allyFearImmune(a) {
      return !!(window.__fearImmune || templeBlessing || (a && a.buffs && a.buffs.fearImmuneRemaining > 0));
    }
    // dc に対しパーティ全員 (頭 + 生存仲間) が d20+WIS を振り、失敗者に frightened を付与。
    // 結果配列 [{kind, ally?, saved, immune?}] を返す (検証ドライバ用)。
    function partyWillSave(dc) {
      const results = [];
      // ── 頭 (player) ──
      if (hp > 0 && !gameOver) {
        if (playerFearImmune()) {
          results.push({ kind: "player", saved: true, immune: true });
        } else {
          const roll = d20();
          const total = roll + (playerStats.wis || 0);
          const saved = total >= dc;
          if (!saved) {
            playerBuffs.frightenedRemaining = Math.max(playerBuffs.frightenedRemaining || 0, FRIGHTENED_DURATION);
            playerBuffs.frightenedPenalty = FRIGHTENED_PENALTY;
          }
          showRollAtPlayer(
            `<span class="label">${saved ? "FEAR RESIST" : "FRIGHTENED"}</span>` +
            `1d20(<b>${roll}</b>)${signedDD(playerStats.wis || 0)} = ${total}<br>vs DC ${dc}`,
            saved ? "hit" : "miss");
          results.push({ kind: "player", saved });
        }
      }
      // ── 仲間 ──
      for (const a of allies) {
        if (!a.alive) continue;
        if (allyFearImmune(a)) { results.push({ kind: "ally", ally: a, saved: true, immune: true }); continue; }
        const roll = d20();
        const total = roll + (a.wis || 0);
        const saved = total >= dc;
        if (!saved) {
          a.buffs.frightenedRemaining = Math.max(a.buffs.frightenedRemaining || 0, FRIGHTENED_DURATION);
          a.buffs.frightenedPenalty = FRIGHTENED_PENALTY;
        }
        showRollAtAlly(a,
          `<span class="label">${saved ? "FEAR RESIST" : "FRIGHTENED"}</span>` +
          `1d20(<b>${roll}</b>)${signedDD(a.wis || 0)} = ${total}<br>vs DC ${dc}`,
          saved ? "hit" : "miss");
        results.push({ kind: "ally", ally: a, saved });
      }
      return results;
    }

    function resetAllyBuffs(ally) {
      ally.buffs.atkBonusRemaining = 0;
      ally.buffs.atkBonusAmount = 0;
      ally.buffs.dmgReductionRemaining = 0;
      ally.buffs.dmgReductionDice = null;
      ally.buffs.dmgReductionFlat = 0;
      ally.buffs.dmgReductionFlatRemaining = 0;
      ally.buffs.statusImmunityCharges = 0;
      ally.buffs.antiKnockbackRemaining = 0;
      ally.buffs.skipNextTurn = false;
      ally.buffs.resilientFired = false;
      ally.buffs.acBonusRemaining = 0;
      ally.buffs.acBonusAmount = 0;
      ally.buffs.strikingRemaining = 0;
      ally.buffs.strikingDie = 0;
      ally.buffs.evasionRemaining = 0;
      ally.buffs.luckyRemaining = 0;
      ally.buffs.luckyCritWiden = 0;
      ally.buffs.frightenedRemaining = 0;
      ally.buffs.frightenedPenalty = 0;
      ally.buffs.fearImmuneRemaining = 0;
      ally.gritThreshold = null;  // ドワーフの意地: エンカウンターごとに 2d4 を再ロール
    }

    function showDmgAt(worldX, worldY, dmg, isCrit) {
      const pop = document.createElement("div");
      pop.className = "dmgPop" + (isCrit ? " crit" : "");
      pop.textContent = dmg;
      pop.style.left = (worldX - camX) + "px";
      pop.style.top  = (worldY - camY - 4) + "px";
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), isCrit ? 1200 : 900);
    }

    const battleBannerEl = document.getElementById("battleBanner");
    function showBanner(text, ms = 1000) {
      battleBannerEl.textContent = text;
      battleBannerEl.classList.remove("show");
      void battleBannerEl.offsetWidth;
      battleBannerEl.classList.add("show");
      setTimeout(() => battleBannerEl.classList.remove("show"), ms);
    }

    // ── エンカウンター検出 ──
    // 初期検知: 各敵の射程 (engagePx) に基づいて判定
    // 増援検知: 同じく各敵の射程 + 少し余裕 (同室の敵を拾う)
    const REINFORCE_MARGIN_PX = 160;

    function detectEnemiesEngagedByRange(excludeSet, extraPx) {
      const pCX = playerX + 48, pCY = playerY + 58;
      const list = [];
      for (let i = 0; i < enemies.length; i++) {
        if (excludeSet && excludeSet.has(i)) continue;
        const e = enemies[i];
        if (!e.alive) continue;
        if (e.inactive) continue;   // 檻内のビーストはエンカ発生に絡まない
        const ex = e.x + e.def.displaySize / 2;
        const ey = e.y + e.def.displaySize / 2;
        const d = Math.hypot(pCX - ex, pCY - ey);
        const enemyRange = getRange(e.def.range || "melee");
        const engageDist = enemyRange.engagePx + (extraPx || 0);
        // フォグ視界 gating: 敵がパーティ視界内に入るまで戦闘開始/増援しない(伏兵化)
        if (d < engageDist && hasLineOfSight(pCX, pCY, ex, ey) && isEnemyVisibleToParty(e)) {
          list.push(i);
        }
      }
      return list;
    }
    function detectEngaged() {
      return detectEnemiesEngagedByRange(null, 0);
    }
    function detectReinforcements() {
      return detectEnemiesEngagedByRange(new Set(encounterEnemyIndices), REINFORCE_MARGIN_PX);
    }

    function tryStartEncounter() {
      if (encounterActive || encounterRunning) return;
      if (!gameStarted || gameOver) return;
      if (attackActive || counterActive || playerHitStun > 0) return;
      const engaged = detectEngaged();
      if (engaged.length > 0) {
        encounterRunning = true;
        runEncounter(engaged).finally(() => { encounterRunning = false; });
      }
    }

    // ── ヒット演出用の敵フラッシュ・スパーク呼び出し ──
    // (既存 triggerEnemyDamageFlash / showHitSpark を使う)

    // ── ヒット判定なしスイング(視覚のみ) ──
    function runSwingNoHit(angle) {
      return new Promise((resolve) => {
        attackActive = true;
        currentAttackAngle = angle;
        currentSwingProgress = 0;
        currentAttackRadius = 54;
        currentAttackHitSize = 34;
        currentAttackStage = 0;
        hitEnemiesThisSwing = new Set();
        const duration = 900;
        const startTime = performance.now();
        function anim(now) {
          currentSwingProgress = Math.min((now - startTime) / duration, 1);
          if (currentSwingProgress < 1) {
            requestAnimationFrame(anim);
          } else {
            attackActive = false;
            resolve();
          }
        }
        requestAnimationFrame(anim);
      });
    }

    // ── 敵の攻撃演出 ──
    async function playEnemyAttackVisual(idx, targetWX, targetWY) {
      const enemy = enemies[idx];
      const def = enemy.def;
      if (def.hasAttackAnim) {
        enemy.state = "attack";
        enemy.attackTimer = 0;
        enemy.attackHitDealt = true;  // 既存の damagePlayer 呼び出しを抑止
        await sleepMs((def.attackDuration || 28) * 30);
        enemy.state = "idle";
        enemy.attackTimer = 0;
        enemy.attackHitDealt = false;
      } else {
        const el = enemyElements[idx];
        if (el) {
          el.style.filter = "brightness(2.4) saturate(3)";
          await sleepMs(280);
          el.style.filter = "";
        } else {
          await sleepMs(350);
        }
      }
      // 遠距離 (def.projectile = "arrow"): 矢を発射演出
      if (def.projectile === "arrow" && targetWX != null && targetWY != null) {
        const eCX = enemy.x + def.displaySize / 2;
        const eCY = enemy.y + def.displaySize / 2 - 6;  // 弓の高さ補正
        await spawnArrow(eCX, eCY, targetWX, targetWY, 280, { variant: "enemyArrow" });
      }
    }

    // ── エンカウンターメインフロー ──
    async function runEncounter(initialEngaged) {
      encounterActive = true;
      if (window.__diag) window.__diag.beat("combat", true);   // 自動デバッグ: 戦闘開始
      encounterStartedAt = (typeof performance !== "undefined" && performance.now)
        ? performance.now() : Date.now();   // Phase 2-B: 確率脱走の経過時間基準
      window.__inMidBoss = isMidBossActive();   // 既に解き放たれた中ボスが居れば midboss 曲を選ばせる
      setPhase("combat");
      encounterEnemyIndices = initialEngaged.slice();
      // DM ナレーション: ボスがいればボス戦前メッセージ、そうでなければ敵種族別
      const bossIdx = initialEngaged.find(i => enemies[i].def.maxSummons > 0);
      if (bossIdx !== undefined) {
        const bossName = enemies[bossIdx].def.name;
        showDMMessage(`…部屋の奥から、重い足音が近づいてくる。これが${bossName}か。覚悟はいいか。`, 2800);
      } else {
        const fam = detectEnemyFamily(initialEngaged);
        showDMMessage(ENEMY_FAMILY_MSG[fam] || ENEMY_FAMILY_MSG.generic, 2200);
      }

      try {
        // プレイヤー状態をリセット
        targetX = null; targetY = null;
        heroPath = []; heroPathGoal = null;
        heroTurnPause = 0;

        // 交戦対象の敵もリセット
        for (const i of encounterEnemyIndices) {
          const e = enemies[i];
          e.state = "idle";
          e.attackTimer = 0;
          e.attackHitDealt = false;
          e.path = [];
          e.pathTimer = 0;
          e.stunned = 0;
          e.poisonRemaining = 0; e.poisonDie = null;
          e.huntMarkRemaining = 0; e.huntMarkDie = 0;
          e.atkPenaltyRemaining = 0; e.atkPenaltyAmount = 0;
        }

        // プレイヤーのバフ・デバフもリセット
        resetPlayerBuffs();
        // 仲間の 1戦1回スキル使用記録 + クールダウンをリセット
        for (const a of allies) {
          if (a.skillsUsedInEncounter) a.skillsUsedInEncounter.clear();
          if (a.skillCooldowns) a.skillCooldowns = {};
        }
        // リーダー (プレイヤー) も同様にリセット
        leaderSkillsUsedInEncounter.clear();
        for (const k of Object.keys(leaderSkillCooldowns)) delete leaderSkillCooldowns[k];

        // ── タイル整列 (グリッド戦闘化): プレイヤー・全交戦対象をタイル中央へスナップ ──
        const pSnapTX = Math.floor((playerX + 48) / TILE_SIZE);
        const pSnapTY = Math.floor((playerY + 58) / TILE_SIZE);
        snapPlayerToTile(pSnapTX, pSnapTY);
        for (const i of encounterEnemyIndices) {
          const e = enemies[i];
          const eCX = e.x + e.def.displaySize / 2;
          const eCY = e.y + e.def.displaySize / 2;
          const eSnapTX = Math.floor(eCX / TILE_SIZE);
          const eSnapTY = Math.floor(eCY / TILE_SIZE);
          snapEnemyToTile(e, eSnapTX, eSnapTY);
        }

        showBanner("⚔  ENCOUNTER  ⚔", 1100);
        updateInfo("敵と遭遇!");
        await sleepMs(1050);

        // 仲間キャラもタイル整列 + バフリセット (他ユニットと同タイルなら隣接空タイルへずらす)
        for (const ally of allies) {
          if (!ally.alive) continue;
          const aCX = ally.x + ally.def.displaySize / 2;
          const aCY = ally.y + ally.def.displaySize / 2;
          let aTX = Math.floor(aCX / TILE_SIZE);
          let aTY = Math.floor(aCY / TILE_SIZE);
          const occupied = getUnitOccupiedTiles(ally);
          if (occupied.has(aTX + "," + aTY) || isTileWall(aTX, aTY)) {
            // 近い空タイルを探して退避
            let found = false;
            for (let r = 1; r <= 3 && !found; r++) {
              for (let dy = -r; dy <= r && !found; dy++) {
                for (let dx = -r; dx <= r && !found; dx++) {
                  if (Math.max(Math.abs(dx), Math.abs(dy)) !== r) continue;
                  const ntx = aTX + dx, nty = aTY + dy;
                  if (ntx < 0 || ntx >= MAP_W || nty < 0 || nty >= MAP_H) continue;
                  if (isTileWall(ntx, nty)) continue;
                  if (occupied.has(ntx + "," + nty)) continue;
                  aTX = ntx; aTY = nty;
                  found = true;
                }
              }
            }
          }
          snapEnemyToTile(ally, aTX, aTY);
          resetAllyBuffs(ally);
        }

        // ── イニシアチブロール (プレイヤー + 仲間 + 敵) ──
        const units = [
          { kind: "player", name: getLeaderName(), dex: playerStats.dex },
          ...allies.filter(a => a.alive).map(a => ({
            kind: "ally",
            ally: a,
            name: a.def.name,
            dex: a.dex || 0,
          })),
          ...encounterEnemyIndices.map(i => ({
            kind: "enemy",
            idx: i,
            name: enemies[i].def.name,
            dex: enemies[i].def.dex || 0,
          })),
        ];
        for (const u of units) {
          const n = d20();
          u.initiative = n + u.dex;
          const html =
            `<span class="label">INITIATIVE</span>` +
            `1d20(${n})${signedDD(u.dex)} = <span class="big">${u.initiative}</span>`;
          if (u.kind === "player") showRollAtPlayer(html, "init");
          else if (u.kind === "ally") showRollAtAlly(u.ally, html, "init");
          else                     showRollAtEnemy(u.idx, html, "init");
          await sleepMs(380);
        }
        const sortUnits = () => units.sort((a, b) => {
          if (b.initiative !== a.initiative) return b.initiative - a.initiative;
          // 同値: プレイヤー > 仲間 > 敵
          const prio = { player: 0, ally: 1, enemy: 2 };
          return (prio[a.kind] || 2) - (prio[b.kind] || 2);
        });
        sortUnits();
        updateInfo("行動順: " + units.map(u => `${u.name}(${u.initiative})`).join(" → "));
        await sleepMs(600);

        // ── ボスの恐怖オーラ (リッチ Frightful Presence / Sce6 ファラクサス) ──
        // 戦闘開始時に1回、def.fearDC を持つボスがいればパーティ全員が Will セーヴ。
        const fearBossIdx = encounterEnemyIndices.find(i =>
          enemies[i] && enemies[i].alive && enemies[i].def.isBoss && enemies[i].def.fearDC);
        if (fearBossIdx !== undefined) {
          const fb = enemies[fearBossIdx];
          showBanner(`💀 ${fb.def.name} 恐怖のオーラ! 💀`, 1500);
          showRollAtEnemy(fearBossIdx, `<span class="label">FRIGHTFUL PRESENCE</span>Will DC ${fb.def.fearDC}`, "crit");
          updateInfo(`${fb.def.name} の威圧! パーティは Will セーヴ (DC ${fb.def.fearDC})`);
          await sleepMs(900);
          partyWillSave(fb.def.fearDC);
          await sleepMs(1100);
        }

        // ── ラウンドループ ──
        let round = 1;
        while (!gameOver && hp > 0 &&
               encounterEnemyIndices.some(i => enemies[i].alive)) {
          // 2ラウンド目以降: 近くに未参戦の敵がいれば増援として合流
          if (round > 1) {
            const reinforce = detectReinforcements();
            if (reinforce.length > 0) {
              const names = reinforce.map(i => enemies[i].def.name).join("、");
              showBanner("⚠ REINFORCEMENT ⚠", 1200);
              updateInfo(`敵の増援が合流! (${names})`);
              await sleepMs(900);
              for (const i of reinforce) {
                encounterEnemyIndices.push(i);
                const e = enemies[i];
                e.state = "idle";
                e.attackTimer = 0;
                e.attackHitDealt = false;
                e.path = [];
                e.pathTimer = 0;
                e.stunned = 0;
                e.poisonRemaining = 0; e.poisonDie = null;
                e.huntMarkRemaining = 0; e.huntMarkDie = 0;
                e.atkPenaltyRemaining = 0; e.atkPenaltyAmount = 0;

                const dexVal = e.def.dex || 0;
                const n = d20();
                const init = n + dexVal;
                units.push({
                  kind: "enemy",
                  idx: i,
                  name: e.def.name,
                  dex: dexVal,
                  initiative: init,
                });
                showRollAtEnemy(i,
                  `<span class="label">REINFORCE</span>1d20(${n})${signedDD(dexVal)} = <span class="big">${init}</span>`,
                  "init");
                await sleepMs(400);
              }
              sortUnits();
              await sleepMs(500);
            }
          }

          showBanner(`ROUND ${round}`, 850);
          if (window.__diag) window.__diag.beat("round", round);   // 自動デバッグ: ラウンド進行
          await sleepMs(650);

          // エルフ コードン・オブ・アロー: 設置ゾーンをラウンド開始時に発動
          await tickCordonZones();

          for (const actor of units) {
            if (gameOver || hp <= 0) break;
            if (!encounterEnemyIndices.some(i => enemies[i].alive)) break;
            if (actor.kind === "enemy" && !enemies[actor.idx].alive) continue;
            if (actor.kind === "ally" && !actor.ally.alive) continue;

            if (actor.kind === "player") {
              const tgtIdx = pickAliveEngagedIdx();
              if (tgtIdx < 0) break;
              await playerAttackTurn(tgtIdx);
            } else if (actor.kind === "ally") {
              await allyAttackTurn(actor.ally);
            } else {
              await enemyAttackTurn(actor.idx);
            }
            await sleepMs(220);
          }
          round++;
          if (round > 40) break;  // 安全ブレーキ
        }

        if (!(hp <= 0 || gameOver)) {
          // ── PT 立て直しフェーズ (演出は短めに、体感「固まり」を回避) ──
          showBanner("VICTORY", 1200);
          setPhase("rest");
          updateInfo("敵を撃破!");
          // 戦闘専用バフ (シールド・オブ・フェイス等の AC バフ、攻撃バフ、ダメ軽減) を消去
          // ターン経過で減算する仕様のため、戦闘終了時は明示的に切る必要がある
          resetPlayerBuffs();
          for (const a of allies) {
            if (a.alive) resetAllyBuffs(a);
          }
          await sleepMs(900);

          // 1. Phase 2-J: 呪文スロット回復 (勝利ボーナス: maxSpellSlots[id] × 25% 切上げ)
          //    対象者が1人でもいれば「息を整える…」バナーを出す
          const slotRestorable = allies.some(a => {
            if (!a.alive || !a.maxSpellSlots) return false;
            for (const id of Object.keys(a.maxSpellSlots)) {
              if ((a.spellSlots[id] || 0) < a.maxSpellSlots[id]) return true;
            }
            return false;
          });
          if (slotRestorable) showBanner("息を整える…", 1500);
          let anyMpRestored = false;
          for (const a of allies) {
            if (!a.alive || !a.maxSpellSlots) continue;
            let totalRestored = 0;
            for (const id of Object.keys(a.maxSpellSlots)) {
              const max = a.maxSpellSlots[id];
              const refill = Math.ceil(max * 0.25);
              const prev = a.spellSlots[id] || 0;
              a.spellSlots[id] = Math.min(max, prev + refill);
              totalRestored += a.spellSlots[id] - prev;
            }
            if (totalRestored > 0) {
              anyMpRestored = true;
              flashAction(a.el, "skill");
              if (typeof showHealAtAllyMp === "function") showHealAtAllyMp(a, totalRestored);
              updateInfo(`${a.def.name}の呪文が、${totalRestored} スロット回復した。`);
              await sleepMs(450);
            }
          }
          await sleepMs(anyMpRestored ? 500 : 200);

          // 2. セカンドウィンド (装備していて HP 減っていれば発動)
          await triggerSecondWind();

          // 3. 行軍再開
          showBanner("行軍再開", 1100);
          updateInfo("探索再開");
          await sleepMs(700);
        }
      } catch (err) {
        console.error("encounter error", err);
      } finally {
        encounterEnemyIndices = [];
        encounterActive = false;
        window.__inMidBoss = isMidBossActive();   // 中ボス撃破済なら false (撃破済は alive=false)。逃げて生存中なら true 維持

    function resetPlayerBuffs() {

    function tickPlayerBuffsAtTurnStart() {
      if (playerBuffs.atkBonusRemaining > 0) playerBuffs.atkBonusRemaining--;
      if (playerBuffs.dmgReductionRemaining > 0) {
        playerBuffs.dmgReductionRemaining--;
        if (playerBuffs.dmgReductionRemaining <= 0) playerBuffs.dmgReductionDice = null;
      }
      if (playerBuffs.dmgReductionFlatRemaining > 0) {
        playerBuffs.dmgReductionFlatRemaining--;
        if (playerBuffs.dmgReductionFlatRemaining <= 0) playerBuffs.dmgReductionFlat = 0;
      }
      if (playerBuffs.antiKnockbackRemaining > 0) playerBuffs.antiKnockbackRemaining--;
      if (playerBuffs.acBonusRemaining > 0) playerBuffs.acBonusRemaining--;
      if (playerBuffs.strikingRemaining > 0) playerBuffs.strikingRemaining--;
      if (playerBuffs.evasionRemaining > 0) playerBuffs.evasionRemaining--;
      if (playerBuffs.luckyRemaining > 0) {
        playerBuffs.luckyRemaining--;
        if (playerBuffs.luckyRemaining <= 0) playerBuffs.luckyCritWiden = 0;
      }
      if (playerBuffs.frightenedRemaining > 0) playerBuffs.frightenedRemaining--;
      if (playerBuffs.fearImmuneRemaining > 0) playerBuffs.fearImmuneRemaining--;
      // リーダースキルクールダウンも 1 進める (rogue の shadow-step CD など)
      for (const k of Object.keys(leaderSkillCooldowns)) {
        if (leaderSkillCooldowns[k] > 0) leaderSkillCooldowns[k]--;

      const { n, sides } = parseDiceDD(playerBuffs.dmgReductionDice);

    function pickAliveEngagedIdx() {
      let best = -1, bestHp = Infinity;
      for (const i of encounterEnemyIndices) {

    // ── レア武器の特殊効果 (Flame Tongue / 雷鳴の斧 / 吸命メイス / 嵐のスタッフ / 霜咬みの弓) ──
    // weaponLike: { bonusDmgDice, bonusDmgType, critStun, lifeStealDice,
    //               shockwaveDice, shockwaveType, shockwaveSaveDC }
    // 順序: 0.余波 (ヒット瞬間に黄色フラッシュ + 周囲ダメージ) → 1.主対象追加属性 → 2.crit スタン → 3.HP 吸収
    // attacker: "player" or { kind:"ally", ally }
    async function applyWeaponSpecialEffects(weaponLike, target, targetIdx, ex, isCrit, attackerName, attackerRef, suppressFx) {
      if (!weaponLike) return;
      const ELEM_NAME = { fire: "炎", cold: "冷気", lightning: "雷", holy: "聖" };

      // 0. 周囲1マス余波 (雷鳴の斧): ヒット瞬間に発動 - 視覚演出 → 余波ダメージ → 続けて主対象の追加属性
      if (weaponLike.shockwaveDice) {
        const ds = target.def.displaySize || 64;
        const tcx = target.x + ds / 2;
        const tcy = target.y + ds / 2;
        const dc  = weaponLike.shockwaveSaveDC || 13;
        const targetTX = Math.floor(tcx / TILE_SIZE);
        const targetTY = Math.floor(tcy / TILE_SIZE);
        if (!suppressFx) {
          // 3x3 黄色ハイライト (中心マス基準で -1,-1 から 3x3、〜600ms フラッシュ)
          spawnGroundFx(targetTX - 1, targetTY - 1, 3, 3, "thunder", 600);
          playThunderShockwaveFx(tcx, tcy);
        }
        let hitN = 0;
        for (let i = 0; i < enemies.length; i++) {
          if (i === targetIdx) continue;
          const e = enemies[i];
          if (!e || !e.alive) continue;
          const eds = e.def.displaySize || 64;
          const ecx = e.x + eds / 2;
          const ecy = e.y + eds / 2;
          if (tileChebyshev(tcx, tcy, ecx, ecy) > 1) continue;
          const sd = parseDiceDD(weaponLike.shockwaveDice);
          const sr = rollDiceDD(sd.n, sd.sides);
          const strMod = (e.def && typeof e.def.str === "number") ? e.def.str : 0;
          const saveTotal = d20() + strMod;
          const saved = saveTotal >= dc;
          let sdmg = Math.max(1, sr.total);
          if (saved) sdmg = Math.max(1, Math.floor(sdmg / 2));
          e.hp = Math.max(0, e.hp - sdmg);
          triggerEnemyDamageFlash(i);
          showDmgAt(ecx, e.y - 22, sdmg, false);
          if (!suppressFx) spawnThunderZapOnEnemy(i, saved);
          hitN++;
        }
        if (hitN > 0) {
          updateInfo(`${attackerName}: 雷鳴の余波 → 周囲 ${hitN} 体に追撃 (${weaponLike.shockwaveDice}, STR DC${dc})`);
        }
        await sleepMs(380);
      }

      // 1. 追加属性ダメージ (Flame Tongue, 嵐のスタッフ, 霜咬みの弓)
      const bonusDice = weaponLike.bonusDmgDice;
      const bonusType = weaponLike.bonusDmgType;
      if (bonusDice) {
        const bd = parseDiceDD(bonusDice);
        const br = rollDiceDD(bd.n, bd.sides);
        const extra = Math.max(1, br.total);
        // ハイドラ: 炎/酸の追撃属性は「火で焼き切った」扱い (首の永久切除を許可)
        if (bonusType === "fire" || bonusType === "acid") target.__tookFireAcid = true;
        target.hp = Math.max(0, target.hp - extra);
        triggerEnemyDamageFlash(targetIdx);
        // 属性エフェクト (suppressFx 指定時はスキップ)
        if (!suppressFx) {
          const fxY = target.y + (target.def.displaySize || 64) / 2;
          if (bonusType === "fire") {
            // 炎: 中央フラッシュ + 炎柱 → 敵に火が燃え移る粒子継続
            playFlameTongueImpactFx(ex, fxY, targetIdx, isCrit);
            spawnFireBurnOnEnemy(targetIdx, isCrit ? 1800 : 1400);
            spawnFireImpactBurst(ex, fxY, { size: 120, light: true });   // フォグ貫通の爆発 (剣撃・小)
          } else if (bonusType === "cold") {
            // 冷気: 青白閃光 + 放射状氷晶 → 敵から落ちる氷の粒
            playFrostbiteImpactFx(ex, fxY, targetIdx, isCrit);
            spawnFrostOnEnemy(targetIdx, isCrit ? 1500 : 1200);
          } else if (bonusType === "lightning") {
            // 雷: 黄色閃光 + 4方向ジグザグ。雷鳴の斧 (shockwave 持ち) は中央フラッシュが
            // playThunderShockwaveFx で既に出てるので重複回避
            if (!weaponLike.shockwaveDice) {
              playLightningImpactFx(ex, fxY, isCrit);
            }
          } else if (bonusType === "holy") {
            // 聖: 金色バースト + 上から降りる光柱 → 上昇する金色の光粒
            playHolyImpactFx(ex, fxY, targetIdx, isCrit);
            spawnHolyAuraOnEnemy(targetIdx, isCrit ? 1500 : 1200);
          }
        }
        showDmgAt(ex, target.y - 22, extra, false);
        const tname = ELEM_NAME[bonusType] || "魔法";
        updateInfo(`${attackerName}: +${extra} ${tname}属性ダメージ (${bonusDice}[${br.rolls.join("+")}])`);
        await sleepMs(350);
      }

      // 2. クリティカル時スタン (雷鳴の斧, 霜咬みの弓)
      if (weaponLike.critStun && isCrit && target.alive !== false && target.hp > 0) {
        target.stunned = Math.max(target.stunned || 0, weaponLike.critStun);
        showDmgAt(ex, target.y - 40, "STUN", false);
        updateInfo(`${attackerName}: ${target.def.name} を ${weaponLike.critStun}T スタン!`);
        await sleepMs(350);
      }

      // 3. 命中時HP回復 (吸命のメイス)
      if (weaponLike.lifeStealDice) {
        const ld = parseDiceDD(weaponLike.lifeStealDice);
        const lr = rollDiceDD(ld.n, ld.sides);
        const rawHeal = lr.total;
        let actualHeal = 0;
        if (attackerRef === "player") {
          const prev = hp;
          hp = Math.min(maxHp, hp + rawHeal);
          actualHeal = hp - prev;
          if (actualHeal > 0) showHealAt(playerX + 48, playerY + 40, actualHeal);
        } else if (attackerRef && attackerRef.ally) {
          const a = attackerRef.ally;
          const prev = a.hp;
          a.hp = Math.min(a.maxHp, a.hp + rawHeal);
          actualHeal = a.hp - prev;
          if (actualHeal > 0) showHealAt(a.x + a.def.displaySize / 2, a.y, actualHeal);
        }
        if (actualHeal > 0) {
          updateInfo(`${attackerName}: 命中時 ${actualHeal} HP 吸収 (${weaponLike.lifeStealDice}[${lr.rolls.join("+")}])`);
          await sleepMs(300);
        }
      }
    }

    // 敵の実効AC: 通常 = def.ac、煙幕などのフェーズバフがあれば加算
    function effectiveEnemyAc(target) {
      let ac = target.def.ac || 10;
      if (target.def.ragePhaseDefensive && target.phase === 1) ac += 4;
      return ac;
    }

    // 盗賊 幸運: critRange を一時的に下げる (=クリ閾値を広げる)。unit は ally / leader actor。
    function effectiveCritRange(unit) {
      const base = (unit && unit.critRange) || 20;
      const widen = (unit && unit.buffs && unit.buffs.luckyRemaining > 0) ? (unit.buffs.luckyCritWiden || 0) : 0;
      return base - widen;
    }

    // ── 単体攻撃の共通処理(通常攻撃・スキル共用) ──
    // opts: { skillName?, dmgDice, dmgBonus, critMult, useStr?, onAfterHit?, range? }
    async function playerSingleAttack(targetIdx, opts) {
      const target = enemies[targetIdx];
      const tgtDef = target.def;
      const ex = target.x + tgtDef.displaySize / 2;
      const ey = target.y + tgtDef.displaySize / 2;

      mouseX = ex; mouseY = ey;
      updateFacingFromMouse();

      // 射程チェック: opts.range (スキル側) が優先、なければ武器射程
      const rangeKey = opts.range || playerStats.weaponRange || "melee";
      const rangeTiles = getRange(rangeKey).tiles;
      const dist = tileChebyshev(playerX + 48, playerY + 58, ex, ey);
      if (dist > rangeTiles) {
        showRollAtPlayer(
          `<span class="label">OUT OF RANGE</span>射程外 (${dist}タイル / 射程${rangeTiles})`,
          "miss");
        updateInfo(`射程外: ${dist}タイル (射程${rangeTiles})`);
        await sleepMs(900);
        return { missed: true };
      }

      const helpless = target.stunned > 0;  // スタン/スリープ中の敵は無抵抗
      const atkBonus = currentPlayerAtkBonus();
      const natD20  = d20();
      const atkTotal = natD20 + atkBonus;
      const isFumble = !helpless && natD20 === 1;  // 無抵抗相手はファンブルなし
      const luckyWiden = (playerBuffs.luckyRemaining > 0) ? (playerBuffs.luckyCritWiden || 0) : 0;
      const isThreat = natD20 >= (playerStats.critRange - luckyWiden) && !isFumble;
      const critMult = opts.critMult != null ? opts.critMult : playerStats.critMult;
      const labelPrefix = opts.skillName ? `${opts.skillName} ` : "";
      const atkText =
        `1d20(<b>${natD20}</b>)${signedDD(atkBonus)} = ` +
        `<span class="big">${atkTotal}</span><br>vs AC ${effectiveEnemyAc(target)}`;

      if (isFumble) {
        showRollAtPlayer(
          `<span class="label">FUMBLE!</span>1d20(<b>1</b>)${signedDD(atkBonus)}`,
          "fumble");
        sfx("fumble");
        updateInfo(`${getLeaderName()}${opts.skillName ? "の"+opts.skillName : ""}: ファンブル! 自動ミス`);
        await sleepMs(1000);
        return { missed: true };
      }

      const hit = helpless || isThreat || atkTotal >= effectiveEnemyAc(target);
      let isCrit = helpless;  // 無抵抗は確定クリティカル相当

      if (!hit) {
        sfx("miss");
        showRollAtPlayer(`<span class="label">${labelPrefix}MISS</span>${atkText}`, "miss");
        updateInfo(`${getLeaderName()}${opts.skillName ? "の"+opts.skillName : ""}: ${atkTotal} vs AC${effectiveEnemyAc(target)} → ミス`);
        const angle = Math.atan2(ey - (playerY + 58), ex - (playerX + 48));
        await runSwingNoHit(angle);
        return { missed: true };
      }

      if (helpless) {
        showRollAtPlayer(
          `<span class="label">${labelPrefix}HELPLESS!</span>無抵抗の敵に自動命中 ×${critMult}`,
          "crit");
        updateInfo(`${getLeaderName()}: ${tgtDef.name} は無抵抗! 自動命中 ×${critMult}`);
      } else if (isThreat) {
        showRollAtPlayer(
          `<span class="label">CRIT THREAT!</span>1d20(<b>${natD20}</b>)${signedDD(atkBonus)}`,
          "crit");
        await sleepMs(650);
        const cn = d20(), ct = cn + atkBonus;
        if (ct >= effectiveEnemyAc(target)) {
          isCrit = true;
          showRollAtPlayer(
            `<span class="label">CRIT x${critMult}</span>` +
            `確認: 1d20(${cn})${signedDD(atkBonus)} = <span class="big">${ct}</span>`,
            "crit");
          updateInfo(`${getLeaderName()}: クリティカル成功! ×${critMult}`);
        } else {
          showRollAtPlayer(
            `<span class="label">CRIT FAILED</span>確認 ${ct} → 通常命中`, "hit");
        }
      } else {
        showRollAtPlayer(`<span class="label">${labelPrefix}HIT</span>${atkText}`, "hit");
      }
      await sleepMs(550);
      sfx(isCrit ? "crit" : "hit");

      const angle = Math.atan2(ey - (playerY + 58), ex - (playerX + 48));
      await runSwingNoHit(angle);

      // 武器エンハンスメント (+N) はダメージにも加算、ダメダイスは武器から
      const curWeapon = getCurrentWeapon();
      const weaponEnh = (curWeapon && curWeapon.enhancement) || 0;
      const weaponDice = (curWeapon && curWeapon.dmgDice) || playerStats.dmgDice;
      const dmgBonus = (opts.dmgBonus != null ? opts.dmgBonus : playerStats.dmgBonus) + weaponEnh;
      const { n, sides } = parseDiceDD(opts.dmgDice || weaponDice);
      const times = isCrit ? critMult : 1;
      let allRolls = [];
      for (let i = 0; i < times; i++) {
        allRolls = allRolls.concat(rollDiceDD(n, sides).rolls);
      }
      const bonusTotal = dmgBonus * times;
      let dmg = Math.max(1, allRolls.reduce((a, b) => a + b, 0) + bonusTotal);
      // ストライキング: 命中ごとに +1dX (ボーナスダイスは D&D RAW で crit 非倍化)
      let strikeDmg = 0;
      if (playerBuffs.strikingRemaining > 0 && playerBuffs.strikingDie > 0) {
        strikeDmg = rollDiceDD(1, playerBuffs.strikingDie).total;
        dmg += strikeDmg;
      }
      // ハンターズ・マーク: 標的が烙印されていれば武器命中ごとに +1dX (crit 非倍化)
      let markDmg = 0;
      if (target.huntMarkRemaining > 0 && target.huntMarkDie > 0) {
        markDmg = rollDiceDD(1, target.huntMarkDie).total;
        dmg += markDmg;
      }

      // Phase 2-A: 残影回避判定 (shadowBeast 等) — 命中ロール通過後、ダメージ適用直前
      if (tryDisplacement(targetIdx)) {
        await sleepMs(420);
        return { missed: true, displaced: true };
      }
      // 非魔法物理免疫 (ストーンゴーレム等): +1以上の魔法武器でなければ通用しない
      if (golemPhysImmune(targetIdx, weaponEnh)) {
        showRollAtEnemy(targetIdx, `<span class="label">IMMUNE</span>通用しない!`, "miss");
        showHitSpark(targetIdx, false);
        updateInfo(`${tgtDef.name}: 非魔法の武器は通用しない! (魔法武器か呪文が必要)`);
        noteDisplacementHit(targetIdx);
        await sleepMs(420);
        return { missed: true, immune: true };
      }
      target.hp -= dmg;
      if (target.hp < 0) target.hp = 0;
      triggerEnemyDamageFlash(targetIdx);
      noteDisplacementHit(targetIdx);
      showHitSpark(targetIdx, isCrit);
      showDmgAt(ex, target.y, dmg, isCrit);
      const rollText = allRolls.join("+");
      const diceStr = opts.dmgDice || playerStats.dmgDice;
      updateInfo(`${getLeaderName()}${opts.skillName ? "の"+opts.skillName : ""}: ${tgtDef.name} に ${dmg} ダメージ ` +
        `(${diceStr}${isCrit ? "×" + critMult : ""}[${rollText}]${signedDD(bonusTotal)}${strikeDmg > 0 ? " +striking1d" + playerBuffs.strikingDie + "[" + strikeDmg + "]" : ""}${markDmg > 0 ? " +印1d" + target.huntMarkDie + "[" + markDmg + "]" : ""})`);
      await sleepMs(400);

      // ── レア武器の特殊効果 (D&D 3.5 RAW: エネルギーダメは crit で倍化されない) ──
      await applyWeaponSpecialEffects(curWeapon, target, targetIdx, ex, isCrit, getLeaderName(), "player", opts.suppressWeaponFx);

      if (opts.onAfterHit) await opts.onAfterHit(targetIdx, isCrit);

      if (target.hp <= 0) {
        defeatEnemy(targetIdx);
        await sleepMs(400);
      }
      return { missed: false, isCrit };
    }

    // ── 各スキル実装 ──
    async function skill_strongCleave(targetIdx) {
      await playerSingleAttack(targetIdx, {
        skillName: "強斬り",
        dmgDice: "2d8",
        dmgBonus: playerStats.str,
        range: WARRIOR_SKILLS["strong-cleave"].range,
      });
    }
    async function skill_sweep() {
      // 前列全体: 交戦中の生存敵すべてに個別に攻撃ロール
      const aliveIdxs = encounterEnemyIndices.filter(i => enemies[i].alive);
      for (const idx of aliveIdxs) {
        if (!enemies[idx].alive) continue;
        await playerSingleAttack(idx, {
          skillName: "なぎ払い",
          dmgDice: "1d6",
          dmgBonus: playerStats.str,
          range: WARRIOR_SKILLS["sweep"].range,
        });
        await sleepMs(200);
      }
    }
    async function skill_finisher(targetIdx) {
      const res = await playerSingleAttack(targetIdx, {
        skillName: "渾身の一撃",
        dmgDice: "3d10",
        dmgBonus: playerStats.str,
        range: WARRIOR_SKILLS["finisher"].range,
      });
      // 命中/外れに関わらず自分は息切れで次ターン行動不能
      playerBuffs.skipNextTurn = true;
      showBuffPop(`<span class="label">SELF STUN</span>息切れ — 次ターン休み`);
      await sleepMs(400);
    }
    async function skill_ironGuard() {
      const skill = WARRIOR_SKILLS["iron-guard"];
      playerBuffs.dmgReductionRemaining = skill.duration + 1;  // 次ターンまで
      playerBuffs.dmgReductionDice = skill.dmgReductionDice;
      showBuffPop(
        `<span class="label">鉄壁の構え</span>` +
        `次ターンまで被ダメ <span class="big">-${skill.dmgReductionDice}</span>`
      );
      updateInfo(`戦士: 鉄壁の構え! 被ダメージを ${skill.dmgReductionDice} 軽減`);
      await sleepMs(900);
    }
    async function skill_shieldBash(targetIdx) {
      const res = await playerSingleAttack(targetIdx, {
        skillName: "盾バッシュ",
        dmgDice: "1d4",
        dmgBonus: playerStats.str,
        range: WARRIOR_SKILLS["shield-bash"].range,
        suppressWeaponFx: true,  // 盾の打撃なので武器の炎エフェクトは出さない
      });
      if (!res.missed && enemies[targetIdx].alive) {
        enemies[targetIdx].stunned = 1;
        showRollAtEnemy(targetIdx, `<span class="label">STUNNED</span>次ターン行動不能`, "miss");
        await sleepMs(500);
      }
    }
    async function skill_morale() {
      const skill = WARRIOR_SKILLS["morale"];
      playerBuffs.atkBonusRemaining = skill.duration + 1;  // 次ターンから3ターン
      playerBuffs.atkBonusAmount = skill.atkBonusAmount;
      showBuffPop(
        `<span class="label">士気高揚</span>` +
        `3ターン攻撃ロール <span class="big">${signedDD(skill.atkBonusAmount)}</span>`
      );
      updateInfo(`戦士: 士気高揚! 3ターン攻撃+${skill.atkBonusAmount}`);
      await sleepMs(900);
    }
    async function skill_fightingSpirit() {
      const skill = WARRIOR_SKILLS["fighting-spirit"];
      const { n, sides } = parseDiceDD(skill.healDice);
      const r = rollDiceDD(n, sides);
      const heal = Math.max(1, r.total + playerStats.con);
      const prevHp = hp;
      hp = Math.min(maxHp, hp + heal);
      const actualHeal = hp - prevHp;
      showBuffPop(
        `<span class="label">闘志 HEAL</span>` +
        `${skill.healDice}(${r.rolls.join("+")})${signedDD(playerStats.con)} = ` +
        `<span class="big">+${actualHeal}</span>`
      );
      updateInfo(`戦士: 闘志でHPを ${actualHeal} 回復 (${hp}/${maxHp})`);
      await sleepMs(900);
    }

    // ── セカンドウィンド (立て直しフェーズで同期発動・1エンカウンター1回) ──
    let secondWindUsed = false;
    async function triggerSecondWind() {
      if (secondWindUsed) return false;
      if (hp <= 0) return false;
      if (!equippedSkills.includes("second-wind")) return false;
      if (hp >= maxHp) return false;  // HP 満タンなら温存

      secondWindUsed = true;
      const r = rollDiceDD(1, 10);
      const heal = Math.max(1, r.total + playerStats.con);
      const prevHp = hp;
      hp = Math.min(maxHp, hp + heal);
      const actualHeal = hp - prevHp;

      flashAction(player, "skill");
      showSkillAnnounce("セカンドウィンド");
      showHealAt(playerX + 48, playerY + 40, actualHeal);
      await sleepMs(500);
      showRollAtPlayer(
        `<span class="label">REST</span>1d10(${r.rolls.join("+")})${signedDD(playerStats.con)} = <span class="big">+${actualHeal}</span>`,
        "init"
      );
      updateInfo(`戦士のHPが、${actualHeal} 回復した。(セカンドウィンド)`);
      await sleepMs(1100);
      return true;
    }

    // ═════════════════════════════════════════════════════════
    // 部屋配置の宝箱 (トレハン要素)
    // ═════════════════════════════════════════════════════════
    const roomChests = [];
    const CHEST_DISCOVER_RADIUS = 240;   // この距離以内に入ると発見
    const CHEST_SAFE_DIST       = 640;   // 敵がこの距離未満なら発見保留 (戦闘圏内)
    const CHEST_ELIGIBLE_MIN_SIZE = 25;  // 玄室判定: 5×5 以上
    const CHEST_SPAWN_CHANCE    = 0.5;   // 各玄室での出現率

    function pickChestLoot() {
      const r = Math.random();
      if (r < 0.33) {
        return { kind: "goldSmall", amount: 10 + Math.floor(Math.random() * 11) };      // 10-20
      } else if (r < 0.50) {
        return { kind: "goldLarge", amount: 30 + Math.floor(Math.random() * 21) };      // 30-50
      } else if (r < 0.62) {
        return { kind: "weapon" };
      } else if (r < 0.74) {
        return { kind: "armor" };
      } else if (r < 0.84) {
        return { kind: "shield" };
      } else if (r < 0.96) {
        return { kind: "scroll" };                                                      // 呪文学習スクロール (12%)
      } else {
        return { kind: "empty" };
      }
    }

    function spawnRoomChests() {
      // 玄室候補: 5×5以上 & 非スタート(idx=0) & 非ボス部屋(末尾)
      const candidates = [];
      const bossRoomIdx = ROOMS.length - 1;
      for (let i = 0; i < ROOMS.length; i++) {
        if (i === 0 || i === bossRoomIdx) continue;
        const [r1, c1, r2, c2] = ROOMS[i];
        const size = (r2 - r1 + 1) * (c2 - c1 + 1);
        if (size >= CHEST_ELIGIBLE_MIN_SIZE) candidates.push(i);
      }
      for (const i of candidates) {
        if (Math.random() >= CHEST_SPAWN_CHANCE) continue;
        const [r1, c1, r2, c2] = ROOMS[i];
        // 部屋内の床タイル (壁・障害物除外) からランダム1個選ぶ
        const floorTiles = [];
        for (let r = r1; r <= r2; r++) {
          for (let c = c1; c <= c2; c++) {
            if (mapData[r][c] !== 0) continue;       // 1=レア床 も除外 (元仕様)
            if (isTileWall(c, r)) continue;           // 倒木/大型葦の上は避ける
            floorTiles.push([c, r]);
          }
        }
        if (floorTiles.length === 0) continue;
        const [tx, ty] = floorTiles[Math.floor(Math.random() * floorTiles.length)];
        const chest = {
          tx, ty, opened: false, found: false,
          hidden: false,             // 部屋配置は自動発見 (接近で tryDiscoverChest)
          loot: pickChestLoot(),
          el: null,
        };
        roomChests.push(chest);
        createRoomChestDom(chest, roomChests.length - 1);
      }
    }

    // 隠された宝箱: 床タイル (スタート/ボス部屋除外) にランダム配置
    //   罠と同じく未発見は非表示、知覚チェックで発見後に回収可能
    function spawnHiddenChests() {
      const count = currentScenario.hiddenChestCount || 0;
      if (count <= 0) return;
      const bossIdx = ROOMS.length - 1;
      const excludeRooms = new Set([0, bossIdx]);
      const candidates = [];
      for (let r = 0; r < MAP_H; r++) {
        for (let c = 0; c < MAP_W; c++) {
          if (mapData[r][c] !== 0) continue;
          if (isTileWall(c, r)) continue;              // 倒木/大型葦の上は避ける
          let inExcluded = false;
          for (const i of excludeRooms) {
            const [r1, c1, r2, c2] = ROOMS[i];
            if (r >= r1 && r <= r2 && c >= c1 && c <= c2) { inExcluded = true; break; }
          }
          if (inExcluded) continue;
          // 既存の宝箱 (roomChests) や罠と同じタイルは避ける
          const occupied = roomChests.some(ch => ch.tx === c && ch.ty === r)
            || (typeof traps !== "undefined" && traps.some(t => t.tx === c && t.ty === r));
          if (occupied) continue;
          candidates.push([c, r]);
        }
      }
      if (candidates.length === 0) return;
      for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
      }
      const spawnN = Math.min(count, candidates.length);
      for (let i = 0; i < spawnN; i++) {
        const [tx, ty] = candidates[i];
        const chest = {
          tx, ty, opened: false, found: false,
          hidden: true,              // 知覚チェックで発見するまで非表示
          loot: pickChestLoot(),
          el: null,
        };
        roomChests.push(chest);
        createRoomChestDom(chest, roomChests.length - 1);
      }

      // Sce2 隠し要素: rogue がパーティに居る場合のみ、鍵束を別の hidden chest として配置。
      // この chest は通常 hidden chest と同じ知覚チェックで発見可能だが、rogue 不在なら
      // そもそも spawn しない (= 隠し要素「残影の獣」が封印される)。
      if (scenarioId === "bandits-forest" && partyComposition.includes("rogue")) {
        // 残りの candidates (まだ chest を置いていないタイル) から 1 つ追加配置
        const usedTiles = new Set(roomChests.map(ch => `${ch.tx},${ch.ty}`));
        const freeTiles = candidates.filter(([c, r]) => !usedTiles.has(`${c},${r}`));
        if (freeTiles.length > 0) {
          const [tx, ty] = freeTiles[Math.floor(Math.random() * freeTiles.length)];
          const keyChest = {
            tx, ty, opened: false, found: false,
            hidden: true,
            loot: { kind: "key" },     // 専用 loot 種別
            el: null,
          };
          roomChests.push(keyChest);
          createRoomChestDom(keyChest, roomChests.length - 1);
        }
      }
    }

    function createRoomChestDom(chest, idx) {
      const el = document.createElement("div");
      el.className = "roomChest";
      el.id = "roomChest" + idx;
      document.body.appendChild(el);
      chest.el = el;
    }

    function tryDiscoverChest() {
      if (!gameStarted || gameOver) return;
      if (encounterActive || encounterRunning) return;
      if (hp <= 0) return;
      const pCX = playerX + 48, pCY = playerY + 58;

      for (const chest of roomChests) {
        if (chest.opened) continue;  // 開封済みは無視
        if (chest.isMimic) continue; // ミミックは専用トリガ (tryApproachMimic / 盗賊察知) で処理
        // 隠された宝箱 (知覚チェック待ち) は非表示のまま
        if (chest.hidden && !chest.found) continue;
        const cx = chest.tx * TILE_SIZE + TILE_SIZE / 2;
        const cy = chest.ty * TILE_SIZE + TILE_SIZE / 2;
        if (Math.hypot(pCX - cx, pCY - cy) > CHEST_DISCOVER_RADIUS) continue;
        if (!hasLineOfSight(pCX, pCY, cx, cy)) continue;

        // 近くに生存敵がいれば保留 (戦闘圏内)
        let inDanger = false;
        for (const e of enemies) {
          if (!e.alive) continue;
          if (e.inactive) continue;   // 檻内のビーストは脅威扱いしない
          const eCX = e.x + e.def.displaySize / 2;
          const eCY = e.y + e.def.displaySize / 2;
          if (Math.hypot(pCX - eCX, pCY - eCY) < CHEST_SAFE_DIST) { inDanger = true; break; }
        }
        if (inDanger) continue;

        // 発見演出 (知覚で既に found=true なら発見バナーは省略して開封演出のみ)
        const skipBanner = chest.found;
        chest.found = true;
        discoverChest(chest, { skipBanner });
        return;  // 1回の tick で1個だけ処理
      }
    }

    async function discoverChest(chest, opts = {}) {
      if (!opts.skipBanner) {
        sfx("chestFound");
        showBanner("🎁 宝箱をみつけた!", 1500);
        appendLog("宝箱を発見！", "sys");
        // レア判定: loot 種別で differentiate (武器/防具/大金貨=レア的扱い)
        const isRare = chest.loot && (chest.loot.kind === "weapon" || chest.loot.kind === "armor" || chest.loot.kind === "goldLarge" || chest.loot.kind === "scroll");
        if (isRare) {
          showDMMessage("おや…これはただの箱ではない。紋章が刻まれた鉄製の箱だ。中に何が入っている？", 2400);
        } else {
          showDMMessage("壁際に、古びた木箱が置かれている。埃を被っているが、鍵はかかっていないようだ。", 2400);
        }
      }
      if (chest.el) chest.el.classList.add("discovering");
      await sleepMs(800);
      sfx("chestOpen");

      // 中身処理
      const loot = chest.loot;
      if (loot.kind === "goldSmall" || loot.kind === "goldLarge") {
        coins += loot.amount;
        updateInfo(`宝箱の中身: 金貨 +${loot.amount}`);
        showBanner(`金貨 +${loot.amount}`, 1400);
      } else if (loot.kind === "weapon") {
        // 次ランクの武器を所持 (既存の index=1 体系)
        const nextIdx = Math.min(weapons.length - 1, currentWeaponIndex + 1);
        if (nextIdx > currentWeaponIndex) {
          currentWeaponIndex = nextIdx;
          const w = weapons[nextIdx];
          updateInfo(`宝箱の中身: 武器『${w.name}』`);
          showBanner(`武器 "${w.name}" を手に入れた!`, 1800);
          // 即時保存 (撤退/敗北/タブ閉じで失わないセーフネット)
          try {
            localStorage.setItem("dragonfighters.weaponIdx",      String(currentWeaponIndex));
            localStorage.setItem("dragonfighters.equipWeaponIdx", String(currentWeaponIndex));
          } catch (e) { /* silent */ }
        } else {
          // 既に最上位 → 金貨に変換
          const bonus = 25;
          coins += bonus;
          updateInfo(`宝箱の中身: 予備の武器 (既に上位所持) → 金貨 +${bonus}`);
          showBanner(`予備の武器を換金 金貨 +${bonus}`, 1400);
        }
      } else if (loot.kind === "armor") {
        const nextIdx = Math.min(armors.length - 1, currentArmorIndex + 1);
        if (nextIdx > currentArmorIndex) {
          currentArmorIndex = nextIdx;
          const a = armors[nextIdx];
          updateInfo(`宝箱の中身: 防具『${a.name}』`);
          showBanner(`防具 "${a.name}" を手に入れた!`, 1800);
          try {
            localStorage.setItem("dragonfighters.armorIdx",      String(currentArmorIndex));
            localStorage.setItem("dragonfighters.equipArmorIdx", String(currentArmorIndex));
          } catch (e) { /* silent */ }
        } else {
          const bonus = 25;
          coins += bonus;
          updateInfo(`宝箱の中身: 予備の防具 (既に上位所持) → 金貨 +${bonus}`);
          showBanner(`予備の防具を換金 金貨 +${bonus}`, 1400);
        }
      } else if (loot.kind === "shield") {
        const nextIdx = Math.min(shields.length - 1, currentShieldIndex + 1);
        if (nextIdx > currentShieldIndex) {
          currentShieldIndex = nextIdx;
          const s = shields[nextIdx];
          updateInfo(`宝箱の中身: 盾『${s.name}』`);
          showBanner(`盾 "${s.name}" を手に入れた!`, 1800);
          try {
            localStorage.setItem("dragonfighters.shieldIdx",      String(currentShieldIndex));
            localStorage.setItem("dragonfighters.equipShieldIdx", String(currentShieldIndex));
          } catch (e) { /* silent */ }
        } else {
          const bonus = 20;
          coins += bonus;
          updateInfo(`宝箱の中身: 予備の盾 (既に上位所持) → 金貨 +${bonus}`);
          showBanner(`予備の盾を換金 金貨 +${bonus}`, 1400);
        }
      } else if (loot.kind === "key") {
        // Sce2 隠し要素: 盗賊の鍵束。檻を開ける鍵
        hasKey = true;
        updateInfo("宝箱の中身: 盗賊の鍵束 — 何かを開けられそうだ");
        showBanner("🗝 盗賊の鍵束を手に入れた!", 1800);
        showDMMessage("古い革の束に錆びた鉄鍵が数本。盗賊たちが何か危険なものを閉じ込めているのかもしれない…", 2800);
      } else if (loot.kind === "scroll") {
        // スクロール (呪文学習アイテム)。rarity 重みで1種抽選 → 在庫へ (酒場で「読む」と永続習得)
        const sid = (typeof pickScrollId === "function") ? pickScrollId({ common: 55, uncommon: 35, rare: 10 }) : null;
        const c = (sid && typeof addScroll === "function") ? addScroll(sid, { silent: true }) : null;
        if (c) {
          const sk = (typeof getSkill === "function") ? getSkill(c.spellId) : null;
          updateInfo(`宝箱の中身: ${c.name} — 酒場で「読む」と「${sk ? sk.name : c.spellId}」を永続習得`);
          showBanner(`📜 ${c.name} を手に入れた!`, 1800);
          showDMMessage("色褪せた羊皮紙に、忘れられた呪文が記されている。読み解けば、新たな力となるだろう。", 2800);
        } else {
          updateInfo("宝箱の中身: 空っぽだった…");
          showBanner("空っぽだった…", 1300);
        }
      } else {
        // empty
        updateInfo("宝箱の中身: 空っぽだった…");
        showBanner("空っぽだった…", 1300);
      }

      await sleepMs(600);
      chest.opened = true;
      if (chest.el) {
        chest.el.classList.remove("discovering");
        chest.el.classList.add("opened");
        // 開封時のバースト演出 (放射光線+暖色ブルーム+本体パンチアップ)
        chest.el.classList.add("openBurst");
        const elRef = chest.el;
        setTimeout(() => { if (elRef) elRef.classList.remove("openBurst"); }, 950);
      }
    }

    setInterval(tryDiscoverChest, 400);

    // ═════════════════════════════════════════════════════════
    // 最終シナリオ 隠し要素: 偽宝箱 (ミミック) — final-mimic.md
    //   ボス部屋に「財宝の山」(ダミー宝箱 + ミミック1個) を擬態配置。普通の宝箱として描画され、
    //   接近で不意打ち起動 (粘着) / 盗賊の知覚で事前察知 (粘着なし先制)。起動で宝箱 DOM を敵スポーンに置換。
    // ═════════════════════════════════════════════════════════
    let mimicChest = null;
    const MIMIC_APPROACH_RADIUS = 200;   // 接近=「触れた」と見なす半径 (発火率はヘッドレス実測で調整可)
    const MIMIC_ADHESIVE_DC = 13;        // 粘着脱出の STR 判定 DC (5e Mimic 準拠)

    // ボス部屋に財宝の山を配置 (既定スポナーはボス部屋を除外するので専用配置)。dragon-lair 限定。
    function spawnDragonHoard() {
      if (scenarioId !== "dragon-lair") return;
      if (!Array.isArray(ROOMS) || ROOMS.length === 0) return;
      const [r1, c1, r2, c2] = ROOMS[ROOMS.length - 1];   // ボス部屋
      const isOccupied = (c, r) =>
        roomChests.some(ch => ch.tx === c && ch.ty === r) ||
        (typeof traps !== "undefined" && traps.some(t => t.tx === c && t.ty === r)) ||
        enemies.some(e => {
          const eTX = Math.floor((e.x + e.def.displaySize / 2) / TILE_SIZE);
          const eTY = Math.floor((e.y + e.def.displaySize / 2) / TILE_SIZE);
          return eTX === c && eTY === r;
        });
      // 入口寄り (西〜中央) の床タイルを集める。ボス/他ユニット/既存宝箱/罠と非重複。
      const westLimit = c1 + Math.floor((c2 - c1) * 0.45);
      const tiles = [];
      for (let r = r1; r <= r2; r++) {
        for (let c = c1; c <= westLimit; c++) {
          if (mapData[r][c] !== 0) continue;
          if (isTileWall(c, r)) continue;
          if (isOccupied(c, r)) continue;
          tiles.push([c, r]);
        }
      }
      if (tiles.length === 0) return;
      for (let i = tiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
      }
      // ダミー宝箱 (最大3個) — 「並んだ宝箱」の絵作り。残り1枠をミミックに使う。
      const dummyN = Math.min(3, Math.max(0, tiles.length - 1));
      for (let i = 0; i < dummyN; i++) {
        const [tx, ty] = tiles[i];
