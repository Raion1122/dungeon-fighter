      const facing = ally.facing || "right";
      // FFタクティクス風: 右向き行固定、左向きは CSS flip
      const row = 3;
      ally.el.style.transform = facing === "left" ? "scaleX(-1)" : "";
      const ck = ally.classKey;
      const isCustom = CUSTOM_SHEET_CLASSES.has(ck);

      // キャストアニメ中 (攻撃より優先)
      if (CAST_SHEET_CLASSES.has(ck) && ally.castAnimActive) {
        const elapsed = performance.now() - ally.castAnimStart;
        if (elapsed >= ally.castAnimDuration) {
          // setTimeout が何らかの理由で遅延した場合の自己保険
          ally.castAnimActive = false;
        } else {
          const progress = Math.min(1, elapsed / ally.castAnimDuration);
          const frame = Math.min(5, Math.floor(progress * 6));
          if (ck === "cleric") setAllySpriteSheet(ally, CLERIC_CAST_URL, CLERIC_CAST_SIZE);
          ally.el.style.backgroundPosition = `${-frame * 96}px ${-row * 96}px`;
          ally.playerMovingThisFrame = false;
          return;
        }
      }

      // 攻撃アニメ中
      if (isCustom && ally.attackAnimActive) {
        const elapsed = performance.now() - ally.attackAnimStart;
        const progress = Math.min(1, elapsed / ally.attackAnimDuration);
        const frame = Math.min(4, Math.floor(progress * 5));
        const ssA = getSpriteSet(ck, ally.variant || 0);
        if (ssA) setAllySpriteSheet(ally, ssA.attack, ssA.attackSize);
        ally.el.style.backgroundPosition = `${-frame * 96}px ${-row * 96}px`;
        ally.playerMovingThisFrame = false;
        return;
      }

      // 通常 (歩行/待機)
      let frameCount, framesPerStep;
      if (ally.playerMovingThisFrame) {
        // カスタムシートは 6F, simple_knight は 5F
        framesPerStep = isCustom ? 5 : 6;
        frameCount    = isCustom ? 6 : 5;
      } else {
        framesPerStep = 1; frameCount = 1;
      }
      const frame = Math.floor(ally.animTick / framesPerStep) % frameCount;
      const ssW = getSpriteSet(ck, ally.variant || 0);
      if (ssW) setAllySpriteSheet(ally, ssW.walk, ssW.walkSize);
      else     setAllySpriteSheet(ally, `url("${ally.def.sprite}")`, "480px 1152px");
      ally.el.style.backgroundPosition = `${-frame * 96}px ${-row * 96}px`;
      ally.playerMovingThisFrame = false;
    }

    function showGuardEffect() {
      let gx = playerX - 12;
      let gy = playerY - 12;
      // 右向きのみ運用: 水平2方向
      if (facing === "left") { gx = playerX - 34; gy = playerY - 12; }
      if (facing === "right") { gx = playerX + 18; gy = playerY - 12; }

      guardEffect.style.left = (gx - camX) + "px";
      guardEffect.style.top  = (gy - camY) + "px";
      guardEffect.style.display = "block";
      guardEffect.style.animation = "none";
      void guardEffect.offsetWidth;
      guardEffect.style.animation = "";

      setTimeout(() => {
        guardEffect.style.display = "none";
      }, 320);
    }

    function showHitSpark(index, strong = false) {
      // エフェクト調整中: 命中時の光る演出 (白い閃光+リング) を一旦オフ
      // 戻すには下のブロックの先頭の return を外す
      return;
      const enemy = enemies[index];
      const spark = hitSparkElements[index];
      spark.classList.toggle("strong", strong);
      spark.style.left = (enemy.x - camX - (strong ? 24 : 10)) + "px";
      spark.style.top  = (enemy.y - camY - (strong ? 24 : 10)) + "px";
      spark.style.display = "block";
      spark.style.animation = "none";
      void spark.offsetWidth;
      spark.style.animation = "";

      setTimeout(() => {
        spark.style.display = "none";
        spark.classList.remove("strong");
      }, strong ? 260 : 220);
    }

    function triggerEnemyDamageFlash(index) {
      enemies[index].damageFlashTimer = 10;
    }

    // ── Phase 2-A: 残影回避 (Displacement) ヘルパー ──
    // shadowBeast 等 def.displacementChance を持つ敵に対する命中後判定。
    // 返り値 true = 攻撃が位相ずれで空振り (ダメージなし)。被弾後 2 秒間は無効。
    // 呼び出し側は、命中ロール通過後・ダメージ計算前に呼び、true なら更新せず終了する。
    function tryDisplacement(enemyIdx) {
      const e = enemies[enemyIdx];
      if (!e || !e.alive) return false;
      const def = e.def;
      const chance = def.displacementChance || 0;
      if (chance <= 0) return false;
      // 被弾後クールダウン中は回避できない
      const now = (typeof performance !== "undefined" && performance.now)
        ? performance.now() : Date.now();
      if (e.displacementDisabledUntil && now < e.displacementDisabledUntil) return false;
      if (Math.random() >= chance) return false;
      // 発動: 残像 fx + 残影回避ログ
      spawnDisplaceAfterimage(enemyIdx);
      try { updateInfo(`${def.name} は残影で攻撃をかわした!`); } catch {}
      return true;
    }

    // 被弾時に呼ぶ: クールダウン開始 (displacementChance を持つ敵のみ)
    function noteDisplacementHit(enemyIdx) {
      const e = enemies[enemyIdx];
      if (!e || !e.def) return;
      if (!(e.def.displacementChance > 0)) return;
      const cd = e.def.displacementCooldownMs || 2000;
      const now = (typeof performance !== "undefined" && performance.now)
        ? performance.now() : Date.now();
      e.displacementDisabledUntil = now + cd;
    }

    // ── 非魔法物理免疫 (ストーンゴーレム等、fort-golems.md) ──
    // physicalImmunity を持つ敵は、+1以上の魔法武器 (enhancement>=1) でない物理攻撃を
    // 完全に無効化する。呪文ダメージは別経路 (この関数を呼ばない) なので常に通過する。
    // 武器命中ロール通過後・ダメージ適用直前 (tryDisplacement と同じ介入点) で判定する。
    // attackerEnh: リーダーは weaponEnh、仲間は ally.weaponEnhancement (当面 0 = 通用しない)。
    function golemPhysImmune(enemyIdx, attackerEnh) {
      const e = enemies[enemyIdx];
      if (!e || !e.def || !e.def.physicalImmunity) return false;
      return (Number(attackerEnh) || 0) < 1;
    }

    // 残像エフェクト DOM を spawn (520ms で自動 fade-out)
    function spawnDisplaceAfterimage(enemyIdx) {
      const e = enemies[enemyIdx];
      const el = enemyElements[enemyIdx];
      if (!e || !el) return;
      const ghost = document.createElement("div");
      ghost.className = "displaceAfterimage";
      const ds = e.def.displaySize || TILE_SIZE;
      ghost.style.width  = ds + "px";
      ghost.style.height = ds + "px";
      ghost.style.left   = (e.x - camX) + "px";
      ghost.style.top    = (e.y - camY) + "px";
      ghost.style.backgroundImage = `url("${e.def.sprite}")`;
      const scale = ds / e.def.frameW;
      ghost.style.backgroundSize = `${Math.round(e.def.sheetW * scale)}px ${Math.round(e.def.sheetH * scale)}px`;
      ghost.style.backgroundPosition = el.style.backgroundPosition || "0 0";
      ghost.style.transform = el.style.transform || "";
      enemyLayer.appendChild(ghost);
      setTimeout(() => { try { ghost.remove(); } catch {} }, 560);
    }

    // Phase 2-G: PC 用の残像エフェクト (残影の首飾りで回避時に発動)
    // #player の現在の sprite sheet / frame / transform を動的に読み取って複製する。
    // 戦士は walk / attack で複数シートを切替えるので、ハードコードせず player の現値をコピー。
    function spawnPlayerDisplaceAfterimage() {
      if (!player) return;
      const cs = window.getComputedStyle(player);
      const ghost = document.createElement("div");
      ghost.className = "displaceAfterimage";
      ghost.style.width  = playerWidth  + "px";
      ghost.style.height = playerHeight + "px";
      ghost.style.left   = (playerX - camX) + "px";
      ghost.style.top    = (playerY - camY) + "px";
      // インライン優先 → 計算済 → simple_knight フォールバック
      ghost.style.backgroundImage    = player.style.backgroundImage
        || cs.backgroundImage || "url(\"assets/simple_knight.png\")";
      ghost.style.backgroundSize     = player.style.backgroundSize
        || cs.backgroundSize  || "480px 1152px";
      ghost.style.backgroundPosition = player.style.backgroundPosition
        || cs.backgroundPosition || "0 0";
      ghost.style.transform          = player.style.transform || "";
      document.body.appendChild(ghost);
      setTimeout(() => { try { ghost.remove(); } catch {} }, 560);
    }

    // Phase 2-G 拡張: 仲間用の残像エフェクト (ally.el を複製)
    function spawnAllyDisplaceAfterimage(ally) {
      if (!ally || !ally.el) return;
      const el = ally.el;
      const cs = window.getComputedStyle(el);
      const ghost = document.createElement("div");
      ghost.className = "displaceAfterimage";
      const ds = (ally.def && ally.def.displaySize) || 96;
      ghost.style.width  = ds + "px";
      ghost.style.height = ds + "px";
      ghost.style.left   = (ally.x - camX) + "px";
      ghost.style.top    = (ally.y - camY) + "px";
      ghost.style.backgroundImage    = el.style.backgroundImage    || cs.backgroundImage    || "";
      ghost.style.backgroundSize     = el.style.backgroundSize     || cs.backgroundSize     || "";
      ghost.style.backgroundPosition = el.style.backgroundPosition || cs.backgroundPosition || "0 0";
      ghost.style.transform          = el.style.transform || "";
      document.body.appendChild(ghost);
      setTimeout(() => { try { ghost.remove(); } catch {} }, 560);
    }

    // (廃止) tryHealWithCoins — 3枚で 1HP 回復の機構は削除済

    function isGuardFacingEnemy(enemy) {
      const playerCenterX = playerX + playerWidth / 2;
      const playerCenterY = playerY + playerHeight / 2;
      const enemyCenterX = (enemy.x + enemy.def.displaySize / 2);
      const enemyCenterY = (enemy.y + enemy.def.displaySize / 2);
      const dx = enemyCenterX - playerCenterX;
      const dy = enemyCenterY - playerCenterY;

      // 右向きのみ運用: X軸の向き一致だけで判定
      if (facing === "left") return dx < 0;
      if (facing === "right") return dx > 0;
      return false;
    }

    function applyPlayerKnockbackFromEnemy(enemy, reduced = false, knockbackScale = 1, stunScale = 1) {
      // ノックバック廃止: 位置を押さない。短い flinch のみ残し、殴り合いになるように
      playerKnockbackVX = 0;
      playerKnockbackVY = 0;
      playerHitStun = reduced ? 3 : 6;

      targetX = null;
      targetY = null;
    }

    function getNearestAliveEnemy() {
      const center = getPlayerCenter();
      let bestIndex = -1;
      let bestDist = Infinity;

      enemies.forEach((enemy, index) => {
        if (!enemy.alive) return;
        const ex = (enemy.x + enemy.def.displaySize / 2);
        const ey = (enemy.y + enemy.def.displaySize / 2);
        const dist = Math.hypot(ex - center.x, ey - center.y);
        if (dist < bestDist) {
          bestDist = dist;
          bestIndex = index;
        }
      });

      return bestIndex;
    }

    function getAngleToEnemy(index) {
      const center = getPlayerCenter();
      const enemy = enemies[index];
      return Math.atan2(((enemy.y + enemy.def.displaySize / 2)) - center.y, ((enemy.x + enemy.def.displaySize / 2)) - center.x);
    }

    function applyKnockback(enemy, amount, angle) {
      // ノックバック廃止: 位置を押さない。短い flinch のみ残し、殴り合いになるように
      enemy.hitStun = 4;
      enemy.knockbackVX = 0;
      enemy.knockbackVY = 0;
    }

    function damageEnemy(index, stage = 0, angle = currentAttackAngle) {
      const enemy = enemies[index];
      if (!enemy.alive) return;

      // 攻撃を受けたら必ず追跡状態に
      if (enemy.state !== "chase") {
        enemy.state = "chase";
        enemy.alertTimer = 0;
        enemy.path = [];
        enemy.pathTimer = 0;
      }

      const weapon = getCurrentWeapon();
      let damage = weapon.power;
      let knockback = weapon.knockback;
      let strong = false;

      if (stage === 1) {
        knockback *= 2;
        strong = true;
      }

      triggerEnemyDamageFlash(index);
      showHitSpark(index, strong);
      enemy.hp -= damage;
      applyKnockback(enemy, knockback, angle);

      if (enemy.hp <= 0) {
        defeatEnemy(index);
      } else {
        if (stage === 0) {
          const nm = (enemy.def && enemy.def.name) || "敵";
          updateInfo(nm + "に " + damage + " ダメージ！ 残りHP: " + enemy.hp);
        } else {
          updateInfo("ダッシュカウンター命中！ 残りHP: " + enemy.hp);
        }
      }
    }

    function maybeDropIronSword(index) {
      const enemy = enemies[index];
      if (hasIronSword()) return;
      if (Math.random() < ironSwordDropChance) {
        enemy.weaponVisible = true;
        enemy.weaponX = enemy.x + 38;
        enemy.weaponY = enemy.y - 2;
      }
    }

    function maybeDropLeatherArmor(index) {
      const enemy = enemies[index];
      if (hasLeatherArmor()) return;
      if (Math.random() < leatherArmorDropChance) {
        enemy.armorVisible = true;
        enemy.armorX = enemy.x - 4;
        enemy.armorY = enemy.y - 2;
      }
    }

    // Phase 2-G 拡張: shadowBeast 撃破時に「残影の首飾り」を入手
    // 4 人パーティ全員 (戦士 + 仲間 3 名) が独立スロット 2 つを持つ。
    // 同一キャラ内では重複不可、別キャラには同じアクセを装備可。
    // 装備可能キャラ (未所持 + 空き枠あり) のリストを作って、選択ダイアログを出す。
    async function maybeDropShadowAmulet(index) {
      const enemy = enemies[index];
      if (!enemy || !enemy.def || !enemy.def.pelt) return;
      const amuletIdx = accessories.findIndex(a => a.id === "shadow-amulet");
      if (amuletIdx < 0) return;
      // Phase 2-H: 4 個まで (PT 4 人分) 持てる、5 個目は換金
      const currentCount = (accessoryStock["shadow-amulet"] || 0);
      if (currentCount >= 4) {
        const bonus = 50;
        coins += bonus;
        updateInfo(`残影の首飾り を見つけた (既に 4 個所持) → 金貨 +${bonus}`);
        return;
      }
      // 装備可能候補を列挙: 未装備 (hasAccessoryId が false) + 空き枠あり
      const candidates = [];
      // 戦士 (リーダー)
      if (!hasAccessoryId("shadow-amulet", "player")) {
        const slot = currentAccessoryIndices.findIndex(i => accessories[i] && accessories[i].id === "none");
        if (slot >= 0) candidates.push({ kind: "player", label: getLeaderName(), slot });
      }
      // 仲間
      if (typeof allies !== "undefined") {
        for (const a of allies) {
          if (!a || !a.alive) continue;
          if (hasAccessoryId("shadow-amulet", a)) continue;
          const slot = a.accessoryIndices.findIndex(i => accessories[i] && accessories[i].id === "none");
          if (slot >= 0) candidates.push({ kind: "ally", ally: a, label: a.def.name, slot });
        }
      }
      if (candidates.length === 0) {
        updateInfo("残影の首飾り を見つけたが、PT 全員が既に装備中 / 枠が満杯");
        return;
      }
      // 装着先選択 (新規 showCharChoice モーダル)
      const pickedIdx = await showCharChoice("🌒 残影の首飾り を誰に装備?", candidates);
      if (pickedIdx == null || pickedIdx < 0) {
        // キャンセル / 未選択 → 持ち帰り (persistent には積み増し)
        savePersistentAccessoryStock();
        updateInfo("残影の首飾り を持ち帰った (装備先を選ばず)");
        return;
      }
      const chosen = candidates[pickedIdx];
      if (chosen.kind === "player") {
        currentAccessoryIndices[chosen.slot] = amuletIdx;
        if (typeof showBanner === "function") {
          showBanner(`🌒 残影の首飾り → ${chosen.label}`, 2400);
        }
        updateInfo(`残影の首飾り を ${chosen.label} のアクセ${chosen.slot + 1} に装着`);
      } else {
        chosen.ally.accessoryIndices[chosen.slot] = amuletIdx;
        if (typeof showBanner === "function") {
          showBanner(`🌒 残影の首飾り → ${chosen.label}`, 2400);
        }
        updateInfo(`残影の首飾り を ${chosen.label} のアクセ${chosen.slot + 1} に装着`);
      }
      // persistent 保存
      savePersistentAccessoryStock();
      // Phase 2-H: 在庫数も同期
      recomputeAccessoryStock();
      // UI 即時反映
      if (typeof renderPartyStatuses === "function") renderPartyStatuses();
    }

    // 全キャラのアクセサリースロット状態を persistent / localStorage に保存
    function savePersistentAccessoryStock() {
      // 各キャラのスロット 2 つを JSON で保存
      const snap = {
        player: currentAccessoryIndices.map(i => (accessories[i] || accessories[0]).id),
        allies: {},
      };
      if (typeof allies !== "undefined") {
        for (const a of allies) {
          if (!a || !a.classKey) continue;
          snap.allies[a.classKey] = a.accessoryIndices.map(i => (accessories[i] || accessories[0]).id);
        }
      }
      // 在庫リスト = 全キャラの装備中 "shadow-amulet" 個数 (将来の素材保管にも対応)
      const stock = [];
      const allEquipped = [
        ...currentAccessoryIndices,
        ...((typeof allies !== "undefined") ? allies.flatMap(a => a.accessoryIndices) : []),
      ].filter(i => accessories[i] && accessories[i].id !== "none");
      for (const i of allEquipped) stock.push(accessories[i].id);
      persistent.accessoryIds = stock;
      persistent.accessoryStateJson = JSON.stringify(snap);
      try {
        localStorage.setItem("dragonfighters.accessoryIds", JSON.stringify(stock));
        localStorage.setItem("dragonfighters.accessoryState", persistent.accessoryStateJson);
        // 後方互換: スロット 1/2 (リーダー用) も保存
        localStorage.setItem("dragonfighters.equipAccessory1", snap.player[0]);
        localStorage.setItem("dragonfighters.equipAccessory2", snap.player[1]);
      } catch (e) { /* ignore */ }
    }

    // 盗賊 毒塗り短剣: 毒 (DoT) を付与 (リフレッシュ式、スタックなし)
    function applyPoison(enemy, die, turns) {
      if (!enemy || !enemy.alive) return;
      enemy.poisonDie = die || "1d4";
      enemy.poisonRemaining = Math.max(enemy.poisonRemaining || 0, turns || 3);
    }

    function defeatEnemy(index) {
      const enemy = enemies[index];
      // ── 多頭ハイドラ: hp→0 は「頭が落ちた」イベント。炎/酸=永久切除、物理=完全再生 ──
      if (enemy.def && enemy.def.multiHead && (enemy.hydraHeads || 0) > 0) {
        const burned = !!enemy.__tookFireAcid;   // この頭の生存中に炎/酸を浴びたか
        enemy.__tookFireAcid = false;            // 次の頭へ持ち越さない (sever ごとリセット)
        if (burned) {
          enemy.hydraHeads -= 1;
          if (enemy.hydraHeads <= 0) {
            // 最後の頭を焼き切った → 下の通常死亡処理へフォールスルー (撃破確定)
          } else {
            enemy.hp = enemy.headHpMax;
            triggerEnemyDamageFlash(index);
            showRollAtEnemy(index, `<span class="label">🔥 SEVERED</span>頭を焼き切った! 残り ${enemy.hydraHeads} 頭`, "crit");
            updateInfo(`古代ハイドラ: 1つの頭を永久に焼き切った! (残り ${enemy.hydraHeads} 頭)`);
            maybeHydraDragRoar(enemy, index);
            return;   // 撃破ではない
          }
        } else {
          // 炎/酸を浴びていない頭は物理で落としても完全再生 (+1本・HP全回復、上限 cap)
          const cap = enemy.def.maxHeadsCap || 8;
          if (enemy.hydraHeads < cap) enemy.hydraHeads += 1;
          enemy.hp = enemy.headHpMax;
          triggerEnemyDamageFlash(index);
          showRollAtEnemy(index, `<span class="label">REGROW</span>頭が再生! ${enemy.hydraHeads} 頭`, "miss");
          if (!enemy.__regrowNarrated && typeof showDMMessage === "function") {
            enemy.__regrowNarrated = true;   // 「焼け!」のヒントは初回のみ (スパム防止)
            showDMMessage("「斬り落とした首から、二本の新たな頭が生えた。このままでは終わらない…焼け!」", 3600);
          }
          maybeHydraDragRoar(enemy, index);
          return;   // 撃破ではない (物理では死なない)
        }
      }
      enemy.alive = false;
      enemy.__diagDead = true;   // 自動デバッグ: 死亡反転検出マーカー
      // コインドロップは廃止 (報酬は宝箱とクリア報酬に集約)
      enemy.coinVisible = false;
      enemy.knockbackVX = 0;
      enemy.knockbackVY = 0;
      enemy.hitStun = 0;
      enemy.damageFlashTimer = 0;
      sfx(enemy.def && enemy.def.boss ? "bossDeath" : "enemyDeath");

      maybeDropIronSword(index);
      maybeDropLeatherArmor(index);
      maybeDropShadowAmulet(index);   // Phase 2-G: shadowBeast 撃破で残影の首飾り入手
      maybeGrantScrollDrop(enemy);    // ボス/隠し要素撃破でスクロール確定ドロップ

      const nm = (enemy.def && enemy.def.name) || "敵";
      // ボス死亡セリフ (deathLine 定義時のみ)
      if (enemy.def && enemy.def.deathLine && typeof showDMMessage === "function") {
        setTimeout(() => showDMMessage(`「${enemy.def.deathLine}」 — ${nm}`, 3600), 600);
      }
      // Sce4 隠し要素: ストーンゴーレム撃破 → 伏線ナレ + バナー (実アイテム化は後追い)
      if (enemy.type === "stoneGolem" && typeof showDMMessage === "function") {
        if (typeof showBanner === "function") showBanner("🏛 古代王国の守護者を打ち倒した!", 2600);
        setTimeout(() => showDMMessage(
          "巨人は瓦礫へと崩れ落ちた。砕けた胸甲の奥に、古代王国の紋章と…\n" +
          "炎竜の鱗が一片、埋め込まれている。なぜ、この古の砦に竜の鱗が…?", 4600), 700);
      }
      // Sce3 隠し要素: 古代ハイドラ撃破 → 撃破ナレ + 報酬列挙 + ファラクサス伏線文書 (実アイテム化は後追い)
      if (enemy.def && enemy.def.multiHead && typeof showDMMessage === "function") {
        if (typeof showBanner === "function") showBanner("🐲 沼の守護神・古代ハイドラを討伐!", 2800);
        setTimeout(() => showDMMessage(
          "「最後の頭が地に落ちた。沼の水面に、かすかな波紋が広がり…そして静寂が戻った。\n" +
          "リザードマンたちは、まるで魂が抜けたように地に伏している。」", 5200), 700);
        setTimeout(() => updateInfo("入手: 多頭の鱗 / ハイドラの牙 / 古代の聖印 / 守護神のオベリスク片"), 1600);
        setTimeout(() => showDMMessage(
          "守護神の亡骸の傍ら、苔むした石板にこう刻まれていた —\n" +
          "『我らの祖は蛇神に仕えし蜥蜴の民。龍と蛇は争い、蛇は封じられ、龍は今も眠る…\n" +
          "その龍の名は、ファラクサス。』", 5600), 3400);
      }
      // 最終シナリオ 隠し要素: 偽宝箱 (ミミック) 撃破 → 崩壊ナレ + 金貨大量 + 鱗/遺品の伏線 (軽量・実アイテム化なし)
      if (enemy.type === "mimic" && typeof showDMMessage === "function") {
        playerBuffs.stuck = false;   // 粘着の安全クリア (撃破でソフトロック解消)
        if (typeof showBanner === "function") showBanner("🧰 偽宝箱を打ち倒した!", 2600);
        const hoardGold = 200 + Math.floor(Math.random() * 101);  // 200-300
        coins += hoardGold;
        setTimeout(() => showDMMessage(
          "偽宝箱が、最後に大きな粘液の塊となって崩れた。\n" +
          "周囲の本物の宝箱は、何事もなかったかのように静かに鎮座している。", 4200), 600);
        setTimeout(() => updateInfo(`崩れた粘液から金貨 +${hoardGold} — そして『ファラクサスの鱗』と古い『ドラゴンスレイヤーの遺品』`), 1600);
        setTimeout(() => showDMMessage(
          "粘液の奥から、金貨の山 — そして炎竜の鱗が一片と、錆びついた『ドラゴンスレイヤーの遺品』が転がり出た。\n" +
          "いつかの英雄が、ここで竜に挑み、敗れたのか…? 次なる旅へ続く、何かを示すように。", 5200), 3000);
      }
      if (enemy.weaponVisible && enemy.armorVisible) {
        updateInfo(`${nm}を倒した！ 宝箱2つが落ちた`);
      } else if (enemy.weaponVisible || enemy.armorVisible) {
        updateInfo(`${nm}を倒した！ 宝箱が落ちた`);
      } else {
        updateInfo(`${nm}を倒した！`);
      }
      // XP 加算
      if (typeof gainXP === "function") {
        gainXP(enemy.def.xp || 0, nm);
      }
    }

    // ハイドラ: 頭数しきい値で 沼の引き込み / 激怒の咆哮 を各1回発火 (頭は炎でしか減らない=しきい値は確定1回通過)
    function maybeHydraDragRoar(enemy, index) {
      const def = enemy.def;
      if (!enemy.dragDone && enemy.hydraHeads <= (def.dragHeadsThreshold || 2)) {
        enemy.dragDone = true;
        if (typeof showBanner === "function") showBanner("🌊 沼の引き込み 🌊", 1600);
        updateInfo("古代ハイドラ: 沼の引き込み! 次の一撃で単体を強く捕える");
        enemy.__forceSmashNext = true;   // 次の噛撃を smash 相当 (強打) へ
      }
      if (!enemy.roarDone && enemy.hydraHeads <= (def.roarHeadsThreshold || 1)) {
        enemy.roarDone = true;
        if (typeof showBanner === "function") showBanner("🗣 激怒の咆哮 🗣", 1600);
        updateInfo(`古代ハイドラ: 激怒の咆哮! 全員 WIS セーヴ (DC ${def.fearDC || 15})`);
        if (def.fearDC && typeof partyWillSave === "function") partyWillSave(def.fearDC);
      }
    }

    function respawnEnemy(index) {
      const pos = randomEnemyPosition();
      enemies[index].x = pos.x;
      enemies[index].y = pos.y;
      enemies[index].originX = pos.x;
      enemies[index].originY = pos.y;
      enemies[index].searchTimer = 0;
      enemies[index].alive = true;
      enemies[index].__diagDead = false;   // 自動デバッグ: 正規リスポーン (死亡反転と区別)
      enemies[index].hp = enemies[index].maxHp;
      enemies[index].coinVisible = false;
      enemies[index].weaponVisible = false;
      enemies[index].armorVisible = false;
      enemies[index].knockbackVX = 0;
      enemies[index].knockbackVY = 0;
      enemies[index].hitStun = 0;
      enemies[index].damageFlashTimer = 0;
      enemies[index].path = [];
      enemies[index].pathTimer = 0;
      enemies[index].state = "idle";
      enemies[index].losTimer = 0;
      enemies[index].alertTimer = 0;
      enemies[index].attackTimer = 0;
      enemies[index].attackCooldown = 0;
      enemies[index].attackHitDealt = false;
      updatePositions();
    }

    function getAttackHitbox() {
      const center = getPlayerCenter();
      const hitCenterX = center.x + Math.cos(currentAttackAngle) * currentAttackRadius;
      const hitCenterY = center.y + Math.sin(currentAttackAngle) * currentAttackRadius;

      return {
        left: hitCenterX - currentAttackHitSize,
        top: hitCenterY - currentAttackHitSize,
        right: hitCenterX + currentAttackHitSize,
        bottom: hitCenterY + currentAttackHitSize
      };
    }

    function checkAttackHit() {
      // エンカウンター中はダイスロール側でダメージを処理するのでコリジョン判定は無効化
      if (encounterActive) return;
      const attackHitbox = getAttackHitbox();

      for (let i = 0; i < enemies.length; i++) {
        if (hitEnemiesThisSwing.has(i)) continue;
        if (!enemies[i].alive) continue;
        if (enemies[i].inactive) continue;   // 檻内のビースト等は探索フェーズの当たり判定から除外

        const enemyHitbox = getEnemyHitbox(enemies[i]);
        if (isOverlapping(attackHitbox, enemyHitbox)) {
          damageEnemy(i, currentAttackStage, currentAttackAngle);
          hitEnemiesThisSwing.add(i);
        }
      }
    }

    function runSwing(angle, options) {
      return new Promise((resolve) => {
        attackActive = true;
        currentAttackAngle = angle;
        currentSwingProgress = 0;
        currentAttackRadius = options.radius;
        currentAttackHitSize = options.hitSize;
        currentAttackStage = options.stage;
        hitEnemiesThisSwing = new Set();

        const startTime = performance.now();

        function animateSwing(now) {
          const elapsed = now - startTime;
          currentSwingProgress = Math.min(elapsed / options.duration, 1);

          checkAttackHit();

          if (currentSwingProgress < 1) {
            requestAnimationFrame(animateSwing);
          } else {
            attackActive = false;
            heroTurnPause = TURN_PAUSE_TICKS;   // 攻撃後もターン休止
            resolve();
          }
        }

        requestAnimationFrame(animateSwing);
      });
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function dashPlayerBy(dx, dy, duration) {
      const startX = playerX;
      const startY = playerY;
      const startTime = performance.now();

      return new Promise((resolve) => {
        function step(now) {
          const t = Math.min((now - startTime) / duration, 1);
          // 目標位置との差分を tryMove で進める(壁衝突時はそこで止まる)
          const targetX = startX + dx * t;
          const targetY = startY + dy * t;
          tryMoveX(targetX - playerX);
          tryMoveY(targetY - playerY);
          clampPlayerToMap();
          updatePositions();

          if (t < 1) {
            requestAnimationFrame(step);
          } else {
            resolve();
          }
        }
        requestAnimationFrame(step);
      });
    }

    async function startCounterCombo(enemyIndex) {
      if (counterActive || gameOver) return;

      cancelTimedInvincibility();

      counterActive = true;
      counterInvincible = true;
      counterVisualActive = true;
      invincible = true;
      isGuarding = false;
      targetX = null;
      targetY = null;

      playerKnockbackVX = 0;
      playerKnockbackVY = 0;
      playerHitStun = 0;

      applyNormalPlayerVisual();
      updatePositions();

      if (counterResetTimer) {
        clearTimeout(counterResetTimer);
        counterResetTimer = null;
      }

      try {
        let target = enemyIndex;
        if (target < 0 || !enemies[target].alive) {
          target = getNearestAliveEnemy();
        }

        if (target === -1) {
          await wait(120);
          return;
        }

        const angle = getAngleToEnemy(target);
        const backDistance = 44;
        const dashDistance = 56;

        updateInfo("ガード成功！ 体勢を崩して反撃準備！");
        await dashPlayerBy(-Math.cos(angle) * backDistance, -Math.sin(angle) * backDistance, 90);

        updateInfo("青く発光…！");
        await wait(110);

        updateInfo("ダッシュ斬り！");
        await dashPlayerBy(Math.cos(angle) * dashDistance, Math.sin(angle) * dashDistance, 95);

        await runSwing(angle, {
          stage: 1,
          duration: 230,
          radius: 72,
          hitSize: 50
        });
      } finally {
        counterResetTimer = setTimeout(() => {
          clearCounterState();
        }, 80);
      }
    }

    function damagePlayer(enemy, enemyIndex) {
      if (gameOver) return;
      if (encounterActive) return;  // 観戦フェーズ中はダイス側に任せる
      if (counterActive || counterInvincible) return;
      if (invincible || guardInvincible) return;

      if (isGuarding && isGuardFacingEnemy(enemy)) {
        showGuardEffect();
        updateInfo("正面ガード成功！ カキン！");
        startCounterCombo(enemyIndex);
        return;
      }

      const armor = getCurrentArmor();

      if (Math.random() < armor.blockChance) {
        applyPlayerKnockbackFromEnemy(enemy, true, 1, 1);
        updateInfo(armor.name + " がダメージを防いだ！ カキン！");
        showGuardEffect();
        startTimedInvincibility(guardInvincibleDuration, true);
        return;
      }

      hp -= 1;
      applyPlayerKnockbackFromEnemy(enemy, false, 2, 2);
      updateInfo("ダメージを受けた！");

      if (hp <= 0) {
        if (onHeadDowned("explore")) return;   // 頭=NPC → 委譲して継続
        gameOver = true;
        invincible = false;
        guardInvincible = false;
        counterInvincible = false;
        counterVisualActive = false;
        stopDamageBlink();
        player.style.opacity = "1";
        player.style.filter = "none";
        updateInfo(isPartyWiped() ? "パーティは全滅した… ゲームオーバー(更新でやり直し)" : "あなたは倒れた… ゲームオーバー(更新でやり直し)");
        return;
      }

      // ノックバック廃止に伴い、密着継続でも連続被弾しないよう i-frame を固定化
      startDamageBlinkInvincibility(600);
    }

    function checkPlayerCollision() {
      if (gameOver || counterActive) return;
      if (encounterActive) return;  // 観戦フェーズ中はダイス側に任せる

      const playerHitbox = getPlayerHitbox();

      for (let i = 0; i < enemies.length; i++) {
        if (!enemies[i].alive) continue;
        // 攻撃モーション持ちタイプは接触ダメージなし(モーション中のヒットフレームでのみ判定)
        // 攻撃モーション持ちタイプは接触ダメージなし
        if (enemies[i].def && enemies[i].def.hasAttackAnim) continue;

        const enemyHitbox = getEnemyHitbox(enemies[i]);
        if (isOverlapping(playerHitbox, enemyHitbox)) {
          damagePlayer(enemies[i], i);
          break;
        }
      }
    }

    // (廃止) checkCoinPickup — コインドロップ自体を撤去したので不要 (no-op で残置)
    function checkCoinPickup() {}

    // ── Phase 2-H: ドロップ装備のディスパッチ ──
    // PT 内に装備可能職業がいれば該当キャラに装備変更、いなければ道具袋へ (ダブったら換金)。
    // 現状の敵ドロップは戦士用ロングソード (weapons[1]) と 鋲打ち革鎧 (armors[1]) のみ。
    function partyHasClass(classKey) {
      if (leaderClassKey === classKey) return true;
      if (typeof allies !== "undefined") {
        for (const a of allies) {
          if (a && a.classKey === classKey && a.alive) return true;
        }
      }
      return false;
    }

    function handleDroppedEquipment(targetClassKey, kind, idx, displayName) {
      if (partyHasClass(targetClassKey)) {
        if (targetClassKey === leaderClassKey) {
          tryEquipOnLeader(kind, idx, displayName);
        } else {
          tryEquipOnAlly(targetClassKey, kind, idx, displayName);
        }
        return;
      }
      // PT に該当職業なし → 道具袋へ
      const slot = inventoryBag[targetClassKey] && inventoryBag[targetClassKey][kind];
      if (!slot) return;
      if (slot.includes(idx)) {
        // ダブり → 換金
        const bonus = (kind === "weapons") ? 25 : 20;
        coins += bonus;
        updateInfo(`『${displayName}』を見つけた (道具袋に既に保管) → 金貨 +${bonus}`);
      } else {
        slot.push(idx);
        saveInventoryBag();
        updateInfo(`『${displayName}』を道具袋に保管 (装備可能な仲間が PT にいない)`);
      }
      updatePositions();
    }

    // リーダーが targetClass の場合の装備変更 (戦士のみ現状)
    function tryEquipOnLeader(kind, idx, displayName) {
      if (kind === "weapons") {
        const cur = weapons[currentWeaponIndex];
        const newW = weapons[idx];
        if (cur && (cur.power || 0) >= (newW.power || 0)) {
          updateInfo(`『${newW.name}』を見つけたが、装備中の『${cur.name}』の方が強い。`);
        } else {
          currentWeaponIndex = idx;
          updateInfo(`宝箱を開けた！\n『${newW.name}』を手に入れた！\n${newW.flavor || ""}`);
        }
      } else if (kind === "armors") {
        const curA = armors[currentArmorIndex];
        const newA = armors[idx];
        if (curA && (curA.enhancement || 0) >= (newA.enhancement || 0)) {
          updateInfo(`『${newA.name}』を見つけたが、装備中の『${curA.name}』の方が頼もしい。`);
        } else {
          currentArmorIndex = idx;
          updateInfo(`宝箱を開けた！\n『${newA.name}』を手に入れた！\n${newA.flavor || ""}`);
        }
      }
      updatePositions();
    }

    // 仲間 (該当 classKey) が PT にいる場合: 走行中の即時付け替えは副作用が大きいため道具袋へ保管し、
    // 出発前の酒場で職業別プリセットとして装備する (renderCharTabs で全6職タブ対応済み)。
    function tryEquipOnAlly(classKey, kind, idx, displayName) {
      const slot = inventoryBag[classKey] && inventoryBag[classKey][kind];
      if (!slot) return;
      if (slot.includes(idx)) {
        const bonus = (kind === "weapons") ? 25 : 20;
        coins += bonus;
        updateInfo(`『${displayName}』を見つけた (${classKey} の道具袋に既に保管) → 金貨 +${bonus}`);
      } else {
        slot.push(idx);
        saveInventoryBag();
        updateInfo(`『${displayName}』を道具袋に保管 (酒場で${classKey}に装備可能)`);
      }
    }

    function openChestAt(worldX, worldY) {
      for (let i = 0; i < enemies.length; i++) {
        const enemy = enemies[i];
        if (enemy.weaponVisible &&
            worldX >= enemy.weaponX && worldX <= enemy.weaponX + 36 &&
            worldY >= enemy.weaponY && worldY <= enemy.weaponY + 30) {
          enemy.weaponVisible = false;
          // 敵ドロップ武器は戦士用ロングソード (weapons[1])
          handleDroppedEquipment("warrior", "weapons", 1, "ロングソード");
          return true;
        }
        if (enemy.armorVisible &&
            worldX >= enemy.armorX && worldX <= enemy.armorX + 36 &&
            worldY >= enemy.armorY && worldY <= enemy.armorY + 30) {
          enemy.armorVisible = false;
          // 敵ドロップ防具は戦士用鋲打ち革鎧 (armors[1])
          handleDroppedEquipment("warrior", "armors", 1, "鋲打ち革鎧");
          return true;
        }
      }
      return false;
    }

    async function showAttack() {
      if (!gameStarted || gameOver || attackActive || isGuarding || counterActive) return;

      targetX = null;
      targetY = null;
      updateFacingFromMouse();

      const center = getPlayerCenter();
      const angle = Math.atan2(mouseY - center.y, mouseX - center.x);

      await runSwing(angle, {
        stage: 0,
        duration: 512,
        radius: 54,
        hitSize: 34
      });
    }

    function moveTowardTarget() {
      if (targetX === null || targetY === null) return;
      if (playerHitStun > 0 || gameOver || counterActive) return;

      const playerCenterX = playerX + playerWidth / 2;
      // ヒットボックス中心Y (34-82 → 58)。スプライト中心(+48)だと1幅廊下で10px壁にめり込み停止する
      const playerCenterY = playerY + 58;
      const dx = targetX - playerCenterX;
      const dy = targetY - playerCenterY;
      const distance = Math.hypot(dx, dy);
      const speed = isGuarding ? guardMoveSpeed : mouseMoveSpeed;

      if (distance < speed + 2) {
        targetX = null;
        targetY = null;
        return;
      }

      // 4方向のみ: 差が大きい軸を優先。ブロックされたらもう一方の軸を試す
      const preX = playerX, preY = playerY;
      if (Math.abs(dx) >= Math.abs(dy)) {
        tryMoveX(Math.sign(dx) * speed);
        if (playerX === preX && dy !== 0) tryMoveY(Math.sign(dy) * speed);
      } else {
        tryMoveY(Math.sign(dy) * speed);
        if (playerY === preY && dx !== 0) tryMoveX(Math.sign(dx) * speed);
      }

      // 右向きのみ運用: 水平移動した時だけ facing を更新、上下のみは維持
      if (!isGuarding) {
        const movedDx = playerX - preX;
        if (movedDx > 0.01) facing = "right";
        else if (movedDx < -0.01) facing = "left";
      }

      clampPlayerToMap();
    }

    // ── AUTO PILOT モード: マウス/キーボード入力はゲーム開始にのみ使用 ──
    document.addEventListener("mousemove", (e) => {
      // 観戦用: カーソル追従は無効(AIが向きを制御する)
    });

    document.addEventListener("click", (e) => {
      if (window.GameAudio) GameAudio.unlock();
      if (!gameStarted) {
        if (narrationPlaying) { narrationSkipRequested = true; return; }
        startGame();
        return;
      }
      // 宝箱クリックはプレイヤーが触れる唯一の要素として残す(観戦でも拾える)
      if (gameOver) return;
      if (e.button !== 0) return;
      const clickWX = e.clientX + camX;
      const clickWY = e.clientY + camY;
      openChestAt(clickWX, clickWY);
    });

    document.addEventListener("contextmenu", (e) => {
      e.preventDefault();
    });

    document.addEventListener("mousedown", (e) => {
      if (window.GameAudio) GameAudio.unlock();
      if (!gameStarted) {
        if (narrationPlaying) { narrationSkipRequested = true; return; }
        startGame();
        return;
      }
      // ガードはAI制御に移行(手動入力は受け付けない)
    });

    document.addEventListener("mouseup", (e) => {
      // noop (auto-pilot)
    });

    // ── インベントリ UI ────────────────────────────────────────
    const inventoryEl = document.getElementById("inventory");
    const invWeaponEl = document.getElementById("invWeapon");
    const invArmorEl  = document.getElementById("invArmor");
    const invCoinsEl  = document.getElementById("invCoins");
    function renderInventory() {
      const w = getCurrentWeapon();
      const a = getCurrentArmor();
      invWeaponEl.className = "invValue rarity-" + (w.rarity || "common");
      invWeaponEl.innerHTML = `${w.name} <span style="font-size:13px;opacity:0.75;">攻${w.power}</span>`;
      invWeaponEl.title = w.flavor || "";
      invArmorEl.className = "invValue rarity-" + (a.rarity || "common");
      invArmorEl.innerHTML = (a.blockChance > 0)
        ? `${a.name} <span style="font-size:13px;opacity:0.75;">受${Math.round(a.blockChance * 100)}%</span>`
        : a.name;
      invArmorEl.title = a.flavor || "";
      invCoinsEl.textContent = coins;
    }
    function toggleInventory() {
      const open = inventoryEl.style.display !== "block";
      if (open) renderInventory();
      inventoryEl.style.display = open ? "block" : "none";
    }

    document.addEventListener("keydown", async (e) => {
      if (window.GameAudio) GameAudio.unlock();
      if (!gameStarted) {
        if (narrationPlaying) { narrationSkipRequested = true; return; }
        startGame();
        return;
      }
      // AUTO: インベントリ確認のみ手動許可
      if (e.key === "i" || e.key === "I") {
        toggleInventory();
        return;
      }
    });

    function updatePlayerKnockback() {
      if (playerHitStun > 0) {
        const newX = playerX + playerKnockbackVX;
        const newY = playerY + playerKnockbackVY;
        if (!wouldOverlapWall(newX+28, playerY+34, newX+68, playerY+82)) playerX = newX;
        else playerKnockbackVX = 0;
        if (!wouldOverlapWall(playerX+28, newY+34, playerX+68, newY+82)) playerY = newY;
        else playerKnockbackVY = 0;

        playerKnockbackVX *= 0.55;
        playerKnockbackVY *= 0.55;
        playerHitStun -= 1;

        clampPlayerToMap();
      }
    }

    // ── 視線チェック（Bresenham） ────────────────────────────────
    const DETECTION_RANGE = 1200; // 視野距離 (world px)

    function hasLineOfSight(fromX, fromY, toX, toY) {
      let tx = Math.floor(fromX / TILE_SIZE);
      let ty = Math.floor(fromY / TILE_SIZE);
      const etx = Math.floor(toX / TILE_SIZE);
      const ety = Math.floor(toY / TILE_SIZE);
      const dx = Math.abs(etx - tx), dy = Math.abs(ety - ty);
      const sx = tx < etx ? 1 : -1, sy = ty < ety ? 1 : -1;
      let err = dx - dy;
      for (let step = 0; step < MAP_W + MAP_H; step++) {
        if (isTileWall(tx, ty)) return false;
        if (tx === etx && ty === ety) return true;
        const e2 = 2 * err;
        if (e2 > -dy) { err -= dy; tx += sx; }
        if (e2 <  dx) { err += dx; ty += sy; }
      }
      return false;
    }
    // ─────────────────────────────────────────────────────────────

    // ── フォグオブウォー: 視界タイル計算 + 敵可視判定 ──────────────
    // パーティ(主人公+生存仲間)の視界から visibleTiles/exploredTiles を更新。
    // タイル座標シグネチャが前回と同じ(誰も別タイルへ移動していない)ならスキップ。
    function computeVisibleTiles() {
      const members = [];
      members.push({ cx: playerX + 48, cy: playerY + 58, s: getSight(leaderClassKey) });
      if (typeof allies !== "undefined") {
        for (const a of allies) {
          if (!a.alive) continue;
          members.push({ cx: a.x + a.def.displaySize / 2, cy: a.y + a.def.displaySize / 2, s: getSight(a.classKey) });
        }
      }
      let sig = "";
      for (const m of members) sig += Math.floor(m.cx / TILE_SIZE) + "," + Math.floor(m.cy / TILE_SIZE) + "|";
      if (sig === lastVisSignature) return;   // 移動なし → 再計算不要
      lastVisSignature = sig;

      for (let r = 0; r < MAP_H; r++) visibleTiles[r].fill(0);
      for (const m of members) {
        const cTX = Math.floor(m.cx / TILE_SIZE), cTY = Math.floor(m.cy / TILE_SIZE);
        const R = m.s.tiles;
        for (let dr = -R; dr <= R; dr++) {
          const ty = cTY + dr; if (ty < 0 || ty >= MAP_H) continue;
          for (let dc = -R; dc <= R; dc++) {
            const tx = cTX + dc; if (tx < 0 || tx >= MAP_W) continue;
            if (dr * dr + dc * dc > R * R) continue;     // 円形視界
            if (visibleTiles[ty][tx]) continue;          // 既可視なら LOS 省略
            const tcx = tx * TILE_SIZE + TILE_SIZE / 2, tcy = ty * TILE_SIZE + TILE_SIZE / 2;
            if (hasLineOfSight(m.cx, m.cy, tcx, tcy)) {
              visibleTiles[ty][tx] = 1;
              exploredTiles[ty][tx] = 1;
            }
          }
        }
      }
    }
    // 敵中心タイルが現在パーティ視界内か(伏兵/エンカウント判定用)
    function isEnemyVisibleToParty(enemy) {
      const ds = (enemy.def && enemy.def.displaySize) || TILE_SIZE;
      const tx = Math.floor((enemy.x + ds / 2) / TILE_SIZE);
      const ty = Math.floor((enemy.y + ds / 2) / TILE_SIZE);
      if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
      return visibleTiles[ty][tx] === 1;
    }

    // ── A* パスファインディング ──────────────────────────────────
    // aStar: avoidTiles (Set<string> "tx,ty") に含まれるタイルは壁扱い
    //        ただしゴールタイルは常に通過可能 (接敵 / 対象隣接タイルを許可)
    // recentPenaltyMap: 任意の Map<tileKey, additionalGCost>。
    //   タイルへ「進入する」コストに加算 (heroAI のオシレーション抑制用)。
    //   key 形式は本関数内の key() = y * MAP_W + x と一致させる必要がある。
    function aStar(startTX, startTY, goalTX, goalTY, avoidTiles, recentPenaltyMap) {
      if (isTileWall(startTX, startTY) || isTileWall(goalTX, goalTY)) return null;
      if (startTX === goalTX && startTY === goalTY) return [];

      const isBlocked = (tx, ty) => {
        if (isTileWall(tx, ty)) return true;
        if (!avoidTiles) return false;
        if (tx === goalTX && ty === goalTY) return false;   // ゴールは例外
        return avoidTiles.has(tx + "," + ty);
      };

      const key = (x, y) => y * MAP_W + x;
      const startK = key(startTX, startTY);
      const goalK  = key(goalTX,  goalTY);

      const gScore   = new Map([[startK, 0]]);
      const fScore   = new Map([[startK, Math.abs(startTX - goalTX) + Math.abs(startTY - goalTY)]]);
      const cameFrom = new Map();
      const tilePos  = new Map([[startK, {tx: startTX, ty: startTY}]]);
      const openArr  = [startK];
      const inOpen   = new Set([startK]);

      while (openArr.length > 0) {
        let minIdx = 0;
        let minF   = fScore.get(openArr[0]) ?? Infinity;
        for (let i = 1; i < openArr.length; i++) {
          const f = fScore.get(openArr[i]) ?? Infinity;
          if (f < minF) { minF = f; minIdx = i; }
        }
        const curK = openArr[minIdx];
        openArr.splice(minIdx, 1);
        inOpen.delete(curK);

        if (curK === goalK) {
          const path = [];
          let k = curK;
          while (cameFrom.has(k)) { path.unshift(tilePos.get(k)); k = cameFrom.get(k); }
          return path;
        }

        const {tx: cx, ty: cy} = tilePos.get(curK);
        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = cx + dx, ny = cy + dy;
          if (isBlocked(nx, ny)) continue;
          const nk       = key(nx, ny);
          // 訪問履歴ペナルティ: 直近通ったタイルに戻る経路は重く扱う
          const movePenalty = recentPenaltyMap ? (recentPenaltyMap.get(nk) || 0) : 0;
          const tentG    = (gScore.get(curK) ?? Infinity) + 1 + movePenalty;
          if (tentG < (gScore.get(nk) ?? Infinity)) {
            cameFrom.set(nk, curK);
            gScore.set(nk, tentG);
            fScore.set(nk, tentG + Math.abs(nx - goalTX) + Math.abs(ny - goalTY));
            tilePos.set(nk, {tx: nx, ty: ny});
            if (!inOpen.has(nk)) { openArr.push(nk); inOpen.add(nk); }
          }
        }
      }
      return null;
    }

    // 現在他ユニット (プレイヤー・仲間・敵) が占有しているタイルキーの集合
    // excludeRef に渡した単位は除外 (自分は動くので避ける必要なし)
    function getUnitOccupiedTiles(excludeRef) {
      const set = new Set();
      const tileKey = (tx, ty) => tx + "," + ty;
      if (hp > 0 && !gameOver && excludeRef !== "player") {
        const tx = Math.floor((playerX + 48) / TILE_SIZE);
        const ty = Math.floor((playerY + 58) / TILE_SIZE);
        set.add(tileKey(tx, ty));
        // プレイヤーが次に向かうタイル (heroPath[0]) も予約
        if (typeof heroPath !== "undefined" && heroPath && heroPath.length > 0) {
          set.add(tileKey(heroPath[0].tx, heroPath[0].ty));
        }
      }
      if (typeof allies !== "undefined") {
        for (const a of allies) {
          if (!a.alive || a === excludeRef) continue;
          const tx = Math.floor((a.x + a.def.displaySize / 2) / TILE_SIZE);
          const ty = Math.floor((a.y + a.def.displaySize / 2) / TILE_SIZE);
          set.add(tileKey(tx, ty));
          // slide 中の移動先タイルも予約 (他ユニットの侵入を防ぐ)
          if (a.slideTargetTile) {
            set.add(tileKey(a.slideTargetTile.tx, a.slideTargetTile.ty));
          }
        }
      }
      for (const e of enemies) {
        if (!e.alive || e === excludeRef) continue;
        const tx = Math.floor((e.x + e.def.displaySize / 2) / TILE_SIZE);
        const ty = Math.floor((e.y + e.def.displaySize / 2) / TILE_SIZE);
        set.add(tileKey(tx, ty));
        // 敵の次 wp (探索追跡中) と slide target (戦闘中前進) も予約
        if (e.path && e.path.length > 0) {
          set.add(tileKey(e.path[0].tx, e.path[0].ty));
        }
        if (e.slideTargetTile) {
          set.add(tileKey(e.slideTargetTile.tx, e.slideTargetTile.ty));
        }
      }
      // 発見済み & 未発動の罠タイルも回避 (発動済みは安全、未発見は意図的に避けない)
      if (typeof traps !== "undefined") {
        for (const trap of traps) {
          if (trap.found && !trap.triggered) {
            set.add(tileKey(trap.tx, trap.ty));
          }
        }
      }
      return set;
    }
    // ────────────────────────────────────────────────────────────

    function moveEnemies() {
      if (window.__diag) window.__diag.beat("tick");   // 自動デバッグ: フレーム落ち計測
      if (!gameStarted || gameOver) return;
      if (dialogPaused) return;   // showChoice 表示中はゲーム時間停止

      // エンカウンター発動検出(ターン制戦闘へ移行)
      tryStartEncounter();

      enemies.forEach((enemy, index) => {
        if (!enemy.alive) return;
        // 檻内のビースト (inactive=true) は完全停止 (位置固定、AI 無し)
        if (enemy.inactive) return;

        if (enemy.damageFlashTimer > 0) {
          enemy.damageFlashTimer -= 1;
        }

        // 観戦フェーズ中: 交戦対象は state=attack のときだけアニメを進め、
        // 他の敵は完全凍結(意思決定・移動・攻撃判定はスキップ)
        if (encounterActive) {
          if (encounterEnemyIndices.includes(index) &&
              enemy.state === "attack" && enemy.def.hasAttackAnim) {
            enemy.attackTimer += 1;
            if (enemy.attackTimer >= enemy.def.attackDuration) {
              enemy.state = "idle";
              enemy.attackTimer = 0;
              enemy.attackHitDealt = false;
            }
          }
          clampEnemyToMap(enemy);
          return;
        }

        if (enemy.hitStun > 0) {
          const newEX = enemy.x + enemy.knockbackVX;
          const newEY = enemy.y + enemy.knockbackVY;
          if (!wouldOverlapWall(newEX+16, enemy.y+18, newEX+56, enemy.y+58)) enemy.x = newEX;
          else enemy.knockbackVX = 0;
          if (!wouldOverlapWall(enemy.x+16, newEY+18, enemy.x+56, newEY+58)) enemy.y = newEY;
          else enemy.knockbackVY = 0;
          enemy.knockbackVX *= 0.55;
          enemy.knockbackVY *= 0.55;
          enemy.hitStun -= 1;
          clampEnemyToMap(enemy);
          return;
        }

        // ── ステートマシン ────────────────────────────────────────
        const eCX = (enemy.x + enemy.def.displaySize / 2);
        const eCY = (enemy.y + enemy.def.displaySize / 2);
        const pCX = playerX + 48;
        const pCY = playerY + 48;

        if (enemy.state === "idle") {
          // 視線チェック（毎10tick = 約300ms）
          enemy.losTimer -= 1;
          if (enemy.losTimer <= 0) {
            enemy.losTimer = 10;
            if (Math.hypot(pCX - eCX, pCY - eCY) < DETECTION_RANGE &&
                hasLineOfSight(eCX, eCY, pCX, pCY)) {
              enemy.state = "alert";
              enemy.alertTimer = 16; // 約480ms 待機してから追跡
              enemy.path = [];
              enemy.pathTimer = 0;
            }
          }
          clampEnemyToMap(enemy);
          return;
        }

        if (enemy.state === "alert") {
          // 発見演出：その場で待機
          enemy.alertTimer -= 1;
          if (enemy.alertTimer <= 0) enemy.state = "chase";
          clampEnemyToMap(enemy);
          return;
        }

        const eTX = Math.floor(eCX / TILE_SIZE);
        const eTY = Math.floor(eCY / TILE_SIZE);

        // 経路上を 1 マス進む共通処理 (連続移動は廃止、ターン制 exploreEnemyTurn に委譲)
        // ここでは state 遷移判定のための呼び出しだけ受ける (no-op)
        function stepAlongPathToward(_targetTX, _targetTY) { /* no-op (turn-based) */ }

        const playerVisible =
          Math.hypot(pCX - eCX, pCY - eCY) < DETECTION_RANGE &&
          hasLineOfSight(eCX, eCY, pCX, pCY);

        // ── 攻撃モーション持ちタイプの攻撃ロジック(ENEMY_TYPES から参照) ──
        const def = enemy.def;
        if (enemy.attackCooldown > 0) enemy.attackCooldown -= 1;

        if (enemy.state === "attack" && def.hasAttackAnim) {
          enemy.attackTimer += 1;
          // ヒットフレーム時に距離判定
          if (!enemy.attackHitDealt && enemy.attackTimer >= def.attackHitFrame) {
            enemy.attackHitDealt = true;
            const distNow = Math.hypot(pCX - eCX, pCY - eCY);
            if (distNow < def.hitRange) {
              damagePlayer(enemy, index);
            }
          }
          if (enemy.attackTimer >= def.attackDuration) {
            enemy.state = "chase";
            enemy.attackTimer = 0;
            enemy.attackHitDealt = false;
            enemy.attackCooldown = def.attackCooldown;
          }
          clampEnemyToMap(enemy);
          return;
        }

        // chase中、近接&視線あり&クールダウン明け → 攻撃モーション開始
        if (def.hasAttackAnim && enemy.state === "chase" &&
            playerVisible && enemy.attackCooldown <= 0 &&
            Math.hypot(pCX - eCX, pCY - eCY) < def.meleeRange) {
          enemy.state = "attack";
          enemy.attackTimer = 0;
          enemy.attackHitDealt = false;
          enemy.path = [];
          enemy.pathTimer = 0;
          clampEnemyToMap(enemy);
          return;
        }

        if (enemy.state === "chase") {
          if (playerVisible) {
            enemy.lastSeenX = pCX;
            enemy.lastSeenY = pCY;
            const pTX = Math.floor(pCX / TILE_SIZE);
            const pTY = Math.floor(pCY / TILE_SIZE);
            stepAlongPathToward(pTX, pTY);
          } else {
            // 視線喪失 → 最後に見た地点へ捜索
            enemy.state = "search";
            enemy.searchTimer = 0;
            enemy.path = [];
            enemy.pathTimer = 0;
          }
        } else if (enemy.state === "search") {
          // 移動中も再発見チェック
          if (playerVisible) {
            enemy.state = "chase";
            enemy.path = [];
            enemy.pathTimer = 0;
          } else {
            const distToLastSeen = Math.hypot(enemy.lastSeenX - eCX, enemy.lastSeenY - eCY);
            const tx = Math.floor(enemy.lastSeenX / TILE_SIZE);
            const ty = Math.floor(enemy.lastSeenY / TILE_SIZE);
            stepAlongPathToward(tx, ty);
            // 到達条件: タイル半分以内、または経路が無い(これ以上近づけない)
            if (distToLastSeen < TILE_SIZE * 0.6 || enemy.path.length === 0) {
              enemy.searchTimer += 1;
              if (enemy.searchTimer >= 90) { // 約 2.7 秒その場で待機
                enemy.state = "returning";
                enemy.path = [];
                enemy.pathTimer = 0;
              }
            }
          }
        } else if (enemy.state === "returning") {
          if (playerVisible) {
            enemy.state = "chase";
            enemy.path = [];
            enemy.pathTimer = 0;
          } else {
            const homeCX = enemy.originX + 36;
            const homeCY = enemy.originY + 36;
            const distToHome = Math.hypot(homeCX - eCX, homeCY - eCY);
            if (distToHome < TILE_SIZE * 0.5) {
              enemy.state = "idle";
              enemy.path = [];
              enemy.losTimer = 0;
              enemy.searchTimer = 0;
            } else {
              const tx = Math.floor(homeCX / TILE_SIZE);
              const ty = Math.floor(homeCY / TILE_SIZE);
              stepAlongPathToward(tx, ty);
            }
          }
        }

        clampEnemyToMap(enemy);
      });

      updatePlayerKnockback();
      heroAI();
      moveTowardTarget();
      checkAutoAttack();
      updateAllyFollow();  // 仲間がリーダーに追従 (非戦闘時)
      updatePositions();
      checkPlayerCollision();
      checkCoinPickup();
      checkAutoChestPickup();
      checkDungeonClear();
    }

    // 仲間がリーダー(プレイヤー)に追従するロジック (ターン制グリッド)
    // プレイヤーが 1 タイル到達するたびに exploreAllyTurn() が呼ばれる。
    // 戦闘中は別ルート (allyAttackTurn) で動かす。
    const ALLY_FOLLOW_DIST = 220;   // バックラインの先頭基準
    const ALLY_FOLLOW_STEP = 120;   // バックライン 2人目以降はこの距離だけ後方に
    const FRONTLINE_FORWARD = 180;  // フロントラインはリーダーの前方オフセット
    const FRONTLINE_SIDE    = 76;   // フロントラインの左右オフセット (隣に並ぶ)
    const BACKLINE_SIDE     = 88;   // バックラインの左右オフセット (2列配置)
    const BACKLINE_IN_POSITION_TOLERANCE = 160; // この距離以内なら「配置についた」扱い

    // 探索ターン: プレイヤーが 1 タイル移動するたびに、仲間が「電車方式」で跡を辿る
    //   先頭仲間 → プレイヤーの旧タイル
    //   2人目以降 → 前の仲間の旧タイル
    //   フォーメーション (前衛/後衛の隊列配置) は廃止、ギクシャク軽減
    let exploreAllyTurnRunning = false;
    async function exploreAllyTurn(oldPlayerTile) {
      if (exploreAllyTurnRunning) return;
      if (encounterActive || encounterRunning) return;
      if (!gameStarted || gameOver) return;
      if (!oldPlayerTile) return;
      exploreAllyTurnRunning = true;
      try {
        const aliveAllies = allies.filter(a => a.alive);
        if (aliveAllies.length === 0) return;
        // 各 ally の「動く前の」タイルをスナップショット
        const startTiles = aliveAllies.map(a => {
          const cx = a.x + a.def.displaySize / 2;
          const cy = a.y + a.def.displaySize / 2;
          return { tx: Math.floor(cx / TILE_SIZE), ty: Math.floor(cy / TILE_SIZE) };
        });
        for (let i = 0; i < aliveAllies.length; i++) {
          if (encounterActive || encounterRunning) break;
          const ally = aliveAllies[i];
          const targetTile = (i === 0) ? oldPlayerTile : startTiles[i - 1];
          if (!targetTile) continue;
          const myStart = startTiles[i];
          if (myStart.tx === targetTile.tx && myStart.ty === targetTile.ty) continue;  // 既に到達
          const wx = targetTile.tx * TILE_SIZE + TILE_SIZE / 2;
          const wy = targetTile.ty * TILE_SIZE + TILE_SIZE / 2;
          await allyAdvanceTowardPoint(ally, wx, wy, {
            slideMs: 600, postSleep: 40, silent: true,
          });
        }
      } finally {
        exploreAllyTurnRunning = false;
      }
    }

    // 仲間全員がプレイヤーの近くに居るか (戦闘終了後の前進待機用)
    //   スネーク方式では厳密な隊列位置は無いので、距離ベースで「遅れてる仲間がいないか」判定
    function isBacklineInPosition() {
      if (!gameStarted || gameOver) return true;
      const MAX_LAG = 480;  // この距離を超えて離れている仲間がいれば待機
      for (const ally of allies) {
        if (!ally.alive) continue;
        const d = Math.hypot(ally.x - playerX, ally.y - playerY);
        if (d > MAX_LAG) return false;
      }
      return true;
    }

    // 探索ターン: プレイヤー 1 タイル移動後に、各敵が state に応じて 1 タイル slide
    //   state が chase/search/returning の敵のみ動く (idle/alert/attack は停止)
    //   敵同士は並列 slide (slideTargetTile 予約で重なり防止)
    let exploreEnemyTurnRunning = false;
    async function exploreEnemyTurn() {
      if (exploreEnemyTurnRunning) return;
      if (encounterActive || encounterRunning) return;
      if (!gameStarted || gameOver) return;
      exploreEnemyTurnRunning = true;
      try {
        const moves = [];
        for (let i = 0; i < enemies.length; i++) {
          const enemy = enemies[i];
          if (!enemy.alive) continue;
          if (enemy.state !== "chase" &&
              enemy.state !== "search" &&
              enemy.state !== "returning") continue;
          moves.push(exploreMoveEnemyOneTile(i));
        }
        await Promise.all(moves);
      } finally {
        exploreEnemyTurnRunning = false;
      }
    }

    async function exploreMoveEnemyOneTile(idx) {
      const enemy = enemies[idx];
      if (!enemy.alive) return;
      let targetCX, targetCY;
      if (enemy.state === "chase") {
        targetCX = playerX + 48;
        targetCY = playerY + 58;
      } else if (enemy.state === "search") {
        targetCX = enemy.lastSeenX;
        targetCY = enemy.lastSeenY;
      } else if (enemy.state === "returning") {
        targetCX = enemy.originX + enemy.def.displaySize / 2;
        targetCY = enemy.originY + enemy.def.displaySize / 2;
      } else {
        return;
      }
      await enemyAdvanceOneTile(idx, targetCX, targetCY, {
        slideMs: 500, postSleep: 40, silent: true,
      });
    }

    // プレイヤーから離れすぎた仲間をプレイヤーの位置へ呼び寄せる
    //   heroAI が isBacklineInPosition 待機中に発火、デッドロック防止
    async function exploreRallyToPlayer() {
      if (exploreAllyTurnRunning) return;
      if (encounterActive || encounterRunning) return;
      if (!gameStarted || gameOver) return;
      exploreAllyTurnRunning = true;
      try {
        const pTX = Math.floor((playerX + 48) / TILE_SIZE);
        const pTY = Math.floor((playerY + 58) / TILE_SIZE);
        const wx = pTX * TILE_SIZE + TILE_SIZE / 2;
        const wy = pTY * TILE_SIZE + TILE_SIZE / 2;
        const aliveAllies = allies.filter(a => a.alive);
        for (const ally of aliveAllies) {
          if (encounterActive || encounterRunning) break;
          const d = Math.hypot(ally.x - playerX, ally.y - playerY);
          if (d < 160) continue;  // 既に近い仲間は動かさない
          await allyAdvanceTowardPoint(ally, wx, wy, {
            slideMs: 600, postSleep: 30, silent: true,
          });
        }
      } finally {
        exploreAllyTurnRunning = false;
      }
    }
    // 旧リアルタイム連続追従は廃止。
    // 仲間の追従は exploreAllyTurn() が heroAI の 1 タイル到達時にまとめて実行する。
    function updateAllyFollow() { /* no-op (ターン制へ移行) */ }

    // ─────────────────────────────────────────────────────────
    // ヒーローAI(フルオート探索+戦闘)
    // ─────────────────────────────────────────────────────────
    const visitedRooms = new Set();
    let bossRoomNarrationShown = false;  // ボス部屋到達ナレーションを1ランで1回だけ出すためのフラグ
    const visitedTiles = new Set();  // フォグオブウォー用 (key = ty * 100 + tx)
    let heroPath = [];           // A*経路(ワールドタイル)
    let heroPathGoal = null;     // {tx, ty} 現在向かっている場所
    let heroPathTTL = 0;         // 経路の再計算タイマー
    let heroCurrentRoomGoal = -1;
    // スタック検知(壁に引っかかった場合の救済)
    let heroLastX = -1, heroLastY = -1, heroStuckTicks = 0;
    let heroWiggleUntil = 0;
    let heroWiggleDir = null;           // 選ばれた持続方向 [dx, dy]
    let heroWiggleDirStuckTicks = 0;    // 選んだ方向で動けない tick 数
    // ターン間休止(1タイル到着するごとに小休止)
    let heroTurnPause = 0;
    const TURN_PAUSE_TICKS = 12;         // 約360ms(1ターン間隔)
    // 訪問履歴 (探索フェーズのオシレーション抑制): 直近通ったタイルへ戻る経路に追加 g-cost
    //   履歴は古い順 → 直近末尾の配列。aStar 第6引数の Map<tileKey, penalty> を生成する。
    //   最直近タイル = 最大ペナルティ、古いほど軽くなる (年齢に応じてフェード)。
    const HERO_RECENT_HISTORY = 8;       // 履歴保持タイル数
    const HERO_RECENT_PENALTY_MAX = 6;   // 最直近タイル経由の追加 g-cost (1 タイル分のコスト = 1+penalty)
    let heroRecentTiles = [];            // [{tx, ty}, ...]
    function pushHeroRecentTile(tx, ty) {
      heroRecentTiles.push({ tx, ty });
      while (heroRecentTiles.length > HERO_RECENT_HISTORY) heroRecentTiles.shift();
    }
    function clearHeroRecentTiles() {
      heroRecentTiles.length = 0;
    }
    function heroRecentPenaltyMap() {
      const m = new Map();
      const len = heroRecentTiles.length;
      for (let i = 0; i < len; i++) {
        const t = heroRecentTiles[i];
        const k = t.ty * MAP_W + t.tx;  // aStar の key() と同一形式
        // 末尾(i = len-1)が最直近 → MAX、先頭が最古 → 1 にフェード
        const recencyAge = (len - 1) - i;  // 0 = most recent
        const penalty = Math.max(1, HERO_RECENT_PENALTY_MAX - recencyAge);
        m.set(k, penalty);
      }
      return m;
    }
    // 探索フェーズの戦士スライド進行フラグ (仲間と同じ 1タイル離散ステップ方式)
    let heroSliding = false;
    const HERO_SLIDE_MS = 380;
    const HERO_POST_SLIDE_MS = 120;

    // 壁衝突判定(プレイヤー全体ヒットボックス)
    function canMovePlayerTo(newX, newY) {
      return !wouldOverlapWall(newX + 28, newY + 34, newX + 68, newY + 82);
    }

    // 目標方向を優先しつつ、移動可能な方向を選ぶ
    function pickFreeDir(preferTowardX, preferTowardY) {
      // 4方向のみ: 目標側の優先軸(差が大きい方)から順に試す
      const dirs = [];
      if (preferTowardX != null && preferTowardY != null) {
        const ddx = preferTowardX - playerX;
        const ddy = preferTowardY - playerY;
        const dx0 = Math.sign(ddx);
        const dy0 = Math.sign(ddy);
        if (Math.abs(ddx) >= Math.abs(ddy)) {
          if (dx0) dirs.push([dx0, 0]);
          if (dy0) dirs.push([0, dy0]);
        } else {
          if (dy0) dirs.push([0, dy0]);
          if (dx0) dirs.push([dx0, 0]);
        }
      }
      const allDirs = [
        [ 1, 0],[-1, 0],[0, 1],[0,-1]
      ];
      for (let i = allDirs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allDirs[i], allDirs[j]] = [allDirs[j], allDirs[i]];
      }
      for (const d of allDirs) dirs.push(d);

      for (const d of dirs) {
        if (d[0] === 0 && d[1] === 0) continue;
        if (canMovePlayerTo(playerX + d[0] * 24, playerY + d[1] * 24)) return d;
      }
      for (const d of dirs) {
        if (d[0] === 0 && d[1] === 0) continue;
        if (canMovePlayerTo(playerX + d[0] * 4, playerY + d[1] * 4)) return d;
      }
      return null;
    }

    // 壁に引っかかったときに脱出する(通常速度でゆっくり抜ける)
    function heroWiggle() {
      const preX = playerX, preY = playerY;
      if (!heroWiggleDir || heroWiggleDirStuckTicks > 3) {
        // 元の目標があればその方向を優先
        heroWiggleDir = pickFreeDir(heroPathGoal ? heroPathGoal.tx * TILE_SIZE : null,
                                    heroPathGoal ? heroPathGoal.ty * TILE_SIZE : null);
        heroWiggleDirStuckTicks = 0;
      }
      if (heroWiggleDir) {
        // 通常の歩行速度で移動(急加速感をなくす)
        const step = mouseMoveSpeed;
        tryMoveX(heroWiggleDir[0] * step);
        tryMoveY(heroWiggleDir[1] * step);
        mouseX = playerX + 48 + heroWiggleDir[0] * 100;
        mouseY = playerY + 48 + heroWiggleDir[1] * 100;
        updateFacingFromMouse();
      }
      if (Math.hypot(playerX - preX, playerY - preY) < 0.5) {
        heroWiggleDirStuckTicks++;
      } else {
        heroWiggleDirStuckTicks = 0;
      }
    }

    function markVisitedAround(ptx, pty, radius) {
      const r2 = radius * radius + 1;
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          if (dx * dx + dy * dy > r2) continue;
          const tx = ptx + dx, ty = pty + dy;
          if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) continue;
          visitedTiles.add(ty * 100 + tx);
        }
      }
    }

    function roomContainsTile(room, tx, ty) {
      const [r1, c1, r2, c2] = room;
      return ty >= r1 && ty <= r2 && tx >= c1 && tx <= c2;
    }

    function nearestFloorTileIn(room) {
      // 部屋中央、壁/障害物 (倒木・大型葦) なら近傍を走査
      const [r1, c1, r2, c2] = room;
      const cTX = Math.floor((c1 + c2) / 2);
      const cTY = Math.floor((r1 + r2) / 2);
      if (!isTileWall(cTX, cTY)) return { tx: cTX, ty: cTY };
      // 半径を最大 8 まで広げる (情景障害物が中央に密集しても抜ける)
      for (let r = 1; r <= 8; r++) {
        for (let dx = -r; dx <= r; dx++) for (let dy = -r; dy <= r; dy++) {
          const tx = cTX + dx, ty = cTY + dy;
          if (tx >= c1 && tx <= c2 && ty >= r1 && ty <= r2 && !isTileWall(tx, ty)) {
            return { tx, ty };
          }
        }
      }
      return { tx: cTX, ty: cTY };
    }

    function findNearestAliveEnemy() {
      // 視界(探索済みタイル)内の敵のみを標的にする
      const pCX = playerX + 48, pCY = playerY + 48;
      let best = null, bestDist = Infinity;
      for (const e of enemies) {
        if (!e.alive) continue;
        if (e.inactive) continue;   // 檻内のビースト等は感知対象外 (檻を開けるまで非敵扱い)
        const size = e.def.displaySize;
        const eCX = e.x + size / 2;
        const eCY = e.y + size / 2;
        const eTX = Math.floor(eCX / TILE_SIZE);
        const eTY = Math.floor(eCY / TILE_SIZE);
        if (!visitedTiles.has(eTY * 100 + eTX)) continue;  // 未発見の敵は無視
        const d = Math.hypot(pCX - eCX, pCY - eCY);
        if (d < bestDist) { best = e; bestDist = d; }
      }
      return best;
    }

    // 回収可能なドロップ(コイン/武器/防具)のうち最も近いもの
    // 到達不可と判明したドロップタイルを記憶(findNearestDrop で除外)
    const unreachableDropTiles = new Set();
    function dropTileKey(tx, ty) { return ty * 1000 + tx; }

    function findNearestDrop() {
      const pCX = playerX + 48, pCY = playerY + 48;
      let best = null, bestDist = Infinity;
      // 敵ドロップ (コイン/武器/防具)
      for (const e of enemies) {
        const candidates = [];
        if (e.coinVisible)   candidates.push({ x: e.coinX + 11,  y: e.coinY + 11 });
        if (e.weaponVisible) candidates.push({ x: e.weaponX + 13, y: e.weaponY + 13 });
        if (e.armorVisible)  candidates.push({ x: e.armorX + 14,  y: e.armorY + 14 });
        for (const c of candidates) {
          const tx = Math.floor(c.x / TILE_SIZE);
          const ty = Math.floor(c.y / TILE_SIZE);
          // 壁タイル/到達不可タイルのドロップはスキップ
          if (isTileWall(tx, ty)) continue;
          if (unreachableDropTiles.has(dropTileKey(tx, ty))) continue;
          const d = Math.hypot(pCX - c.x, pCY - c.y);
          if (d < bestDist) { best = { x: c.x, y: c.y, tx, ty }; bestDist = d; }
        }
      }
      // 部屋配置の宝箱 (未開封のみ) — heroAI が自発的に近寄るよう目的地候補に加える
      //   隠された宝箱は「発見済み (found=true)」のみ対象 (未発見は見えてないので寄らない)
      if (typeof roomChests !== "undefined") {
        for (const chest of roomChests) {
          if (chest.opened) continue;
          if (chest.hidden && !chest.found) continue;
          const tx = chest.tx, ty = chest.ty;
          if (isTileWall(tx, ty)) continue;
          if (unreachableDropTiles.has(dropTileKey(tx, ty))) continue;
          const cx = tx * TILE_SIZE + TILE_SIZE / 2;
          const cy = ty * TILE_SIZE + TILE_SIZE / 2;
          const d = Math.hypot(pCX - cx, pCY - cy);
          if (d < bestDist) { best = { x: cx, y: cy, tx, ty }; bestDist = d; }
        }
      }
      return best;
    }

    // 接触した宝箱を自動で開く(タイル一致 or 近接で回収)
    function checkAutoChestPickup() {
      if (!gameStarted || gameOver) return;
      const pHB = getPlayerHitbox();
      const pCX = playerX + 48, pCY = playerY + 58;
      const pTX = Math.floor(pCX / TILE_SIZE);
      const pTY = Math.floor(pCY / TILE_SIZE);
      for (const enemy of enemies) {
        if (enemy.weaponVisible) {
          const cx = enemy.weaponX + 13, cy = enemy.weaponY + 13;
          const sameTile = Math.floor(cx / TILE_SIZE) === pTX && Math.floor(cy / TILE_SIZE) === pTY;
          const nearEnough = Math.hypot(cx - pCX, cy - pCY) < 128;
          if (sameTile || nearEnough || isOverlapping(pHB, getWeaponDropHitbox(enemy))) {
            openChestAt(enemy.weaponX + 13, enemy.weaponY + 13);
            return;
          }
        }
        if (enemy.armorVisible) {
          const cx = enemy.armorX + 14, cy = enemy.armorY + 14;
          const sameTile = Math.floor(cx / TILE_SIZE) === pTX && Math.floor(cy / TILE_SIZE) === pTY;
          const nearEnough = Math.hypot(cx - pCX, cy - pCY) < 128;
          if (sameTile || nearEnough || isOverlapping(pHB, getArmorDropHitbox(enemy))) {
            openChestAt(enemy.armorX + 14, enemy.armorY + 14);
            return;
          }
        }
      }
    }

    function findNextRoomGoal() {
      // まだ訪れていない部屋を距離順に選ぶ
      const pCX = playerX + 48, pCY = playerY + 48;
      let best = -1, bestDist = Infinity;
      for (let i = 0; i < ROOMS.length; i++) {
        if (visitedRooms.has(i)) continue;
        const [r1, c1, r2, c2] = ROOMS[i];
        const cx = ((c1 + c2) / 2) * TILE_SIZE + TILE_SIZE / 2;
        const cy = ((r1 + r2) / 2) * TILE_SIZE + TILE_SIZE / 2;
        const d = Math.hypot(pCX - cx, pCY - cy);
        if (d < bestDist) { best = i; bestDist = d; }
      }
      return best;
    }

    // 探索フェーズの戦士「1タイル離散スライド」 (仲間の allyAdvanceTowardPoint と同方式)
    async function heroSlideOneTileExplore(wp, oldPlayerTile) {
      if (heroSliding) return;
      heroSliding = true;
      try {
        if (wp.tx < oldPlayerTile.tx) facing = "left";
        else if (wp.tx > oldPlayerTile.tx) facing = "right";
        flashAction(player, "move");
        const fromX = playerX, fromY = playerY;
        const toX = wp.tx * TILE_SIZE + SNAP_X_OFFSET;
        const toY = wp.ty * TILE_SIZE + SNAP_Y_OFFSET;
        playerMovingThisFrame = true;
        await slideAnim((x, y) => {
          playerX = x; playerY = y; playerMovingThisFrame = true;
        }, fromX, fromY, toX, toY, HERO_SLIDE_MS);
        playerMovingThisFrame = false;
        // 1タイル消費 (heroPath 先頭が wp と一致してれば shift)
        if (heroPath.length > 0 && heroPath[0].tx === wp.tx && heroPath[0].ty === wp.ty) {
          heroPath.shift();
        }
        // 訪問履歴に「離れたタイル」を push (オシレーション抑制)
        // 直後の経路再計算で逆方向 (oldPlayerTile に戻る経路) が重く扱われる
        pushHeroRecentTile(oldPlayerTile.tx, oldPlayerTile.ty);
        // 探索ターン: 知覚 → 罠 → 仲間 → 敵 → 再罠
        if (typeof runPerceptionCheck === "function") runPerceptionCheck();
        if (typeof checkTrapTrigger === "function") checkTrapTrigger();
        await exploreAllyTurn(oldPlayerTile);
        await exploreEnemyTurn();
        if (typeof checkTrapTrigger === "function") checkTrapTrigger();
        await sleepMs(HERO_POST_SLIDE_MS);
        heroTurnPause = TURN_PAUSE_TICKS;
      } finally {
        heroSliding = false;
      }
    }

    let heroWaitForBacklineStartAt = 0;
    function heroAI() {
      if (!gameStarted || gameOver) return;
      if (encounterActive) return;  // 観戦フェーズ中は turn loop が制御
      if (attackActive || counterActive || playerHitStun > 0) return;
      if (heroSliding) return;  // 1タイル離散スライド進行中は新しい指示を出さない
      // 仲間 or 敵の探索ターン中はプレイヤー前進を抑制
      if (exploreAllyTurnRunning || exploreEnemyTurnRunning) return;
      // バックラインが配置につくまで前進を待つ (戦闘終了直後の置き去り防止)
      // ただし 5秒経っても揃わないなら詰み回避で強制解除
      if (!isBacklineInPosition()) {
        if (!heroWaitForBacklineStartAt) heroWaitForBacklineStartAt = Date.now();
        if (Date.now() - heroWaitForBacklineStartAt < 5000) {
          // 待機中、遅れてる仲間をプレイヤーの位置へ呼び寄せる
          exploreRallyToPlayer();
          return;
        }
      } else {
        heroWaitForBacklineStartAt = 0;
      }

      // ヒットボックス中心(+58)でタイル座標を計算 — スプライト中心(+48)は1幅廊下でズレる
      const pCX = playerX + 48, pCY = playerY + 58;
      const pTX = Math.floor(pCX / TILE_SIZE);
      const pTY = Math.floor(pCY / TILE_SIZE);

      // スタック検知: 移動していない時間をカウント(休止中は無視)
      const moved = Math.hypot(playerX - heroLastX, playerY - heroLastY) > 0.4;
      if (moved || heroTurnPause > 0) heroStuckTicks = 0;
      else heroStuckTicks += 1;
      heroLastX = playerX;
      heroLastY = playerY;

      // ウィグル中: 8方向に脱出移動を試みる(moveTowardTargetに邪魔されないよう target も消す)
      if (heroWiggleUntil > 0) {
        heroWiggleUntil -= 1;
        targetX = null;
        targetY = null;
        heroWiggle();
        return;
      }

      // 緊急脱出: 60tick(1.8s)動けない → 隣接フロアタイルへワープ(ヒットボックス中心を合わせる)
      if (heroStuckTicks > 60) {
        const dirs = [[1,0],[-1,0],[0,1],[0,-1],[2,0],[-2,0],[0,2],[0,-2],[1,1],[-1,1],[1,-1],[-1,-1]];
        for (const [dx, dy] of dirs) {
          const nx = pTX + dx, ny = pTY + dy;
          if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) continue;
          if (mapData[ny][nx] !== 2) {
            // ヒットボックス中心 (playerX+48, playerY+58) をタイル中心 (nx*48+24, ny*48+24) に揃える
            playerX = nx * TILE_SIZE + SNAP_X_OFFSET;
            playerY = ny * TILE_SIZE + SNAP_Y_OFFSET;
            heroStuckTicks = 0;
            heroPath = [];
            heroPathGoal = null;
            // ワープでは履歴の連続性が断たれるのでリセット (ワープ後の経路に古いペナルティを残さない)
            clearHeroRecentTiles();
            return;
          }
        }
      }

      // 20tick動けない → ウィグル開始(stuckTicks はリセットせず、ウィグルでも動けない場合 60tick でワープ)
      if (heroStuckTicks > 20) {
        heroPath = [];
        heroPathTTL = 0;
        // heroPathGoal は残す(ウィグル時に目標方向を参照)
        heroWiggleUntil = 18;            // 18tick(約540ms)だけ
        heroWiggleDir = null;
        heroWiggleDirStuckTicks = 0;
        targetX = null;
        targetY = null;
        return;
      }

      // 現在位置の部屋を訪問済みにマーク
      const bossRoomIdx = ROOMS.length - 1;
      for (let i = 0; i < ROOMS.length; i++) {
        if (roomContainsTile(ROOMS[i], pTX, pTY)) {
          const firstEntry = !visitedRooms.has(i);
          visitedRooms.add(i);
          // ボス部屋に初入室 → 到達ナレーション (戦闘開始前の入室時のみ。
          // 戦闘開始時の「足音」メッセージ runEncounter L9110 とは別タイミング)
          if (firstEntry && i === bossRoomIdx && !bossRoomNarrationShown &&
              !encounterActive && !gameOver && !dungeonCleared) {
            bossRoomNarrationShown = true;
            window.__inBossRoom = true;
            bgm("boss");
            showDMMessage("…この先に、奴がいる。準備はいいか。", 2400);
          }
        }
      }
      // 周囲タイルをフォグオブウォーで「見た」扱いに
      markVisitedAround(pTX, pTY, 6);

      // ① 敵発見 → 最も近い敵を目標
      const enemy = findNearestAliveEnemy();
      let goalTX, goalTY;
      if (enemy) {
        const size = enemy.def.displaySize;
        const eCX = enemy.x + size / 2;
        const eCY = enemy.y + size / 2;
        goalTX = Math.floor(eCX / TILE_SIZE);
        goalTY = Math.floor(eCY / TILE_SIZE);
        // 向きを敵に合わせる(攻撃判定のため)
        mouseX = eCX; mouseY = eCY;
        updateFacingFromMouse();
        // 攻撃レンジ内かつ視線が通っているなら停止して自動攻撃に任せる
        // (視線が通らない = 壁越し の場合は A* で回り込む)
        const dist = Math.hypot(pCX - eCX, pCY - eCY);
        if (dist < 80 && hasLineOfSight(pCX, pCY, eCX, eCY)) {
          targetX = null; targetY = null;
          heroPath = []; heroPathGoal = null;
          // 攻撃レンジ内で待機中も heroTurnPause を減らす(減らさないと checkAutoAttack が永久に止まる)
          if (heroTurnPause > 0) heroTurnPause -= 1;
          return;
        }
      } else {
        // ② 敵なし → まずドロップアイテムを回収
        const drop = findNearestDrop();
        if (drop) {
          goalTX = Math.floor(drop.x / TILE_SIZE);
          goalTY = Math.floor(drop.y / TILE_SIZE);
        } else {
          // ③ ドロップなし → 未訪問の部屋へ
          const roomIdx = findNextRoomGoal();
          if (roomIdx >= 0) {
            heroCurrentRoomGoal = roomIdx;
            const t = nearestFloorTileIn(ROOMS[roomIdx]);
            goalTX = t.tx; goalTY = t.ty;
          } else {
            // ④ 全部屋探索済みだが敵が残っている → 霧を無視して最寄り敵へ
            let globalEnemy = null, bestD = Infinity;
            for (const e of enemies) {
              if (!e.alive) continue;
              if (e.inactive) continue;   // 檻内のビーストは「未探索の敵」に数えない
              const size = e.def.displaySize;
              const d = Math.hypot(pCX - (e.x + size/2), pCY - (e.y + size/2));
              if (d < bestD) { globalEnemy = e; bestD = d; }
            }
            if (globalEnemy) {
              const size = globalEnemy.def.displaySize;
              goalTX = Math.floor((globalEnemy.x + size/2) / TILE_SIZE);
              goalTY = Math.floor((globalEnemy.y + size/2) / TILE_SIZE);
            } else {
              targetX = null; targetY = null;
              return;
            }
          }
        }
      }

      // A*経路を計算(目標変化 or TTL切れ or 経路無し時)
      heroPathTTL -= 1;
      const needsRecalc =
        heroPath.length === 0 ||
        heroPathTTL <= 0 ||
        !heroPathGoal ||
        heroPathGoal.tx !== goalTX ||
        heroPathGoal.ty !== goalTY;
      if (needsRecalc) {
        // 仲間を避けた経路と、仲間を無視した(壁のみ考慮)経路を両方計算
        const allyAvoid = getUnitOccupiedTiles("player");
        // 訪問履歴ペナルティ: 直近通ったタイルに戻る経路に追加 g-cost (オシレーション抑制)
        const recentPenalty = heroRecentPenaltyMap();
        const pathAvoidAllies = aStar(pTX, pTY, goalTX, goalTY, allyAvoid, recentPenalty) || [];
        const pathIgnoreAllies = aStar(pTX, pTY, goalTX, goalTY, null, recentPenalty) || [];

        // 壁を考慮しても到達不可 = 本当に届かない → unreachable 登録
        if (pathIgnoreAllies.length === 0 && !(pTX === goalTX && pTY === goalTY)) {
          heroPath = [];
          unreachableDropTiles.add(dropTileKey(goalTX, goalTY));
          heroPathGoal = null;
          targetX = null; targetY = null;
          return;
        }

        // 仲間塞がれ or 大回り判定:
        //   - 避けた経路が無い → 仲間タイルを通る経路にフォールバック (deadlock 回避)
        //   - 無視経路の 2.5倍超 → 待機 (本当に大回りすぎる場合のみ)
        const DETOUR_RATIO = 2.5;
        if (pathAvoidAllies.length === 0 && pathIgnoreAllies.length > 0) {
          // 仲間が完全に塞いでいる → 仲間を押しのけて通る (5人パーティの密集対策)
          heroPath = pathIgnoreAllies;
          heroPathGoal = { tx: goalTX, ty: goalTY };
          heroPathTTL = 20;
        } else if (pathIgnoreAllies.length > 0 &&
                   pathAvoidAllies.length > pathIgnoreAllies.length * DETOUR_RATIO) {
          // 大回りすぎる → 待機して仲間が動くのを待つ
          heroPath = [];
          heroPathGoal = null;
          heroPathTTL = 6;
          return;
        } else {
          // 通常: 仲間を避けた経路を採用
          heroPath = pathAvoidAllies;
          heroPathGoal = { tx: goalTX, ty: goalTY };
          heroPathTTL = 20;
        }
      }

      // 休止中: 動かない (前回スライドの post-slide 余韻を維持)
      if (heroTurnPause > 0) {
        heroTurnPause -= 1;
        targetX = null;
        targetY = null;
        return;
      }

      if (heroPath.length > 0) {
        const wp = heroPath[0];
        // 1タイル離散スライド (380ms) → 探索ターン → 休止 を非同期で実行
        const oldPlayerTile = { tx: pTX, ty: pTY };
        targetX = null; targetY = null;
        heroSlideOneTileExplore(wp, oldPlayerTile);
      } else {
        // ゴール到達: 何もしない (タイル一致時のドロップ回収は checkCoinPickup 等が処理)
        targetX = null; targetY = null;
      }
    }

    let dungeonCleared = false;
    function checkDungeonClear() {
      if (dungeonCleared || gameOver) return;
      // passiveNpc (未対話/友好/無視のカエルム霊) は撃破対象ではないのでクリア判定から除外。
      // 敵対化すると passiveNpc=false になり、通常敵同様に撃破が必要。
      if (enemies.every(e => !e.alive || e.passiveNpc) && visitedRooms.size >= ROOMS.length - 2) {
        dungeonCleared = true;
        // Phase 2-J: シナリオクリア時に全 ally + リーダーの呪文スロットを完全回復
        for (const a of allies) {
          if (a && a.alive && a.maxSpellSlots) {
            a.spellSlots = { ...a.maxSpellSlots };
          }
        }
        if (currentMaxSpellSlots) {
          currentSpellSlots = { ...currentMaxSpellSlots };
        }
        updateInfo("ダンジョン制覇！\n全ての敵を倒した");
      }
    }

    function checkAutoAttack() {
      if (encounterActive) return;  // 観戦フェーズ中は turn loop 側が発動を管理
      if (attackActive || isGuarding || counterActive || gameOver || !gameStarted) return;
      // ターン休止中は攻撃しない(1ターン1アクション制)
      if (heroTurnPause > 0) return;

      const center = getPlayerCenter();
      const attackRange = 170;
      let nearestIndex = -1;
      let nearestDist = Infinity;

      for (let i = 0; i < enemies.length; i++) {
        if (!enemies[i].alive) continue;
        if (enemies[i].inactive) continue;   // 檻内のビースト等は auto-target から除外
        const ex = enemies[i].x + enemies[i].def.displaySize / 2;
        const ey = enemies[i].y + enemies[i].def.displaySize / 2;
        const dx = ex - center.x;
        const dy = ey - center.y;
        const dist = Math.hypot(dx, dy);

        // 向いている方向に敵がいるか確認 (右向きのみ運用: X軸で判定)
        const inFacing =
          (facing === "right" && dx > 0) ||
          (facing === "left"  && dx < 0);

        if (dist <= attackRange && inFacing && dist < nearestDist) {
          nearestDist = dist;
          nearestIndex = i;
        }
      }

      if (nearestIndex < 0) return;

      const enemy = enemies[nearestIndex];
      const ex = (enemy.x + enemy.def.displaySize / 2);
      const ey = (enemy.y + enemy.def.displaySize / 2);
      const angle = Math.atan2(ey - center.y, ex - center.x);

      // 敵の方向に向く (右向きのみ運用: X軸のみ判定、真上/真下時は維持)
      if (Math.abs(ex - center.x) > 2) {
